<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint Visual Audit Contact Sheet 2026-05-16</title>
<style>
  body{margin:0;background:#071220;color:#bddfff;font-family:Arial,sans-serif;}
  header{position:sticky;top:0;background:#091a2f;border-bottom:1px solid #2c5788;padding:10px 14px;z-index:2}
  h1{font:700 16px/1.2 ui-monospace,Menlo,monospace;margin:0 0 4px;color:#e7f4ff}
  p{font:12px/1.45 Arial,sans-serif;margin:0;color:#7fa8d2}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:10px}
  .card{border:1px solid #2b5484;background:#0b1f36;min-width:0}
  .title{font:12px/1.2 ui-monospace,Menlo,monospace;padding:6px 8px;border-bottom:1px solid #2b5484;color:#e7f4ff}
  .row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px}
  .cell{background:#050f1b;min-height:126px;overflow:hidden}
  .axis{font:10px/1 ui-monospace,Menlo,monospace;color:#70a6dc;padding:4px 5px}
  img{display:block;width:100%;height:112px;object-fit:contain}
  @media (max-width:1200px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
</style>
</head>
<body>
<header>
  <h1>Blueprint Visual Audit Contact Sheet · 3-axis assembly images</h1>
  <p>Each card shows top / internal / exterior. Use this to mark images that are too icon-like, ambiguous, or mismatched against the assembly intent.</p>
</header>
<main class="grid" id="grid"></main>
<script>
const ids = [
  'arm_6dof','cinelifter_x8','civil_airliner','cnc_tool_changer','cochlear_implant',
  'cubesat_3u','cyclocopter_demo','delta_parallel_robot','electric_motor_assy',
  'fighter_f_class','harmonic_drive','heavy_helicopter','humanoid_biped',
  'hydraulic_cylinder','ion_thruster_assy','lunar_lander','marine_propeller',
  'mars_rover','myoelectric_hand','orbital_module','powered_afo','powered_exoskeleton',
  'precision_linkage','quadruped_walker','racing_quad_5in','research_submarine',
  'rov_inspection','small_launch_vehicle','solid_rocket_motor','space_telescope',
  'supersonic_sst','surgical_robot_arm','suspension_assy','tiltrotor_vtol',
  'turbofan_engine','turboprop_transport','underwater_glider','usv_autonomous',
  'wave_glider_asv','wing_long_range'
];
const axes = ['top', 'internal', 'exterior'];
document.getElementById('grid').innerHTML = ids.map(id => `
  <section class="card">
    <div class="title">${id}</div>
    <div class="row">
      ${axes.map(axis => `
        <div class="cell">
          <div class="axis">${axis}</div>
          <img src="../vendor/img/${id}_${axis}.svg" alt="${id} ${axis}">
        </div>
      `).join('')}
    </div>
  </section>
`).join('');
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint Visual Audit Contact Sheet 2026-05-16 Page 2</title>
<style>
  body{margin:0;background:#071220;color:#bddfff;font-family:Arial,sans-serif;}
  header{background:#091a2f;border-bottom:1px solid #2c5788;padding:10px 14px}
  h1{font:700 16px/1.2 ui-monospace,Menlo,monospace;margin:0 0 4px;color:#e7f4ff}
  p{font:12px/1.45 Arial,sans-serif;margin:0;color:#7fa8d2}
  .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:10px}
  .card{border:1px solid #2b5484;background:#0b1f36;min-width:0}
  .title{font:12px/1.2 ui-monospace,Menlo,monospace;padding:6px 8px;border-bottom:1px solid #2b5484;color:#e7f4ff}
  .row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px}
  .cell{background:#050f1b;min-height:150px;overflow:hidden}
  .axis{font:10px/1 ui-monospace,Menlo,monospace;color:#70a6dc;padding:4px 5px}
  img{display:block;width:100%;height:136px;object-fit:contain}
</style>
</head>
<body>
<header>
  <h1>Blueprint Visual Audit Contact Sheet · page 2</h1>
  <p>Remaining assembly 3-axis images, larger thumbnails.</p>
</header>
<main class="grid" id="grid"></main>
<script>
const ids = [
  'powered_afo','powered_exoskeleton','precision_linkage','quadruped_walker',
  'racing_quad_5in','research_submarine','rov_inspection','small_launch_vehicle',
  'solid_rocket_motor','space_telescope','supersonic_sst','surgical_robot_arm',
  'suspension_assy','tiltrotor_vtol','turbofan_engine','turboprop_transport',
  'underwater_glider','usv_autonomous','wave_glider_asv','wing_long_range'
];
const axes = ['top', 'internal', 'exterior'];
document.getElementById('grid').innerHTML = ids.map(id => `
  <section class="card">
    <div class="title">${id}</div>
    <div class="row">
      ${axes.map(axis => `
        <div class="cell">
          <div class="axis">${axis}</div>
          <img src="../vendor/img/${id}_${axis}.svg" alt="${id} ${axis}">
        </div>
      `).join('')}
    </div>
  </section>
`).join('');
</script>
</body>
</html>

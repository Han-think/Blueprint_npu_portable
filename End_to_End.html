<script type="text/babel">
const { useState, useMemo } = React;
const C = {
  canvas:'#0c1e35', canvas2:'#0a1a2e', frame:'#274a79', ink:'#fff', ink2:'#e6ecf5', ink3:'#9aa8bd',
  lox:'#9fd3ff', lox2:'#9cd0ff', lh2:'#ffd39f', intertank:'#89ffa8', intertank2:'#b6ffb6',
  halo:'#caa9ff', danger:'#ff9fb5', engineFill:'#1f6aa8',
  mono:"'JetBrains Mono', ui-monospace, Menlo, monospace",
  sans:"'Inter','Noto Sans KR',system-ui,sans-serif",
};
const Chip = ({color=C.lox,children}) => <span style={{fontFamily:C.mono,fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color}}>{children}</span>;
const Card = ({children,style}) => <div style={{border:`1px solid ${C.frame}`,padding:20,borderRadius:2,background:C.canvas,...style}}>{children}</div>;
const H = ({children,c=C.ink}) => <h2 style={{margin:'0 0 12px',fontWeight:600,fontSize:22,color:c,lineHeight:1.15}}>{children}</h2>;
const Btn = ({children,variant='default',onClick,active=false}) => {
  const b = variant==='primary'?C.lox:variant==='go'?C.intertank:variant==='warn'?C.lh2:variant==='danger'?C.danger:C.ink;
  return <button onClick={onClick} style={{fontFamily:C.mono,fontSize:12,textTransform:'uppercase',letterSpacing:'0.08em',
    padding:'9px 14px',background:active?b:'transparent',color:active?C.canvas:b,border:`1px solid ${b}`,borderRadius:2,cursor:'pointer'}}>{children}</button>;
};

function Stage4_PartTree({tree}){
  function walk(n, depth=0){
    return [
      <div key={n.id} style={{fontFamily:C.mono,fontSize:12,paddingLeft:depth*18,color:C.ink}}>
        <span style={{color:C.lox}}>{n.id}</span>
        <span style={{color:C.ink3}}> · </span>
        <span>{n.name}</span>
        {n.qty && <span style={{color:C.ink3}}> · ×{n.qty}</span>}
        {n.material && <span style={{color:C.lh2}}> · {n.material}</span>}
        {n.process && <span style={{color:C.intertank}}> · {n.process}</span>}
      </div>,
      ...(n.children||[]).flatMap(c=>walk(c,depth+1))
    ];
  }
  return (
    <Card>
      <Chip color={C.lox2}>4 · PART_TREE · PARSED JSON</Chip>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:10}}>
        <div style={{border:`1px solid ${C.frame}`,padding:12,background:C.canvas2}}>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.ink3,marginBottom:8}}>TREE VIEW</div>
          {walk(tree)}
        </div>
        <pre style={{margin:0,background:C.canvas2,border:`1px solid ${C.frame}`,padding:12,
          fontFamily:C.mono,fontSize:11,color:C.ink2,overflow:'auto',maxHeight:320}}>
{JSON.stringify(tree,null,2)}
        </pre>
      </div>
    </Card>
  );
}

function Stage5_Geometry({ops}){

        <div>

{ops.map(o=>`${o.op.padEnd(14)} ${JSON.stringify(o.args)}${o.id?'  // '+o.id:''}`).join('\n')}

          <div style={{fontFamily:C.mono,fontSize:10,color:C.ink3,marginTop:6}}>
            → resolve via <span style={{color:C.lox}}>cadquery</span> · export <span style={{color:C.lox}}>STEP / STL / 3MF</span>
          </div>
        </div>
        {/* iso wireframe preview */}
        <div style={{border:`1px solid ${C.frame}`,background:C.canvas2,padding:10}}>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.ink3,marginBottom:6}}>ISO PREVIEW · wireframe</div>
          <svg viewBox="0 0 360 280" width="100%">
            {/* outer ring */}
            <ellipse cx="180" cy="160" rx="140" ry="50" fill="none" stroke={C.ink} strokeWidth="1.2"/>

            {/* 24 coax elements as dots on PCD */}

            {Array.from({length:12}).map((_,i)=>{

            <text x="180" y="30" fill={C.lox} fontSize="11" fontFamily={C.mono} textAnchor="middle">24× coax · PCD 156</text>
            <text x="180" y="48" fill={C.lh2} fontSize="11" fontFamily={C.mono} textAnchor="middle">12× M10 · PCD 196</text>

        </div>

function Stage6_Verify({checks, risks}){
  return (
    <Card>
      <Chip color={C.intertank}>6 · VERIFY · V&V + RISKS</Chip>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:10}}>
        <div>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.ink3,marginBottom:6}}>AUTO CHECKS</div>
          {checks.map((c,i)=>{
            const col = c.result==='pass'?C.intertank:c.result==='warn'?C.lh2:C.danger;
            const mark = c.result==='pass'?'✓':c.result==='warn'?'!':'✗';
            return (
              <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:`1px dashed ${C.frame}`}}>
                <span style={{color:col,fontFamily:C.mono,fontSize:14,width:14}}>{mark}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:C.mono,fontSize:12,color:C.ink}}>{c.check}</div>
                  <div style={{fontFamily:C.mono,fontSize:11,color:col}}>{c.value}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.ink3,marginBottom:6}}>TOP 5 RISKS</div>
          {risks.map((r,i)=>(
            <div key={i} style={{padding:'8px 0',borderBottom:`1px dashed ${C.frame}`}}>
              <div style={{display:'flex',gap:10}}>
                <span style={{color:C.danger,fontFamily:C.mono,fontSize:11}}>{r.id}</span>
                <div style={{flex:1,fontFamily:C.mono,fontSize:12,color:C.ink}}>{r.desc}</div>
              </div>
              <div style={{fontFamily:C.mono,fontSize:11,color:C.intertank,marginTop:4,paddingLeft:32}}>→ {r.mit}</div>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

function Stage7_Slice({profiles}){
  const [mode,setMode]=useState('lpbf');
  const p = profiles[mode];
  return (
    <Card>
      <Chip color={C.danger}>7 · SLICE · PRINT_PROFILE + G-CODE</Chip>
      <div style={{display:'flex',gap:10,margin:'10px 0'}}>
        <Btn onClick={()=>setMode('fdm')}  active={mode==='fdm'}  variant='warn'>FDM · PrusaSlicer</Btn>
        <Btn onClick={()=>setMode('lpbf')} active={mode==='lpbf'} variant='danger'>LPBF · EOSPRINT</Btn>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <pre style={{margin:0,background:C.canvas2,border:`1px solid ${C.frame}`,padding:12,
          fontFamily:C.mono,fontSize:12,color:C.ink2}}>
{`printer      : ${p.printer}
material     : ${p.material}
layer_mm     : ${p.layer_mm}
${'hatch_mm' in p ? 'hatch_mm     : '+p.hatch_mm+'\n' : ''}${'laser_W' in p ? 'laser_W      : '+p.laser_W+'\n' : ''}${'walls' in p ? 'walls        : '+p.walls+'\n' : ''}${'infill' in p ? 'infill       : '+p.infill+'\n' : ''}supports     : ${p.supports}
orientation  : ${p.orientation}
est_time     : ${p.est_time}
${'filament_g' in p ? 'filament_g   : '+p.filament_g : 'powder_kg    : '+p.powder_kg}`}
        </pre>
        <pre style={{margin:0,background:C.canvas2,border:`1px solid ${C.frame}`,padding:12,
          fontFamily:C.mono,fontSize:11,color:C.ink2,overflow:'auto'}}>
{mode==='fdm' ?
`; G-code · Prusa MK4 · PETG
; generated by slicer_job v0.2
M140 S80
M104 S240 T0
G28 ; home
G1 Z0.2 F600
G1 X30 Y30 F3000
; LAYER:0
G1 F1800 E2
...
; total layers: 140
; estimated time: 11h 40m
M104 S0 ; cooldown`
:
`; JOB · EOSPRINT 2.x · Inconel 718
; scan strategy: stripe 67°
; laser: 285 W, 960 mm/s
; hatch: 0.11 mm, layer: 0.04 mm
; contour: 100 W, 400 mm/s
; supports: block, thickness 2 mm
; --- layer 000000 ---
EXPOSE CONTOUR
EXPOSE INFILL stripe rot=67
RECOAT
; ---
; total layers: 1625
; estimated time: 38h 12m`}
        </pre>
      </div>
    </Card>
  );
}

function Stage8_Queue({tree}){
  const rows = useMemo(()=>{
    const out=[];
    (function walk(n,parent){
      out.push({id:n.id,name:n.name,qty:n.qty||1,material:n.material||'',process:n.process||'',parent:parent||''});
      (n.children||[]).forEach(c=>walk(c,n.id));
    })(tree);
    return out;
  },[tree]);
  return (
    <Card>
      <Chip>8 · QUEUE · PRINT_QUEUE.CSV</Chip>
      <div style={{marginTop:10,border:`1px solid ${C.frame}`}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontFamily:C.mono,fontSize:12}}>
          <thead style={{background:C.canvas2}}><tr>
            {['id','name','qty','material','process','parent','status'].map(h=>(
              <th key={h} style={{textAlign:'left',padding:'8px 10px',color:C.ink3,fontWeight:400,
                borderBottom:`1px solid ${C.frame}`,textTransform:'uppercase',letterSpacing:'0.08em',fontSize:10}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>{
              const statuses=['queued','queued','sliced','sliced','ready','printing','done'];
              const s=statuses[i%statuses.length];
              const colMap={queued:C.ink3, sliced:C.lh2, ready:C.intertank, printing:C.lox, done:C.intertank};
              return (
                <tr key={r.id} style={{borderBottom:`1px solid ${C.canvas2}`}}>
                  <td style={{padding:'8px 10px',color:C.lox}}>{r.id}</td>
                  <td style={{padding:'8px 10px',color:C.ink}}>{r.name}</td>
                  <td style={{padding:'8px 10px',color:C.ink2}}>{r.qty}</td>
                  <td style={{padding:'8px 10px',color:C.lh2}}>{r.material}</td>
                  <td style={{padding:'8px 10px',color:C.intertank}}>{r.process}</td>
                  <td style={{padding:'8px 10px',color:C.ink3}}>{r.parent||'—'}</td>
                  <td style={{padding:'8px 10px',color:colMap[s]}}>{s}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:10,marginTop:14}}>
        <Btn variant='primary'>Export print_pack.zip</Btn>
        <Btn variant='go'>Send to printer (OctoPrint · FTP)</Btn>
        <Btn>Mark done → prefs.jsonl (feedback)</Btn>
      </div>
    </Card>
  );
}

// ============================================================
// ROOT
// ============================================================
function App(){
  const [active,setActive]=useState(0);
  const stages = [
    <Stage1_Brief brief={SAMPLE_BRIEF}/>,
    <Stage2_RAG/>,
    <Stage3_Generate/>,
    <Stage4_PartTree tree={SAMPLE_PART_TREE}/>,
    <Stage5_Geometry ops={SAMPLE_GEOMETRY_OPS}/>,
    <Stage6_Verify checks={SAMPLE_VERIFY} risks={SAMPLE_RISKS}/>,
    <Stage7_Slice profiles={SAMPLE_PRINT_PROFILE}/>,
    <Stage8_Queue tree={SAMPLE_PART_TREE}/>,
  ];
  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:24,fontFamily:C.sans,color:C.ink2}} data-screen-label="Blueprint NPU E2E">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <div>
          <div style={{fontFamily:C.mono,letterSpacing:'0.14em',color:C.ink,fontSize:22}}>BLUEPRINT_NPU</div>
          <div style={{fontFamily:C.mono,fontSize:12,color:C.lox,marginTop:4}}>
            NPU · OpenVINO INT4 · &lt;20 B models · offline · engineering-first design → 3D print
          </div>
        </div>
        <div style={{display:'flex',gap:14,fontFamily:C.mono,fontSize:11,color:C.ink3}}>
          <span>models: <span style={{color:C.lox}}>qwen2.5-3b · llama-3.2-3b · phi-3.5-mini</span></span>
          <span>device: <span style={{color:C.intertank}}>Core Ultra · NPU</span></span>
        </div>
      </div>

      <ArchDiagram/>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
        <H>End-to-end pipeline · <span style={{color:C.lox}}>injector_face_plate</span> · <span style={{color:C.ink3,fontWeight:400}}>leaf71-r0</span></H>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>setActive(Math.max(0,active-1))}>◀ prev</Btn>
          <Btn variant='primary' onClick={()=>setActive(Math.min(STAGES.length-1,active+1))}>next ▶</Btn>
        </div>
      </div>
      <StageBar active={active} onPick={setActive}/>
      {stages[active]}

      <div style={{marginTop:28,border:`1px solid ${C.frame}`,padding:16,background:C.canvas}}>
        <Chip color={C.halo}>FEEDBACK LOOP · CLOSES THE CIRCLE</Chip>
        <div style={{fontFamily:C.mono,fontSize:12,color:C.ink2,marginTop:8,lineHeight:1.7}}>
          printer outcome (pass / fail / rework) + operator rating → <span style={{color:C.lox}}>save/sessions/&lt;ts&gt;/prefs.jsonl</span><br/>
          → periodic <span style={{color:C.intertank}}>LoRA / DPO refresh</span> on XPU → re-export INT4 → hot-swap on NPU.<br/>
          No cloud, no telemetry. Everything stays in <span style={{color:C.lox}}>./save/</span>.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>

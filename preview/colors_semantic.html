<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="bp" style="margin:0;padding:24px;width:700px;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div><div style="height:60px;background:#89ffa8;"></div><div class="chip" style="margin-top:6px;color:#89ffa8">SUCCESS</div><div class="caption">#89ffa8</div></div>
    <div><div style="height:60px;background:#ffd39f;"></div><div class="chip" style="margin-top:6px;color:#ffd39f">WARNING</div><div class="caption">#ffd39f</div></div>
    <div><div style="height:60px;background:#ff9fb5;"></div><div class="chip" style="margin-top:6px;color:#ff9fb5">DANGER</div><div class="caption">#ff9fb5</div></div>
    <div><div style="height:60px;background:#9fd3ff;"></div><div class="chip" style="margin-top:6px;color:#9fd3ff">INFO</div><div class="caption">#9fd3ff</div></div>
  </div>
  <div style="margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div class="card" style="padding:10px;"><span class="chip label-intertank">PASS</span><div class="caption" style="margin-top:4px;">part_tree ✓ · dedup ✓</div></div>
    <div class="card" style="padding:10px;"><span class="chip label-lh2">WARN</span><div class="caption" style="margin-top:4px;">Δp &gt; 10%</div></div>
    <div class="card" style="padding:10px;"><span class="chip" style="color:#ff9fb5">RISK</span><div class="caption" style="margin-top:4px;">overhang 52°</div></div>
    <div class="card" style="padding:10px;"><span class="chip label-lox">INFO</span><div class="caption" style="margin-top:4px;">device=NPU</div></div>
  </div>
</body></html>

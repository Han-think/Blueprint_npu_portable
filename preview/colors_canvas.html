<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="bp" style="margin:0;padding:24px;width:700px;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <!-- canvas -->
    <div>
      <div style="height:72px;background:#0c1e35;border:1px solid #274a79;"></div>
      <div class="chip" style="margin-top:6px;color:#9fd3ff">CANVAS</div>
      <div class="caption">#0c1e35</div>
    </div>
    <div>
      <div style="height:72px;background:#0a1a2e;border:1px solid #274a79;"></div>
      <div class="chip" style="margin-top:6px;color:#9fd3ff">CANVAS‑2</div>
      <div class="caption">#0a1a2e</div>
    </div>
    <div>
      <div style="height:72px;background:#274a79;border:1px solid #274a79;"></div>
      <div class="chip" style="margin-top:6px;color:#9fd3ff">FRAME</div>
      <div class="caption">#274a79</div>
    </div>
    <div>
      <div style="height:72px;background:#ffffff;"></div>
      <div class="chip" style="margin-top:6px;color:#9fd3ff">INK</div>
      <div class="caption">#ffffff</div>
    </div>
  </div>
</body></html>

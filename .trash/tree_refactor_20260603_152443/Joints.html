<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<title>Joints · Blueprint NPU</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>body{margin:0;background:#0c1e35;color:#eaf2ff;font-family:Inter,sans-serif}.mono{font-family:'JetBrains Mono',monospace}button{cursor:pointer;font-family:Inter;background:transparent;border:1px solid #274a79;color:#eaf2ff;padding:6px 12px;font-size:11px;letter-spacing:.04em}button:hover{border-color:#9fd3ff;color:#9fd3ff}button.on{background:#9fd3ff;color:#0c1e35;border-color:#9fd3ff}</style>
</head><body class="bp">
<div id="topnav"></div><div id="root"></div>
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/babel.js"></script>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel">setTimeout(()=>window.BPMountTopNav&&window.BPMountTopNav('Joints'),100);</script>
<script type="text/babel">
const {useState} = React;
const C={canvas:'#0c1e35',canvas2:'#0a1a2f',frame:'#274a79',ink:'#eaf2ff',ink2:'#9fb6d9',ink3:'#6f8cb0',
        lox:'#9fd3ff',lh2:'#ffd39f',inter:'#89ffa8',halo:'#ff9fc6',risk:'#ff8c8c'};

const JOINTS = [
  {id:'J1', name:'Hi-Lok™ pin + collar', cat:'fastener', use:'Wing skin, fuselage panel, engine nacelle',
   spec:'MS21923 · Ti / A286 / 17-4PH', strength:'95 ksi shear (Hi-Lok 95)', preload:'auto torque break-off',
   tolerance:'transition fit, edge 2D / spacing 4D', removable:false, notes:'Allen hex on pin tail prevents spin during collar install. Collar shears at preset torque → no torque inspection.'},
  {id:'J2', name:'Hi-Lite® (Ti)', cat:'fastener', use:'Weight-critical structural', spec:'NAS1580 · titanium',
   strength:'~95 ksi shear', preload:'auto break-off', tolerance:'transition fit', removable:false,
   notes:'Like Hi-Lok but shorter thread transition + all-Ti → ~25% lighter.'},
  {id:'J3', name:'Hi-Tigue® (interference)', cat:'fastener', use:'Wing splice, high-cycle fatigue zones',
   spec:'pin w/ radius bead', strength:'95 ksi shear', preload:'cold-works hole on install',
   tolerance:'interference fit', removable:false, notes:'Cold-work bead increases fatigue life of mating hole.'},
  {id:'J4', name:'Taper-Lok', cat:'fastener', use:'Critical cyclic loading (spar caps, root fittings)',
   spec:'1.19° tapered shank, alloy steel / Ti', strength:'bolt-equivalent tension', preload:'torque to nut',
   tolerance:'reamed taper interference', removable:true, notes:'Taper preload + no shank spin. As tension capable as same-size bolt.'},
  {id:'J5', name:'Marman V-band clamp', cat:'clamp', use:'Engine inlet/outlet, ducting, payload separation',
   spec:'MS21924 · Inconel / CRES', strength:'up to 800 °F service', preload:'T-bolt torque',
   tolerance:'flange profile to ±0.05 mm', removable:true, notes:'Replaces heavy bolted flange. Single-point disconnect — used SpaceX stage sep, GE/RR engine cases.'},
  {id:'J6', name:'Bolted flange (PCD)', cat:'flange', use:'Tank dome to barrel, gimbal interface',
   spec:'MS / NAS bolt pattern · 6–24 bolts', strength:'pressure-class up to 4× MEOP', preload:'torque + lockwire',
   tolerance:'flatness 0.05/Ø200', removable:true, notes:'Conservative, heavy, but field-serviceable. Datum A = flange face, B = bolt circle.'},
  {id:'J7', name:'Solid rivet (MS20470)', cat:'rivet', use:'Skin-to-stringer, non-critical',
   spec:'2017-T4 / 5056 Al · ø3.2–6.4 mm', strength:'30–41 ksi shear', preload:'driven (cold form)',
   tolerance:'edge 2D, spacing 4D', removable:false, notes:'Do NOT use on composites — over-stresses hole, causes delamination.'},
  {id:'J8', name:'Cherry blind rivet', cat:'rivet', use:'Blind-side access only',
   spec:'CR3243 / CR3523 · monel / Inconel', strength:'tubular w/ locking stem', preload:'pulled stem',
   tolerance:'standard clearance', removable:false, notes:'One-sided install. Lower strength than Hi-Lok but accessible.'},
  {id:'J9', name:'GTAW weld bead', cat:'permanent', use:'Pressure vessel seam, plumbing tube',
   spec:'AWS D17.1 class A', strength:'parent-metal equiv. after PWHT', preload:'n/a',
   tolerance:'mismatch ≤ 10% wall', removable:false, notes:'X-ray + dye-penetrant inspection mandatory. Heat-affected zone reduces parent strength ~15% pre-PWHT.'},
  {id:'J10',name:'AN/MS swage fitting', cat:'tube', use:'Hydraulic / pneumatic lines',
   spec:'AS3402 · AS5202 fitting', strength:'pressure to 3000 psi', preload:'swage tool',
   tolerance:'bore concentricity 0.025', removable:false, notes:'Crimped onto tube. Replaces flared fitting in vibration zones.'},
];

const STACKUP = [
  {part:'P1 Dome upper', dim:'flange height',  nom:40.00, tol:0.05},
  {part:'P2 Barrel ring',dim:'cylinder length',nom:60.00, tol:0.08},
  {part:'P3 Dome lower', dim:'flange height',  nom:40.00, tol:0.05},
  {part:'gasket × 2',    dim:'compressed thk', nom: 2.00, tol:0.10},
];

function App(){
  const [sel,setSel]=useState('J1'); const [cat,setCat]=useState('all');
  const list = cat==='all' ? JOINTS : JOINTS.filter(j=>j.cat===cat);
  const j = JOINTS.find(x=>x.id===sel);

  const wc  = STACKUP.reduce((s,r)=>s+r.tol*(r.part.includes('×')?2:1),0);
  const rss = Math.sqrt(STACKUP.reduce((s,r)=>s+r.tol*r.tol*(r.part.includes('×')?2:1),0));

  return (
    <div style={{maxWidth:1300,margin:'0 auto',padding:'24px 28px 80px'}}>
      <div style={{borderBottom:`1px solid ${C.frame}`,paddingBottom:18,marginBottom:22}}>
        <div className="mono" style={{fontSize:10,color:C.ink3,letterSpacing:'.2em',marginBottom:6}}>BLUEPRINT NPU · JOINTS & TOLERANCE STACK-UP · v0.5</div>
        <div style={{fontSize:34,fontWeight:500,letterSpacing:'-.02em',marginBottom:8}}>How the parts hold together</div>
        <div style={{fontSize:13,color:C.ink2,maxWidth:880,lineHeight:1.55}}>
          The Assembly tree said <i>which</i> parts. This page says <b style={{color:C.ink}}>how</b> they connect — fastener spec,
          datum reference frame (ASME Y14.5-2018), and worst-case + RSS tolerance stack-up so the assembled stack still fits its envelope.
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        {/* DATUM REFERENCE FRAME diagram */}
        <div style={{background:C.canvas2,border:`1px solid ${C.frame}`,padding:18}}>
          <div className="mono" style={{fontSize:10,color:C.ink3,letterSpacing:'.16em',marginBottom:12}}>DATUM REFERENCE FRAME · A-B-C (suppresses 6 DoF)</div>
          <svg viewBox="0 0 500 280" style={{width:'100%'}}>
            {/* part outline */}
            <rect x="120" y="80" width="280" height="140" fill="none" stroke={C.lox} strokeWidth="1.2"/>
            <circle cx="260" cy="150" r="22" fill="none" stroke={C.lox} strokeWidth="1"/>
            {/* primary datum A — bottom face */}
            <line x1="100" y1="220" x2="420" y2="220" stroke={C.halo} strokeWidth="2"/>
            <text x="424" y="224" fill={C.halo} fontSize="11" fontFamily="JetBrains Mono">A · primary (3 DoF)</text>
            {/* secondary datum B — left face */}
            <line x1="120" y1="60" x2="120" y2="240" stroke={C.inter} strokeWidth="2"/>
            <text x="60" y="60" fill={C.inter} fontSize="11" fontFamily="JetBrains Mono">B · secondary</text>
            <text x="60" y="74" fill={C.inter} fontSize="10" fontFamily="JetBrains Mono">(2 DoF)</text>
            {/* tertiary datum C — back face (top edge here) */}
            <line x1="100" y1="80" x2="420" y2="80" stroke={C.lh2} strokeWidth="2" strokeDasharray="4 3"/>
            <text x="424" y="84" fill={C.lh2} fontSize="11" fontFamily="JetBrains Mono">C · tertiary (1 DoF)</text>
            {/* feature control frame */}
            <g transform="translate(240,250)">
              <rect x="0" y="0" width="160" height="22" fill="none" stroke={C.ink2}/>
              <line x1="22" y1="0" x2="22" y2="22" stroke={C.ink2}/><text x="11" y="16" fill={C.ink2} fontSize="13" fontFamily="JetBrains Mono" textAnchor="middle">⊕</text>
              <line x1="68" y1="0" x2="68" y2="22" stroke={C.ink2}/><text x="45" y="16" fill={C.ink2} fontSize="10" fontFamily="JetBrains Mono" textAnchor="middle">Ø0.1 Ⓜ</text>
              <text x="80" y="16" fill={C.ink2} fontSize="10" fontFamily="JetBrains Mono">A | B | C</text>
            </g>
            <text x="260" y="156" fill={C.lox} fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle">bore</text>
          </svg>
          <div className="mono" style={{fontSize:10,color:C.ink3,lineHeight:1.7,marginTop:8}}>
            A locates 3 translational DoF · B + perpendicular adds 2 rotational · C clamps the final yaw.<br/>
            Rule of thumb (aerospace): datum form tolerance = 10× tightest referencing tolerance.
          </div>
        </div>

        {/* TOLERANCE STACK-UP calculation */}
        <div style={{background:C.canvas2,border:`1px solid ${C.frame}`,padding:18}}>
          <div className="mono" style={{fontSize:10,color:C.ink3,letterSpacing:'.16em',marginBottom:12}}>TOLERANCE STACK-UP · LOX tank dome-barrel-dome chain</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead><tr style={{color:C.ink3}} className="mono">
              <th style={{textAlign:'left',padding:'4px 6px',borderBottom:`1px solid ${C.frame}`,letterSpacing:'.08em'}}>PART</th>
              <th style={{textAlign:'left',padding:'4px 6px',borderBottom:`1px solid ${C.frame}`}}>DIM</th>
              <th style={{textAlign:'right',padding:'4px 6px',borderBottom:`1px solid ${C.frame}`}}>NOM mm</th>
              <th style={{textAlign:'right',padding:'4px 6px',borderBottom:`1px solid ${C.frame}`}}>± mm</th>
            </tr></thead>
            <tbody className="mono">{STACKUP.map((r,i)=>(
              <tr key={i} style={{color:C.ink2}}>
                <td style={{padding:'5px 6px'}}>{r.part}</td>
                <td style={{padding:'5px 6px'}}>{r.dim}</td>
                <td style={{padding:'5px 6px',textAlign:'right'}}>{r.nom.toFixed(2)}</td>
                <td style={{padding:'5px 6px',textAlign:'right',color:C.lh2}}>{r.tol.toFixed(2)}</td>
              </tr>))}
            </tbody>
          </table>
          <div style={{marginTop:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{border:`1px solid ${C.risk}`,padding:'10px 12px'}}>
              <div className="mono" style={{fontSize:9,color:C.risk,letterSpacing:'.12em',marginBottom:4}}>WORST-CASE Σ|t|</div>
              <div style={{fontSize:22,fontWeight:500,color:C.ink}}>±{wc.toFixed(2)}<span className="mono" style={{fontSize:11,color:C.ink3,marginLeft:4}}>mm</span></div>
              <div className="mono" style={{fontSize:9,color:C.ink3,marginTop:3}}>aerospace · 100% fit</div>
            </div>
            <div style={{border:`1px solid ${C.inter}`,padding:'10px 12px'}}>
              <div className="mono" style={{fontSize:9,color:C.inter,letterSpacing:'.12em',marginBottom:4}}>RSS √Σt²</div>
              <div style={{fontSize:22,fontWeight:500,color:C.ink}}>±{rss.toFixed(2)}<span className="mono" style={{fontSize:11,color:C.ink3,marginLeft:4}}>mm</span></div>
              <div className="mono" style={{fontSize:9,color:C.ink3,marginTop:3}}>99.73% (3σ)</div>
            </div>
          </div>
          <div className="mono" style={{fontSize:10,color:C.ink3,marginTop:10,lineHeight:1.6}}>
            Critical pressurized assembly → use worst-case. Verifier rejects if stack &gt; envelope.
          </div>
        </div>
      </div>

      {/* JOINT CATALOG */}
      <div style={{background:C.canvas2,border:`1px solid ${C.frame}`,padding:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="mono" style={{fontSize:10,color:C.ink3,letterSpacing:'.16em'}}>AEROSPACE JOINT CATALOG · {list.length}/{JOINTS.length}</div>
          <div style={{display:'flex',gap:6}}>
            {['all','fastener','clamp','flange','rivet','permanent','tube'].map(k=>(
              <button key={k} className={cat===k?'on':''} onClick={()=>setCat(k)}>{k}</button>
            ))}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:14}}>
          <div>
            {list.map(x=>(
              <div key={x.id} onClick={()=>setSel(x.id)} style={{
                padding:'10px 12px',cursor:'pointer',borderLeft:`2px solid ${x.id===sel?C.lox:'transparent'}`,
                background:x.id===sel?'#08152a':'transparent',marginBottom:2}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span className="mono" style={{fontSize:10,color:C.lox}}>{x.id}</span>
                  <span className="mono" style={{fontSize:9,color:C.ink3,letterSpacing:'.08em'}}>{x.cat.toUpperCase()}</span>
                </div>
                <div style={{fontSize:12.5,color:C.ink,marginTop:2}}>{x.name}</div>
                <div style={{fontSize:10.5,color:C.ink2,marginTop:3}}>{x.use}</div>
              </div>
            ))}
          </div>
          <div style={{borderLeft:`1px solid ${C.frame}`,paddingLeft:18}}>
            <div className="mono" style={{fontSize:10,color:C.ink3,letterSpacing:'.12em',marginBottom:4}}>{j.id} · {j.cat.toUpperCase()}</div>
            <div style={{fontSize:20,fontWeight:500,marginBottom:18}}>{j.name}</div>
            {[['Application',j.use],['Spec',j.spec],['Strength',j.strength],['Preload',j.preload],['Tolerance',j.tolerance],['Removable',j.removable?'yes — serviceable':'no — one-time install']].map(([k,v],i)=>(
              <div key={i} style={{marginBottom:12}}>
                <div className="mono" style={{fontSize:9.5,color:C.ink3,letterSpacing:'.1em',marginBottom:3}}>{k.toUpperCase()}</div>
                <div className="mono" style={{fontSize:12,color:C.ink}}>{v}</div>
              </div>
            ))}
            <div style={{marginTop:18,padding:'12px 14px',background:'#08152a',border:`1px dashed ${C.frame}`,fontSize:11.5,color:C.ink2,lineHeight:1.6}}>
              <span className="mono" style={{fontSize:9.5,color:C.halo,letterSpacing:'.1em',marginRight:6}}>NOTES</span>
              {j.notes}
            </div>
          </div>
        </div>
      </div>

      <div style={{background:C.canvas2,border:`1px solid ${C.frame}`,padding:18,marginTop:14}}>
        <div className="mono" style={{fontSize:10,color:C.halo,letterSpacing:'.16em',marginBottom:12}}>SCHEMA · joints.v0.5 · referenced by assembly.json</div>
        <pre className="mono" style={{margin:0,fontSize:10.5,lineHeight:1.6,color:C.ink2,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{`{
  "schema": "joints.v0.5",
  "joints": [{
    "from": "P7",  "to": "P8",
    "type": "bolt-flange",
    "joint_ref": "J6",
    "datum_ref_frame": { "A": "P7.face_aft", "B": "P7.bolt_circle", "C": "P7.keyway" },
    "fastener": { "spec": "NAS6604", "qty": 8, "torque_Nm": 28, "lockwire": true },
    "stackup": { "method": "worst-case", "chain": ["P7","gasket","P8"], "result_mm": 0.20 }
  }],
  "tolerance_method": "worst-case",
  "ASME": "Y14.5-2018"
}`}</pre>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>

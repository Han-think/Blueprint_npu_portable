<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<title>ICD · Blueprint NPU</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>body{margin:0;background:#0c1e35;color:#eaf2ff;font-family:Inter,sans-serif}.mono{font-family:'JetBrains Mono',monospace}</style>
</head><body class="bp">
<div id="topnav"></div><div id="root"></div>
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/babel.js"></script>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel">setTimeout(()=>window.BPMountTopNav&&window.BPMountTopNav('ICD'),100);</script>
<script type="text/babel">
const {useState}=React;
const C={canvas:'#0c1e35',c2:'#0a1a2f',c3:'#08152a',frame:'#274a79',ink:'#eaf2ff',ink2:'#9fb6d9',ink3:'#6f8cb0',
        lox:'#9fd3ff',lh2:'#ffd39f',inter:'#89ffa8',halo:'#caa9ff',risk:'#ff8c8c'};

// Interface Control Document — Engine ↔ Vehicle boundary
// 6 interface families. Each = one row in the formal ICD ledger.
const IFACES = [
  { id:'IF-M01', fam:'mech', title:'Thrust mount bolt pattern',
    desc:'8× MS21250-08036 Hi-Lok on Ø320 BCD · 45° spacing',
    side_e:'P2 forward bulkhead · datum A',
    side_v:'Stage 2 thrust skirt · datum AV',
    nominal:'BCD Ø320.00 +0/−0.05 · bolt Ø8.00 +0.013/−0',
    tol:'TIR ≤ 0.15mm across pattern',
    rev:'C', status:'BASELINED', owner:'Mechanical', closes:'F14' },

  { id:'IF-M02', fam:'mech', title:'Gimbal pivot interface',
    desc:'2× spherical bearing · ±8° travel envelope',
    side_e:'P10 yoke pivot pins',
    side_v:'TVC actuator clevis',
    nominal:'pin Ø20H7 / clevis Ø20F7 · clearance 0.020–0.053mm',
    tol:'misalignment ≤ 0.05° static',
    rev:'B', status:'BASELINED', owner:'Mechanical', closes:'F09' },

  { id:'IF-F01', fam:'fluid', title:'LOX inlet flange',
    desc:'AN-12 cryogenic flange · Ø15.875mm bore',
    side_e:'P14 LOX inlet manifold',
    side_v:'Vehicle LOX feedline (vacuum-jacketed)',
    nominal:'Pc 2.5 MPa · ṁ 14.2 kg/s · 90 K',
    tol:'leak ≤ 1×10⁻⁵ scc/s He · proof 1.5×',
    rev:'C', status:'BASELINED', owner:'Fluids', closes:null },

  { id:'IF-F02', fam:'fluid', title:'LH2 inlet flange',
    desc:'AN-10 cryogenic flange · Ø12.7mm bore',
    side_e:'P5 LH2 feed line',
    side_v:'Vehicle LH2 feedline · vacuum-jacketed',
    nominal:'Pc 2.0 MPa · ṁ 2.4 kg/s · 22 K',
    tol:'leak ≤ 1×10⁻⁶ scc/s He · ΔT shock 200 K/s',
    rev:'C', status:'BASELINED', owner:'Fluids', closes:'F07' },

  { id:'IF-F03', fam:'fluid', title:'GHe purge interface',
    desc:'Quick-disconnect AS5859 · Ø6mm',
    side_e:'P4 manifold purge port',
    side_v:'GSE umbilical (disconnects at T-3s)',
    nominal:'Pc 1.5 MPa · 290 K · ṁ 0.05 kg/s',
    tol:'auto-disconnect ≤ 50 ms after release',
    rev:'A', status:'IN-REVIEW', owner:'Fluids', closes:null },

  { id:'IF-E01', fam:'elec', title:'Engine controller harness',
    desc:'MIL-DTL-38999 series III · 41 pins',
    side_e:'P12 cable tray junction box',
    side_v:'Vehicle avionics bay',
    nominal:'28 VDC · 8 A peak · CAN-FD 5 Mbps',
    tol:'EMI per MIL-STD-461G CE102/RE102',
    rev:'B', status:'BASELINED', owner:'Avionics', closes:null },

  { id:'IF-E02', fam:'elec', title:'TVC actuator power',
    desc:'2× MIL-DTL-38999 · 270 VDC bus',
    side_e:'P10 yoke actuator stub',
    side_v:'Vehicle TVC bus',
    nominal:'270 VDC · 25 A peak · 4 kW continuous',
    tol:'voltage droop ≤ 5% under step load',
    rev:'B', status:'BASELINED', owner:'Avionics', closes:null },

  { id:'IF-T01', fam:'thermal', title:'Heat soak-back boundary',
    desc:'Radiative + conductive to fwd bulkhead',
    side_e:'P2 forward bulkhead outer face',
    side_v:'Stage 2 thrust skirt MLI blanket',
    nominal:'≤ 80°C at boundary 600s post-MECO',
    tol:'emissivity ε ≤ 0.30 · MLI 20 layers',
    rev:'A', status:'IN-REVIEW', owner:'Thermal', closes:null },

  { id:'IF-D01', fam:'data', title:'Telemetry stream',
    desc:'128 channels @ 1 kHz · Pc, T, vibe, accel',
    side_e:'Engine controller P12',
    side_v:'Vehicle telemetry mux',
    nominal:'Ethernet TSN 1 Gbps · packet ≤ 1500B',
    tol:'jitter ≤ 50 µs · loss ≤ 10⁻⁶',
    rev:'A', status:'DRAFT', owner:'Avionics', closes:null },

  { id:'IF-S01', fam:'safety', title:'Range safety abort',
    desc:'Dual-redundant FTS receive',
    side_e:'—',
    side_v:'Range safety system',
    nominal:'400 MHz dual antenna · safe arm interlock',
    tol:'response ≤ 50 ms from command to valve close',
    rev:'B', status:'BASELINED', owner:'Safety', closes:null },
];

const FAM = {
  mech:    {name:'MECHANICAL', c:C.lox},
  fluid:   {name:'FLUID',      c:C.lh2},
  elec:    {name:'ELECTRICAL', c:C.inter},
  thermal: {name:'THERMAL',    c:C.risk},
  data:    {name:'DATA',       c:C.halo},
  safety:  {name:'SAFETY',     c:C.ink},
};
const ST_C = {BASELINED:C.inter, 'IN-REVIEW':C.lh2, DRAFT:C.lox, OBSOLETE:C.ink3};

// schematic: engine block on left, vehicle on right, interfaces as labelled connectors crossing the boundary
function Schematic({sel,onSel}){
  const W=900, H=420;
  const cx=W/2;
  const rows = IFACES.map((f,i)=>({...f, y: 50 + i*32}));

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',background:C.c3}}>
      {/* engine box */}
      <rect x={20} y={30} width={cx-90} height={H-60} fill={C.c2} stroke={C.frame}/>
      <text x={30} y={50} fill={C.lox} fontSize="11" fontFamily="JetBrains Mono" letterSpacing=".12em">ENGINE · NPU-A</text>
      <text x={30} y={64} fill={C.ink3} fontSize="9" fontFamily="JetBrains Mono">datum A · build origin</text>

      {/* vehicle box */}
      <rect x={cx+70} y={30} width={W-cx-90} height={H-60} fill={C.c2} stroke={C.frame}/>
      <text x={cx+80} y={50} fill={C.halo} fontSize="11" fontFamily="JetBrains Mono" letterSpacing=".12em">VEHICLE · Stage 2</text>
      <text x={cx+80} y={64} fill={C.ink3} fontSize="9" fontFamily="JetBrains Mono">datum AV · vehicle frame</text>

      {/* boundary line (the ICD plane) */}
      <line x1={cx} y1={20} x2={cx} y2={H-20} stroke={C.ink3} strokeWidth="1" strokeDasharray="4 3"/>
      <text x={cx} y={18} fill={C.ink3} fontSize="9" fontFamily="JetBrains Mono" textAnchor="middle">ICD PLANE</text>

      {/* interfaces */}
      {rows.map(f=>{
        const fam = FAM[f.fam];
        const isSel = sel===f.id;
        return (
          <g key={f.id} style={{cursor:'pointer'}} onClick={()=>onSel(f.id)}>
            <line x1={cx-90} y1={f.y} x2={cx+70} y2={f.y} stroke={fam.c} strokeWidth={isSel?2:1} opacity={isSel?1:0.55}/>
            <circle cx={cx} cy={f.y} r={isSel?5:3.5} fill={fam.c}/>
            <text x={cx-95} y={f.y+3} fill={isSel?C.ink:C.ink2} fontSize="9.5" fontFamily="JetBrains Mono" textAnchor="end">
              {f.id} · {f.title}
            </text>
            <text x={cx+78} y={f.y+3} fill={ST_C[f.status]} fontSize="9" fontFamily="JetBrains Mono">
              rev {f.rev} · {f.status}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function App(){
  const [sel,setSel] = useState('IF-M01');
  const sF = IFACES.find(f=>f.id===sel);
  const stats = {
    total:IFACES.length,
    baselined:IFACES.filter(f=>f.status==='BASELINED').length,
    pending:IFACES.filter(f=>f.status!=='BASELINED').length,
  };

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'18px 24px 60px'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:14,marginBottom:14}}>
        <h1 style={{margin:0,fontSize:22,fontWeight:600,color:C.ink}}>ICD</h1>
        <span className="mono" style={{color:C.ink3,fontSize:11}}>
          Interface Control Document · Engine ↔ Vehicle · doc BP-ICD-A · rev C
        </span>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:18}}>
        {[
          {k:'INTERFACES', v:stats.total, c:C.lox, s:'total in ICD'},
          {k:'BASELINED',  v:stats.baselined, c:C.inter, s:'frozen for build'},
          {k:'PENDING',    v:stats.pending, c:C.lh2, s:'review / draft'},
          {k:'MECH',  v:IFACES.filter(f=>f.fam==='mech').length, c:C.lox, s:'bolts · pivots'},
          {k:'FLUID', v:IFACES.filter(f=>f.fam==='fluid').length, c:C.lh2, s:'LOX/LH2/He'},
          {k:'ELEC',  v:IFACES.filter(f=>f.fam==='elec').length, c:C.inter, s:'power · data'},
        ].map(t=>(
          <div key={t.k} style={{border:`1px solid ${C.frame}`,background:C.c2,padding:'10px 12px'}}>
            <div className="mono" style={{color:C.ink3,fontSize:9.5,letterSpacing:'.12em'}}>{t.k}</div>
            <div className="mono" style={{color:t.c,fontSize:20,marginTop:4}}>{t.v}</div>
            <div className="mono" style={{color:C.ink3,fontSize:9.5}}>{t.s}</div>
          </div>
        ))}
      </div>

      <div style={{border:`1px solid ${C.frame}`,background:C.c2,padding:14,marginBottom:14}}>
        <div className="mono" style={{color:C.lox,fontSize:11,letterSpacing:'.12em',marginBottom:10}}>
          INTERFACE PLANE · Engine ↔ Vehicle
        </div>
        <Schematic sel={sel} onSel={setSel}/>
      </div>

      {/* detail card */}
      {sF && (
        <div style={{border:`1px solid ${FAM[sF.fam].c}`,background:C.c2,padding:18}}>
          <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:10}}>
            <span className="mono" style={{color:FAM[sF.fam].c,fontSize:14,letterSpacing:'.06em'}}>{sF.id}</span>
            <span className="mono" style={{color:C.ink3,fontSize:10,letterSpacing:'.12em'}}>{FAM[sF.fam].name}</span>
            <span style={{flex:1}}/>
            <span className="mono" style={{color:ST_C[sF.status],fontSize:10,letterSpacing:'.08em',
                          border:`1px solid ${ST_C[sF.status]}`,padding:'2px 8px'}}>{sF.status} · REV {sF.rev}</span>
          </div>
          <div style={{color:C.ink,fontSize:15,fontWeight:500,marginBottom:6}}>{sF.title}</div>
          <div style={{color:C.ink2,fontSize:11,marginBottom:14}} className="mono">{sF.desc}</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
            <div style={{border:`1px dashed ${C.frame}`,padding:12}}>
              <div className="mono" style={{color:C.lox,fontSize:10,letterSpacing:'.12em',marginBottom:6}}>ENGINE SIDE</div>
              <div style={{color:C.ink,fontSize:11.5,lineHeight:1.55}} className="mono">{sF.side_e}</div>
            </div>
            <div style={{border:`1px dashed ${C.frame}`,padding:12}}>
              <div className="mono" style={{color:C.halo,fontSize:10,letterSpacing:'.12em',marginBottom:6}}>VEHICLE SIDE</div>
              <div style={{color:C.ink,fontSize:11.5,lineHeight:1.55}} className="mono">{sF.side_v}</div>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'100px 1fr',gap:'4px 12px',fontSize:11,lineHeight:1.55}} className="mono">
            <span style={{color:C.ink3}}>NOMINAL</span>  <span style={{color:C.ink}}>{sF.nominal}</span>
            <span style={{color:C.ink3}}>TOLERANCE</span><span style={{color:C.lh2}}>{sF.tol}</span>
            <span style={{color:C.ink3}}>OWNER</span>    <span style={{color:C.inter}}>{sF.owner}</span>
            {sF.closes && <><span style={{color:C.ink3}}>CLOSES</span><span style={{color:C.halo}}>→ FMEA {sF.closes}</span></>}
          </div>
        </div>
      )}

      {/* schema */}
      <div style={{marginTop:18,padding:14,border:`1px dashed ${C.frame}`,background:C.c3}} className="mono">
        <div style={{color:C.lox,fontSize:10,letterSpacing:'.12em',marginBottom:6}}>SCHEMA · icd.v0.2 · doc BP-ICD-A</div>
        <pre style={{margin:0,fontSize:10,color:C.ink2,lineHeight:1.5,background:'transparent',border:0,padding:0}}>{`{
  "families":  ["mech", "fluid", "elec", "thermal", "data", "safety"],
  "boundary":  "ICD plane between engine datum A and vehicle datum AV",
  "rev_policy":"BASELINED interfaces frozen · changes require CCB",
  "policy":    { "rev_bump_on_change": true,
                 "baselined_required_for": "lineage.fai_release" },
  "links":     ["parts.P##", "joints.J##", "fmea.F##"],
  "ccb":       { "frequency": "weekly", "quorum": ["Mech","Fluids","Avionics","Vehicle"] }
}`}</pre>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>

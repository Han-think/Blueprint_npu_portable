        addAsmMesh('p9', new T3.BoxGeometry(4, 34, 18), [Math.cos(a)*32, y0 + 15, Math.sin(a)*32], [0, -a, 0], 0.7);
      }
      addAsmMesh('p2', new T3.CylinderGeometry(8, 24, 34, 72, 1, true), [0, y0 - 20, 0], [0, 0, 0], 0.72);
      addAsmMesh('p1', new T3.CylinderGeometry(18, 18, 42, 64), [0, y0 + 42, 0], [0, 0, 0], 0.76);
      addAsmMesh('p5', new T3.CylinderGeometry(29, 29, 80, 72), [0, y0 + 100, 0], [0, 0, 0], 0.68);
      addAsmMesh('p4', new T3.CylinderGeometry(29, 29, 80, 72), [0, y0 + 184, 0], [0, 0, 0], 0.68);
      addAsmRing('p6', 31, 2, [0, y0 + 228, 0]);
      addAsmMesh('p6', new T3.CylinderGeometry(30, 25, 34, 72, 1, true), [0, y0 + 246, 0], [0, 0, 0], 0.62);
      addAsmMesh('p7', new T3.CylinderGeometry(9, 20, 34, 72, 1, true), [0, y0 + 266, 0], [0, 0, 0], 0.72);
      addAsmMesh('p10', new T3.CylinderGeometry(24, 24, 34, 48), [0, y0 + 302, 0], [0, 0, 0], 0.68);
      addAsmMesh('p8', new T3.CylinderGeometry(25, 25, 38, 72, 1, true), [0, y0 + 338, 0], [0, 0, 0], 0.62);
      addAsmMesh('p8', new T3.ConeGeometry(25, 48, 72, 1, true), [0, y0 + 381, 0], [0, 0, 0], 0.62);
      addAsmMesh('p3', new T3.CylinderGeometry(4, 4, 36, 16), [34, y0 + 50, 0], [0, 0, 0], 0.76);
      addAsmLabel('p8', 'Payload Fairing', [42, y0 + 372, 0]);
      addAsmLabel('p4', 'LOX Tank', [42, y0 + 184, 0]);
      addAsmLabel('p5', 'Fuel Tank', [42, y0 + 100, 0]);
      addAsmLabel('p1', 'Chamber/Nozzle', [42, y0 + 32, 0]);
      ctrl.target.set(0, 175, 0);
      cam.position.set(145, 225, 145);
      ctrl.update();
    }

    function renderMasterAssemblyScaffold() {
      const id = vehicle?.id;
      if (id === 'small_launch_vehicle') {
        renderSmallLaunchAssemblyScaffold();
        return true;
      }
      if (id === 'cubesat_3u') {
        addAsmMesh('p1', new T3.BoxGeometry(34, 102, 34), [0, 0, 0], [0, 0, 0], 0.78);
        addAsmMesh('p6', new T3.BoxGeometry(4, 92, 50), [-34, 0, 0], [0, 0, 0], 0.62);
        addAsmMesh('p6', new T3.BoxGeometry(4, 92, 50), [34, 0, 0], [0, 0, 0], 0.62);
        addAsmMesh('p4', new T3.CylinderGeometry(18, 18, 10, 48), [0, -62, 0], [Math.PI / 2, 0, 0], 0.72);
        addAsmMesh('p5', new T3.CylinderGeometry(2, 2, 90, 12), [0, 0, 28], [0, 0, Math.PI / 2], 0.72);
        addAsmMesh('p8', new T3.BoxGeometry(24, 20, 8), [0, 62, 0], [0, 0, 0], 0.68);
        addAsmLabel('p1', '3U CubeSat bus', [0, 72, 0]);
        ctrl.target.set(0, 0, 0); cam.position.set(95, 85, 95); ctrl.update();
        return true;
      }
      if (id === 'lunar_lander') {
        addAsmMesh('p1', new T3.CylinderGeometry(34, 38, 44, 64), [0, 38, 0], [0, 0, 0], 0.74);
        addAsmMesh('p2', new T3.SphereGeometry(16, 32, 20), [-30, 50, 0], [0, 0, 0], 0.66);
        addAsmMesh('p2', new T3.SphereGeometry(16, 32, 20), [30, 50, 0], [0, 0, 0], 0.66);
        addAsmMesh('p4', new T3.CylinderGeometry(8, 18, 38, 48, 1, true), [0, 2, 0], [0, 0, 0], 0.72);
        for (let k = 0; k < 4; k++) {
          const a = k / 4 * Math.PI * 2 + Math.PI / 4;
          addAsmMesh('p6', new T3.CylinderGeometry(2, 2, 58, 12), [Math.cos(a)*32, 12, Math.sin(a)*32], [0.55, 0, -a], 0.72);
          addAsmMesh('p6', new T3.CylinderGeometry(10, 10, 2, 24), [Math.cos(a)*58, -18, Math.sin(a)*58], [0, 0, 0], 0.72);
        }
        addAsmMesh('p5', new T3.BoxGeometry(54, 4, 22), [0, 82, 0], [0, 0, 0], 0.62);
        addAsmLabel('p1', 'Lander deck + legs', [0, 98, 0]);
        ctrl.target.set(0, 35, 0); cam.position.set(120, 95, 120); ctrl.update();
        return true;
      }
      if (id === 'space_telescope') {
        addAsmMesh('p1', new T3.CylinderGeometry(22, 22, 120, 72), [0, 0, 0], [0, 0, Math.PI / 2], 0.74);
        addAsmMesh('p2', new T3.CylinderGeometry(24, 24, 6, 64), [-64, 0, 0], [0, 0, Math.PI / 2], 0.68);
        addAsmMesh('p3', new T3.CylinderGeometry(18, 18, 8, 64), [-50, 0, 0], [0, 0, Math.PI / 2], 0.62);
        addAsmMesh('p5', new T3.BoxGeometry(4, 58, 28), [0, 44, 0], [0, 0, 0], 0.62);
        addAsmMesh('p5', new T3.BoxGeometry(4, 58, 28), [0, -44, 0], [0, 0, 0], 0.62);
        addAsmMesh('p7', new T3.BoxGeometry(24, 22, 18), [48, 0, 0], [0, 0, 0], 0.62);
        addAsmLabel('p1', 'Optical telescope tube', [0, 72, 0]);
        ctrl.target.set(0, 0, 0); cam.position.set(130, 90, 110); ctrl.update();
        return true;
      }
      if (id === 'orbital_module') {
        addAsmMesh('p1', new T3.CylinderGeometry(30, 30, 140, 72), [0, 0, 0], [0, 0, Math.PI / 2], 0.72);
        addAsmRing('p2', 31, 1.6, [-72, 0, 0]);
        addAsmRing('p2', 31, 1.6, [72, 0, 0]);
        addAsmMesh('p5', new T3.BoxGeometry(120, 4, 30), [0, 54, 0], [0, 0, 0], 0.62);
        addAsmMesh('p5', new T3.BoxGeometry(120, 4, 30), [0, -54, 0], [0, 0, 0], 0.62);
        addAsmMesh('p4', new T3.BoxGeometry(16, 42, 24), [-46, 0, 30], [0, 0, 0], 0.62);
        addAsmMesh('p7', new T3.BoxGeometry(20, 28, 18), [52, 0, 32], [0, 0, 0], 0.62);
        addAsmLabel('p1', 'Orbital pressure module', [0, 76, 0]);
        ctrl.target.set(0, 0, 0); cam.position.set(145, 95, 115); ctrl.update();
        return true;
      }
      if (['fighter_f_class', 'supersonic_sst', 'civil_airliner', 'turboprop_transport'].includes(id)) {
        const fighter = id === 'fighter_f_class';
        const sst = id === 'supersonic_sst';
        const turboprop = id === 'turboprop_transport';
        const fuselageLen = fighter ? 132 : sst ? 190 : turboprop ? 150 : 170;
        const fuselageR = fighter ? 12 : sst ? 10 : turboprop ? 14 : 15;
        addAsmMesh('p1', new T3.CylinderGeometry(fuselageR, fuselageR * 0.85, fuselageLen, 72), [0, 0, 0], [0, 0, Math.PI / 2], 0.74);
        addAsmMesh('p1', new T3.ConeGeometry(fuselageR, 28, 48), [-fuselageLen / 2 - 12, 0, 0], [0, 0, Math.PI / 2], 0.74);
        addAsmMesh('p1', new T3.ConeGeometry(fuselageR * 0.75, 20, 48), [fuselageLen / 2 + 8, 0, 0], [0, 0, -Math.PI / 2], 0.66);
        addAsmMesh('p2', new T3.BoxGeometry(fighter ? 96 : sst ? 128 : 156, 5, fighter ? 34 : 28), [0, 0, 0], [0, 0, 0], 0.62);
        addAsmMesh('p6', new T3.BoxGeometry(28, 4, 42), [fuselageLen / 2 - 18, 0, 22], [0, 0, 0], 0.62);
        addAsmMesh('p7', new T3.BoxGeometry(30, 4, 18), [fuselageLen / 2 - 28, 0, -22], [0, 0, 0], 0.62);
        if (fighter) {
          addAsmMesh('p3', new T3.CylinderGeometry(6, 7, 30, 32), [42, 14, -5], [0, 0, Math.PI / 2], 0.72);
          addAsmMesh('p3', new T3.CylinderGeometry(6, 7, 30, 32), [42, -14, -5], [0, 0, Math.PI / 2], 0.72);
        } else if (turboprop) {
          addAsmMesh('p3', new T3.CylinderGeometry(7, 7, 24, 32), [-10, 44, 0], [Math.PI / 2, 0, 0], 0.72);
          addAsmMesh('p3', new T3.CylinderGeometry(7, 7, 24, 32), [-10, -44, 0], [Math.PI / 2, 0, 0], 0.72);
          addAsmRing('p4', 16, 1.2, [-10, 58, 0]);
          addAsmRing('p4', 16, 1.2, [-10, -58, 0]);
        } else {
          addAsmMesh('p3', new T3.CylinderGeometry(8, 8, 26, 32), [12, 44, -6], [Math.PI / 2, 0, 0], 0.72);
          addAsmMesh('p3', new T3.CylinderGeometry(8, 8, 26, 32), [12, -44, -6], [Math.PI / 2, 0, 0], 0.72);
        }
        addAsmLabel('p1', vehicle.label, [0, 78, 0]);
        ctrl.target.set(0, 0, 0); cam.position.set(165, 95, 125); ctrl.update();
        return true;
      }
      if (id === 'heavy_helicopter') {
        addAsmMesh('p1', new T3.BoxGeometry(130, 28, 28), [0, 0, 0], [0, 0, 0], 0.72);
        addAsmMesh('p2', new T3.CylinderGeometry(6, 6, 112, 20), [-44, 0, 32], [Math.PI / 2, 0, 0], 0.72);
        addAsmMesh('p2', new T3.CylinderGeometry(6, 6, 112, 20), [44, 0, 32], [Math.PI / 2, 0, 0], 0.72);
        addAsmRing('p3', 44, 1.2, [-44, 0, 42]);
        addAsmRing('p3', 44, 1.2, [44, 0, 42]);
        addAsmMesh('p4', new T3.BoxGeometry(34, 4, 22), [72, 0, 18], [0, 0, 0], 0.62);
        addAsmMesh('p8', new T3.CylinderGeometry(8, 8, 24, 32), [-18, 18, 14], [0, 0, Math.PI / 2], 0.7);
        addAsmMesh('p8', new T3.CylinderGeometry(8, 8, 24, 32), [-18, -18, 14], [0, 0, Math.PI / 2], 0.7);
        addAsmLabel('p1', 'Tandem rotor helicopter', [0, 70, 0]);
        ctrl.target.set(0, 0, 12); cam.position.set(140, 100, 120); ctrl.update();
        return true;
      }
      if (id === 'turbofan_engine') {
        addAsmMesh('p9', new T3.CylinderGeometry(34, 28, 150, 96, 1, true), [0, 0, 0], [0, 0, Math.PI / 2], 0.52);
        addAsmMesh('p1', new T3.CylinderGeometry(34, 34, 12, 96), [-72, 0, 0], [0, 0, Math.PI / 2], 0.72);
        addAsmMesh('p3', new T3.CylinderGeometry(24, 22, 28, 72), [-38, 0, 0], [0, 0, Math.PI / 2], 0.7);
        addAsmMesh('p4', new T3.CylinderGeometry(20, 17, 30, 72), [-10, 0, 0], [0, 0, Math.PI / 2], 0.7);
        addAsmMesh('p5', new T3.CylinderGeometry(17, 17, 20, 72), [18, 0, 0], [0, 0, Math.PI / 2], 0.68);
        addAsmMesh('p6', new T3.CylinderGeometry(18, 20, 22, 72), [42, 0, 0], [0, 0, Math.PI / 2], 0.68);
        addAsmMesh('p8', new T3.CylinderGeometry(20, 28, 34, 72, 1, true), [78, 0, 0], [0, 0, Math.PI / 2], 0.62);
        addAsmLabel('p9', 'Turbofan core + nacelle', [0, 62, 0]);
        ctrl.target.set(0, 0, 0); cam.position.set(150, 90, 110); ctrl.update();
        return true;
      }
      return false;
    }

    const useAssemblyScaffold = renderMasterAssemblyScaffold();
    if (useAssemblyScaffold) {
      // Master-grade assembly scaffold already rendered above.
    } else zones.forEach(z => {
      if (rendered.has(z.id)) return;
      rendered.add(z.id);

      const status = partMap[z.id] || 'pending';
      const { hex, emissive } = partColor(status);
      const mat = new T3.MeshPhongMaterial({
        color: hex, emissive, shininess: 60,
        transparent: true, opacity: status === 'pending' ? 0.45 : 0.78,
      });

      let mesh;
      if (z.shape === 'R') {
        const bw = Math.max(4, z.w * scaleX);
        const bh = Math.max(4, z.h * scaleZ);
        const bd = Math.min(bw, bh) * 0.6 + 4;
        const geo = new T3.BoxGeometry(bw, bd, bh);
        mesh = new T3.Mesh(geo, mat);
        mesh.position.set(
          (z.x + z.w / 2 - svgW / 2) * scaleX,
          bd / 2,
          (z.y + z.h / 2 - svgH / 2) * scaleZ,
        );
      } else if (z.shape === 'C') {
        const r = Math.max(3, z.r * Math.min(scaleX, scaleZ));
        const h = r * 1.2 + 3;
        const geo = new T3.CylinderGeometry(r, r * 1.05, h, 24);
        mesh = new T3.Mesh(geo, mat);
        mesh.position.set(
          (z.cx - svgW / 2) * scaleX,
          h / 2,
          (z.cy - svgH / 2) * scaleZ,
        );
      } else if (z.shape === 'P' && z.pts) {
        const pts = z.pts.split(' ').map(p => p.split(',').map(Number));
        const xs  = pts.map(p => p[0]);
        const ys  = pts.map(p => p[1]);
        const bw  = Math.max(4, (Math.max(...xs) - Math.min(...xs)) * scaleX);
        const bh  = Math.max(4, (Math.max(...ys) - Math.min(...ys)) * scaleZ);
        const bd  = Math.min(bw, bh) * 0.5 + 4;
        const geo = new T3.BoxGeometry(bw, bd, bh);
        mesh = new T3.Mesh(geo, mat);
        const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
        const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
        mesh.position.set(
          (cx - svgW / 2) * scaleX,
          bd / 2,
          (cy - svgH / 2) * scaleZ,
        );
      }

      if (!mesh) return;

      // 엣지 라인
      const eg = new T3.EdgesGeometry(mesh.geometry);
      const ln = new T3.LineSegments(eg,
        new T3.LineBasicMaterial({ color: 0x64a0f0, transparent: true, opacity: 0.5 }));
      ln.position.copy(mesh.position);
      scene.add(mesh);
      scene.add(ln);

      // 파트 레이블 (canvas texture)
      const partLabel = (vehicle?.parts || []).find(p => p.id === z.id)?.label || z.id;
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 64;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, 256, 64);
      ctx.fillStyle = status === 'done' ? '#89ffa8' :
                      status === 'error' ? '#ff9fb5' : 'rgba(100,160,240,0.9)';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(partLabel.slice(0, 22), 128, 36);
      const tex = new T3.CanvasTexture(cv);
      const spr = new T3.Sprite(new T3.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85 }));
      spr.scale.set(24, 6, 1);
      spr.position.set(mesh.position.x, mesh.position.y + 18, mesh.position.z);
      scene.add(spr);
      sprites.push(spr);
    });

    setReady(true);

    /* ── 애니메이션 루프 ── */
    function animate() {
      frameRef.current = requestAnimationFrame(animate);
      ctrl.update();
      renderer.render(scene, cam);
    }
    animate();

    return () => {
      cancelAnimationFrame(frameRef.current);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, []);

  const doneCnt = (asmParts || []).filter(p => p.status === 'done').length;
  const total   = (asmParts || []).length;
  const hasMaster3D = MASTER_3D_ASSEMBLY_IDS.has(vehicle?.id);

  return (
    <div style={{ position:'fixed', inset:0, zIndex:9100,
                  background:'rgba(3,9,18,0.92)', display:'flex', flexDirection:'column' }}>
      {/* 헤더 */}
      <div style={{ padding:'10px 18px', borderBottom:`1px solid ${C.frame}`,
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    background:C.canvas, flexShrink:0 }}>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <Chip c={C.halo}>3D ASSEMBLY VIEW</Chip>
          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
            {vehicle?.label} · {doneCnt}/{total} parts done
          </span>
          <span className="mono" style={{ fontSize:9, color:hasMaster3D ? C.lh2 : C.risk }}>
            {hasMaster3D ? 'master 3D reference scaffold' : 'schematic extrusion placeholder'}
          </span>
          <span className="mono" style={{ fontSize:9, color:C.ink3 }}>
            드래그=회전 · 스크롤=줌 · 우클릭=이동
          </span>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {[['rgba(26,122,58,0.8)','Done'],['rgba(26,61,107,0.8)','Pending'],['rgba(122,26,42,0.8)','Error']]
            .map(([c,l])=>(
              <span key={l} style={{ display:'flex', gap:4, alignItems:'center' }}>
                <span style={{ width:10, height:10, background:c, display:'inline-block', borderRadius:2 }}/>
                <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{l}</span>
              </span>
            ))}
          <button onClick={onClose}
            style={{ background:'transparent', border:`1px solid ${C.frame}`, color:C.ink3,
                     fontFamily:'monospace', fontSize:11, padding:'4px 12px', cursor:'pointer' }}>
            ✕ 닫기
          </button>
        </div>
      </div>
      {/* 3D 캔버스 */}
      <div ref={mountRef} style={{ flex:1, overflow:'hidden' }}/>
      {!ready && (
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center',
                      justifyContent:'center', pointerEvents:'none' }}>
          <span className="mono" style={{ fontSize:12, color:'rgba(100,160,240,0.4)' }}>BUILDING 3D SCENE…</span>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// Blueprint Modal — 탭 뷰 (완성된 blueprint 전체 표시)
// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
// ThreeDModal — geometry_ops → Three.js 3D 뷰어 + STL 내보내기
// ═══════════════════════════════════════════════════════════════════════════
function ThreeDModal({ bp, onClose }) {
  const mountRef   = useRef(null);
  const rendRef    = useRef(null);
  const frameRef   = useRef(null);
  const sceneRef   = useRef(null);
  const cameraRef  = useRef(null);
  const [ready, setReady] = useState(false);
  const [opCount, setOpCount] = useState(0);
  const [renderMode, setRenderMode] = useState('generated geometry_ops');

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  useEffect(() => {
    if (!mountRef.current) return;
    const T3 = window.THREE;
    if (!T3) { console.warn('Three.js not loaded'); return; }

    const mount = mountRef.current;
    const W = mount.clientWidth || 800;
    const H = mount.clientHeight || 560;

    /* ── 씬 ── */
    const scene = new T3.Scene();
    scene.background = new T3.Color(0x050d18);
    sceneRef.current = scene;

    /* ── 그리드 ── */
    const grid = new T3.GridHelper(300, 30, 0x274a79, 0x132238);
    scene.add(grid);

    /* ── 조명 ── */
    scene.add(new T3.AmbientLight(0x9fd3ff, 0.45));
    const sun = new T3.DirectionalLight(0xffffff, 0.9);
    sun.position.set(120, 180, 100);
    scene.add(sun);
    const fill = new T3.DirectionalLight(0x89ffa8, 0.25);
    fill.position.set(-100, 40, -80);
    scene.add(fill);

    /* ── 카메라 ── */
    const cam = new T3.PerspectiveCamera(45, W / H, 0.1, 3000);
    cam.position.set(90, 70, 90);
    cameraRef.current = cam;

    /* ── 렌더러 ── */
    const renderer = new T3.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    mount.appendChild(renderer.domElement);
    rendRef.current = renderer;

    /* ── OrbitControls ── */
    const ctrl = new T3.OrbitControls(cam, renderer.domElement);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.06;
    ctrl.minDistance = 5;
    ctrl.maxDistance = 800;

    /* ── 머티리얼 팔레트 ── */
    const MAT = {
      main:     new T3.MeshPhongMaterial({ color:0x1a4a82, transparent:true, opacity:0.82, shininess:70 }),
      subtract: new T3.MeshPhongMaterial({ color:0xcc2244, transparent:true, opacity:0.45, side:T3.DoubleSide }),
      fillet:   new T3.MeshPhongMaterial({ color:0x8855cc, transparent:true, opacity:0.55 }),
      pattern:  new T3.MeshPhongMaterial({ color:0x22aa55, transparent:true, opacity:0.70 }),
      boss:     new T3.MeshPhongMaterial({ color:0x44aacc, transparent:true, opacity:0.75 }),
      sweep:    new T3.MeshPhongMaterial({ color:0xddaa22, transparent:true, opacity:0.65 }),
      edge:     new T3.LineBasicMaterial({ color:0x4499dd, transparent:true, opacity:0.55 }),
    };

    /* ── geometry_ops → 메쉬 변환 ── */
    const ops = bp.geometry_ops || [];
    const allMeshes = [];
    const idMap = {};   // id → mesh (target 참조용)

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function dim(args, keys, fallback = 10) {
      for (const k of keys) {
        if (args[k] !== undefined && args[k] !== null && args[k] !== '') return args[k];
      }
      return fallback;
    }
    function getAt(args) {
      const explicit = explicitOpPosition({ args });
      if (explicit) return explicit;
      return [
        Number(dim(args, ['at_x','cx','x0'], args.x || 0)) || 0,
        Number(dim(args, ['at_y','cy','y0'], args.y || 0)) || 0,
        Number(dim(args, ['at_z','cz','z0'], args.z || 0)) || 0,
      ];
    }
    function addEdge(geo, pos, rot = [0, 0, 0]) {
      const eg = new T3.EdgesGeometry(geo);
      const ln = new T3.LineSegments(eg, MAT.edge.clone());
      ln.position.set(...pos);
      ln.rotation.set(...rot);
      scene.add(ln);
    }
    function addMesh(geo, mat, pos, id, rot = [0, 0, 0]) {
      const m = new T3.Mesh(geo, mat.clone());
      m.position.set(...pos);
      m.rotation.set(...rot);
      m.castShadow = true;
      scene.add(m);
      addEdge(geo, pos, rot);
      allMeshes.push(m);
      if (id) idMap[id] = m;
      return m;
    }

    function makeRefMat(hex = 0x1f66a8, opacity = 0.72) {
      return new T3.MeshPhongMaterial({ color:hex, transparent:true, opacity, shininess:75 });
    }
    function addRing(id, r, tube, pos) {
      addMesh(new T3.TorusGeometry(r, tube, 16, 64), MAT.boss, pos, id, [Math.PI / 2, 0, 0]);
    }
    function addLabelSprite(text, pos, color = '#ffd39f') {
      const cv = document.createElement('canvas');
      cv.width = 384; cv.height = 72;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, 384, 72);
      ctx.fillStyle = color;
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(String(text || '').slice(0, 28), 192, 42);
      const tex = new T3.CanvasTexture(cv);
      const spr = new T3.Sprite(new T3.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 }));
      spr.scale.set(42, 8, 1);
      spr.position.set(...pos);
      scene.add(spr);
    }
    function renderSmallLaunchReferencePart() {
      const pid = bp?._part_id;
      if (bp?._vehicle_id !== 'small_launch_vehicle' || !pid) return false;
      const blue = makeRefMat(0x1f66a8, 0.68);
      const green = makeRefMat(0x2aa66b, 0.62);
      const amber = makeRefMat(0xddaa22, 0.64);
      const red = makeRefMat(0xb74a64, 0.58);
      addLabelSprite(`${pid} · reference 3D scaffold`, [0, 70, 0]);
      switch (pid) {
        case 'p1': { // combustion chamber
          addMesh(new T3.CylinderGeometry(18, 18, 70, 64), blue, [0, 0, 0], 'chamber');
          addMesh(new T3.CylinderGeometry(24, 24, 8, 64), MAT.boss, [0, -38, 0], 'injector_flange');
          addMesh(new T3.CylinderGeometry(16, 22, 16, 64), amber, [0, 43, 0], 'throat_taper');
          for (let k = 0; k < 18; k++) {
            const a = k / 18 * Math.PI * 2;
            addMesh(new T3.CylinderGeometry(1.1, 1.1, 62, 8), green, [Math.cos(a)*20, 0, Math.sin(a)*20], null);
          }
          addRing('bolt_circle', 25, 1.2, [0, -43, 0]);
          return true;
        }
        case 'p2': { // bell nozzle
          addMesh(new T3.CylinderGeometry(12, 38, 82, 96, 1, true), blue, [0, 0, 0], 'bell_nozzle');
          addMesh(new T3.CylinderGeometry(10, 10, 18, 64), amber, [0, -50, 0], 'throat');
          addRing('mount_flange', 22, 2.0, [0, -42, 0]);
          addRing('exit_lip', 38, 1.6, [0, 41, 0]);
          return true;
        }
        case 'p3': { // turbopump
          addMesh(new T3.CylinderGeometry(18, 18, 22, 48), blue, [-24, 0, 0], 'lox_pump', [0, 0, Math.PI / 2]);
          addMesh(new T3.CylinderGeometry(15, 15, 22, 48), blue, [24, 0, 0], 'fuel_pump', [0, 0, Math.PI / 2]);
          addMesh(new T3.BoxGeometry(28, 20, 20), MAT.boss, [0, 0, 0], 'gearbox');
          addMesh(new T3.CylinderGeometry(4, 4, 74, 24), amber, [0, 0, 0], 'cross_shaft', [0, 0, Math.PI / 2]);
          addMesh(new T3.CylinderGeometry(3, 3, 70, 16), green, [0, 18, 0], 'feed_line', [0, 0, Math.PI / 2]);
          return true;
        }
        case 'p4':
        case 'p5': { // tanks
          addMesh(new T3.CylinderGeometry(28, 28, 92, 72), blue, [0, 0, 0], 'tank_barrel');
          addMesh(new T3.SphereGeometry(28, 48, 16, 0, Math.PI * 2, 0, Math.PI / 2), blue, [0, -46, 0], 'lower_dome');
          addMesh(new T3.SphereGeometry(28, 48, 16, 0, Math.PI * 2, 0, Math.PI / 2), blue, [0, 46, 0], 'upper_dome', [Math.PI, 0, 0]);
          addRing('equator_ring', 29, 1.2, [0, 0, 0]);
          addMesh(new T3.CylinderGeometry(3, 3, 100, 16), green, [34, 0, 0], 'feedline');
          return true;
        }
        case 'p6': { // interstage
          addMesh(new T3.CylinderGeometry(34, 28, 48, 72, 1, true), blue, [0, 0, 0], 'tapered_interstage');
          addRing('lower_ring', 34, 1.5, [0, -24, 0]);
          addRing('upper_ring', 28, 1.5, [0, 24, 0]);
          for (let k = 0; k < 12; k++) {
            const a = k / 12 * Math.PI * 2;
            addMesh(new T3.BoxGeometry(2, 42, 2), amber, [Math.cos(a)*31, 0, Math.sin(a)*31], null);
          }
          return true;
        }
        case 'p7': { // stage 2 engine
          addMesh(new T3.CylinderGeometry(12, 12, 34, 48), blue, [0, -18, 0], 'upper_chamber');
          addMesh(new T3.CylinderGeometry(9, 24, 48, 72, 1, true), blue, [0, 24, 0], 'vac_nozzle');
          addRing('gimbal_ring', 18, 1.4, [0, -38, 0]);
          addMesh(new T3.CylinderGeometry(2, 2, 54, 12), green, [18, 0, 0], 'feed_pipe');
          return true;
        }
        case 'p8': { // fairing
          addMesh(new T3.CylinderGeometry(28, 28, 48, 72, 1, true), blue, [0, -18, 0], 'fairing_barrel');
          addMesh(new T3.ConeGeometry(28, 54, 72, 1, true), blue, [0, 33, 0], 'ogive_nose');
          addMesh(new T3.BoxGeometry(2, 96, 58), amber, [0, 8, 0], 'split_line');
          addRing('separation_ring', 29, 1.4, [0, -43, 0]);
          return true;
        }
        case 'p9': { // fins
          for (let k = 0; k < 4; k++) {
            const a = k / 4 * Math.PI * 2;
            const x = Math.cos(a) * 26;
            const z = Math.sin(a) * 26;
            const fin = addMesh(new T3.BoxGeometry(4, 38, 22), red, [x, 0, z], `fin_${k}`, [0, -a, 0]);
            fin.scale.set(1, 1, 0.65);
          }
          addMesh(new T3.CylinderGeometry(20, 20, 58, 48, 1, true), blue, [0, 0, 0], 'aft_skirt');
          return true;
        }
        case 'p10': { // avionics bay
          addMesh(new T3.CylinderGeometry(24, 24, 42, 48), blue, [0, 0, 0], 'avionics_cylinder');
          addMesh(new T3.BoxGeometry(28, 5, 18), green, [0, 0, 14], 'pcb_stack');
          addMesh(new T3.BoxGeometry(16, 4, 12), amber, [-8, 12, 14], 'imu_gps');
          addMesh(new T3.BoxGeometry(16, 4, 12), amber, [10, -12, 14], 'radio');
          addRing('access_ring', 25, 1.1, [0, 22, 0]);
          return true;
        }
        default:
          return false;
      }
    }

    const coordAudit = geometryCoordinateAudit(bp);
    const boxLikeOps = ops.filter(op => ['box', 'shell', 'extrude', 'pocket'].includes(op?.op)).length;
    const useReference3D = false;
    if (useReference3D && renderSmallLaunchReferencePart()) {
      setOpCount(ops.length);
      setRenderMode(`reference scaffold · generated coord ${coordAudit.explicit}/${coordAudit.ops.length}`);
    } else {
      const designAudit = generatedDesignAudit(bp);
      setRenderMode(`actual generated geometry_ops · ${designAudit.designStatus} · coord ${coordAudit.explicit}/${coordAudit.ops.length} · box ${boxLikeOps}/${ops.length}`);
    }

    let stackY = 0; // 위치 없는 ops 수직 쌓기
    if (!useReference3D) ops.forEach((op, i) => {
      const a = op.args || {};
      const r  = v => clamp(Number(v) || 10, 0.5, 240);
      const dia = (fallback = 20) => r(dim(a, ['d_mm','dia_mm','diameter_mm','d','diameter'], fallback));
      const rad = (fallback = 10) => r(dim(a, ['r_mm','radius_mm','r','radius'], fallback));
      const len = (fallback = 30) => r(dim(a, ['h_mm','height_mm','l_mm','length_mm','depth_mm','h','l','depth'], fallback));
      const wx = (fallback = 20) => r(dim(a, ['x_mm','w_mm','width_mm','x','w'], fallback));
      const wy = (fallback = 20) => r(dim(a, ['y_mm','h_mm','height_mm','y','h'], fallback));
      const wz = (fallback = 20) => r(dim(a, ['z_mm','d_mm','depth_mm','z','d'], fallback));
      const pos = (() => {
        const at = getAt(a);
        const anyAt = at.some(v => v !== 0);
        if (anyAt) return at;
        // target이 있으면 target 위치 참조
        if (op.target && idMap[op.target]) {
          const tp = idMap[op.target].position;
          return [tp.x, tp.y, tp.z];
        }
        return [0, stackY, 0];
      })();

      switch (op.op) {
        case 'cylinder':
        case 'boss': {
          const radius = a.r2 || a.r2_mm ? rad(10) : dia(20) / 2;
          const radius2 = a.r2 || a.r2_mm ? r(dim(a, ['r2_mm','r2'], radius)) : radius;
          const geo = new T3.CylinderGeometry(radius, radius2, len(30), 48);
          addMesh(geo, op.op==='boss' ? MAT.boss : MAT.main, pos, op.id);
          stackY += len(30) + 2;
          break;
        }
        case 'box': {
          const geo = new T3.BoxGeometry(wx(20), wy(20), wz(20));
          addMesh(geo, MAT.main, pos, op.id);
          stackY += wy(20) + 2;
          break;
        }
        case 'sphere': {
          const geo = new T3.SphereGeometry(rad(10), 32, 24);
          addMesh(geo, MAT.main, pos, op.id);
          stackY += rad(10) * 2 + 2;
          break;
        }
        case 'extrude': {
          const geo = new T3.BoxGeometry(wx(20), len(10), wz(20));
          addMesh(geo, MAT.main, pos, op.id);
          stackY += len(10) + 2;
          break;
        }
        case 'revolve': {
          const rr = rad(15);
          const tube = r(dim(a, ['tube_mm','tube','thickness_mm','t'], Math.max(2, rr * 0.25)));
          const geo = new T3.TorusGeometry(rr, tube, 20, 48);
          addMesh(geo, MAT.main, pos, op.id);
          break;
        }
        case 'loft':
        case 'sweep': {
          const geo = new T3.CylinderGeometry(
            r(dim(a, ['r2_mm','r2'], dim(a, ['r_mm','radius_mm','r'], 8))),
            rad(8),
            len(30),
            32
          );
          addMesh(geo, MAT.sweep, pos, op.id);
          stackY += len(30) + 2;
          break;
        }
        case 'drill':
        case 'pocket':
        case 'subtract': {
          const holeR = a.d_mm || a.diameter_mm || a.d ? dia(8) / 2 : rad(4);
          const geo = new T3.CylinderGeometry(holeR, holeR, len(20), 24);
          const m = addMesh(geo, MAT.subtract, pos, op.id);
          m.material.transparent = true;
          m.material.opacity = 0.35;
          break;
        }
        case 'fillet':
        case 'chamfer': {
          const rr = op.op === 'chamfer' ? r(dim(a, ['d_mm','depth_mm','d'], 4)) : rad(4);
          const geo = new T3.TorusGeometry(rr*1.5, rr*0.4, 8, 24);
          const tgt = op.target && idMap[op.target];
          const fp = tgt ? [tgt.position.x, tgt.position.y, tgt.position.z] : pos;
          addMesh(geo, MAT.fillet, fp, op.id);
          break;
        }
        case 'pattern_polar': {
          const n = Number(a.n || a.count || 4);
          const ringRad = r(dim(a, ['radius_mm','r_mm','radius','r'], 20));
          const featR = r(dim(a, ['feat_r_mm','feat_r','d_mm'], a.d_mm ? Number(a.d_mm) / 2 : 3));
          const geo = new T3.CylinderGeometry(featR, featR, r(dim(a, ['feat_h_mm','feat_h','h_mm','depth_mm'], 10)), 16);
          for (let k = 0; k < Math.min(n, 24); k++) {
            const ang = (k / n) * Math.PI * 2;
            addMesh(geo.clone(), MAT.pattern,
              [pos[0]+Math.cos(ang)*ringRad, pos[1], pos[2]+Math.sin(ang)*ringRad], null);
          }
          break;
        }
        case 'pattern_linear': {
          const nx = Number(a.nx||a.n||3), ny = Number(a.ny||1), nz = Number(a.nz||1);
          const dx = Number(a.dx||a.pitch||15), dy = Number(a.dy||0), dz = Number(a.dz||0);
          const geo = new T3.BoxGeometry(r(a.feat_w||6), r(a.feat_h||6), r(a.feat_d||6));
          for (let ix = 0; ix < Math.min(nx,20); ix++)
          for (let iy = 0; iy < Math.min(ny,10); iy++)
          for (let iz = 0; iz < Math.min(nz,10); iz++) {
            addMesh(geo.clone(), MAT.pattern,
              [pos[0]+ix*dx, pos[1]+iy*dy, pos[2]+iz*dz], null);
          }
          break;
        }
        case 'mirror': {
          const tgt = op.target && idMap[op.target];
          if (tgt) {
            const mc = tgt.clone();
            const ax = (a.axis||'x').toLowerCase();
            if (ax==='x') mc.position.x *= -1;
            else if (ax==='y') mc.position.y *= -1;
            else mc.position.z *= -1;
            scene.add(mc);
            allMeshes.push(mc);
          }
          break;
        }
        case 'shell': {
          const geo = new T3.BoxGeometry(wx(30), wy(30), wz(30));
          const m = addMesh(geo, MAT.main.clone(), pos, op.id);
          m.material.wireframe = false;
          m.material.opacity = 0.25;
          break;
        }
        case 'channel': {
          const channelR = a.w_mm ? Math.max(1, wx(4) / 2) : rad(3);
          const geo = new T3.CylinderGeometry(channelR, channelR, len(30), 16);
          addMesh(geo, MAT.sweep, pos, op.id);
          break;
        }
        case 'engrave': {
          const geo = new T3.BoxGeometry(wx(28), Math.max(0.8, r(dim(a, ['depth_mm','d_mm'], 1))), wz(4));
          addMesh(geo, MAT.fillet, pos, op.id);
          break;
        }
        default: {
          const geo = new T3.BoxGeometry(8, 4, 8);
          addMesh(geo, MAT.main, pos, op.id);
        }
      }
    });

    setOpCount(ops.length);

    /* ── 카메라 auto-fit ── */
    if (allMeshes.length > 0) {
      const box = new T3.Box3();
      allMeshes.forEach(m => box.expandByObject(m));
      const center = new T3.Vector3();
      const size   = new T3.Vector3();
      box.getCenter(center);
      box.getSize(size);
      const dist = Math.max(size.length() * 1.4, 40);
      cam.position.set(center.x + dist, center.y + dist * 0.6, center.z + dist);
      ctrl.target.copy(center);
      ctrl.update();
    }

    setReady(true);

    /* ── 애니메이션 루프 ── */
    function loop() {
      frameRef.current = requestAnimationFrame(loop);
      ctrl.update();
      renderer.render(scene, cam);
    }
    loop();

    /* ── 리사이즈 ── */
    function onResize() {
      const W2 = mount.clientWidth, H2 = mount.clientHeight;
      cam.aspect = W2 / H2;
      cam.updateProjectionMatrix();
      renderer.setSize(W2, H2);
    }
    window.addEventListener('resize', onResize);

    return () => {
      window.removeEventListener('resize', onResize);
      cancelAnimationFrame(frameRef.current);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, []);

  /* ── STL 내보내기 ── */
  function exportSTL() {
    const T3 = window.THREE;
    if (!sceneRef.current || !T3?.STLExporter) return;
    const exporter = new T3.STLExporter();
    const str  = exporter.parse(sceneRef.current, { binary: false });
    const blob = new Blob([str], { type:'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${(bp.object||bp.project||'design').replace(/\s+/g,'-').toLowerCase()}_3d.stl`;
    a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div style={{ position:'fixed', inset:0, zIndex:300,
                  background:'rgba(0,0,0,0.94)', display:'flex', flexDirection:'column' }}>
      {/* 헤더 */}
      <div style={{ padding:'10px 18px', borderBottom:`1px solid ${C.frame}`,
                    background:C.canvas2, flexShrink:0,
                    display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
          <Chip c={C.lox}>🔲 3D PREVIEW</Chip>
          <span className="mono" style={{ fontSize:12, color:C.ink2 }}>
            {bp.object || bp.project || 'Design'}
          </span>
          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
            {opCount}개 ops · 드래그:회전 · 스크롤:줌 · 우클릭:이동
          </span>
          <span className="mono" style={{ fontSize:10, color:renderMode.startsWith('reference') ? C.lh2 : C.inter }}>
            {renderMode}
          </span>
          <span className="mono" style={{ fontSize:9, color:C.ink3 }}>
            axes: X/Y/Z · matches 2D TOP/FRONT/SIDE
          </span>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={exportSTL}
            style={{ background:'transparent', border:`1px solid ${C.inter}`, color:C.inter,
                     fontFamily:C.mono, fontSize:11, padding:'5px 14px', cursor:'pointer' }}>
            ⬇ STL
          </button>
          <button onClick={onClose}
            style={{ background:'transparent', border:`1px solid ${C.frame}`, color:C.ink3,
                     fontFamily:C.mono, fontSize:11, padding:'5px 10px', cursor:'pointer' }}>
            ✕ Esc
          </button>
        </div>
      </div>

      {/* 범례 */}
      <div style={{ padding:'5px 18px', background:C.canvas, borderBottom:`1px solid ${C.frame}`,
                    display:'flex', gap:18, flexShrink:0 }}>
        {renderMode.startsWith('reference') && (
          <span className="mono" style={{ fontSize:9, color:C.lh2 }}>
            기준 3D scaffold 표시 중 · 생성 geometry 좌표/형상은 아직 검수 부족
          </span>
        )}
        {!renderMode.startsWith('reference') && renderMode.includes('fail') && (
          <span className="mono" style={{ fontSize:9, color:C.risk }}>
            실제 생성 3D 표시 중 · 결과가 박스형/좌표부족이면 keep 금지
          </span>
        )}
        {[['#1a4a82','Main Body'],['#cc2244','Subtract / Drill'],
          ['#8855cc','Fillet / Chamfer'],['#22aa55','Pattern / Boss'],
          ['#44aacc','Channel / Sweep']].map(([col,lbl])=>(
          <span key={lbl} style={{ display:'flex', gap:5, alignItems:'center' }}>
            <span style={{ width:9, height:9, background:col, display:'inline-block', borderRadius:2 }}/>
            <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{lbl}</span>
          </span>
        ))}
      </div>

      {/* 3D 캔버스 */}
      <div ref={mountRef} style={{ flex:1, position:'relative' }}>
        {!ready && (
          <div style={{ position:'absolute', inset:0, display:'flex',
                        alignItems:'center', justifyContent:'center' }}>
            <span className="mono" style={{ color:C.ink3, animation:'blink 1s infinite' }}>
              ◐ Three.js 초기화 중…
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

    { k:'blueprint', label:'▣ Blueprint' },

    { k:'quality',  label:'✅ Quality'  },
    { k:'print',    label:'🖨 Print'    },
    ...(hasElec ? [{ k:'electrical', label:'⚡ Electrical' }] : []),

  useEffect(() => {

    return () => window.removeEventListener('keydown', h);

  const parts     = flattenTree(bp.part_tree);

    const rm = bp._run_meta;

    a.download = `blueprint_${(bp.object || bp.project || 'design').replace(/\s+/g, '-').toLowerCase()}${suffix}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);

  return (
    <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.82)', zIndex:200,
               display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ background:C.canvas2, border:`1px solid ${C.frame}`,
                    width:'100%', maxWidth:920, maxHeight:'92vh', display:'flex', flexDirection:'column' }}>

        {/* 모달 헤더 */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                      padding:'12px 18px', borderBottom:`1px solid ${C.frame}`, flexShrink:0 }}>
          <div style={{ display:'flex', gap:10, alignItems:'baseline', flexWrap:'wrap' }}>
            <span className="mono" style={{ fontSize:16, color:C.lox, fontWeight:700 }}>
              {bp.object || bp.project || 'Blueprint'}
            </span>
            {bp.cad_brief?.rev  && <Badge t={`rev ${bp.cad_brief.rev}`}              c={C.halo} />}
            {bp.brief?.constraints?.material && <Badge t={bp.brief.constraints.material} c={C.lox}  />}
            {bp.brief?.constraints?.process  && <Badge t={bp.brief.constraints.process}  c={C.inter}/>}
          </div>
          <button onClick={onClose}
            style={{ background:'transparent', border:`1px solid ${C.frame}`, color:C.ink3,
                     fontFamily:C.mono, fontSize:11, padding:'4px 10px', cursor:'pointer' }}>
            ✕ Esc
          </button>
        </div>

        {/* 탭 바 */}
        <div style={{ display:'flex', borderBottom:`1px solid ${C.frame}`, flexShrink:0, overflowX:'auto' }}>
          {TABS.map(t => (
            <button key={t.k} onClick={() => setTab(t.k)}
              style={{ padding:'8px 16px', background:'transparent', border:'none',
                       borderBottom:`2px solid ${tab === t.k ? C.lox : 'transparent'}`,
                       fontFamily:C.mono, fontSize:11,
                       color:tab === t.k ? C.lox : C.ink3,
                       cursor:'pointer', letterSpacing:'.04em', whiteSpace:'nowrap' }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* 탭 컨텐츠 */}
        <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>

          {tab === 'blueprint' && (
            <div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
              GENERATED OPS PROJECTION · 3-VIEW JSON GEOMETRY
              </div>
              <CoordinateAuditStrip bp={bp} />
              <GeneratedDesignThreeView2D bp={bp} />
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'12px 0 10px' }}>
                GENERATED COORDINATE MAP · FROM GEOMETRY_OPS AT[]
              </div>
              <GeometryCoordinatePreview bp={bp} />
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'12px 0 10px' }}>
                REFERENCE TARGET · NOT GENERATED OUTPUT
              </div>
              <BlueprintAssetReference bp={bp} />
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'12px 0 10px' }}>
                STRUCTURE SUMMARY · PART_TREE + OP LIST
              </div>
              <BlueprintPlanPreview bp={bp} />
              <div style={{ marginTop:12, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                <div style={{ border:`1px solid ${C.frame}`, background:C.canvas, padding:'9px 10px' }}>
                  <div className="mono" style={{ fontSize:9, color:C.ink3, letterSpacing:'.08em' }}>PART TREE</div>
                  <div className="mono" style={{ fontSize:15, color:C.lox, marginTop:4 }}>{parts.length}</div>
                </div>
                <div style={{ border:`1px solid ${C.frame}`, background:C.canvas, padding:'9px 10px' }}>
                  <div className="mono" style={{ fontSize:9, color:C.ink3, letterSpacing:'.08em' }}>GEOMETRY OPS</div>
                  <div className="mono" style={{ fontSize:15, color:C.halo, marginTop:4 }}>{(bp.geometry_ops || []).length}</div>
                </div>
                <div style={{ border:`1px solid ${C.frame}`, background:C.canvas, padding:'9px 10px' }}>
                  <div className="mono" style={{ fontSize:9, color:C.ink3, letterSpacing:'.08em' }}>3D CHECK</div>
                  <button onClick={() => setShow3D(true)}
                    style={{ marginTop:4, background:'transparent', border:`1px solid ${C.lox}`, color:C.lox,
                             fontFamily:C.mono, fontSize:10, padding:'4px 10px', cursor:'pointer' }}>
                    open 3D view
                  </button>
                </div>
              </div>
            </div>
          )}

          {tab === 'brief' && (
            <div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                REQUIREMENTS · {(bp.brief?.requirements || []).length}개
              </div>
              {(bp.brief?.requirements || []).map((r, i) => (
                <div key={i} style={{ display:'flex', gap:12, padding:'8px 0',
                                      borderBottom:`1px solid rgba(39,74,121,.4)` }}>
                  <span className="mono" style={{ fontSize:11, color:C.halo, flexShrink:0 }}>{i + 1}</span>
                  <span style={{ fontFamily:C.sans, fontSize:13, color:C.ink2, lineHeight:1.55 }}>{r}</span>
                </div>
              ))}
              <div className="mono"
                style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'16px 0 10px' }}>
                CONSTRAINTS
              </div>
              {Object.entries(bp.brief?.constraints || {}).map(([k, v]) => (
                <KV key={k} k={k}
                  v={Array.isArray(v) ? v.join(' × ') + ' mm' : String(v)}
                  c={C.lox} />
              ))}
            </div>
          )}

          {tab === 'parts' && (
            <div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                PART HIERARCHY · {parts.length}개
              </div>
              {parts.map((p, i) => (
                <div key={i}
                  style={{ display:'grid', gridTemplateColumns:'120px 1fr auto 80px',
                            gap:10, alignItems:'center', padding:'8px 0',
                            borderBottom:`1px solid rgba(39,74,121,.4)`,
                            paddingLeft: p.depth * 20 }}>
                  <span className="mono" style={{ fontSize:10, color:C.ink3 }}>{p.id}</span>
                  <span style={{ fontFamily:C.sans, fontSize:13, color:p.depth === 0 ? C.lox : C.ink }}>
                    {p.name}
                  </span>
                  <Badge t={`×${p.qty}`} c={C.lh2} />
                  <span className="mono" style={{ fontSize:10, color:C.ink3, textAlign:'right' }}>
                    {p.material || '—'}
                  </span>
                </div>
              ))}
            </div>
          )}

          {tab === 'geometry' && (
            <div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                PARAMETRIC OPS · {(bp.geometry_ops || []).length}개 operations
              </div>
              {(bp.geometry_ops || []).map((op, i) => (
                <div key={i}
                  style={{ display:'grid', gridTemplateColumns:'2em 110px 1fr 70px',
                            gap:10, alignItems:'start', padding:'8px 0',
                            borderBottom:`1px solid rgba(39,74,121,.4)` }}>
                  <span className="mono" style={{ fontSize:10, color:C.ink3 }}>{i + 1}</span>
                  <Badge t={op.op} c={C.halo} />
                  <div>
                    <div className="mono" style={{ fontSize:10, color:C.ink2 }}>
                      {JSON.stringify(op.args || {})}
                    </div>
                    {op.target && (
                      <div className="mono" style={{ fontSize:9, color:C.ink3 }}>target: {op.target}</div>
                    )}
                  </div>
                  <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{op.id || ''}</span>
                </div>
              ))}
              {(bp.geometry_ops || []).length === 0 && (
                <div className="mono" style={{ fontSize:11, color:C.ink3 }}>
                  (Stage 2가 완료되지 않았습니다)
                </div>
              )}
            </div>
          )}

          {tab === 'quality' && (
            <div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                VERIFICATION · {(bp.verify || []).length}개 checks
              </div>
              {(bp.verify || []).map((v, i) => (
                <div key={i}
                  style={{ display:'grid', gridTemplateColumns:'70px 1fr auto',
                            gap:12, alignItems:'center', padding:'9px 0',
                            borderBottom:`1px solid rgba(39,74,121,.4)` }}>
                  <Badge t={v.result} c={resCol(v.result)} />
                  <div>
                    <div style={{ fontFamily:C.sans, fontSize:13, color:C.ink }}>{v.check}</div>
                    {v.value && (
                      <div className="mono" style={{ fontSize:10, color:C.ink3, marginTop:2 }}>{v.value}</div>
                    )}
                  </div>
                  {v.rule && (
                    <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{v.rule}</span>
                  )}
                </div>
              ))}

              <div className="mono"
                style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'18px 0 10px' }}>
                RISK REGISTER · {(bp.risk || []).length}개 (max 5)
              </div>
              {(bp.risk || []).map((r, i) => (
                <div key={i}
                  style={{ padding:'12px', marginBottom:8,
                            border:`1px solid ${C.frame}`, background:C.canvas }}>
                  <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                    <Badge t={r.id} c={C.risk} />
                    {r.severity && <Badge t={r.severity} c={sevCol(r.severity)} />}
                  </div>
                  <div style={{ fontFamily:C.sans, fontSize:13, color:C.ink2, marginBottom:6 }}>{r.desc}</div>
                  <div className="mono" style={{ fontSize:11, color:C.ink3 }}>↳ {r.mit}</div>
                </div>
              ))}
            </div>
          )}

          {tab === 'print' && (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
              <div>
                <div className="mono"
                  style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                  PRINT PROFILE
                </div>
                {Object.entries(bp.print_profile || {})
                  .filter(([, v]) => v !== null && v !== undefined)
                  .map(([k, v]) => <KV key={k} k={k} v={String(v)} c={C.lox} />)}
              </div>
              <div>
                <div className="mono"
                  style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                  SLICER JOB
                </div>
                {Object.entries(bp.slicer_job || {})
                  .filter(([k]) => k !== 'args')
                  .map(([k, v]) => <KV key={k} k={k} v={String(v)} c={C.inter} />)}
                {bp.slicer_job?.args && (
                  <div style={{ marginTop:8 }}>
                    <span className="mono" style={{ fontSize:10, color:C.ink3, textTransform:'uppercase' }}>
                      args
                    </span>
                    <div className="mono" style={{ fontSize:10, color:C.ink2, marginTop:4, lineHeight:1.6 }}>
                      {bp.slicer_job.args.join(' ')}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {tab === 'electrical' && (() => {
            const eb   = bp.electrical_brief || {};
            const bom  = bp.electronics_bom  || [];
            const catColor = { fc:'#9fd3ff', esc:'#caa9ff', motor:'#89ffa8',
                               battery:'#ffd39f', vtx:'#ff9fb5', receiver:'#9fd3ff',
                               sensor:'#e6ecf5', bec:'#ffd39f', other:'#9aa8bd' };
            // MOTOR_BATTERY_MATCH 호환 정보 매칭
            const matchKey = eb.cell_s === 4 ? '4S' : eb.cell_s === 6 ? '6S' : null;
            const matchInfo = matchKey ? MOTOR_BATTERY_MATCH[matchKey] : null;

            return (
              <div>
                {/* Electrical Brief 섹션 */}
                {Object.keys(eb).length > 0 && (
                  <>
                    <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                      ⚡ ELECTRICAL BRIEF
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:20 }}>
                      {eb.cell_s      && <KV k="Cell S"       v={`${eb.cell_s}S`}                           c={C.lh2} />}
                      {eb.voltage_nom && <KV k="Voltage nom"  v={`${eb.voltage_nom}V`}                      c={C.lh2} />}
                      {eb.voltage_max && <KV k="Voltage max"  v={`${eb.voltage_max}V`}                      c={C.risk}/>}
                      {eb.total_mah   && <KV k="Capacity"     v={`${eb.total_mah}mAh`}                      c={C.lox} />}
                      {eb.peak_a      && <KV k="Peak current" v={`${eb.peak_a}A`}                           c={C.risk}/>}
                      {eb.connector   && <KV k="Connector"    v={eb.connector}                              c={C.ink2}/>}
                      {eb.fc_firmware && <KV k="FC firmware"  v={eb.fc_firmware}                            c={C.halo}/>}
                      {eb.protocol    && <KV k="Protocol"     v={eb.protocol}                               c={C.halo}/>}
                      {eb.rc_link     && <KV k="RC link"      v={eb.rc_link}                                c={C.inter}/>}
                      {eb.video_link  && <KV k="Video link"   v={eb.video_link}                             c={C.inter}/>}
                    </div>
                    {eb.compat_note && (
                      <div style={{ padding:'10px 14px', border:`1px solid ${C.frame}`,
                                    background:C.canvas, marginBottom:18 }}>
                        <div className="mono" style={{ fontSize:9, color:C.ink3, marginBottom:4 }}>COMPAT NOTE</div>
                        <div style={{ fontFamily:C.sans, fontSize:12, color:C.ink2, lineHeight:1.6 }}>
                          {eb.compat_note}
                        </div>
                      </div>
                    )}

                    {/* MOTOR_BATTERY_MATCH 호환 체크 */}
                    {matchInfo && (
                      <div style={{ padding:'10px 14px', border:`1px solid ${C.inter}40`,
                                    background:`${C.inter}08`, marginBottom:18 }}>
                        <div className="mono" style={{ fontSize:9, color:C.inter, marginBottom:8 }}>
                          🔋 {matchKey} 호환 범위 — {matchInfo.use_case}
                        </div>
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
                          <KV k="KV range"   v={`${matchInfo.kv_range[0]}–${matchInfo.kv_range[1]}KV`} c={C.lox} />
                          <KV k="ESC min"    v={`${matchInfo.esc_min_a}A cont`}                        c={C.lh2} />
                          <KV k="Props"      v={matchInfo.props.join(', ')}                            c={C.ink2}/>
                          <KV k="Capacity"   v={matchInfo.battery_mah.join(' / ') + ' mAh'}           c={C.lox} />
                        </div>
                        <div className="mono" style={{ fontSize:9, color:C.ink3, marginTop:8 }}>
                          {matchInfo.notes}
                        </div>
                      </div>
                    )}
                  </>
                )}

                {/* Electronics BOM 테이블 */}
                {bom.length > 0 && (
                  <>
                    <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:10 }}>
                      🔌 ELECTRONICS BOM · {bom.length}개 부품
                    </div>
                    {bom.map((item, i) => (
                      <div key={i} style={{ padding:'12px 14px', marginBottom:8,
                                            border:`1px solid ${C.frame}`, background:C.canvas }}>
                        <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:8, flexWrap:'wrap' }}>
                          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>{item.id}</span>
                          <span style={{ fontFamily:C.sans, fontSize:13, color:C.ink, fontWeight:600 }}>
                            {item.label}
                          </span>
                          {item.category && (
                            <Badge t={item.category} c={catColor[item.category] || C.ink3} />
                          )}
                          {item.qty && item.qty > 1 && <Badge t={`×${item.qty}`} c={C.lh2} />}
                        </div>
                        <div style={{ fontFamily:C.sans, fontSize:11.5, color:C.ink2,
                                      lineHeight:1.6, marginBottom:8 }}>
                          {item.spec}
                        </div>
                        <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                          {item.voltage   && <span className="mono" style={{ fontSize:9, color:C.lh2  }}>{item.voltage}</span>}
                          {item.current_a && <span className="mono" style={{ fontSize:9, color:C.risk }}>{item.current_a}A</span>}
                          {item.mass_g    && <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{item.mass_g}g</span>}
                          {item.dims_mm   && <span className="mono" style={{ fontSize:9, color:C.ink3 }}>{item.dims_mm}</span>}
                          {item.firmware  && <span className="mono" style={{ fontSize:9, color:C.halo }}>{item.firmware}</span>}
                          {item.protocol  && <span className="mono" style={{ fontSize:9, color:C.halo }}>{item.protocol}</span>}
                        </div>
                      </div>
                    ))}
                  </>
                )}

                {!hasElec && (
                  <div className="mono" style={{ fontSize:11, color:C.ink3 }}>
                    electronics_bom / electrical_brief 데이터 없음
                  </div>
                )}
              </div>
            );
          })()}

          {tab === 'raw' && (
            <pre style={{ fontFamily:C.mono, fontSize:10.5, color:C.term_green,
                          background:C.term_bg, padding:14, margin:0,
                          overflowX:'auto', whiteSpace:'pre-wrap', wordBreak:'break-word',
                          lineHeight:1.55 }}>
              {JSON.stringify(bp, null, 2)}
            </pre>
          )}
        </div>

        {/* 모달 푸터 */}
        <div style={{ padding:'10px 18px', borderTop:`1px solid ${C.frame}`, flexShrink:0,
                      display:'flex', justifyContent:'space-between', alignItems:'center', gap:10 }}>
          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
            {bp.ts ? new Date(bp.ts).toLocaleString('ko-KR') : '—'} · schema_v6
          </span>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => setShow3D(true)}
              style={{ background:'transparent', border:`1px solid ${C.lox}`, color:C.lox,
                       fontFamily:C.mono, fontSize:11, padding:'5px 14px', cursor:'pointer',
                       letterSpacing:'.04em' }}>
              🔲 3D View
            </button>
            <button onClick={() => { setShow3D(false); setTab('blueprint'); }}
              style={{ background:'transparent', border:`1px solid ${C.halo}`, color:C.halo,
                       fontFamily:C.mono, fontSize:11, padding:'5px 14px', cursor:'pointer',
                       letterSpacing:'.04em' }}>
              ▣ 2D View
            </button>
            <Btn size="sm" variant="warn" onClick={downloadJSON}>↓ JSON</Btn>
          </div>
        </div>
      </div>

      {/* 3D 뷰어 오버레이 */}
      {show3D && <ThreeDModal bp={bp} onClose={() => setShow3D(false)} />}
    </div>
  );
}

function preferredModelName(models) {
  const names = (models || []).map(m => m.name || '');
  const prefs = [
    /qwen3:4b-instruct/i,
    /qwen2\.5.*14b.*instruct/i,
    /qwen3.*8b.*instruct/i,
    /qwen3.*14b.*instruct/i,
    /qwen/i,
    /exaone/i,
    /gemma/i,
  ];
  for (const rx of prefs) {
    const hit = names.find(n => rx.test(n));
    if (hit) return hit;
  }
  return names[0] || '';
}

function partGeometryHint(part) {
  const text = `${part?.label || ''} ${part?.spec || ''}`.toLowerCase();
  if (/nozzle|bell|engine/.test(text)) {
    return 'Part-specific geometry hint: use revolve/loft/shell/channel for bell contour, throat, exit lip, cooling jacket, gimbal flange, bolt circle, and nozzle label. Avoid starting with a generic box.';
  }
  if (/combustion|chamber|injector/.test(text)) {
    return 'Part-specific geometry hint: use cylinder/shell/channel/drill/pattern_polar for injector face, chamber wall, regenerative cooling channels, flanges, ports, and pressure shell. Avoid generic rectangular body.';
  }
  if (/turbopump|pump|impeller/.test(text)) {
    return 'Part-specific geometry hint: use cylinder/revolve/pattern_polar/channel/boss for pump volute, impeller housing, shaft axis, bearing caps, inlet/outlet ports, gearbox pads, and service flanges.';
  }
  if (/tank|propellant|lox|fuel/.test(text)) {
    return 'Part-specific geometry hint: use cylinder/shell/revolve/channel/baffle-like pocket features for cylindrical tank barrel, dome caps, common bulkhead, slosh baffles, vent/fill/drain ports, and sensor bosses.';
  }
  if (/interstage|adapter|ring/.test(text)) {
    return 'Part-specific geometry hint: use cylinder/shell/pattern_polar/drill/channel for ring frames, separation bolts, vent slots, stringers, and stage interface flanges.';
  }
  if (/fairing|payload/.test(text)) {
    return 'Part-specific geometry hint: use loft/shell/mirror/channel/engrave for ogive fairing halves, split seam, separation rails, acoustic blanket panels, payload adapter ring, and access labels.';
  }
  if (/fin/.test(text)) {
    return 'Part-specific geometry hint: use extrude/loft/mirror/drill/chamfer for trapezoidal fins, root tabs, leading-edge bevel, attachment bolts, and fin-can interface. Avoid cylinder-dominant geometry.';
  }
  if (/avionics|bay|electronics/.test(text)) {
    return 'Part-specific geometry hint: use box/pocket/drill/channel/engrave for avionics trays, card slots, harness channels, connector panels, cooling vents, access cover, and datum labels.';
  }
  return 'Part-specific geometry hint: choose operations that match the named part. Do not copy the generic example order if the part is better represented by loft, revolve, shell, channel, mirror, or pattern operations.';
}

  }
  if (/wing|fuselage|tail|nacelle|inlet|gear|fairing|door|mirror|optical/.test(text)) {

function physicsPathHintsForAssembly(vehicle) {
  const text = `${vehicle?.id || ''} ${vehicle?.label || ''} ${vehicle?.desc || ''}`.toLowerCase();
  const paths = [];
  if (/rocket|launch|motor|thruster|propulsion|turbofan|engine|nozzle|compressor|turbine/.test(text)) {
    paths.push({ type:'flow', path:'inlet or propellant feed -> energy conversion/combustion/compression -> nozzle/exhaust/outlet', target:'minimize losses, separation, leakage, heat risk' });
    paths.push({ type:'thermal', path:'hot zone -> liner/cooling/heat shield -> structure/radiator/ambient', target:'protect load-bearing structure and service interfaces' });
  }
  if (/aircraft|fighter|airliner|wing|helicopter|uav|drone|glider/.test(text)) {
    paths.push({ type:'load', path:'aero surface/rotor/landing load -> spar/frame/hardpoint -> fuselage/core structure', target:'high stiffness with low mass and accessible inspection points' });
    paths.push({ type:'flow', path:'freestream/inlet/prop wash -> duct/control surface/nozzle -> wake/exhaust', target:'clean flow path with minimized blockage and drag' });
  }
  if (/robot|arm|rover|exo|prosthetic|surgical|joint|gearbox|actuator/.test(text)) {
    paths.push({ type:'motion', path:'actuator/reducer -> joint axis/link -> tool/limb/contact point', target:'clear torque path, bearing support, encoder reference, cable routing' });
    paths.push({ type:'load', path:'payload/contact load -> link/joint/bearing -> base or human interface', target:'limit deflection, backlash, wear, and unsafe motion' });
  }
  if (/marine|underwater|rov|submarine|glider|surface|propeller|hull/.test(text)) {
    paths.push({ type:'flow', path:'water inflow -> hull/duct/foil/propulsor -> wake/outflow', target:'reduce cavitation, drag, fouling, and turbulence penalties' });
    paths.push({ type:'pressure', path:'external hydrostatic pressure -> seal stack/pressure shell -> internal dry volume', target:'prevent leakage and preserve serviceability' });
  }
  if (/medical|implant|hand|orthosis|brace|socket|patient/.test(text)) {
    paths.push({ type:'human_interface', path:'body contact -> padding/trim/strap/adjustment -> load-bearing shell or actuator', target:'safe contact, adjustability, cleanability, and repeatable alignment' });
  }
  if (!paths.length) {
    paths.push({ type:'load', path:'external load -> functional feature -> mounting datum -> primary structure', target:'reduce part count while preserving stiffness and inspection access' });
  }
  return paths;
}

      id: p.id,
      label: p.label,

// ═══════════════════════════════════════════════════════════════════════════
// PresetSelector — 3단계 계층 UI
// ═══════════════════════════════════════════════════════════════════════════

function presetAssetPath(preset) {
  return `vendor/img/presets/${preset.cat}/${preset.type}/${preset.conf}.svg`;
}

function presetPartAssetPath(presetRef) {
  if (!Array.isArray(presetRef) || presetRef.length < 3) return '';
  return `vendor/img/presets/${presetRef[0]}/${presetRef[1]}/${presetRef[2]}.svg`;
}

function assemblyPartAssetPath(vehicleId, part) {
  if (!vehicleId || !part?.id) return '';
  return `vendor/img/assembly_parts/${vehicleId}/${part.id}.svg`;
}

function PresetSelector({ preset, onChange, disabled, mode = 'part' }) {
  const cats   = CATEGORY_ORDER.map(k => [k, PRESET_TREE[k]]).filter(([,v]) => v);
  const catObj = PRESET_TREE[preset.cat];
  const types  = catObj ? Object.entries(catObj.types) : [];
  const typeObj= catObj?.types[preset.type];
  const confs  = typeObj ? Object.entries(typeObj.configs) : [];
  const hint   = getPresetHint(preset);
  const assemblyMode = mode === 'assembly';

  function pickCat(k) {
    const t0 = Object.keys(PRESET_TREE[k].types)[0];
    const c0 = Object.keys(PRESET_TREE[k].types[t0].configs)[0];
    onChange({ cat:k, type:t0, conf:c0 });
  }
  function pickType(k) {
    const c0 = Object.keys(catObj.types[k].configs)[0];
    onChange({ ...preset, type:k, conf:c0 });
  }

  return (
    <div style={{ border:`1px solid ${C.frame}`, background:C.canvas, marginBottom:12 }}>

      {/* ── Level 1: Category ── */}
      <div style={{ display:'flex', borderBottom:`1px solid ${C.frame}`, overflowX:'auto' }}>
        {cats.map(([k, cat]) => {
          const on = preset.cat === k;
          return (
            <button key={k} onClick={() => !disabled && pickCat(k)} disabled={disabled}
              style={{ padding:'9px 16px', background: on ? 'rgba(159,211,255,0.1)' : 'transparent',
                       border:'none', borderBottom:`2px solid ${on ? cat.color : 'transparent'}`,
                       fontFamily:C.mono, fontSize:12, color: on ? cat.color : C.ink3,
                       cursor:disabled?'not-allowed':'pointer', whiteSpace:'nowrap',
                       letterSpacing:'.06em', transition:'color .1s' }}>
              {cat.icon}  {cat.label}
            </button>
          );
        })}
      </div>

      {!assemblyMode && (
        <>
          {/* ── Level 2: Type ── */}
          <div style={{ display:'flex', borderBottom:`1px solid ${C.frame}`,
                        padding:'0 6px', background:'rgba(10,26,46,0.4)', overflowX:'auto' }}>
            {types.map(([k, t]) => {
              const on = preset.type === k;
              return (
                <button key={k} onClick={() => !disabled && pickType(k)} disabled={disabled}
                  style={{ padding:'6px 12px', background:'transparent', border:'none',
                           borderBottom:`2px solid ${on ? catObj.color : 'transparent'}`,
                           fontFamily:C.mono, fontSize:10, color: on ? catObj.color : C.ink3,
                           cursor:disabled?'not-allowed':'pointer', whiteSpace:'nowrap',
                           letterSpacing:'.06em' }}>
                  {t.label}
                </button>
              );
            })}
          </div>

          {/* ── Level 3: Config chips ── */}
          <div style={{ padding:'10px 14px', display:'flex', gap:6, flexWrap:'wrap' }}>
            {confs.map(([k, conf]) => {
              const on = preset.conf === k;
              return (
                <button key={k}
                  onClick={() => !disabled && onChange({ ...preset, conf:k })}
                  disabled={disabled}
                  style={{ fontFamily:C.mono, fontSize:10, letterSpacing:'.06em',
                           padding:'5px 11px', background: on ? catObj.color : 'transparent',
                           color: on ? C.canvas : C.ink3,
                           border:`1px solid ${on ? catObj.color : C.frame}`,
                           borderRadius:2, cursor:disabled?'not-allowed':'pointer',
                           transition:'all .1s' }}>
                  {conf.label}
                </button>
              );
            })}
          </div>
        </>
      )}

      {/* ── Hint preview ── */}
      {!assemblyMode && hint && (
        <div style={{ padding:'10px 14px', borderTop:`1px solid ${C.frame}`,
                      display:'grid', gridTemplateColumns:'180px 1fr', gap:12,
                      alignItems:'stretch', background:'rgba(5,13,24,0.25)' }}>
          <div style={{ border:`1px solid ${C.frame}`, background:'#050d18', overflow:'hidden' }}>
            <img
              src={presetAssetPath(preset)}
              alt={`${preset.cat}/${preset.type}/${preset.conf}`}
              style={{ width:'100%', height:104, objectFit:'cover', display:'block' }}
              onError={e => { e.target.style.display='none'; }}
            />
          </div>
          <div style={{ display:'flex', flexDirection:'column', justifyContent:'center' }}>
            <div className="mono" style={{ fontSize:9, color:catObj.color, letterSpacing:'.1em', marginBottom:5 }}>
              SINGLE-PART SCHEMATIC · {preset.cat}/{preset.type}/{preset.conf}
            </div>
            <span className="mono" style={{ fontSize:9, color:C.ink3, lineHeight:1.6 }}>
              <span style={{ color:catObj.color }}>hint  </span>{hint}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}

// ImgThumb — Wikipedia REST API로 대표 제품 썸네일 로드
// ═══════════════════════════════════════════════════════════════════════════

const _wikiThumbCache = {};

function ImgThumb({ title, h = 108 }) {
  const [src, setSrc] = React.useState(_wikiThumbCache[title] || null);
  const [err, setErr] = React.useState(false);

  React.useEffect(() => {
    if (!title || _wikiThumbCache[title]) return;
    fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        const url = d?.thumbnail?.source;
        if (url) { _wikiThumbCache[title] = url; setSrc(url); }
        else setErr(true);
      })
      .catch(() => setErr(true));
  }, [title]);

  if (!title || err) return null;
  if (!src) return (
    <div style={{ height: h, background:'#081c30',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  borderBottom:'1px solid rgba(39,74,121,0.25)' }}>
      <span style={{ fontSize:9, color:'rgba(100,160,240,0.25)', fontFamily:'monospace' }}>LOADING···</span>
    </div>
  );
  return (
    <img src={src} alt={title}
      style={{ width:'100%', height:h, objectFit:'cover', display:'block',
               borderBottom:'1px solid rgba(39,74,121,0.25)', filter:'saturate(0.7) brightness(0.85)' }}
      onError={() => setErr(true)}
    />
  );
}

// Assembly Part Card (생성 중 / 완료 후 표시)
// ═══════════════════════════════════════════════════════════════════════════

function AssemblyPartCard({ part, idx, vehicleId, onView }) {
  const isDone = part.status === 'done';
  const isErr  = part.status === 'error';
  const isGen  = part.status === 'generating';
  const isPend = part.status === 'pending';
  const bp     = part.blueprint;
  const [imgSrc, setImgSrc] = React.useState(() => assemblyPartAssetPath(vehicleId, part));
  const fallbackImg = presetPartAssetPath(part.preset);

  React.useEffect(() => {
    setImgSrc(assemblyPartAssetPath(vehicleId, part));
  }, [vehicleId, part.id]);

  const borderCol = isDone ? C.inter : isErr ? C.risk : isGen ? C.halo : C.frame;
  const validCol  = part.validation?.valid === true ? C.inter
                  : part.validation?.valid === false ? C.lh2 : C.ink3;

  return (
    <div style={{ border:`${isDone?1.5:1}px solid ${borderCol}`, background:C.canvas,
                  padding:'10px 12px', display:'flex', flexDirection:'column',
                  cursor: isDone ? 'pointer' : 'default', minHeight:120 }}
      onClick={() => isDone && onView(idx)}>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div className="mono" style={{ fontSize:9, color:C.ink3, letterSpacing:'.08em' }}>
            P{String(idx+1).padStart(2,'0')}
          </div>
          <div className="mono" style={{ fontSize:11.5, color:C.ink, fontWeight:600,
                                          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
            {part.label}
          </div>
        </div>
        <span style={{ width:8, height:8, borderRadius:'50%',
                       background: isDone?C.inter:isGen?C.halo:isErr?C.risk:C.ink3,
                       boxShadow: isGen?`0 0 6px ${C.halo}`:'none',
                       animation: isGen?'blink 1s infinite':'none', flexShrink:0 }}/>
      </div>

      <div style={{ border:`1px solid rgba(39,74,121,0.55)`, background:'#050d18',
                    height:86, marginBottom:8, display:'flex', alignItems:'center',
                    justifyContent:'center', overflow:'hidden' }}>
        {imgSrc ? (
          <img src={imgSrc}
            alt={`${part.label} schematic`}
            onError={() => {
              if (fallbackImg && imgSrc !== fallbackImg) setImgSrc(fallbackImg);
              else setImgSrc('');
            }}
            style={{ width:'100%', height:'100%', objectFit:'contain', display:'block', opacity:0.96 }}/>
        ) : (
          <span className="mono" style={{ fontSize:8, color:C.ink3 }}>NO IMAGE</span>
        )}
      </div>

      {isDone && bp && (
        <div style={{ flex:1 }}>
          <div className="mono" style={{ fontSize:9, color:C.lox, lineHeight:1.5 }}>
            {bp.brief?.constraints?.material || '—'}
          </div>
          <div className="mono" style={{ fontSize:9, color:C.inter, lineHeight:1.5 }}>
            {bp.brief?.constraints?.process || '—'} · {(bp.geometry_ops||[]).length} ops
          </div>
          {part.validation && (
            <div className="mono" style={{ fontSize:9, color:validCol, marginTop:4 }}>
              {part.validation.valid === true  ? '✓ valid' :
               part.validation.valid === false ? `⚠ ${part.validation.errors?.length||0} err` : ''}
            </div>
          )}
        </div>
      )}

      {isGen && (
        <div className="mono" style={{ fontSize:10, color:C.halo, flex:1, alignContent:'center' }}>
          ◐ {part.stage || 'stage 1'}… {part.tokens || 0} tok
        </div>
      )}

      {isErr && (
        <div className="mono" style={{ fontSize:9, color:C.risk, flex:1 }}>
          ✗ {part.error || 'error'}
        </div>
      )}

      {isPend && (
        <div className="mono" style={{ fontSize:9, color:C.ink3, flex:1, alignContent:'center' }}>
          ⏳ queued
        </div>
      )}

      {isDone && (
        <div style={{ marginTop:6, display:'flex', justifyContent:'space-between', alignItems:'center', gap:6 }}>
          <span className="mono" style={{ fontSize:8, color:C.halo }}>
            ▣ 2D 보기
          </span>
          <span className="mono" style={{ fontSize:8, color:C.ink3 }}>
            click ↗
          </span>
        </div>
      )}
    </div>
  );
}

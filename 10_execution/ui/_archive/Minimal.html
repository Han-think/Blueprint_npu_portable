function extractJSON(text) {
  if (!text) return null;
  // 1) raw JSON parse
  try { const t = text.trim(); if (t.startsWith('{')) return JSON.parse(t); } catch {}
  // 2) ```json ... ``` 블록
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) { try { return JSON.parse(fence[1].trim()); } catch {} }
  // 3) 첫 { ~ 마지막 }
  const s = text.indexOf('{'), e = text.lastIndexOf('}');
  if (s !== -1 && e > s) { try { return JSON.parse(text.slice(s, e + 1)); } catch {} }
  return null;
}

function normalizeBlueprint(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  const o = JSON.parse(JSON.stringify(obj)); // deep clone

  // version constant
  o.version = 'bp-npu-r6';

  // ts: ensure ISO 8601
  if (!o.ts || !/^\d{4}-\d{2}-\d{2}T/.test(String(o.ts))) {
    o.ts = new Date().toISOString();
  }

  // brief.constraints.process enum
  if (o.brief?.constraints?.process) {
    const raw = String(o.brief.constraints.process);
    o.brief.constraints.process = PROCESS_MAP[raw.toLowerCase()] || raw;
  }

  // cad_brief.rev: strip "v" prefix
  if (o.cad_brief?.rev) {
    o.cad_brief.rev = String(o.cad_brief.rev).replace(/^v/i, '');
  }

  // risk: id pattern R\d+, trim to 5
  if (Array.isArray(o.risk)) {
    o.risk = o.risk.slice(0, 5).map((r, i) => ({
      ...r,
      id: /^R\d+$/.test(String(r.id || '')) ? String(r.id) : `R${String(i + 1).padStart(2, '0')}`,
    }));
  }

  // geometry_ops: op alias normalization
  if (Array.isArray(o.geometry_ops)) {
    o.geometry_ops = o.geometry_ops.map(op => {
      if (!op || typeof op !== 'object') return op;
      const raw = String(op.op || '').toLowerCase();
      if (VALID_OPS.has(op.op)) return op;
      return { ...op, op: OP_ALIASES[raw] || 'extrude' };
    });
  }

  // print_profile.supports enum
  if (o.print_profile?.supports) {
    const raw = String(o.print_profile.supports).toLowerCase();
    o.print_profile.supports = SUP_MAP[raw] || o.print_profile.supports;
  }

  // slicer_job.tool enum (lowercase)
  if (o.slicer_job?.tool) {
    const raw = String(o.slicer_job.tool).toLowerCase().trim();
    o.slicer_job.tool = TOOL_MAP[raw] || raw;
  }

  // slicer_job: uri-reference fallbacks, invalid sha256 removal
  if (o.slicer_job) {
    if (!o.slicer_job.input_stl || typeof o.slicer_job.input_stl !== 'string')
      o.slicer_job.input_stl = 'output/part.stl';
    if (!o.slicer_job.output || typeof o.slicer_job.output !== 'string')
      o.slicer_job.output = 'output/part.gcode';
    if (o.slicer_job.sha256 && !/^[a-f0-9]{64}$/.test(String(o.slicer_job.sha256)))
      delete o.slicer_job.sha256;
  }

  // verify.result enum
  if (Array.isArray(o.verify)) {
    o.verify = o.verify.map(v => {
      if (!v || typeof v !== 'object') return v;
      const raw = String(v.result || '').toLowerCase();
      return { ...v, result: RESULT_MAP[raw] || v.result };
    });
  }

  return o;
}

async function validateBlueprint(obj) {
  try {
    const r = await fetch(`${SERVER}/validate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(obj),
      signal: AbortSignal.timeout(6000),
    });
    return await r.json();
  } catch {
    return { valid: null, errors: [], warning: 'validation server unreachable — start server/serve.py' };
  }
}

async function ollamaTags() {
  const r = await fetch(`${OLLAMA}/api/tags`, { signal: AbortSignal.timeout(3000) });
  if (!r.ok) throw new Error('tags failed');
  return r.json();
}

async function* ollamaStream(model, system, prompt, options = {}) {
  const r = await fetch(`${OLLAMA}/api/generate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model, system, prompt, stream: true,
      options: { temperature: 0.7, num_predict: 1400, ...options },
    }),
  });
  if (!r.ok) throw new Error(`generate HTTP ${r.status}`);
  const reader = r.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.trim()) continue;
      try { yield JSON.parse(line); } catch {}
    }
  }
}

async function ollamaGenerateFull(model, system, prompt, options = {}, onToken) {
  let full = '', tokens = 0;
  for await (const chunk of ollamaStream(model, system, prompt, options)) {
    if (chunk.response) {
      full += chunk.response;
      tokens++;
      onToken?.(full, tokens);
    }
    if (chunk.done) break;
  }
  return { text: full, tokens };
}

// ═══════════════════════════════════════════════════════════════════════════

function flattenTree(node, depth = 0, out = []) {
  if (!node) return out;
  out.push({ ...node, depth });
  (node.children || []).forEach(c => flattenTree(c, depth + 1, out));
  return out;
}

function fallbackSubsystemPlan(vehicleCtx, part, reason = 'local_fallback') {
  const siblings = vehicleCtx.parts || [];
  const idx = Math.max(0, siblings.findIndex(p => p.id === part.id));
  const neighborPool = [
    siblings[idx - 1],
    siblings[idx + 1],
    siblings.find(p => p && p.id !== part.id && p.preset?.[1] !== part.preset?.[1]),
  ].filter(Boolean);
  const neighbors = [...new Map(neighborPool.map(p => [p.id, p])).values()].slice(0, 3);
  const physics = physicsPathHintsForAssembly(vehicleCtx).slice(0, 4).map(p => ({
    type: p.type,
    path: p.path,
    design_implication: p.target,
  }));
  const featureSeeds = [
    ['f01', `${part.label} primary shell`, 'structure', 'carry local loads and define the subsystem envelope', 'main curved/body operation with distributed wall thickness', [0, 0, 0]],
    ['f02', `${part.label} upstream datum`, 'interface', 'connect to the preceding assembly module', 'flange, boss, clamp band, or keyed mount near -Y edge', [0, -40, 0]],
    ['f03', `${part.label} downstream datum`, 'interface', 'connect to the following assembly module', 'flange, boss, clamp band, or keyed mount near +Y edge', [0, 40, 0]],
    ['f04', `${part.label} service feature`, 'service', 'allow inspection, drainage, routing, or maintenance', 'pocket, port, hatch, channel, or access cut on an accessible face', [30, 0, 12]],
    ['f05', `${part.label} stiffening feature`, 'structure', 'reduce deflection and preserve alignment', 'rib, spar, stringer, gusset, or thickened rail', [-30, 0, 8]],
    ['f06', `${part.label} harness or fluid path`, 'flow', 'route power, data, gas, liquid, or cooling path when relevant', 'channel, duct, cable groove, or protected routing passage', [0, 0, -12]],
  ];
  return {
    schema: 'blueprint_npu_subsystem_plan_v1',
    source: reason,
    vehicle_id: vehicleCtx.id,
    part_id: part.id,
    subsystem_role: `${part.label} is a fixed BOM subsystem inside ${vehicleCtx.label}: ${part.spec}`,
    physics_paths: physics.length ? physics : [{
      type: 'load',
      path: 'external load -> functional feature -> mounting datum -> primary structure',
      design_implication: 'model clear load paths, datums, service access, and reduced part count',
    }],
    adjacent_interfaces: (neighbors.length ? neighbors : siblings.filter(p => p.id !== part.id).slice(0, 3)).map((n, i) => ({
      target_part: n?.label || `Assembly neighbor ${i + 1}`,
      interface_type: i === 0 ? 'mount' : (i === 1 ? 'service' : 'electrical'),
      required_feature: i === 0 ? 'primary locating datum and fastener pattern' : (i === 1 ? 'service/flow clearance feature' : 'harness or sensor reference feature'),
      coordinate_region: i === 0 ? '-Y or upstream edge' : (i === 1 ? '+Y or downstream edge' : 'side-accessible face'),
    })),
    internal_features: featureSeeds.map(([id, name, type, fn, geometryHint, coordinateHint]) => ({
      id,
      name,
      type,
      function: fn,
      geometry_hint: geometryHint,
      coordinate_hint: coordinateHint,
      must_map_to_geometry: true,
    })),
    integration_opportunities: [
      'merge mounts, routing channels, ribs, labels, and service datums into the printed subsystem where inspection still remains possible',
    ],
    verification_focus: [
      'check coordinate distribution, neighbor interfaces, service access, minimum wall, and whether internal features map to geometry_ops',
    ],
  };
}

function ensureSubsystemPlan(plan, vehicleCtx, part) {
  const fallback = fallbackSubsystemPlan(vehicleCtx, part, 'local_fallback_for_p0');
  if (!plan || typeof plan !== 'object') return fallback;
  return {
    ...fallback,
    ...plan,
    schema: 'blueprint_npu_subsystem_plan_v1',
    vehicle_id: vehicleCtx.id,
    part_id: part.id,
    physics_paths: Array.isArray(plan.physics_paths) && plan.physics_paths.length ? plan.physics_paths : fallback.physics_paths,
    adjacent_interfaces: Array.isArray(plan.adjacent_interfaces) && plan.adjacent_interfaces.length >= 3 ? plan.adjacent_interfaces : fallback.adjacent_interfaces,
    internal_features: Array.isArray(plan.internal_features) && plan.internal_features.length >= 5 ? plan.internal_features : fallback.internal_features,
    integration_opportunities: Array.isArray(plan.integration_opportunities) && plan.integration_opportunities.length ? plan.integration_opportunities : fallback.integration_opportunities,
    verification_focus: Array.isArray(plan.verification_focus) && plan.verification_focus.length ? plan.verification_focus : fallback.verification_focus,
  };
}

const S2_SYS = `You are Blueprint NPU. Output ONLY raw JSON — no prose, no markdown, no explanation.

Stage 2: given design context, output "geometry_ops" and "cad_brief".
Rules:
- geometry_ops[].op must be exactly one of: cylinder box sphere shell extrude revolve sweep loft fillet chamfer drill boss pocket pattern_polar pattern_linear channel engrave mirror union subtract intersect
- geometry_ops must contain 12 to 24 operations for generated assembly subsystem parts
- include at least: 1 main body op, 3 interface/mounting ops, 3 subtract/drill/pocket/channel ops, 2 fillet/chamfer ops, 1 pattern op when repeated fasteners/holes exist, and 1 label/engrave op
- every important sub-part from the part_tree should be represented by at least one geometry operation
- every geometry op that creates or modifies a physical feature must include args.at as [x_mm, y_mm, z_mm] in millimeters, centered on the vehicle/subsystem local datum
- every op should include useful dimensions such as x_mm/y_mm/z_mm, d_mm/h_mm, radius_mm, depth_mm, w_mm/l_mm, or count/radius_mm for patterns
- coordinate placement must be physically distributed across the subsystem, not all [0,0,0]; interface features should sit near plausible edges/faces/ends
- target-based operations may also include args.offset_mm, but do not omit args.at; the UI uses args.at for 2D/3D coordinate review
- use a consistent coordinate frame: X width/left-right, Y length/forward-aft or axial, Z height/up-down
- avoid generic box-first layouts unless the real subsystem is rectangular; rockets/nozzles/tanks/airframes/rotors/gears must use curved or swept operations such as cylinder, revolve, loft, sweep, pattern_polar, channel
- generated 2D and 3D views are drawn directly from geometry_ops; if the result is box-like, it will be rejected as design-poor
- cad_brief.rev must match pattern \\d+\\.\\d+(\\.\\d+)?  — e.g. "1.0" or "1.0.0", NOT "v1.0"
- cad_brief requires: name, rev, material, envelope_mm ([x,y,z] numbers), build_direction`;

    {"op": "boss",           "id": "mounting_boss",      "target": "primary_body", "args": {"at": [<mm>, <mm>, <mm>], "d_mm": <number>, "h_mm": <number>}},
    {"op": "channel",        "id": "service_channel",    "target": "primary_body", "args": {"at": [<mm>, <mm>, <mm>], "w_mm": <number>, "h_mm": <number>, "l_mm": <number>}},
    {"op": "boss",           "id": "adjacent_interface", "target": "primary_body", "args": {"at": [<mm>, <mm>, <mm>], "d_mm": <number>, "h_mm": <number>}},
    {"op": "drill",          "id": "service_port",       "target": "primary_body", "args": {"at": [<mm>, <mm>, <mm>], "d_mm": <number>, "depth_mm": <number>}},
    {"op": "pocket",         "id": "inspection_access",  "target": "primary_body", "args": {"at": [<mm>, <mm>, <mm>], "x_mm": <mm>, "y_mm": <mm>, "z_mm": <mm>}},
    {"op": "fillet",         "target": "primary_body",   "args": {"at": [0, 0, 0], "r_mm": <number>}},
    {"op": "chamfer",        "target": "mounting_boss",  "args": {"at": [<mm>, <mm>, <mm>], "d_mm": <number>}},
    {"op": "engrave",        "id": "part_label",         "target": "primary_body", "args": {"at": [0, <mm>, <mm>], "text": "<short label>", "depth_mm": <number>}}
  ],
  "cad_brief": {
    "name": "<part name>",
    "rev": "1.0",
    "material": "${mat}",
    "envelope_mm": [<x>, <y>, <z>],
    "build_direction": "+Z",
    "key_dims_mm": {"<key dimension name>": <value>},
    "wall_thickness_mm": {"min": <number>, "typ": <number>},
    "tolerances_mm": {"fit": <number>},
    "mass_est_g": <number>
  }
}`;
}

const S3_SYS = `You are Blueprint NPU. Output ONLY raw JSON — no prose, no markdown, no explanation.

Stage 3: output "verify" (verification checks) and "risk" (risk register).
Rules:
- verify[].result must be exactly one of: pass, warn, fail
- risk[].id must match ^R\\d+$  e.g. "R01", "R1", "R02"
- risk[].severity must be exactly one of: low, med, high
- risk array must have at most 5 items
- Each risk item needs: id, desc, mit`;

function s3UserPrompt(brief, merged) {
  const mat   = merged.brief?.constraints?.material    || 'PETG';
  const proc  = merged.brief?.constraints?.process     || 'FDM';
  const wall  = merged.brief?.constraints?.min_wall_mm || 1.2;
  const ovhg  = merged.brief?.constraints?.overhang_deg || 45;
  const ops   = (merged.geometry_ops || []).map(o => o.op).join(', ');
  const parts = flattenTree(merged.part_tree).map(p => p.name).join(', ');
  return `Design brief: ${brief}

Context: material ${mat}, process ${proc}, min_wall ${wall}mm, overhang limit ${ovhg}°
Parts: ${parts}
Geometry ops: ${ops || '(none yet)'}

Output this JSON:
{
  "verify": [
    {"check": "Wall thickness ≥ min_wall_mm",   "result": "pass", "value": "<actual>mm ≥ ${wall}mm", "rule": "wall-001"},
    {"check": "Overhang ≤ ${ovhg}°",            "result": "pass", "value": "<actual>° ≤ ${ovhg}°",   "rule": "overhang-001"},
    {"check": "Support-free printability",       "result": "pass", "value": "<observation>"},
    {"check": "Part fits build envelope",        "result": "pass", "value": "<dims> ≤ envelope"},
    {"check": "Tolerance achievable by ${proc}", "result": "pass", "value": "±<tol>mm"}
  ],
  "risk": [
    {"id": "R01", "desc": "<risk description>", "mit": "<mitigation action>", "severity": "low"},
    {"id": "R02", "desc": "<risk description>", "mit": "<mitigation action>", "severity": "med"}
  ]
}`;
}

const S4_SYS = `You are Blueprint NPU. Output ONLY raw JSON — no prose, no markdown, no explanation.

Stage 4: output "print_profile" and "slicer_job".
Rules:
- print_profile.supports must be exactly one of: none, tree, grid, block, min
- slicer_job.tool must be exactly one of: prusaslicer, preform, eosprint, cura, ideamaker
- slicer_job.input_stl and slicer_job.output must be plain file-path strings (uri-reference)
- Do NOT include sha256 unless you have a real 64-character lowercase hex string`;

function s4UserPrompt(brief, merged) {
  const mat  = merged.brief?.constraints?.material || 'PETG';
  const proc = merged.brief?.constraints?.process  || 'FDM';
  const obj  = (merged.object || 'part').toLowerCase().replace(/\s+/g, '-');
  return `Design brief: ${brief}
Material: ${mat}, Process: ${proc}

Output this JSON (all values appropriate for ${proc} with ${mat}):
{
  "print_profile": {
    "printer": "<appropriate printer model for ${proc}>",
    "material": "${mat}",
    "layer_mm": <layer thickness number, e.g. 0.2 for FDM or 0.04 for LPBF>,
    "supports": "<none|tree|grid|block|min>",
    "orientation": "<e.g. +Z vertical>",
    "est_time": "<estimate string, e.g. 2h30m>",
    "filament_g": <grams if FDM else omit this key>,
    "walls": <integer wall count if FDM, e.g. 3, else omit>,
    "infill": "<infill style if FDM, e.g. gyroid 20%, else omit>"
  },
  "slicer_job": {
    "tool": "<prusaslicer|cura|ideamaker|preform|eosprint>",
    "input_stl": "output/${obj}.stl",
    "output": "output/${obj}.gcode",
    "args": ["--load", "profile.ini", "--export-gcode"],
    "profile": "${mat}_standard.ini"
  }
}`;
}

function Btn({ children, variant='default', onClick, disabled, style, size='md' }) {
  const colors = { primary:C.lox, go:C.inter, warn:C.lh2, risk:C.risk };
  const col = colors[variant] || C.ink2;

function Terminal({ lines, running }) {

  const stages = [

function explicitOpPosition(op) {
  const a = op?.args || {};
  const candidates = [a.at, a.position, a.origin, a.center, a.center_mm, a.loc, op?.at, op?.position];
  for (const c of candidates) {
    if (Array.isArray(c) && c.length >= 3) {
      const p = c.slice(0, 3).map(Number);
      if (p.every(Number.isFinite)) return p;
    }
    if (c && typeof c === 'object') {
      const p = [c.x ?? c.x_mm, c.y ?? c.y_mm, c.z ?? c.z_mm].map(Number);
      if (p.every(Number.isFinite)) return p;
    }
  }
  const keys = ['at_x', 'cx', 'x0'];
  const hasScalar = keys.some(k => a[k] !== undefined && a[k] !== null && a[k] !== '');
  if (hasScalar) {
    const p = [
      Number(a.at_x ?? a.cx ?? a.x0 ?? 0),
      Number(a.at_y ?? a.cy ?? a.y0 ?? 0),
      Number(a.at_z ?? a.cz ?? a.z0 ?? 0),
    ];
    if (p.every(Number.isFinite)) return p;
  }
  return null;
}

function geometryCoordinateAudit(bp) {
  const ops = bp?.geometry_ops || [];
  let explicit = 0;
  let targetRefs = 0;
  let noCoord = 0;
  const rows = ops.map((op, i) => {
    const pos = explicitOpPosition(op);
    if (pos) explicit += 1;
    else noCoord += 1;
    if (op?.target) targetRefs += 1;
    return { i, op, pos };
  });
  const ratio = ops.length ? explicit / ops.length : 0;
  const status = ops.length === 0 ? 'empty' : ratio >= 0.8 ? 'ok' : ratio >= 0.45 ? 'warn' : 'fail';
  return { ops, rows, explicit, targetRefs, noCoord, ratio, status };
}

function coordinateAuditSummary(bp) {
  const a = geometryCoordinateAudit(bp);
  return {
    explicit_at: a.explicit,
    total_ops: a.ops.length,
    target_refs: a.targetRefs,
    no_coord: a.noCoord,
    ratio: Number(a.ratio.toFixed(3)),
    status: a.status,
  };
}

function opArg(op, keys, fallback = 0) {
  const a = op?.args || {};
  for (const k of keys) {
    if (a[k] !== undefined && a[k] !== null && a[k] !== '') return Number(a[k]);
  }
  return fallback;
}

function generatedDesignAudit(bp) {
  const ops = bp?.geometry_ops || [];
  const coord = geometryCoordinateAudit(bp);
  const boxLike = ops.filter(op => ['box', 'shell', 'extrude', 'pocket'].includes(op?.op)).length;
  const curved = ops.filter(op => ['cylinder', 'sphere', 'revolve', 'sweep', 'loft', 'pattern_polar'].includes(op?.op)).length;
  const opTypes = new Set(ops.map(op => op?.op).filter(Boolean));
  const boxRatio = ops.length ? boxLike / ops.length : 0;
  const status = !ops.length ? 'empty'
    : coord.ratio < 0.8 ? 'fail'
    : boxRatio > 0.55 ? 'fail'
    : opTypes.size < 4 ? 'warn'
    : curved < 2 ? 'warn'
    : 'ok';
  return {
    ...coord,
    boxLike,
    curved,
    opTypes: opTypes.size,
    boxRatio,
    designStatus: status,
  };
}

function clampScore(n) {
  return Math.max(0, Math.min(100, Math.round(n)));
}

function uniqueOpTypes(bp) {
  return new Set((bp?.geometry_ops || []).map(op => op?.op).filter(Boolean));
}

function partTreeFeatureCount(bp) {
  const nodes = flattenTree(bp?.part_tree).filter((_, i) => i > 0);
  return nodes.length;
}

function coordinateSpreadScore(bp) {
  const pts = geometryCoordinateAudit(bp).rows.map(r => r.pos).filter(Boolean);
  if (pts.length < 2) return 0;
  const xs = new Set(pts.map(p => Math.round(p[0])));
  const ys = new Set(pts.map(p => Math.round(p[1])));
  const zs = new Set(pts.map(p => Math.round(p[2])));
  const uniquePts = new Set(pts.map(p => p.map(v => Math.round(v)).join(','))).size;
  const axisSpread = [xs.size, ys.size, zs.size].filter(n => n >= 3).length;
  const originPile = pts.filter(p => p.every(v => Math.abs(v) < 0.001)).length;
  return clampScore(uniquePts / pts.length * 60 + axisSpread * 15 - originPile / pts.length * 35);
}

function interfaceFeatureDepthScore(bp) {
  const ops = bp?.geometry_ops || [];
  const featureWords = /interface|flange|mount|datum|bolt|hole|port|channel|duct|rib|stiff|seal|pocket|access|harness|bearing|hinge|boss|rail|slot|vent|drain|cover|sensor|cable/i;
  const hits = ops.filter(op => featureWords.test(`${op?.id || ''} ${op?.target || ''} ${op?.op || ''}`)).length;
  const negative = ops.filter(op => ['drill','pocket','channel','subtract'].includes(op?.op)).length;
  const interfaceOps = ops.filter(op => ['boss','pattern_polar','pattern_linear','mirror'].includes(op?.op) || featureWords.test(`${op?.id || ''}`)).length;
  return {
    hits,
    negative,
    interfaceOps,
    score: clampScore(Math.min(1, hits / 8) * 45 + Math.min(1, negative / 3) * 30 + Math.min(1, interfaceOps / 4) * 25),
  };
}

function engineeringScorecardForBlueprint(bp, context = {}) {
  const audit = generatedDesignAudit(bp);
  const ops = bp?.geometry_ops || [];
  const opTypes = uniqueOpTypes(bp);
  const verify = bp?.verify || [];
  const risk = bp?.risk || [];
  const text = [
    bp?.object, bp?.project, bp?._part_label, bp?._vehicle_id, bp?._part_id,
    context.vehicle_id, context.part_id, context.part_label, context.category,
    ...(bp?.brief?.requirements || []),
  ].filter(Boolean).join(' ').toLowerCase();
  const has = (...words) => words.some(w => text.includes(w));
  const hasOp = (...opsToFind) => opsToFind.some(op => opTypes.has(op));
  const passCount = verify.filter(v => v?.result === 'pass').length;
  const warnCount = verify.filter(v => v?.result === 'warn').length;
  const failCount = verify.filter(v => v?.result === 'fail').length;

  const categories = [];
  const findings = [];
  function add(name, score, note) {
    categories.push({ name, score: clampScore(score), note });
    if (score < 60) findings.push(note);
  }

  const coordScore = audit.ops.length ? audit.ratio * 100 : 0;
  add('coordinate_placement', coordScore,
    audit.ops.length ? `explicit coordinates ${audit.explicit}/${audit.ops.length}` : 'no geometry operations');

  const spreadScore = coordinateSpreadScore(bp);
  add('coordinate_distribution', spreadScore,
    `coordinate spread score ${spreadScore}/100; avoid stacked origin-only features`);

  const opCountScore = ops.length >= 14 ? 100 : ops.length >= 12 ? 88 : ops.length >= 8 ? 68 : ops.length >= 5 ? 48 : 15;
  add('operation_depth', opCountScore, `${ops.length} geometry operations`);

  const featureCount = partTreeFeatureCount(bp);
  const featureScore = featureCount >= 6 ? 100 : featureCount >= 4 ? 78 : featureCount >= 2 ? 45 : 15;
  add('internal_feature_decomposition', featureScore,
    `${featureCount} internal part_tree child features`);

  const interfaceDepth = interfaceFeatureDepthScore(bp);
  add('interface_service_feature_depth', interfaceDepth.score,
    `feature hits ${interfaceDepth.hits}, negative/service ops ${interfaceDepth.negative}, interface ops ${interfaceDepth.interfaceOps}`);

  const diversityScore =
    audit.designStatus === 'ok' ? 92 :
    audit.designStatus === 'warn' ? 68 :
    audit.ops.length ? 35 : 10;
  add('shape_diversity', diversityScore,
    `op types ${audit.opTypes}, curved ${audit.curved}, box-like ${audit.boxLike}`);

  let domainScore = 62;
  let domainNote = 'generic mechanical structure check';
  if (has('rocket', 'launch vehicle', 'nozzle', 'chamber', 'tank', 'fairing', 'interstage')) {
    const curved = hasOp('cylinder', 'revolve', 'loft', 'sweep', 'sphere', 'pattern_polar');
    const axial = audit.explicit >= Math.min(6, ops.length);
    const subtractive = hasOp('drill', 'channel', 'pocket', 'subtract');
    domainScore = (curved ? 34 : 10) + (axial ? 26 : 8) + (subtractive ? 20 : 8) + (ops.length >= 12 ? 12 : 0) + (featureCount >= 5 ? 8 : 0);
    domainNote = 'rocket/space parts need curved axial features, interfaces, and channels';
  } else if (has('fighter', 'airliner', 'wing', 'fuselage', 'tail', 'nacelle', 'aircraft')) {
    const aeroOps = hasOp('loft', 'sweep', 'chamfer', 'fillet', 'cylinder');
    const interfaces = hasOp('drill', 'pocket', 'boss', 'pattern_linear');
    domainScore = (aeroOps ? 38 : 14) + (interfaces ? 24 : 8) + (audit.opTypes >= 5 ? 20 : 8) + (ops.length >= 12 ? 10 : 0) + (featureCount >= 5 ? 8 : 0);
    domainNote = 'aerospace parts need swept/lofted surfaces, interfaces, and enough feature variety';
  } else if (has('drone', 'uav', 'motor', 'frame', 'arm', 'propeller')) {
    const symmetryOps = hasOp('pattern_polar', 'pattern_linear', 'mirror');
    const mountOps = hasOp('drill', 'boss', 'pocket');
    domainScore = (symmetryOps ? 34 : 12) + (mountOps ? 30 : 12) + (audit.opTypes >= 5 ? 18 : 8) + (ops.length >= 12 ? 10 : 0) + (featureCount >= 5 ? 8 : 0);
    domainNote = 'drone parts need symmetry, motor/fastener mounts, and frame features';
  } else if (has('turbofan', 'compressor', 'turbine', 'fan', 'combustor')) {
    const rotaryOps = hasOp('cylinder', 'revolve', 'pattern_polar', 'channel');
    domainScore = (rotaryOps ? 48 : 18) + (audit.opTypes >= 5 ? 24 : 10) + (ops.length >= 12 ? 18 : 6) + (featureCount >= 5 ? 10 : 0);
    domainNote = 'propulsion parts need rotary/annular features and staged flow geometry';
  }
  add('domain_fit', domainScore, domainNote);

  const verifyScore = verify.length
    ? clampScore(80 + passCount * 4 - warnCount * 8 - failCount * 22 - risk.length * 3)
    : 45;
  add('verification_risk', verifyScore,
    verify.length ? `verify pass/warn/fail ${passCount}/${warnCount}/${failCount}, risks ${risk.length}` : 'missing verification checks');

  const manufacturing = bp?.print_profile?.layer_mm || bp?.brief?.constraints?.process || bp?.cad_brief?.material;
  const manufacturingScore = manufacturing ? 76 + Math.min(18, ops.length * 1.5) : 42;
  add('manufacturing_context', manufacturingScore,
    manufacturing ? 'manufacturing/process context present' : 'missing manufacturing/process context');

  const score = clampScore(categories.reduce((sum, c) => sum + c.score, 0) / Math.max(1, categories.length));
  const verdict = score >= 78 && audit.designStatus === 'ok' && failCount === 0
    ? 'keep_candidate'
    : score >= 55
      ? 'review'
      : 'reject_suggested';
  return {
    schema: 'blueprint_npu_engineering_scorecard_v1',
    score,
    verdict,
    categories,
    findings: findings.slice(0, 5),
    audit: {
      design_status: audit.designStatus,
      coordinate_status: audit.status,
      explicit_at: audit.explicit,
      total_ops: audit.ops.length,
      box_like: audit.boxLike,
      curved: audit.curved,
      op_types: audit.opTypes,
      internal_features: featureCount,
      coordinate_spread_score: spreadScore,
      interface_feature_score: interfaceDepth.score,
    },
  };
}

function engineeringScorecardForAssemblyBundle(bundle, context = {}) {
  const parts = bundle?.parts || [];
  const scored = parts
    .filter(p => p.blueprint)
    .map(p => ({
      id: p.id,
      label: p.label,
      scorecard: engineeringScorecardForBlueprint(p.blueprint, {
        ...context,
        part_id: p.id,
        part_label: p.label,
        vehicle_id: bundle?.vehicle?.id,
      }),
    }));
  const done = parts.filter(p => p.status === 'done' && p.blueprint).length;
  const total = parts.length || 1;
  const valid = parts.filter(p => p.valid === true).length;
  const keyIds = new Set(parts.map(p => p.id));
  const vehicleId = bundle?.vehicle?.id || context.vehicle_id || '';
  let roleScore = 60;
  let roleNote = 'generic assembly role coverage';
  if (vehicleId === 'small_launch_vehicle') {
    const must = ['p1','p2','p4','p5','p6','p8'];
    const hit = must.filter(id => keyIds.has(id)).length;
    roleScore = hit / must.length * 100;
    roleNote = `rocket BOM coverage ${hit}/${must.length} key roles`;
  } else if (vehicleId.includes('fighter') || vehicleId.includes('airliner') || vehicleId.includes('turboprop')) {
    const must = ['p1','p2','p3'];
    const hit = must.filter(id => keyIds.has(id)).length;
    roleScore = hit / must.length * 100;
    roleNote = `aircraft BOM coverage ${hit}/${must.length} core roles`;
  } else if (vehicleId.includes('turbofan')) {
    const must = ['p1','p3','p5','p8'];
    const hit = must.filter(id => keyIds.has(id)).length;
    roleScore = hit / must.length * 100;
    roleNote = `engine flow-path coverage ${hit}/${must.length} core roles`;
  }
  const partAvg = scored.length
    ? scored.reduce((sum, p) => sum + p.scorecard.score, 0) / scored.length
    : 0;
  const completionScore = done / total * 100;
  const validityScore = done ? valid / done * 100 : 0;
  const score = clampScore(partAvg * 0.5 + completionScore * 0.25 + validityScore * 0.15 + roleScore * 0.1);
  const verdict = score >= 78 && done === total ? 'keep_candidate' : score >= 55 ? 'review' : 'reject_suggested';
  const weakest = scored.slice().sort((a, b) => a.scorecard.score - b.scorecard.score).slice(0, 3);
  return {
    schema: 'blueprint_npu_engineering_scorecard_v1',
    score,
    verdict,
    categories: [
      { name:'part_average', score:clampScore(partAvg), note:`average of ${scored.length} generated part scorecards` },
      { name:'assembly_completion', score:clampScore(completionScore), note:`done parts ${done}/${total}` },
      { name:'schema_validity', score:clampScore(validityScore), note:`valid generated parts ${valid}/${done || 0}` },
      { name:'role_coverage', score:clampScore(roleScore), note:roleNote },
    ],
    findings: [
      ...(done < total ? [`incomplete assembly ${done}/${total}`] : []),
      ...weakest.map(p => `${p.id} ${p.label || ''}: ${p.scorecard.score} ${p.scorecard.verdict}`.trim()),
    ].slice(0, 5),
    parts: scored.map(p => ({
      id: p.id,
      label: p.label,
      score: p.scorecard.score,
      verdict: p.scorecard.verdict,
      findings: p.scorecard.findings,
    })),
  };
}

function engineeringScorecardForCurationRecord(record) {
  if (!record) return null;
  if (record.kind === 'assembly') {
    return engineeringScorecardForAssemblyBundle(record.payload, {
      category: record.preset?.cat,
      vehicle_id: record.vehicle_id || record.payload?.vehicle?.id,
    });
  }
  return engineeringScorecardForBlueprint(record.payload, {
    category: record.preset?.cat,
    vehicle_id: record.vehicle_id,
    part_id: record.part_id,
    part_label: record.title,
  });
}

  const color = audit.status === 'ok' ? C.inter : audit.status === 'warn' ? C.lh2 : C.risk;
  const xs = pts.map(r => r.pos[0]);
  const ys = pts.map(r => r.pos[1]);
  const minX = xs.length ? Math.min(...xs) : -50;
  const maxX = xs.length ? Math.max(...xs) : 50;

          explicit at[] {audit.explicit}/{audit.ops.length} · no-coordinate fallback {audit.noCoord}
        </text>
        <line x1={W/2} y1="72" x2={W/2} y2={H-42} stroke="#2d67a4" strokeWidth="1" strokeDasharray="5 5"/>
        <line x1="48" y1={(H+30)/2} x2={W-48} y2={(H+30)/2} stroke="#2d67a4" strokeWidth="1" strokeDasharray="5 5"/>
        {pts.length ? pts.slice(0, 24).map(({op, pos}, i) => {
          const x = sx(pos[0]);
          const y = sy(pos[1]);
          return (
            <g key={`${op.id || op.op}-${i}`}>
              <circle cx={x} cy={y} r="5" fill="rgba(137,255,168,0.2)" stroke={color} strokeWidth="1.2"/>
              <text x={x + 8} y={y - 4} fill="#e6ecf5" fontFamily="monospace" fontSize="8">
                {fitText(op.id || op.op || `op${i+1}`, 18)}
              </text>
              <text x={x + 8} y={y + 8} fill="#7da4cf" fontFamily="monospace" fontSize="7">
                {fitText(op.op, 14)}
              </text>
            </g>
          );
        }) : (
          <text x={W/2} y={H/2} textAnchor="middle" fill={C.risk} fontFamily="monospace" fontSize="12">
            NO EXPLICIT COORDINATES IN GEOMETRY_OPS
          </text>
        )}
      </svg>
    </div>
  );
}

function GeneratedDesignDrawing2D({ bp, compact=false }) {
  const audit = generatedDesignAudit(bp);
  const W = compact ? 720 : 920;
  const H = compact ? 360 : 460;
  const rows = audit.rows.filter(r => r.pos);
  const color = audit.designStatus === 'ok' ? C.inter : audit.designStatus === 'warn' ? C.lh2 : C.risk;
  const title = bp?._part_label || bp?.object || bp?.project || 'Generated Design';

  function dims(op) {
    const x = Math.max(2, opArg(op, ['x_mm','w_mm','width_mm','x','w','d_mm','diameter_mm'], 18));
    const y = Math.max(2, opArg(op, ['y_mm','l_mm','length_mm','h_mm','height_mm','depth_mm','y','l','h'], 18));
    const z = Math.max(2, opArg(op, ['z_mm','d_mm','depth_mm','height_mm','z','d'], 10));
    const r = Math.max(1, opArg(op, ['r_mm','radius_mm','r','radius'], opArg(op, ['d_mm','diameter_mm','d'], 12) / 2));
    return { x, y, z, r };
  }

  const extents = rows.flatMap(({op, pos}) => {
    const d = dims(op);
    const hx = ['cylinder','sphere','revolve','pattern_polar'].includes(op.op) ? d.r : d.x / 2;
    const hy = ['cylinder','sphere','revolve','pattern_polar'].includes(op.op) ? d.r : d.y / 2;
    return [
      [pos[0] - hx, pos[1] - hy],
      [pos[0] + hx, pos[1] + hy],
    ];
  });
  const xs = extents.map(p => p[0]);
  const ys = extents.map(p => p[1]);
  const minX = xs.length ? Math.min(...xs) : -50;
  const maxX = xs.length ? Math.max(...xs) : 50;
  const minY = ys.length ? Math.min(...ys) : -50;
  const maxY = ys.length ? Math.max(...ys) : 50;
  const pad = 28;
  const spanX = Math.max(1, maxX - minX);
  const spanY = Math.max(1, maxY - minY);
  const sx = x => pad + ((x - minX) / spanX) * (W - pad * 2);
  const sy = y => H - 78 - ((y - minY) / spanY) * (H - 138);
  const sw = mm => Math.max(3, (mm / spanX) * (W - pad * 2));
  const sh = mm => Math.max(3, (mm / spanY) * (H - 138));
  const fitText = (s, n) => String(s || '').length > n ? String(s || '').slice(0, n - 1) + '…' : String(s || '');

  function opStroke(op) {
    if (['drill','pocket','subtract'].includes(op.op)) return '#ff9fb5';
    if (['fillet','chamfer'].includes(op.op)) return '#caa9ff';
    if (['channel','sweep','loft'].includes(op.op)) return '#ffd39f';
    if (['pattern_polar','pattern_linear','boss'].includes(op.op)) return '#89ffa8';
    return '#9fd3ff';
  }

  return (
    <div style={{ border:`1px solid ${color}`, background:C.canvas, overflow:'hidden', marginBottom:12 }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', display:'block', background:C.canvas3 }}>
        <defs>
          <pattern id={`gen-grid-${compact ? 'c' : 'f'}`} width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M20 0H0V20" fill="none" stroke="#16365f" strokeWidth="0.55" opacity="0.55"/>
          </pattern>
          <filter id={`gen-glow-${compact ? 'c' : 'f'}`}>
            <feGaussianBlur stdDeviation="0.9" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect x="0" y="0" width={W} height={H} fill={`url(#gen-grid-${compact ? 'c' : 'f'})`}/>
        <rect x="10" y="10" width={W-20} height={H-20} fill="none" stroke={color} strokeWidth="1.2"/>
        <text x="28" y="34" fill={color} fontFamily="monospace" fontSize="12" letterSpacing="2">
          ACTUAL GENERATED 2D DESIGN · FROM GEOMETRY_OPS
        </text>
        <text x="28" y="54" fill="#e6ecf5" fontFamily="monospace" fontSize="10">
          {fitText(title, 70)}
        </text>
        <text x={W-28} y="34" textAnchor="end" fill={color} fontFamily="monospace" fontSize="10">
          {audit.designStatus} · at {audit.explicit}/{audit.ops.length}
        </text>
        <line x1={W/2} y1="70" x2={W/2} y2={H-52} stroke="#2d67a4" strokeWidth="1" strokeDasharray="6 6"/>
        <line x1="38" y1={(H+20)/2} x2={W-38} y2={(H+20)/2} stroke="#2d67a4" strokeWidth="1" strokeDasharray="6 6"/>

        {rows.length ? rows.slice(0, 40).map(({op, pos}, i) => {
          const d = dims(op);
          const x = sx(pos[0]);
          const y = sy(pos[1]);
          const stroke = opStroke(op);
          const fill = ['drill','pocket','subtract'].includes(op.op) ? 'rgba(255,159,181,0.12)' : 'rgba(32,85,140,0.24)';
          const isRound = ['cylinder','sphere','revolve','pattern_polar','boss'].includes(op.op);
          const isLine = ['channel','sweep','loft'].includes(op.op);
          return (
            <g key={`${op.id || op.op}-${i}`} filter={`url(#gen-glow-${compact ? 'c' : 'f'})`}>
              {isLine ? (
                <line x1={x - sw(d.x || d.y)/2} y1={y} x2={x + sw(d.x || d.y)/2} y2={y}
                  stroke={stroke} strokeWidth={Math.max(2, sh(d.z)/2)} strokeLinecap="round" opacity="0.85"/>
              ) : isRound ? (
                <ellipse cx={x} cy={y} rx={Math.max(4, sw(d.r))} ry={Math.max(4, sh(d.r))}
                  fill={fill} stroke={stroke} strokeWidth="1.2"/>
              ) : (
                <rect x={x - sw(d.x)/2} y={y - sh(d.y)/2}
                  width={sw(d.x)} height={sh(d.y)} rx="2"
                  fill={fill} stroke={stroke} strokeWidth="1.2"/>
              )}
              <text x={x + 7} y={y - 7} fill="#e6ecf5" fontFamily="monospace" fontSize="7">
                {fitText(op.id || op.op || `op${i+1}`, 18)}
              </text>
              <text x={x + 7} y={y + 6} fill="#7da4cf" fontFamily="monospace" fontSize="7">
                {fitText(op.op, 12)}
              </text>
            </g>
          );
        }) : (
          <text x={W/2} y={H/2} textAnchor="middle" fill={C.risk} fontFamily="monospace" fontSize="12">
            NO ACTUAL GENERATED 2D DESIGN: geometry_ops do not include explicit coordinates
          </text>
        )}

        <text x="28" y={H-28} fill="#9aa8bd" fontFamily="monospace" fontSize="9">
          This panel draws only the generated JSON geometry. Reference SVG/scaffold is not used here.
        </text>
      </svg>
    </div>
  );
}

function GeneratedDesignThreeView2D({ bp, compact=false }) {
  const audit = generatedDesignAudit(bp);
  const rows = audit.rows.filter(r => r.pos);
  const color = audit.designStatus === 'ok' ? C.inter : audit.designStatus === 'warn' ? C.lh2 : C.risk;
  const W = compact ? 720 : 920;
  const panelW = compact ? 220 : 286;
  const panelH = compact ? 220 : 270;
  const headerH = 72;
  const gap = 14;
  const H = headerH + panelH + 46;
  const title = bp?._part_label || bp?.object || bp?.project || 'Generated Design';
  const views = [
    { name:'TOP VIEW', axes:['X','Y'], idx:[0,1], dim:['x','y'] },
    { name:'FRONT VIEW', axes:['X','Z'], idx:[0,2], dim:['x','z'] },
    { name:'SIDE VIEW', axes:['Y','Z'], idx:[1,2], dim:['y','z'] },
  ];

  function dims(op) {
    const dia = opArg(op, ['d_mm','diameter_mm','dia_mm','d','diameter'], 18);
    const r = Math.max(1, opArg(op, ['r_mm','radius_mm','r','radius'], dia / 2));
    const x = Math.max(2, opArg(op, ['x_mm','w_mm','width_mm','x','w'], dia || 18));
    const y = Math.max(2, opArg(op, ['y_mm','l_mm','length_mm','h_mm','height_mm','depth_mm','y','l','h'], 18));
    const z = Math.max(2, opArg(op, ['z_mm','depth_mm','height_mm','z'], dia || 12));
    return { x, y, z, r, dia, len:y };
  }
  function projectionSize(op, view) {
    const d = dims(op);
    if (op.op === 'sphere') return { a:d.r * 2, b:d.r * 2, round:true };
    if (['cylinder','boss','drill','revolve','pattern_polar'].includes(op.op)) {
      if (view.name === 'TOP VIEW') return { a:d.r * 2, b:d.len, round:true };
      if (view.name === 'FRONT VIEW') return { a:d.r * 2, b:d.r * 2, round:true };
      return { a:d.len, b:d.r * 2, round:true };
    }
    if (['channel','sweep','loft'].includes(op.op)) {
      if (view.name === 'SIDE VIEW') return { a:d.y, b:Math.max(2, d.z), line:true };
      return { a:d.x || d.y, b:Math.max(2, d.z), line:true };
    }
    return { a:d[view.dim[0]], b:d[view.dim[1]], round:false };
  }
  function opStroke(op) {
    if (['drill','pocket','subtract'].includes(op.op)) return '#ff9fb5';
    if (['fillet','chamfer'].includes(op.op)) return '#caa9ff';
    if (['channel','sweep','loft'].includes(op.op)) return '#ffd39f';
    if (['pattern_polar','pattern_linear','boss'].includes(op.op)) return '#89ffa8';
    return '#9fd3ff';
  }
  function fitText(s, n) {
    s = String(s || '');
    return s.length > n ? s.slice(0, n - 1) + '…' : s;
  }
  function viewExtents(view) {
    const pts = rows.flatMap(({op, pos}) => {
      const ps = projectionSize(op, view);
      const a = pos[view.idx[0]], b = pos[view.idx[1]];
      return [[a - ps.a / 2, b - ps.b / 2], [a + ps.a / 2, b + ps.b / 2]];
    });
    const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
    return {
      minA: xs.length ? Math.min(...xs) : -50,
      maxA: xs.length ? Math.max(...xs) : 50,
      minB: ys.length ? Math.min(...ys) : -50,
      maxB: ys.length ? Math.max(...ys) : 50,
    };
  }

  function renderView(view, vx) {
    const ext = viewExtents(view);
    const pad = 26;
    const innerW = panelW - pad * 2;
    const innerH = panelH - 64;
    const spanA = Math.max(1, ext.maxA - ext.minA);
    const spanB = Math.max(1, ext.maxB - ext.minB);
    const sx = a => vx + pad + ((a - ext.minA) / spanA) * innerW;
    const sy = b => headerH + 46 + innerH - ((b - ext.minB) / spanB) * innerH;
    const sw = mm => Math.max(3, (mm / spanA) * innerW);
    const sh = mm => Math.max(3, (mm / spanB) * innerH);
    return (
      <g key={view.name}>
        <rect x={vx} y={headerH} width={panelW} height={panelH} fill="rgba(5,13,24,0.72)" stroke="#2d67a4" strokeWidth="1"/>
        <text x={vx + 14} y={headerH + 22} fill={color} fontFamily="monospace" fontSize="10" letterSpacing="1.5">
          {view.name}
        </text>
        <text x={vx + panelW - 14} y={headerH + 22} textAnchor="end" fill="#7da4cf" fontFamily="monospace" fontSize="8">
          {view.axes[0]}/{view.axes[1]}
        </text>
        <line x1={vx + panelW/2} y1={headerH + 36} x2={vx + panelW/2} y2={headerH + panelH - 22}
          stroke="#16365f" strokeWidth="0.8" strokeDasharray="5 5"/>
        <line x1={vx + 18} y1={headerH + panelH/2 + 14} x2={vx + panelW - 18} y2={headerH + panelH/2 + 14}
          stroke="#16365f" strokeWidth="0.8" strokeDasharray="5 5"/>
        {rows.length ? rows.slice(0, 36).map(({op, pos}, i) => {
          const ps = projectionSize(op, view);
          const x = sx(pos[view.idx[0]]);
          const y = sy(pos[view.idx[1]]);
          const stroke = opStroke(op);
          const fill = ['drill','pocket','subtract'].includes(op.op) ? 'rgba(255,159,181,0.12)' : 'rgba(32,85,140,0.24)';
          return (
            <g key={`${view.name}-${op.id || op.op}-${i}`}>
              {ps.line ? (
                <line x1={x - sw(ps.a)/2} y1={y} x2={x + sw(ps.a)/2} y2={y}
                  stroke={stroke} strokeWidth={Math.max(2, sh(ps.b))} strokeLinecap="round" opacity="0.84"/>
              ) : ps.round ? (
                <ellipse cx={x} cy={y} rx={sw(ps.a)/2} ry={sh(ps.b)/2}
                  fill={fill} stroke={stroke} strokeWidth="1.1"/>
              ) : (
                <rect x={x - sw(ps.a)/2} y={y - sh(ps.b)/2}
                  width={sw(ps.a)} height={sh(ps.b)} rx="1.5"
                  fill={fill} stroke={stroke} strokeWidth="1.1"/>
              )}
              <text x={x + 5} y={y - 5} fill="#e6ecf5" fontFamily="monospace" fontSize="6.5">
                {fitText(op.id || op.op, 14)}
              </text>
            </g>
          );
        }) : (
          <g>
            <text x={vx + panelW/2} y={headerH + panelH/2} textAnchor="middle"
              fill={C.risk} fontFamily="monospace" fontSize="9">
              NO COORDINATED GEOMETRY
            </text>
            <text x={vx + panelW/2} y={headerH + panelH/2 + 16} textAnchor="middle"
              fill="#9aa8bd" fontFamily="monospace" fontSize="7.5">
              geometry_ops missing args.at
            </text>
          </g>
        )}
      </g>
    );
  }

  return (
    <div style={{ border:`1px solid ${color}`, background:C.canvas, overflow:'hidden', marginBottom:12 }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', display:'block', background:C.canvas3 }}>
        <defs>
          <pattern id={`three-view-grid-${compact ? 'c' : 'f'}`} width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M20 0H0V20" fill="none" stroke="#16365f" strokeWidth="0.55" opacity="0.45"/>
          </pattern>
        </defs>
        <rect x="0" y="0" width={W} height={H} fill={`url(#three-view-grid-${compact ? 'c' : 'f'})`}/>
        <rect x="10" y="10" width={W-20} height={H-20} fill="none" stroke={color} strokeWidth="1.2"/>
        <text x="28" y="34" fill={color} fontFamily="monospace" fontSize="12" letterSpacing="2">
          GENERATED OPS PROJECTION · THREE-VIEW
        </text>
        <text x="28" y="54" fill="#e6ecf5" fontFamily="monospace" fontSize="10">
          {fitText(title, 78)}
        </text>
        <text x={W-28} y="34" textAnchor="end" fill={color} fontFamily="monospace" fontSize="10">
          {audit.designStatus} · at {audit.explicit}/{audit.ops.length}
        </text>
        {views.map((v, i) => renderView(v, 20 + i * (panelW + gap)))}
        <text x="28" y={H-22} fill="#9aa8bd" fontFamily="monospace" fontSize="9">
          Top=X/Y · Front=X/Z · Side=Y/Z. This is an operation projection from generated JSON, not a finished CAD drawing.
        </text>
      </svg>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// AsmThreeDModal — Assembly 전체 파트를 3D로 형상화
// ═══════════════════════════════════════════════════════════════════════════
const MASTER_3D_ASSEMBLY_IDS = new Set([
  'small_launch_vehicle',
  'cubesat_3u',
  'lunar_lander',
  'space_telescope',
  'orbital_module',
  'fighter_f_class',
  'supersonic_sst',
  'civil_airliner',
  'turboprop_transport',
  'heavy_helicopter',
  'turbofan_engine',
]);

function AsmThreeDModal({ vehicle, schematic, asmParts, onClose }) {
  const mountRef  = useRef(null);
  const rendRef   = useRef(null);
  const frameRef  = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  useEffect(() => {
    if (!mountRef.current) return;
    const T3 = window.THREE;
    if (!T3) return;

    const mount = mountRef.current;
    const W = mount.clientWidth || 860;
    const H = mount.clientHeight || 560;

    /* ── 씬 ── */
    const scene = new T3.Scene();
    scene.background = new T3.Color(0x050d18);

    /* ── 그리드 ── */
    scene.add(new T3.GridHelper(400, 40, 0x1a3558, 0x0d1f30));

    /* ── 조명 ── */
    scene.add(new T3.AmbientLight(0x9fd3ff, 0.5));
    const sun = new T3.DirectionalLight(0xffffff, 0.8);
    sun.position.set(150, 200, 100);
    scene.add(sun);
    const fill = new T3.DirectionalLight(0x89ffa8, 0.2);
    fill.position.set(-100, 60, -80);
    scene.add(fill);

    /* ── 카메라 ── */
    const cam = new T3.PerspectiveCamera(45, W / H, 0.5, 3000);
    cam.position.set(120, 90, 120);
    cam.lookAt(0, 0, 0);

    /* ── 렌더러 ── */
    const renderer = new T3.WebGLRenderer({ antialias: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    mount.appendChild(renderer.domElement);
    rendRef.current = renderer;

    /* ── OrbitControls ── */
    const ctrl = new T3.OrbitControls(cam, renderer.domElement);
    ctrl.enableDamping = true;
    ctrl.dampingFactor = 0.06;

    /* ── 부품 상태별 색상 ── */
    function partColor(status) {
      if (status === 'done')       return { hex: 0x1a7a3a, emissive: 0x0a3a1a };
      if (status === 'generating') return { hex: 0x6633aa, emissive: 0x331166 };
      if (status === 'error')      return { hex: 0x7a1a2a, emissive: 0x3a0a10 };
      return { hex: 0x1a3d6b, emissive: 0x0a1e35 };
    }

    /* ── 2D zone → 3D box ── */
    const zones  = schematic?.zones || [];
    const vbN    = (schematic?.vb || '0 0 600 400').split(' ').map(Number);
    const svgW   = vbN[2] || 600;
    const svgH   = vbN[3] || 400;
    const scaleX = 160 / svgW;
    const scaleZ = 100 / svgH;

    // partId → status
    const partMap = {};
    (asmParts || []).forEach(p => { partMap[p.id] = p.status || 'pending'; });

    // 이미 처리된 파트 추적 (같은 partId 중복 방지)
    const rendered = new Set();
    const sprites  = [];

    function addAsmEdge(geo, mesh) {
      const eg = new T3.EdgesGeometry(geo);
      const ln = new T3.LineSegments(eg,
        new T3.LineBasicMaterial({ color: 0x64a0f0, transparent: true, opacity: 0.5 }));
      ln.position.copy(mesh.position);
      ln.rotation.copy(mesh.rotation);
      scene.add(ln);
    }
    function addAsmMesh(partId, geo, pos, rot = [0, 0, 0], opacity = 0.78) {
      const status = partMap[partId] || 'pending';
      const { hex, emissive } = partColor(status);
      const mat = new T3.MeshPhongMaterial({
        color: hex, emissive, shininess: 60,
        transparent: true, opacity: status === 'pending' ? Math.min(opacity, 0.46) : opacity,
      });
      const mesh = new T3.Mesh(geo, mat);
      mesh.position.set(...pos);
      mesh.rotation.set(...rot);
      scene.add(mesh);
      addAsmEdge(geo, mesh);
      return mesh;
    }
    function addAsmRing(partId, r, tube, pos) {
      addAsmMesh(partId, new T3.TorusGeometry(r, tube, 16, 64), pos, [Math.PI / 2, 0, 0], 0.72);
    }
    function addAsmLabel(partId, label, pos) {
      const status = partMap[partId] || 'pending';
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 64;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, 256, 64);
      ctx.fillStyle = status === 'done' ? '#89ffa8' :
                      status === 'error' ? '#ff9fb5' : 'rgba(100,160,240,0.9)';
      ctx.font = 'bold 17px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(String(label || partId).slice(0, 22), 128, 36);
      const tex = new T3.CanvasTexture(cv);
      const spr = new T3.Sprite(new T3.SpriteMaterial({ map: tex, transparent: true, opacity: 0.86 }));
      spr.scale.set(24, 6, 1);
      spr.position.set(...pos);
      scene.add(spr);

    }
    function renderSmallLaunchAssemblyScaffold() {
      const y0 = 0;
      addAsmMesh('p9', new T3.CylinderGeometry(26, 28, 28, 72, 1, true), [0, y0 + 14, 0], [0, 0, 0], 0.64);

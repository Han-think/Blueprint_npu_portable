function VehicleSchematic({ vehicle, schematic, asmParts, onPartClick }) {
  if (!schematic || !vehicle) return null;

  // 이미지 로드 상태: 'top'=탑뷰OK, 'side'=탑뷰실패→사이드뷰OK, 'inline'=둘다실패
  const [imgState, setImgState] = React.useState('loading');
  // 3축 설계도: 외형 / 내부 / 파트존
  const [axisView, setAxisView] = React.useState('zones');
  // 파트 포커스 뷰 토글
  const [focusMode, setFocusMode] = React.useState(false);

  React.useEffect(() => { setImgState('loading'); setFocusMode(false); setAxisView('zones'); }, [vehicle.id]);
  React.useEffect(() => { setImgState('loading'); }, [axisView]);

  const { vb, view, zones } = schematic;
  const vbN = vb.split(' ').map(Number);
  const vbW = vbN[2], vbH = vbN[3];

  // partId → { status, idx }
  const partMap = {};
  (vehicle.parts || []).forEach((p, i) => {
    const ap = asmParts?.[i];
    partMap[p.id] = { status: ap?.status || 'pending', idx: i };
  });

  function getZoneStyle(partId) {
    if (!asmParts?.length) {
      return { fill:'rgba(39,74,121,0.10)', stroke:'rgba(59,110,181,0.5)', sw:0.8, pulse:false };
    }
    const info = partMap[partId];
    if (!info) return { fill:'rgba(39,74,121,0.10)', stroke:'rgba(59,110,181,0.5)', sw:0.8, pulse:false };
    switch (info.status) {
      case 'done':       return { fill:'rgba(137,255,168,0.18)', stroke:C.inter, sw:1.5, pulse:false };
      case 'generating': return { fill:'rgba(202,169,255,0.35)', stroke:C.halo,  sw:2.5, pulse:true  };
      case 'error':      return { fill:'rgba(255,159,181,0.22)', stroke:C.risk,  sw:1.5, pulse:false };
      default:           return { fill:'rgba(39,74,121,0.10)',   stroke:'rgba(59,110,181,0.4)', sw:0.8, pulse:false };
    }
  }

  function zoneBounds(z) {
    if (z.shape === 'R') return { x:z.x, y:z.y, w:z.w, h:z.h };
    if (z.shape === 'C') return { x:z.cx-z.r, y:z.cy-z.r, w:z.r*2, h:z.r*2 };
    const pts = z.pts.split(' ').map(p => p.split(',').map(Number));
    const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
    const x=Math.min(...xs), y=Math.min(...ys);
    return { x, y, w:Math.max(...xs)-x, h:Math.max(...ys)-y };
  }

  function centroid(z) {
    const b = zoneBounds(z);
    return [b.x + b.w/2, b.y + b.h/2];
  }

  // 현재 generating 존 → viewBox 포커스 계산
  const genPart  = asmParts?.find(p => p.status === 'generating');
  const genLabel = genPart ? vehicle.parts.find(p => p.id === genPart.id)?.label || '' : '';
  const genZone  = genPart ? zones.find(z => z.id === genPart.id) : null;

  function getFocusVB() {
    if (!genZone || !focusMode) return vb;
    const b = zoneBounds(genZone);
    const pad = Math.max(b.w, b.h) * 0.8;
    const fx = Math.max(0, b.x - pad);
    const fy = Math.max(0, b.y - pad);
    const fw = Math.min(vbW, b.w + pad*2);
    const fh = Math.min(vbH, b.h + pad*2);
    return `${fx} ${fy} ${fw} ${fh}`;
  }

  const activeVB = getFocusVB();

  // 첫 번째 등장 존에만 레이블 표시
  const seenIds = new Set();
  const showLabel = zones.map(z => {
    if (seenIds.has(z.id)) return false;
    seenIds.add(z.id);
    return true;
  });

  const doneCnt = asmParts?.filter(p => p.status === 'done').length || 0;
  const totalCnt = asmParts?.length || 0;

  function axisAssetHref() {
    if (axisView === 'exterior') return `vendor/img/${vehicle.id}_exterior.svg`;
    if (axisView === 'internal') return `vendor/img/${vehicle.id}_internal.svg`;
    return `vendor/img/${vehicle.id}_top.svg`;
  }

  function axisLabel() {
    if (axisView === 'exterior') return 'EXTERIOR';
    if (axisView === 'internal') return 'INTERNAL';
    return 'PART ZONES';
  }

  const showZones = axisView === 'zones';

  return (
    <div style={{ border:`1px solid ${C.frame}`, marginBottom:14 }}>

      {/* 헤더 */}
      <div style={{ padding:'6px 14px', borderBottom:`1px solid ${C.frame}`,
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    background:C.canvas }}>
        <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
          <Chip c={C.lox}>BLUEPRINT SCHEMATIC</Chip>
          <span className="mono" style={{ fontSize:9, color:C.ink3 }}>
            {axisLabel()} · {imgState === 'top' ? 'SVG' : imgState === 'side' ? 'SIDE VIEW' : view}
          </span>
          {[
            ['exterior','외형'],
            ['internal','내부'],
            ['zones','파트존'],
          ].map(([key,label]) => (
            <button key={key} onClick={() => setAxisView(key)}
              style={{ background: axisView === key ? C.lox : 'transparent',
                       border:`1px solid ${axisView === key ? C.lox : C.frame}`,
                       color: axisView === key ? '#050d18' : C.ink2,
                       fontFamily:'monospace', fontSize:9, padding:'2px 8px', cursor:'pointer' }}>
              {label}
            </button>
          ))}
          {genLabel && (
            <span className="mono" style={{ fontSize:10, color:C.halo,
                                            animation:'zpulse 1.2s infinite' }}>
              ◐ {genLabel}
            </span>
          )}
          {genZone && (
            <button onClick={() => setFocusMode(f => !f)}
              style={{ background: focusMode ? C.halo : 'transparent',
                       border:`1px solid ${C.halo}`, color: focusMode ? '#050d18' : C.halo,
                       fontFamily:'monospace', fontSize:9, padding:'2px 8px', cursor:'pointer' }}>
              {focusMode ? '⊞ 전체' : '⊡ 파트 포커스'}
            </button>
          )}
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {totalCnt > 0 && (
            <span className="mono" style={{ fontSize:10, color:C.inter }}>
              {doneCnt}/{totalCnt} done
            </span>
          )}
          {[['rgba(59,110,181,0.6)','Pending'],[C.halo,'Generating'],[C.inter,'Done'],[C.risk,'Error']].map(([c,l])=>(
            <span key={l} style={{ display:'flex', gap:3, alignItems:'center' }}>
              <span style={{ width:8, height:8, background:c, display:'inline-block', borderRadius:1 }}/>
              <span className="mono" style={{ fontSize:8, color:C.ink3 }}>{l}</span>
            </span>
          ))}
        </div>
      </div>

      {/* SVG 다이어그램 */}
      <div style={{ background:'#050d18', position:'relative' }}>
        <svg viewBox={activeVB}
          style={{ width:'100%', maxHeight:520, display:'block',
                   transition:'all 0.4s ease' }}>
          <defs>
            <pattern id="bpgrid" width="40" height="40" patternUnits="userSpaceOnUse">
              <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(39,74,121,0.15)" strokeWidth="0.5"/>
            </pattern>
            <pattern id="bpgrid_fine" width="10" height="10" patternUnits="userSpaceOnUse">
              <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(39,74,121,0.08)" strokeWidth="0.3"/>
            </pattern>
          </defs>
          <rect width={vbW} height={vbH} fill="url(#bpgrid_fine)"/>
          <rect width={vbW} height={vbH} fill="url(#bpgrid)"/>

          {/* 탑뷰 SVG 우선, 실패 시 사이드뷰, 실패 시 inline */}
          {imgState !== 'inline' && (
            <image
              key={`${vehicle.id}-${axisView}`}
              href={axisAssetHref()}
              width={vbW} height={vbH}
              preserveAspectRatio="xMidYMid meet"
              style={{ opacity: imgState === 'top' ? 0.93 : 0 }}
              onLoad={() => setImgState('top')}
              onError={() => {
                // 3축 전용 자산이 아직 없으면 파트존 기준도로 복귀
                if (axisView !== 'zones') {
                  setAxisView('zones');
                } else {
                  setImgState('trying_side');
                }
              }}
            />
          )}
          {(imgState === 'trying_side' || imgState === 'side') && (
            <image
              key={`${vehicle.id}-side`}
              href={`vendor/img/${vehicle.id}.svg`}
              width={vbW} height={vbH}
              preserveAspectRatio="xMidYMid meet"
              style={{ opacity: imgState === 'side' ? 0.93 : 0 }}
              onLoad={() => setImgState('side')}
              onError={() => setImgState('inline')}
            />
          )}
          {imgState === 'inline' && getVehicleLineart(vehicle.id)}

          {/* 존 렌더링 */}
          {showZones && zones.map((z, i) => {
            const st = getZoneStyle(z.id);
            const [lx, ly] = centroid(z);
            const clickable = partMap[z.id]?.status === 'done';
            const sharedProps = {
              fill: st.fill,
              stroke: st.stroke,
              strokeWidth: st.sw,
              style: {
                cursor: clickable ? 'pointer' : 'default',
                animation: st.pulse ? 'zpulse 1.2s infinite' : 'none',
                transition: 'fill 0.3s, stroke 0.3s',
              },
              onClick: () => { if (clickable) onPartClick?.(partMap[z.id].idx); },
            };
            const textStyle = {
              fontSize: z.shape === 'C' && z.r < 20 ? '7px' : '9px',
              fontFamily: "'JetBrains Mono', monospace",
              fill: st.pulse ? C.halo
                  : partMap[z.id]?.status === 'done' ? C.inter
                  : 'rgba(154,168,189,0.8)',
              pointerEvents: 'none',
              userSelect: 'none',
              letterSpacing: '0.04em',
            };
            return (
              <g key={i}>
                {z.shape === 'R' && <rect   {...sharedProps} x={z.x} y={z.y} width={z.w} height={z.h} rx={2}/>}
                {z.shape === 'C' && <circle {...sharedProps} cx={z.cx} cy={z.cy} r={z.r}/>}
                {z.shape === 'P' && <polygon {...sharedProps} points={z.pts}/>}
                {showLabel[i] && (
                  <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" style={textStyle}>
                    {z.label}
                  </text>
                )}
              </g>
            );
          })}

          {/* 3축 인디케이터 (우하단) */}
          {(() => {
            const ox = vbW - 58, oy = vbH - 52, L = 26;
            return (
              <g>
                <rect x={ox-8} y={oy-L-14} width={L+38} height={L+28}
                  fill="rgba(5,13,24,0.7)" stroke="rgba(39,74,121,0.4)" strokeWidth="0.5" rx={2}/>
                <text x={ox+6} y={oy-L-4} textAnchor="middle"
                  style={{ fontSize:'7px', fill:'rgba(154,168,189,0.5)', fontFamily:'monospace' }}>AXIS</text>
                <line x1={ox} y1={oy} x2={ox+L}   y2={oy}   stroke="#ff7a7a" strokeWidth="1.5"/>
                <text x={ox+L+5} y={oy+3} style={{ fontSize:'8px', fill:'#ff7a7a', fontFamily:'monospace' }}>X</text>
                <line x1={ox} y1={oy} x2={ox}     y2={oy-L} stroke="#7aff7a" strokeWidth="1.5"/>
                <text x={ox-7} y={oy-L-3} style={{ fontSize:'8px', fill:'#7aff7a', fontFamily:'monospace' }}>Y</text>
                <line x1={ox} y1={oy} x2={ox-L*0.6} y2={oy-L*0.6} stroke="#7ab4ff" strokeWidth="1.5"/>
                <text x={ox-L*0.6-9} y={oy-L*0.6-2} style={{ fontSize:'8px', fill:'#7ab4ff', fontFamily:'monospace' }}>Z</text>
              </g>
            );
          })()}
        </svg>
      </div>

      {/* 부품 진행 바 */}
      {asmParts?.length > 0 && (
        <div style={{ padding:'6px 14px', background:C.canvas, borderTop:`1px solid ${C.frame}`,
                      display:'flex', gap:3, flexWrap:'wrap' }}>
          {asmParts.map((p, i) => {
            const vp = vehicle.parts[i];
            const c = p.status==='done' ? C.inter : p.status==='generating' ? C.halo
                    : p.status==='error' ? C.risk : 'rgba(39,74,121,0.5)';
            return (
              <div key={i} title={vp?.label || `P${i+1}`}
                onClick={() => p.status==='done' && onPartClick?.(i)}
                style={{ flex:'0 0 auto', width:28, height:6, borderRadius:1,
                         background:c, cursor:p.status==='done'?'pointer':'default',
                         animation:p.status==='generating'?'zpulse 1.2s infinite':'none',
                         transition:'background 0.3s' }}/>
            );
          })}
          <span className="mono" style={{ fontSize:9, color:C.ink3, marginLeft:6, alignSelf:'center' }}>
            {doneCnt}/{asmParts.length} parts complete
          </span>
        </div>
      )}
    </div>
  );
}

// Root App

function App() {
  /* ── model state ── */
  const [models, setModels]               = useState([]);
  const [modelsLoading, setModelsLoading] = useState(true);
  const [activeModel, setActiveModel]     = useState('');
  const [ollamaOnline, setOllamaOnline]   = useState(false);

  /* ── brief / preset ── */
  const [brief, setBrief]   = useState(
    'Design a compact 80mm fan duct bracket for a 3D printer hotend cooling system. Material: PETG. Must be printable without supports. Wall thickness ≥ 1.2mm.'
  );
  const [preset, setPreset] = useState({ cat:'drone', type:'multirotor', conf:'quad_x' });

  /* ── pipeline state ──
     0=idle, 1=gen s1, 2=pick, 3=gen s2, 4=gen s3, 5=gen s4, 6=done */
  const [pipeStage, setPipeStage] = useState(0);
  const stopRef    = useRef(false);
  const choosingRef = useRef(false);

  /* ── stage 1 variants ── */
  const [variants,  setVariants]  = useState([]);
  const [chosenId,  setChosenId]  = useState(null);

  /* ── final blueprint ── */
  const [blueprint, setBlueprint] = useState(null);
  const [bpModal,   setBpModal]   = useState(false);

  /* ── mode: 'part' (단일 부품) | 'assembly' (완성체 어셈블리) ── */
  const [mode, setMode] = useState('part');

  /* ── assembly state (mode='assembly'일 때 사용) ── */
  const [vehicleId, setVehicleId] = useState('racing_quad_5in');
  const [asmParts, setAsmParts]   = useState([]); // { id, label, preset, spec, status, blueprint, validation, tokens, stage, error }
  const [asmStage, setAsmStage]   = useState(0);  // 0=idle, 1=running, 2=done
  const [asmModalIdx, setAsmModalIdx] = useState(null); // 부품 modal 인덱스
  const [show3DAsm, setShow3DAsm] = useState(false);    // 3D Assembly 뷰어
  const [generationSeed, setGenerationSeed] = useState(() => String(Math.floor(100000 + Math.random() * 900000)));
  const [runMeta, setRunMeta] = useState(null);
  const [batchCount, setBatchCount] = useState(3);
  const [batchRunning, setBatchRunning] = useState(false);
  const [improvementLoopRunning, setImprovementLoopRunning] = useState(false);
  const runMetaRef = useRef(null);
  const runSerialRef = useRef(0);

  /* ── curation state: 여러 출력 후보를 쌓고 keep/reject 선별 ── */
  const [curationQueue, setCurationQueue] = useState(() => {
    try {
      const raw = localStorage.getItem(CURATION_QUEUE_STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  });
  const [selectedCurationIds, setSelectedCurationIds] = useState([]);
  const [curation3D, setCuration3D] = useState(null);
  const [scorecardModalRecord, setScorecardModalRecord] = useState(null);

  /* ── terminal ── */
  const [term, setTerm] = useState([
    { c:C.term_dim,   t:'$ blueprint-npu · schema_v6 4-stage pipeline' },
    { c:C.term_green, t:'[init] fetching model list from ollama :11434…' },
  ]);
  function pushTerm(lines) {
    setTerm(t => [...t, ...(Array.isArray(lines) ? lines : [lines])]);
  }

  function randomizeSeed() {
    setGenerationSeed(String(Math.floor(100000 + Math.random() * 900000)));
  }

  function startRunMeta(scope, targetId, seedOverride = null) {
    runSerialRef.current += 1;
    const seedNum = Number.parseInt(seedOverride ?? generationSeed, 10);
    const meta = {
      scope,
      target_id: targetId || '',
      seed: Number.isFinite(seedNum) ? seedNum : Math.floor(100000 + Math.random() * 900000),
      attempt: runSerialRef.current,
      started_at: new Date().toISOString(),
      model: activeModel,
    };
    runMetaRef.current = meta;
    setRunMeta(meta);
    return meta;
  }

  /* ── load models ── */
  useEffect(() => {
    let alive = true;
    ollamaTags()
      .then(data => {
        if (!alive) return;
        const list = data.models || [];
        setModels(list);
        setOllamaOnline(true);
        if (list.length) {
          const preferred = preferredModelName(list);
          setActiveModel(preferred);
          pushTerm([
            { c:C.term_green, t:`[init] ${list.length} model(s): ${list.map(m=>m.name).join(', ')}` },
            { c:C.term_dim,   t:`$ preferred model selected: ${preferred}` },
            { c:C.term_dim,   t:'$ ready · enter brief → generate' },
          ]);
        } else {
          pushTerm({ c:C.term_warn, t:'[warn] no models — ollama pull qwen2.5:7b' });
        }
      })
      .catch(() => {
        if (!alive) return;
        setOllamaOnline(false);
        pushTerm({ c:C.term_risk, t:'[err] ollama offline — run start.bat or start.ps1' });
      })
      .finally(() => { if (alive) setModelsLoading(false); });
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(CURATION_QUEUE_STORAGE_KEY, JSON.stringify(curationQueue.slice(0, 100)));
    } catch {}
  }, [curationQueue]);

  /* ── generateWithRetry: 추출 + 정규화, 최대 2회 재시도
     Stage별 부분 JSON은 완성본 schema_v6가 아니므로 전체 스키마 검증을 하지 않는다.
     최종 병합본만 validateBlueprint로 검사한다. ── */
  async function generateWithRetry(model, sys, userPrompt, onToken, maxRetries = 2, tempBase = 0.7, validateFullSchema = false) {
    let lastText = '';
    let lastErrors = [];

    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      if (stopRef.current) break;
      const temp = Math.max(0.15, tempBase * Math.pow(0.65, attempt));
      const retryNote = attempt > 0 && lastErrors.length > 0
        ? `\n\nERROR: Your previous output had schema validation errors:\n${
            lastErrors.slice(0, 4).map(e => `- field "${e.field}": ${e.message}`).join('\n')
          }\nFix these errors and output corrected JSON only.`
        : '';

      try {
        const runSeed = runMetaRef.current?.seed;
        const opts = { temperature: temp, num_predict: 2200 };
        if (Number.isFinite(runSeed)) opts.seed = runSeed + attempt;
        const { text, tokens } = await ollamaGenerateFull(
          model, sys, userPrompt + retryNote,
          opts,
          onToken
        );
        lastText = text;

        const obj = extractJSON(text);
        if (!obj) {
          pushTerm({ c:C.term_warn, t:`[retry ${attempt + 1}/${maxRetries + 1}] no JSON found in response` });
          lastErrors = [{ field:'(root)', message:'No valid JSON object found in LLM output' }];
          continue;
        }

        const normalized  = normalizeBlueprint(obj);
        let validation = { valid: null, errors: [], warning: 'stage output not full-schema validated' };
        if (validateFullSchema) {
          validation  = await validateBlueprint(normalized);
          if (validation.valid === false && (validation.errors || []).length > 0 && attempt < maxRetries) {
            const sample = validation.errors.slice(0, 2).map(e => `${e.field}: ${e.message}`).join(' | ');
            pushTerm({ c:C.term_warn, t:`[retry ${attempt + 1}/${maxRetries + 1}] ${validation.errors.length} schema errors · ${sample}` });
            lastErrors = validation.errors;
            continue;
          }
        }

        return { obj: normalized, text, tokens, validation };
      } catch (e) {
        if (stopRef.current) break;
        pushTerm({ c:C.term_warn, t:`[retry ${attempt + 1}/${maxRetries + 1}] generate error: ${e.message}` });
        lastErrors = [{ field:'(root)', message: e.message }];
      }
    }

    // 재시도 소진 — best effort 반환
    const obj = extractJSON(lastText);
    const normalized = obj ? normalizeBlueprint(obj) : null;
    return { obj: normalized, text: lastText, tokens: 0, validation: { valid: false, errors: lastErrors } };
  }

  /* ── Stage 1: 3 variants 생성 ── */
  async function runStage1(presetHint = '') {
    const temps = [0.6, 0.8, 1.0];
    const ids   = ['A', 'B', 'C'];
    setVariants(ids.map((id, i) => ({
      id, temp:temps[i], bp:null, raw:'', tokens:0, generating:true, error:null, validation:null,
    })));

    const sys = S1_SYS;
    const up  = s1UserPrompt(brief, presetHint);

    for (let i = 0; i < 3; i++) {
      if (stopRef.current) break;
      const id   = ids[i];
      const temp = temps[i];
      pushTerm({ c:C.term_green, t:`[s1] variant ${id} · temp ${temp} · streaming…` });

      try {
        const { obj, text, tokens, validation } = await generateWithRetry(
          activeModel, sys, up,
          (raw, toks) => setVariants(vs => vs.map(v =>
            v.id === id ? { ...v, raw, tokens:toks } : v
          )),
          2, temp
        );
        setVariants(vs => vs.map(v =>
          v.id === id ? { ...v, bp:obj, raw:text, tokens, generating:false, validation } : v
        ));
        pushTerm({
          c:C.term_green,
          t:`[s1] ${id} done · ${tokens} tok · ${validation?.valid ? 'schema ✓' : `errors: ${validation?.errors?.length}`}`,
        });
      } catch (e) {
        setVariants(vs => vs.map(v =>
          v.id === id ? { ...v, generating:false, error:e.message } : v
        ));
        pushTerm({ c:C.term_risk, t:`[err] variant ${id}: ${e.message}` });
      }
    }
  }

  /* ── Stages 2-4: 선택된 variant 완성 ── */
  async function runPipeline234(id) {
    const chosenV = variants.find(v => v.id === id);
    if (!chosenV?.bp) {
      pushTerm({ c:C.term_risk, t:'[err] chosen variant has no extracted JSON' });
      return;
    }

    let merged = { ...chosenV.bp };
    const model = activeModel;

    /* Stage 2: geometry_ops + cad_brief */
    setPipeStage(3);
    pushTerm({ c:C.term_green, t:'[s2] geometry_ops + cad_brief · streaming…' });
    if (!stopRef.current) {
      try {
        const { obj, tokens } = await generateWithRetry(
          model, S2_SYS, s2UserPrompt(brief, merged), () => {}, 2, 0.5
        );
        if (obj) {
          if (obj.geometry_ops) merged.geometry_ops = obj.geometry_ops;
          if (obj.cad_brief)    merged.cad_brief    = obj.cad_brief;
        }
        pushTerm({ c:C.term_green, t:`[s2] done · ${tokens} tok · ${(obj?.geometry_ops||[]).length} ops` });
      } catch (e) {
        pushTerm({ c:C.term_risk, t:`[err] s2: ${e.message}` });
      }
    }

    /* Stage 3: verify + risk */
    setPipeStage(4);
    pushTerm({ c:C.term_green, t:'[s3] verify + risk · streaming…' });
    if (!stopRef.current) {
      try {
        const { obj, tokens } = await generateWithRetry(
          model, S3_SYS, s3UserPrompt(brief, merged), () => {}, 2, 0.4
        );
        if (obj) {
          if (obj.verify) merged.verify = obj.verify;
          if (obj.risk)   merged.risk   = obj.risk;
        }
        pushTerm({
          c:C.term_green,
          t:`[s3] done · ${tokens} tok · ${(obj?.verify||[]).length} checks · ${(obj?.risk||[]).length} risks`,
        });
      } catch (e) {
        pushTerm({ c:C.term_risk, t:`[err] s3: ${e.message}` });
      }
    }

    /* Stage 4: print_profile + slicer_job */
    setPipeStage(5);
    pushTerm({ c:C.term_green, t:'[s4] print_profile + slicer_job · streaming…' });
    if (!stopRef.current) {
      try {
        const { obj, tokens } = await generateWithRetry(
          model, S4_SYS, s4UserPrompt(brief, merged), () => {}, 2, 0.4
        );
        if (obj) {
          if (obj.print_profile) merged.print_profile = obj.print_profile;
          if (obj.slicer_job)    merged.slicer_job    = obj.slicer_job;
        }
        pushTerm({ c:C.term_green, t:`[s4] done · ${tokens} tok` });
      } catch (e) {
        pushTerm({ c:C.term_risk, t:`[err] s4: ${e.message}` });
      }
    }

    const final = {
      ...normalizeBlueprint(merged),
      _visual_asset: presetPartAssetPath(preset),
      _preset_asset: presetPartAssetPath(preset),
      _preset_ref: `${preset.cat}/${preset.type}/${preset.conf}`,
      _run_meta: { ...(runMetaRef.current || {}) },
    };
    final._coord_audit = coordinateAuditSummary(final);
    final._generated_design_audit = (() => {
      const a = generatedDesignAudit(final);
      return {
        status: a.designStatus,
        explicit_at: a.explicit,
        total_ops: a.ops.length,
        box_like_ops: a.boxLike,
        curved_ops: a.curved,
        op_types: a.opTypes,
        box_ratio: Number(a.boxRatio.toFixed(3)),
      };
    })();
    const finalValidation = await validateBlueprint(normalizeBlueprint(merged));
    const coordAudit = geometryCoordinateAudit(final);
    setBlueprint(final);
    setPipeStage(6);
    choosingRef.current = false;
    pushTerm([
      { c:C.term_green, t:'[done] ✓ blueprint complete · schema_v6' },
      { c:C.term_dim,   t:`$ fields: ${Object.keys(final).length} · ops: ${(final.geometry_ops||[]).length} · risks: ${(final.risk||[]).length} · ${finalValidation.valid ? 'valid' : `${finalValidation.errors?.length || 0} err`}` },
      { c:coordAudit.status === 'ok' ? C.term_green : C.term_risk, t:`[coord] explicit at[] ${coordAudit.explicit}/${coordAudit.ops.length} · target refs ${coordAudit.targetRefs} · ${coordAudit.status}` },
    ]);
  }

  /* ── Assembly mode: 부품 1개 단발 생성 (Stage 1+2 통합) ── */
  async function synthesizeAssemblySubsystem(vehicleCtx, part, onProgress, loopFeedback = '') {
    const presetKey = { cat: part.preset[0], type: part.preset[1], conf: part.preset[2] };
    const hint = getPresetHint(presetKey);
    const categoryContext = designContextForCategory(preset.cat);
    const geomHint = partGeometryHint(part);
    const detailGuidance = assemblySubsystemDetailGuidance(vehicleCtx, part);
    const improvementClause = loopFeedback
      ? `\nENGINEERING IMPROVEMENT LOOP FEEDBACK:\n${loopFeedback}\nApply these corrections concretely in geometry_ops, coordinates, interfaces, and verification. Do not merely restate the critique.\n`
      : '';
    const partBrief = `Subsystem module: ${part.label} (fixed BOM item inside ${vehicleCtx.label})\n` +
                      `Spec: ${part.spec}\n` +
                      `Vehicle context: ${vehicleCtx.desc}\n` +
                      `Representative basis: ${vehicleCtx.wikiTitle || vehicleCtx.label}\n` +
                      `Category design context:\n${categoryContext}\n` +
                      `${geomHint}\n` +
                      `${detailGuidance}\n` +
                      `Assembly dataset contract:\n${JSON.stringify(buildAssemblyDatasetContract(vehicleCtx, vehicleCtx.parts || []), null, 2)}\n` +
                      `Reference SVG: ${assemblyPartAssetPath(vehicleCtx.id, part)}\n` +
                      `Preset fallback SVG: ${presetPartAssetPath(part.preset)}\n` +
                      `Suggested material: ${vehicleCtx.material}, process: ${vehicleCtx.process}\n` +
                      improvementClause +
                      `Output target: detailed manufacturable assembly-subsystem blueprint, not a standalone single-part choice and not a generic block. It must fit the complete vehicle architecture.\n` +
                      `Granularity rule: decompose this subsystem into 5-9 meaningful internal child features in part_tree when possible, such as shell/body, flange/interface, fastener pattern, channel/duct, rib/stiffener, seal/gasket, sensor/avionics pocket, service access, mounting datum, harness/pipe interface, actuator/sensor bracket, thermal liner, or inspection cover.\n` +
                      `Geometry rule: represent those internal features with 12-24 explicit coordinate-bearing geometry_ops, not prose. Every physical feature must include args.at [x,y,z] and real dimensions. Coordinates must be distributed across the local subsystem volume; do not stack all features at the origin.\n` +
                      `Interface rule: include at least three adjacent-module interfaces or mounting datums and at least three negative/service features such as holes, pockets, ducts, channels, ports, or access cuts. Include labels only after physical geometry is defined.\n` +
                      `Training-quality rule: this output will be used as an assembly-bundle learning datum, so make the part_tree children and geometry_ops mutually traceable by id/name.`;

    // Stage P0: subsystem plan for role, physics paths, interfaces, and feature targets.
    onProgress?.({ stage:'P0 plan', tokens:0 });
    let subsystemPlan = null;
    try {
      const { obj } = await generateWithRetry(
        activeModel, P0_PLAN_SYS, p0PlanPrompt(partBrief, vehicleCtx, part),
        (_, toks) => onProgress?.({ stage:'P0 plan', tokens:toks }),
        1, 0.45
      );
      subsystemPlan = ensureSubsystemPlan(obj, vehicleCtx, part);
    } catch (e) {
      subsystemPlan = fallbackSubsystemPlan(vehicleCtx, part, 'local_fallback_after_p0_error');
      pushTerm({ c:C.term_warn, t:`[asm-plan] ${part.label}: P0 model plan failed, local plan applied · ${e.message}` });
    }
    if (!subsystemPlan) subsystemPlan = fallbackSubsystemPlan(vehicleCtx, part, 'local_fallback_empty_p0');

    const stagedBrief = subsystemPlan
      ? partBrief + `\nSubsystem planning output for downstream stages:\n${JSON.stringify(subsystemPlan, null, 2)}\n`
      : partBrief;

    // Stage 1: brief + part_tree
    onProgress?.({ stage:'S1 tree', tokens:0 });
    let merged = {};
    try {
      const { obj } = await generateWithRetry(
        activeModel, S1_SYS, s1UserPrompt(stagedBrief, hint),
        (raw, toks) => onProgress?.({ stage:'S1 tree', tokens:toks }),
        1, 0.5
      );
      if (obj) merged = obj;
    } catch (e) { throw new Error('s1: ' + e.message); }

    if (stopRef.current) return { merged, partialFail:true };

    // Stage 2: geometry_ops + cad_brief
    onProgress?.({ stage:'S2 geometry', tokens:0 });
    try {
      const { obj } = await generateWithRetry(
        activeModel, S2_SYS, s2UserPrompt(stagedBrief, merged),
        (_, toks) => onProgress?.({ stage:'S2 geometry', tokens:toks }),
        1, 0.4
      );
      if (obj) {
        if (obj.geometry_ops) merged.geometry_ops = obj.geometry_ops;
        if (obj.cad_brief)    merged.cad_brief    = obj.cad_brief;
      }
    } catch (e) { throw new Error('s2: ' + e.message); }

    if (stopRef.current) return { merged, partialFail:true };

    // Stage 3: verify + risk (속도 위해 1회만)
    onProgress?.({ stage:'S3 verify', tokens:0 });
    try {
      const { obj } = await generateWithRetry(
        activeModel, S3_SYS, s3UserPrompt(stagedBrief, merged),
        (_, toks) => onProgress?.({ stage:'S3 verify', tokens:toks }),
        1, 0.4
      );
      if (obj) {
        if (obj.verify) merged.verify = obj.verify;
        if (obj.risk)   merged.risk   = obj.risk;
      }
    } catch (e) { /* non-fatal */ }

    if (stopRef.current) return { merged, partialFail:true };

    // Stage 4: print_profile + slicer_job
    onProgress?.({ stage:'S4 print', tokens:0 });
    try {
      const { obj } = await generateWithRetry(
        activeModel, S4_SYS, s4UserPrompt(stagedBrief, merged),
        (_, toks) => onProgress?.({ stage:'S4 print', tokens:toks }),
        1, 0.4
      );
      if (obj) {
        if (obj.print_profile) merged.print_profile = obj.print_profile;
        if (obj.slicer_job)    merged.slicer_job    = obj.slicer_job;
      }
    } catch (e) { /* non-fatal */ }

    const cleanFinal = normalizeBlueprint(merged);
    const validation = await validateBlueprint(cleanFinal);
    const final = {
      ...cleanFinal,
      _visual_asset: assemblyPartAssetPath(vehicleCtx.id, part),
      _preset_asset: presetPartAssetPath(part.preset),
      _vehicle_id: vehicleCtx.id,
      _vehicle_label: vehicleCtx.label,
      _part_id: part.id,
      _part_label: part.label,
      _part_spec: part.spec,
      _preset_ref: part.preset.join('/'),
      _subsystem_plan: subsystemPlan,
      _pipeline_stages: ['P0 subsystem plan', 'S1 part_tree', 'S2 geometry_ops', 'S3 verify_risk', 'S4 print_profile'],
      _dataset_contract_version: 'blueprint_npu_assembly_dataset_contract_v1',
      _run_meta: { ...(runMetaRef.current || {}) },
    };
    final._coord_audit = coordinateAuditSummary(final);
    final._generated_design_audit = (() => {
      const a = generatedDesignAudit(final);
      return {
        status: a.designStatus,
        explicit_at: a.explicit,
        total_ops: a.ops.length,
        box_like_ops: a.boxLike,
        curved_ops: a.curved,
        op_types: a.opTypes,
        box_ratio: Number(a.boxRatio.toFixed(3)),
      };
    })();
    return { merged: final, validation };
  }

  /* ── Assembly mode: 전체 어셈블리 파이프라인 ── */
  async function runAssembly(seedOverride = null, loopFeedback = '', vehicleOverride = null, presetOverride = null, loopParent = null) {
    const activePreset = presetOverride || preset;
    const vehicle = vehicleOverride || getVehicle(activePreset.cat, vehicleId);
    if (!vehicle || !activeModel) return;

    const rm = startRunMeta('assembly', vehicle.id, seedOverride);
    if (loopParent) {
      rm.loop_parent_id = loopParent.id;
      rm.loop_parent_score = loopParent.engineering_scorecard?.score;
      rm.loop_parent_verdict = loopParent.engineering_scorecard?.verdict;
      runMetaRef.current = rm;
      setRunMeta({ ...rm });
    }
    setGenerationSeed(String(rm.seed));
    stopRef.current = false;
    setAsmStage(1);

    const initParts = vehicle.parts.map(p => ({
      ...p,
      status: 'pending',
      blueprint: null,
      validation: null,
      tokens: 0,
      stage: '',
      error: null,
    }));
    setAsmParts(initParts);
    pushTerm([
      { c:C.term_dim,   t:`$ assembly · vehicle: ${vehicle.label} · ${vehicle.parts.length} fixed BOM subsystems · seed ${rm.seed} · attempt ${rm.attempt}${loopParent ? ` · loop from ${loopParent.id}` : ''}` },
      { c:C.term_dim,   t:`[asm] staged factory enabled for every fixed BOM subsystem: P0 plan → S1 tree → S2 geometry → S3 verify → S4 print` },
      { c:C.term_green, t:`[asm] synthesizing whole-vehicle subsystem set…` },
    ]);
    if (loopFeedback) {
      pushTerm({ c:C.term_warn, t:`[loop] engineering feedback injected · ${loopFeedback.split('\n').filter(Boolean).slice(0, 2).join(' / ')}` });
    }

    let completedParts = initParts;
    for (let i = 0; i < vehicle.parts.length; i++) {
      if (stopRef.current) break;
      const part = vehicle.parts[i];
      setAsmParts(ps => ps.map((p, j) => j === i ? { ...p, status: 'generating' } : p));
      pushTerm({ c:C.term_green, t:`[asm ${i+1}/${vehicle.parts.length}] ${part.label} subsystem…` });

      try {
        const { merged, validation } = await synthesizeAssemblySubsystem(
          vehicle, part,
          progress => setAsmParts(ps => ps.map((p, j) =>
            j === i ? { ...p, stage: progress.stage, tokens: progress.tokens } : p
          )),
          loopFeedback
        );
        completedParts = completedParts.map((p, j) =>
          j === i ? { ...p, status: 'done', blueprint: merged, validation } : p
        );
        setAsmParts(ps => ps.map((p, j) =>
          j === i ? { ...p, status: 'done', blueprint: merged, validation } : p
        ));
        const coordAudit = geometryCoordinateAudit(merged);
        pushTerm({
          c:coordAudit.status === 'ok' ? C.term_green : C.term_risk,
          t:`[asm ${i+1}/${vehicle.parts.length}] ✓ done · ${(merged.geometry_ops||[]).length} ops · coord ${coordAudit.explicit}/${coordAudit.ops.length} · ${validation?.valid ? 'valid' : `${validation?.errors?.length||0} err`}`
        });
      } catch (e) {
        completedParts = completedParts.map((p, j) =>
          j === i ? { ...p, status: 'error', error: e.message } : p
        );
        setAsmParts(ps => ps.map((p, j) =>
          j === i ? { ...p, status: 'error', error: e.message } : p
        ));
        pushTerm({ c:C.term_risk, t:`[asm ${i+1}] ✗ ${e.message}` });
      }
    }

    setAsmStage(2);
    pushTerm({ c:C.term_green, t:`[asm] ✓ assembly complete` });
    const doneParts = completedParts.filter(p => p.status === 'done' && p.blueprint);
    if (doneParts.length) {
      const bundle = buildAssemblyCurationBundle(vehicle, completedParts);
      const rec = makeCurationRecord('assembly', bundle, {
        decision: 'candidate',
        title: vehicle.label,
        vehicle_id: vehicle.id,
        done_parts: doneParts.length,
        total_parts: vehicle.parts.length,
        quality_hint: 'manual_review_required',
        training_readiness: 'candidate',
        training_role: 'assembly_primary',
        loop_parent_id: loopParent?.id || null,
        loop_feedback: loopFeedback || '',
      });
      setCurationQueue(q => [rec, ...q]);
      pushTerm({ c:C.term_dim, t:`[curation] auto queued assembly candidate · ${vehicle.label} · ${doneParts.length}/${vehicle.parts.length} · eng ${rec.engineering_scorecard?.score ?? 'n/a'} ${rec.engineering_scorecard?.verdict || ''}` });
    }
  }

  async function runAssemblyBatch() {
    const vehicle = getVehicle(preset.cat, vehicleId);
    if (!vehicle || !activeModel || batchRunning || asmStage === 1) return;
    const count = Math.max(1, Math.min(12, Number(batchCount) || 1));
    const seedBase = Number.parseInt(generationSeed, 10);
    const base = Number.isFinite(seedBase) ? seedBase : Math.floor(100000 + Math.random() * 900000);
    setBatchRunning(true);
    stopRef.current = false;
    pushTerm({ c:C.term_dim, t:`$ batch assembly · ${vehicle.label} · ${count} attempts · seed base ${base}` });
    try {
      for (let i = 0; i < count; i++) {
        if (stopRef.current) break;
        const seed = base + i;
        pushTerm({ c:C.term_green, t:`[batch ${i + 1}/${count}] seed ${seed} → generate + auto queue` });
        await runAssembly(seed);
      }
      pushTerm({ c:C.term_green, t:`[batch] complete · queued candidates are ready for 3D review` });
    } finally {
      setBatchRunning(false);
    }
  }

  function makeCurationRecord(kind, payload, overrides = {}) {
    const ts = new Date().toISOString();
    const id = `${kind}_${ts.replace(/[-:.TZ]/g, '').slice(0, 14)}_${Math.random().toString(36).slice(2, 7)}`;
    const rec = {
      id,
      ts,
      kind,
      decision: 'candidate',
      rating: 0,
      note: '',
      preset: { ...preset },
      model: activeModel,
      run_meta: { ...(runMetaRef.current || {}) },
      brief: kind === 'single_part' ? brief : '',
      payload,
      ...overrides,
    };
    const scorecard = engineeringScorecardForCurationRecord(rec);
    return {
      ...rec,
      engineering_scorecard: scorecard,
      quality_hint: scorecard?.verdict || rec.quality_hint || 'manual_review_required',
      rating: rec.rating || (scorecard ? Math.max(1, Math.ceil(scorecard.score / 20)) : 0),
    };
  }

  function buildAssemblyCurationBundle(vehicle, parts) {
    return {
      schema: 'blueprint_npu_assembly_curation_v1',
      dataset_contract: buildAssemblyDatasetContract(vehicle, parts),
      run_meta: { ...(runMetaRef.current || {}) },
      vehicle: {
        id: vehicle.id,
        label: vehicle.label,
        desc: vehicle.desc,
        material: vehicle.material,
        process: vehicle.process,
        mass: vehicle.mass,
        envelope: vehicle.envelope,
      },
      parts: parts.map((p, i) => ({
        index: i + 1,
        id: p.id,
        label: p.label,
        spec: p.spec,
        preset: p.preset,
        visual_asset: assemblyPartAssetPath(vehicle.id, p),
        preset_asset: presetPartAssetPath(p.preset),
        status: p.status,
        valid: p.validation?.valid,
        subsystem_plan: p.blueprint?._subsystem_plan || null,
        pipeline_stages: p.blueprint?._pipeline_stages || [],
        blueprint: p.blueprint,
      })),
    };
  }

  function addCurrentBlueprintToCuration(decision = 'candidate') {
    if (!blueprint) return;
    const rec = makeCurationRecord('single_part', blueprint, {
      decision,
      title: blueprint.object || blueprint.project || 'Design Output',
      quality_hint: 'single_part_auxiliary_reference',
      training_role: 'single_part_auxiliary',
      training_readiness: decision === 'keep' ? 'auxiliary_single_part_reference' : 'candidate_auxiliary',
    });
    setCurationQueue(q => [rec, ...q]);
    pushTerm({ c:C.term_green, t:`[curation] added single_part · ${rec.title} · ${decision} · eng ${rec.engineering_scorecard?.score ?? 'n/a'} ${rec.engineering_scorecard?.verdict || ''}` });
  }

  function addAssemblyToCuration(decision = 'candidate') {
    const vehicle = getVehicle(preset.cat, vehicleId);
    const doneParts = asmParts.filter(p => p.status === 'done' && p.blueprint);
    if (!vehicle || doneParts.length === 0) return;
    const bundle = buildAssemblyCurationBundle(vehicle, asmParts);
    const rec = makeCurationRecord('assembly', bundle, {
      decision,
      title: vehicle.label,
      vehicle_id: vehicle.id,
      done_parts: doneParts.length,
      total_parts: vehicle.parts.length,
      quality_hint: 'manual_review_required',
      training_role: 'assembly_primary',
      training_readiness: decision === 'keep' ? 'selected_by_user_assembly_bundle' : 'candidate',
    });
    setCurationQueue(q => [rec, ...q]);
    pushTerm({ c:C.term_green, t:`[curation] added assembly · ${vehicle.label} · ${doneParts.length}/${vehicle.parts.length} · ${decision} · eng ${rec.engineering_scorecard?.score ?? 'n/a'} ${rec.engineering_scorecard?.verdict || ''}` });
  }

  function updateCuration(id, patch) {
    setCurationQueue(q => q.map(r => r.id === id ? { ...r, ...patch } : r));
  }

  function removeCuration(id) {
    setCurationQueue(q => q.filter(r => r.id !== id));
    setSelectedCurationIds(ids => ids.filter(x => x !== id));
    setCuration3D(v => v?.id === id ? null : v);
    setScorecardModalRecord(v => v?.id === id ? null : v);
  }

  function assemblyPreviewFromCuration(r) {
    const payload = r?.payload || {};
    const vehicleIdFromPayload = payload.vehicle?.id || r?.vehicle_id || '';
    const vehicle =
      getVehicle(r?.preset?.cat, vehicleIdFromPayload) ||
      Object.values(VEHICLE_TEMPLATES).flat().find(v => v.id === vehicleIdFromPayload) ||
      {
        id: vehicleIdFromPayload || 'curation_assembly',
        label: payload.vehicle?.label || r?.title || 'Curation Assembly',
        parts: (payload.parts || []).map(p => ({
          id: p.id,
          label: p.label || p.id,
          preset: p.preset,
          spec: p.spec || '',
        })),
      };
    const parts = (payload.parts || vehicle.parts || []).map((p, i) => ({
      id: p.id || `p${i + 1}`,
      label: p.label || vehicle.parts?.[i]?.label || p.id || `Part ${i + 1}`,
      preset: p.preset || vehicle.parts?.[i]?.preset,
      spec: p.spec || vehicle.parts?.[i]?.spec || '',
      status: p.status || (p.blueprint ? 'done' : 'pending'),
      blueprint: p.blueprint || null,
      validation: { valid: p.valid ?? p.validation?.valid ?? null },
    }));
    return {
      vehicle,
      schematic: VEHICLE_SCHEMATICS[vehicle.id],
      asmParts: parts,
    };
  }

  function viewCuration3D(r) {
    if (!r) return;
    setCuration3D(r);
  }

  function nextLoopSeed() {
    const base = Number.parseInt(generationSeed, 10);
    const jump = Math.floor(10000 + Math.random() * 800000);
    return String(Math.abs((Number.isFinite(base) ? base : 100000) + jump) % 900000 + 100000);
  }

  function buildImprovementFeedback(record) {
    const scorecard = record?.engineering_scorecard || engineeringScorecardForCurationRecord(record);
    const cats = (scorecard?.categories || [])
      .filter(c => c.score < 78)
      .sort((a, b) => a.score - b.score)
      .slice(0, 4)
      .map(c => `- Improve ${c.name}: ${c.score}/100. ${c.note}`);
    const findings = (scorecard?.findings || []).slice(0, 5).map(f => `- Fix: ${f}`);
    return [
      `Parent candidate: ${record?.title || record?.id || 'unknown'} (${record?.kind || 'candidate'})`,
      `Parent engineering score: ${scorecard?.score ?? 'n/a'}/100 · ${scorecard?.verdict || 'unknown'}`,
      ...findings,
      ...cats,
      '- Increase explicit args.at coordinates for every physical geometry operation.',
      '- Expand part_tree into 5-9 internal child features and map each important child feature to at least one geometry_op.',
      '- Use 12-24 geometry_ops for assembly subsystem parts, with real dimensions and distributed coordinates.',
      '- Add visible interface/service features: flanges, bolt patterns, ports, channels, pockets, access covers, ribs, seals, bearings, cable paths, or datum mounts as appropriate.',
      '- Prefer domain-correct primitives: cylinders/revolve/loft/sweep for rockets/engines/aerospace, symmetry/patterns for drones.',
      '- Add real interfaces, mounts, channels, holes, seals, ribs, labels, and verification checks that match the subsystem role.',
      '- Avoid generic box-only geometry unless the actual subsystem is rectangular.',
    ].filter(Boolean).join('\n');
  }

  function buildSinglePartImprovementBrief(record) {
    const bp = record?.payload || {};
    const feedback = buildImprovementFeedback(record);
    return `Improve this generated design as a new higher-quality candidate.

Original object: ${bp.object || bp.project || record?.title || 'Design Output'}
Original preset: ${record?.preset ? `${record.preset.cat}/${record.preset.type}/${record.preset.conf}` : 'unknown'}

${feedback}

Return a fresh manufacturable design, not a commentary. Preserve the useful design intent but correct the weak geometry, coordinates, interfaces, and verification.`;
  }

  async function runImprovementLoop(record) {
    if (!record || running || improvementLoopRunning) return;
    const feedback = buildImprovementFeedback(record);
    const seed = nextLoopSeed();
    if (record.kind === 'assembly') {
      const vehicleIdFromRecord = record.vehicle_id || record.payload?.vehicle?.id;
      const vehicle =
        getVehicle(record.preset?.cat, vehicleIdFromRecord) ||
        Object.values(VEHICLE_TEMPLATES).flat().find(v => v.id === vehicleIdFromRecord);
      if (!vehicle) {
        pushTerm({ c:C.term_risk, t:`[loop] cannot resolve vehicle for ${record.title || record.id}` });
        return;
      }
      setImprovementLoopRunning(true);
      setMode('assembly');
      if (record.preset) setPreset(record.preset);
      setVehicleId(vehicle.id);
      pushTerm({ c:C.term_dim, t:`$ improvement loop · ${vehicle.label} · parent ${record.id} · seed ${seed}` });
      try {
        await runAssembly(Number(seed), feedback, vehicle, record.preset || preset, record);
      } finally {
        setImprovementLoopRunning(false);
      }
    } else {
      setMode('part');
      if (record.preset) setPreset(record.preset);
      setBrief(buildSinglePartImprovementBrief(record));
      setGenerationSeed(seed);
      setPipeStage(0);
      setVariants([]);
      setChosenId(null);
      setBlueprint(null);
      setBpModal(false);
      pushTerm({ c:C.term_dim, t:`[loop] loaded improved single-part brief · seed ${seed} · press generate 3` });
      window.setTimeout(() => document.querySelector('textarea')?.focus(), 50);
    }
  }

  function curationExportRow(r) {
    const isAssemblyPrimary = r.kind === 'assembly';
    const isKept = r.decision === 'keep';
    return {
      schema: 'blueprint_npu_manual_curation_v1',
      id: r.id,
      ts: r.ts,
      kind: r.kind,
      decision: r.decision,
      rating: r.rating,
      note: r.note,
      model: r.model,
      run_meta: r.run_meta,
      preset: r.preset,
      title: r.title,
      loop_parent_id: r.loop_parent_id || null,
      loop_feedback: r.loop_feedback || '',
      engineering_scorecard: r.engineering_scorecard || engineeringScorecardForCurationRecord(r),
      training_role: isAssemblyPrimary ? 'assembly_primary' : 'single_part_auxiliary',
      training_readiness: isAssemblyPrimary && isKept ? 'human_selected_assembly_bundle'
        : isKept ? 'auxiliary_single_part_reference'
        : 'candidate_or_rejected',
      payload: r.payload,
    };
  }

  function downloadJSONLRows(rows, label) {
    if (!rows.length) return;
    const blob = new Blob([rows.map(r => JSON.stringify(r)).join('\n') + '\n'], { type:'application/x-ndjson' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `blueprint_curation_${label}_${new Date().toISOString().slice(0,10)}.jsonl`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function downloadCurationRecordJSON(r) {
    const blob = new Blob([JSON.stringify(curationExportRow(r), null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `blueprint_curation_${r.kind}_${r.id}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function toggleCurationSelected(id) {
    setSelectedCurationIds(ids => ids.includes(id) ? ids.filter(x => x !== id) : [id, ...ids]);
  }

  function selectAllCuration() {
    setSelectedCurationIds(curationQueue.map(r => r.id));
  }

  function clearCurationSelection() {
    setSelectedCurationIds([]);
  }

  function bulkCurationDecision(decision) {
    const selected = new Set(selectedCurationIds);
    if (!selected.size) return;
    setCurationQueue(q => q.map(r => selected.has(r.id) ? { ...r, decision } : r));
  }

  function downloadSelectedCurationJSONL() {
    const selected = new Set(selectedCurationIds);
    const rows = curationQueue.filter(r => selected.has(r.id)).map(curationExportRow);
    downloadJSONLRows(rows, 'selected');
  }

  function downloadCurationJSONL(onlyKept = true) {
    const rows = curationQueue
      .filter(r => !onlyKept || (r.kind === 'assembly' && r.decision === 'keep'))
      .map(curationExportRow);
    downloadJSONLRows(rows, onlyKept ? 'kept_assembly' : 'all');
  }

  function downloadAuxiliarySinglePartJSONL() {
    const rows = curationQueue
      .filter(r => r.kind === 'single_part')
      .map(curationExportRow);
    downloadJSONLRows(rows, 'aux_single_part');
  }

  /* ── Assembly bundle 다운로드 ── */
  function downloadAssemblyBundle() {
    const vehicle = getVehicle(preset.cat, vehicleId);
    if (!vehicle) return;
    const bundle = {
      schema: 'blueprint_npu_assembly_v1',
      ts: new Date().toISOString(),
      dataset_contract: buildAssemblyDatasetContract(vehicle, asmParts),
      run_meta: { ...(runMetaRef.current || {}) },
      vehicle: {
        id: vehicle.id,
        label: vehicle.label,
        desc: vehicle.desc,
        material: vehicle.material,
        process: vehicle.process,
        mass: vehicle.mass,
        envelope: vehicle.envelope,
      },
      parts: asmParts.map((p, i) => ({
        index: i + 1,
        id: p.id,
        label: p.label,
        spec: p.spec,
        preset: p.preset,
        status: p.status,
        valid: p.validation?.valid,
        subsystem_plan: p.blueprint?._subsystem_plan || null,
        pipeline_stages: p.blueprint?._pipeline_stages || [],
        blueprint: p.blueprint,
      })),
    };
    const blob = new Blob([JSON.stringify(bundle, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    const rm = runMetaRef.current;
    const suffix = rm ? `_seed${rm.seed}_attempt${rm.attempt}` : '';
    a.download = `assembly_${vehicle.id}${suffix}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── Generate 버튼 ── */
  async function onGenerate() {
    if (!brief.trim() || !activeModel || pipeStage !== 0) return;
    const rm = startRunMeta('single_part', `${preset.cat}/${preset.type}/${preset.conf}`);
    stopRef.current = false;
    choosingRef.current = false;
    setChosenId(null);
    setBlueprint(null);
    setVariants([]);
    setPipeStage(1);
    pushTerm([
      { c:C.term_dim,   t:`$ generate · model: ${activeModel} · preset: ${preset.cat}/${preset.type}/${preset.conf} · seed ${rm.seed} · attempt ${rm.attempt}` },
      { c:C.term_green, t:'[pipeline] stage 1 · brief + part_tree · 3 variants' },
    ]);
    await runStage1(getPresetHint(preset));
    if (!stopRef.current) {
      setPipeStage(2);
      pushTerm({ c:C.term_dim, t:'$ stage 1 complete — select a variant to continue →' });
    } else {
      setPipeStage(0);
    }
  }

  /* ── Variant 선택 ── */
  async function onChoose(id) {
    if (pipeStage !== 2 || choosingRef.current) return;
    choosingRef.current = true;
    setChosenId(id);
    pushTerm({ c:C.inter, t:`[pick] variant ${id} selected → stages 2 → 4` });
    await runPipeline234(id);
  }

  /* ── Stop / Reset ── */
  function onStop() {
    stopRef.current = true;
    pushTerm({ c:C.term_warn, t:'[user] pipeline stopped' });
    if (pipeStage === 1) { setPipeStage(0); setVariants([]); }
    else if (pipeStage >= 3 && pipeStage < 6) {
      if (blueprint) setPipeStage(6);
      else { setPipeStage(0); choosingRef.current = false; }
    }
  }

  function onReset() {
    stopRef.current = true;
    choosingRef.current = false;
    setPipeStage(0);
    setVariants([]);
    setChosenId(null);
    setBlueprint(null);
    pushTerm({ c:C.term_dim, t:'$ reset — ready for new brief' });
  }

  const running     = pipeStage === 1 || (pipeStage >= 3 && pipeStage <= 5) || asmStage === 1 || batchRunning || improvementLoopRunning;
  const canGenerate = !!(brief.trim() && activeModel && pipeStage === 0 && !modelsLoading);

  const downloadJSON = () => {
    if (!blueprint) return;
    const blob = new Blob([JSON.stringify(blueprint, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    const rm = blueprint._run_meta;
    const suffix = rm?.seed ? `_seed${rm.seed}_attempt${rm.attempt}` : '';
    a.download = `blueprint_${(blueprint.object||'design').replace(/\s+/g,'-').toLowerCase()}${suffix}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ maxWidth:1280, margin:'0 auto', padding:'20px 20px 60px', fontFamily:C.sans, color:C.ink2 }}>

      {/* Blueprint 모달 */}
      {bpModal && blueprint && <BlueprintModal bp={blueprint} onClose={() => setBpModal(false)} />}
      {curation3D?.kind === 'single_part' && curation3D.payload && (
        <ThreeDModal bp={curation3D.payload} onClose={() => setCuration3D(null)} />
      )}
      {curation3D?.kind === 'assembly' && (() => {
        const preview = assemblyPreviewFromCuration(curation3D);
        return (
          <AsmThreeDModal
            vehicle={preview.vehicle}
            schematic={preview.schematic}
            asmParts={preview.asmParts}
            onClose={() => setCuration3D(null)} />
        );
      })()}
      {scorecardModalRecord && (
        <EngineeringScorecardModal
          record={scorecardModalRecord}
          onClose={() => setScorecardModalRecord(null)} />
      )}

      {/* 헤더 */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline',
                    borderBottom:`2px solid ${C.frame}`, paddingBottom:10, marginBottom:16 }}>
        <div>
          <div className="mono" style={{ letterSpacing:'.14em', color:C.ink, fontSize:18 }}>
            BLUEPRINT_NPU · 설계 생성기
          </div>
            <div className="mono" style={{ fontSize:11, color:C.lox, marginTop:2 }}>
            schema_v6 · staged assembly pipeline · build 2026-05-16 design-pack-v30 · {activeModel || 'no model'}
            {' · '}
            <span style={{ color: PRESET_TREE[preset.cat]?.color || C.ink3 }}>
              {PRESET_TREE[preset.cat]?.label} / {PRESET_TREE[preset.cat]?.types[preset.type]?.label} / {PRESET_TREE[preset.cat]?.types[preset.type]?.configs[preset.conf]?.label}
            </span>
          </div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span className="mono" style={{ fontSize:11, color:ollamaOnline ? C.inter : C.risk }}>
            {ollamaOnline ? '● ollama online' : '✗ ollama offline'}
          </span>
          {running && <Btn size="sm" variant="risk" onClick={onStop}>■ stop</Btn>}
          {pipeStage > 0 && <Btn size="sm" onClick={onReset}>↺ reset</Btn>}
        </div>
      </div>

      {/* 모델 선택 */}
      {models.length > 0 && (
        <div style={{ border:`1px solid ${C.frame}`, padding:'10px 14px', background:C.canvas,
                      marginBottom:12, display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <Chip c={C.inter} style={{ marginRight:4 }}>MODEL</Chip>
          {models.map(m => (
            <Btn key={m.name} size="sm"
              variant={activeModel === m.name ? 'primary' : 'default'}
              onClick={() => setActiveModel(m.name)}
              disabled={running}>
              {m.name}
            </Btn>
          ))}
        </div>
      )}

      {/* 반복 실험 / 저장 메타 */}
      <div style={{ border:`1px solid ${C.frame}`, padding:'9px 14px', background:C.canvas,

        <label className="mono" style={{ fontSize:10, color:C.ink3 }}>
          seed
        </label>
        <input
          value={generationSeed}
          onChange={e => setGenerationSeed(e.target.value.replace(/[^\d-]/g, '').slice(0, 10))}
          disabled={running}
          style={{ width:92, ...INPUT_DARK_STYLE, padding:'5px 7px',
                   fontFamily:C.mono, fontSize:11 }} />
        <Btn size="sm" disabled={running} onClick={randomizeSeed}>↯ random seed</Btn>
        <label className="mono" style={{ fontSize:10, color:C.ink3 }}>
          repeat
        </label>
        <input
          value={batchCount}
          onChange={e => setBatchCount(Math.max(1, Math.min(12, Number(e.target.value) || 1)))}
          disabled={running}
          type="number"
          min="1"
          max="12"
          style={{ width:54, ...INPUT_DARK_STYLE, padding:'5px 7px',
                   fontFamily:C.mono, fontSize:11 }} />
        {runMeta && (
          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
            current · {runMeta.scope} · seed {runMeta.seed} · attempt {runMeta.attempt}
          </span>
        )}
        <span className="mono" style={{ fontSize:9, color:C.ink3 }}>
          seed를 바꾸면 다른 후보, 같은 seed는 재현용 · repeat는 assembly batch에 사용
        </span>
      </div>

      {/* 모드 토글: Single Part vs Full Assembly */}
      <div style={{ border:`1px solid ${C.frame}`, background:C.canvas, marginBottom:12,
                    display:'flex', alignItems:'stretch' }}>
        {[
          { k:'part',     label:'◇ Single Part',    desc:'독립 부품 · 3 variants 후 선택' },
          { k:'assembly', label:'◆ Full Assembly',  desc:'완성체 · 고정 BOM 서브시스템 합성' },
        ].map(m => {
          const on = mode === m.k;
          const disabled = running || asmStage === 1;
          return (
            <button key={m.k}

              style={{ flex:1, padding:'12px 16px', background: on ? 'rgba(159,211,255,0.08)' : 'transparent',
                       border:'none', borderBottom:`3px solid ${on ? C.lox : 'transparent'}`,
                       cursor:disabled?'not-allowed':'pointer', textAlign:'left',
                       transition:'all .15s' }}>
              <div className="mono" style={{ fontSize:13, color:on?C.lox:C.ink2, fontWeight:on?700:400,
                                              letterSpacing:'.04em' }}>
                {m.label}
              </div>
              <div className="mono" style={{ fontSize:10, color:C.ink3, marginTop:3, letterSpacing:'.03em' }}>
                {m.desc}
              </div>
            </button>
          );
        })}
      </div>

      {/* Preset — Single Part는 3단계, Full Assembly는 카테고리만 선택 */}

        setPreset(p);

          if (first) setVehicleId(first.id);

      }} disabled={running || asmStage === 1} mode={mode} />

      {/* ═══ ASSEMBLY MODE UI ═══ */}
      {mode === 'assembly' && (

            vehicleId={vehicleId}

          <div style={{ border:`1px solid ${asmStage===0 ? C.lox : C.frame}`,

                        display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <Chip c={C.lox}>FULL VEHICLE ASSEMBLY SYNTHESIS</Chip>
              <div className="mono" style={{ fontSize:10, color:C.ink3, marginTop:4 }}>
                {(() => {
                  const v = getVehicle(preset.cat, vehicleId);
                  if (!v) return 'vehicle template을 선택하세요';

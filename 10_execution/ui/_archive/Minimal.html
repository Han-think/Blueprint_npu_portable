                  const est = Math.round(totalParts * 1.5); // 부품당 약 1.5분 추정
                  return `${v.label} · ${totalParts}개 고정 BOM/서브시스템 · 예상 시간 ~${est}분 (모델 속도에 따라 변동)`;
                })()}
              </div>
            </div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {(asmStage === 1 || batchRunning) && (
                <Btn variant="risk" onClick={() => { stopRef.current = true; }}>■ stop</Btn>
              )}
              {asmStage === 2 && (
                <>
                  <Btn variant="warn" size="sm" onClick={downloadAssemblyBundle}>↓ bundle json</Btn>
                  <Btn variant="go" size="sm" onClick={() => addAssemblyToCuration('keep')}>✓ keep data</Btn>
                  <Btn size="sm" onClick={() => addAssemblyToCuration('candidate')}>＋ queue</Btn>
                  <Btn variant="primary" size="sm" onClick={() => document.getElementById('assembly-2d-schematic')?.scrollIntoView({ behavior:'smooth', block:'center' })}>▣ 2D 설계도</Btn>
                  <button onClick={() => setShow3DAsm(true)}
                    style={{ background:'transparent', border:`1px solid ${C.halo}`, color:C.halo,
                             fontFamily:'monospace', fontSize:11, padding:'5px 12px', cursor:'pointer',
                             letterSpacing:'.04em' }}>
                    🔲 3D 형상 보기
                  </button>
                </>
              )}
              <Btn variant="primary"
                onClick={() => runAssembly()}
                disabled={asmStage === 1 || batchRunning || !activeModel || !getVehicle(preset.cat, vehicleId)}>
                {asmStage === 0 ? '▶ generate assembly' :
                 asmStage === 1 ? '◐ running…' : '↺ regenerate'}
              </Btn>
              <Btn variant="warn"
                onClick={runAssemblyBatch}
                disabled={asmStage === 1 || batchRunning || !activeModel || !getVehicle(preset.cat, vehicleId)}>
                {batchRunning ? `◐ batch running…` : `↻ generate ×${Math.max(1, Math.min(12, Number(batchCount) || 1))}`}
              </Btn>
            </div>
          </div>

          {/* Blueprint Schematic — 항상 표시 (생성 전에도 차량 구조 파악 가능) */}
          <div id="assembly-2d-schematic">
            <VehicleSchematic
              vehicle={getVehicle(preset.cat, vehicleId)}
              schematic={VEHICLE_SCHEMATICS[vehicleId]}
              asmParts={asmParts}
              onPartClick={setAsmModalIdx}
            />
          </div>

          {/* Assembly Parts Grid — 상세 카드 목록 */}
          {getVehicle(preset.cat, vehicleId) && (() => {
            const vehicle = getVehicle(preset.cat, vehicleId);
            const detailParts = asmParts.length > 0 ? asmParts : vehicle.parts.map(p => ({
              ...p,
              status: 'pending',
              blueprint: null,
              validation: null,
              tokens: 0,
              stage: '',
              error: null,
            }));
            return (
              <div style={{ marginBottom:14 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
                  <Chip c={C.halo}>
                    SUBSYSTEM DETAIL · {detailParts.filter(p=>p.status==='done').length}/{detailParts.length} done
                  </Chip>
                  <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
                    {asmParts.length > 0 ? '완성된 서브시스템 클릭 → schema_v6 전체 보기' : '생성 전 서브시스템 이미지 검수'}
                  </span>
                </div>
                <div style={{ display:'grid',
                              gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:10 }}>
                  {detailParts.map((p, i) => (
                    <AssemblyPartCard key={p.id} part={p} idx={i} vehicleId={vehicleId} onView={setAsmModalIdx}/>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* Part-level Modal */}
          {asmModalIdx !== null && asmParts[asmModalIdx]?.blueprint && (
            <BlueprintModal
              bp={asmParts[asmModalIdx].blueprint}
              onClose={() => setAsmModalIdx(null)} />
          )}

          {/* 3D Assembly 뷰어 모달 */}
          {show3DAsm && (
            <AsmThreeDModal
              vehicle={getVehicle(preset.cat, vehicleId)}
              schematic={VEHICLE_SCHEMATICS[vehicleId]}
              asmParts={asmParts}
              onClose={() => setShow3DAsm(false)} />
          )}
        </>
      )}

      {/* ═══ SINGLE PART MODE UI (기존) ═══ */}
      {mode === 'part' && (<>

      {/* Brief 입력 */}
      <div style={{ border:`1px solid ${pipeStage === 0 ? C.lox : C.frame}`,
                    padding:16, background:C.canvas, marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
          <Chip c={C.lox}>DESIGN BRIEF</Chip>
          <span className="mono" style={{ fontSize:10, color:C.ink3 }}>
            설계 요청 입력 → schema_v6 JSON 3가지 변형안 생성
          </span>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:12, alignItems:'stretch' }}>
          <textarea
            value={brief}
            onChange={e => setBrief(e.target.value)}
            rows={3}
            disabled={pipeStage > 0}
            style={{ fontFamily:C.mono, fontSize:13, background:C.canvas2, color:C.ink,
                     border:`1px solid ${C.frame}`, padding:'10px 12px', borderRadius:2,
                     outline:'none', resize:'vertical', opacity:pipeStage > 0 ? 0.6 : 1 }}/>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <Btn variant="primary" onClick={onGenerate} disabled={!canGenerate}
              style={{ height:'100%', minWidth:120 }}>
              {pipeStage === 0 ? '▶ generate 3'
               : pipeStage === 1 ? '◐ stage 1…'
               : pipeStage === 2 ? '◎ pick variant'
               : pipeStage === 6 ? '✓ done'
               : '◐ building…'}
            </Btn>
          </div>
        </div>
        {!activeModel && !modelsLoading && (
          <div className="mono" style={{ fontSize:11, color:C.risk, marginTop:8 }}>
            ⚠ ollama 모델이 없습니다 — ollama pull qwen2.5:7b
          </div>
        )}
      </div>

      {/* Stage progress */}
      {pipeStage > 0 && <StageProgress stage={pipeStage} />}

      {/* Stage 1 variants */}
      {variants.length > 0 && (
        <div style={{ marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
            <Chip c={C.halo}>STAGE 1 · BRIEF + PART TREE · {variants.length}개 변형안</Chip>
            {pipeStage === 2 && (
              <span className="mono" style={{ fontSize:10, color:C.inter }}>
                ▶ 변형안 선택 → Stage 2-4 자동 진행
              </span>
            )}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
            {variants.map(v => (
              <VariantCard
                key={v.id}
                v={v}
                chosenId={chosenId}
                onChoose={onChoose}
                pickable={pipeStage === 2}
              />
            ))}
          </div>
        </div>
      )}

      {/* Blueprint 완성 결과 */}
      {pipeStage === 6 && blueprint && (
        <div style={{ border:`1.5px solid ${C.inter}`, padding:18,
                      background:C.canvas, marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start',
                        marginBottom:16 }}>
            <div>
              <div className="mono" style={{ fontSize:10, color:C.inter, letterSpacing:'.12em', marginBottom:6 }}>
                ✓ BLUEPRINT COMPLETE · SCHEMA_V6
              </div>
              <div style={{ fontFamily:C.sans, fontSize:22, color:C.ink, fontWeight:700, lineHeight:1.2 }}>
                {blueprint.object || blueprint.project || 'Design Output'}
              </div>
              <div className="mono" style={{ fontSize:11, color:C.ink3, marginTop:4 }}>
                {blueprint.brief?.constraints?.material}
                {blueprint.brief?.constraints?.process ? ` · ${blueprint.brief.constraints.process}` : ''}
                {blueprint.cad_brief?.rev ? ` · rev ${blueprint.cad_brief.rev}` : ''}
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:8, alignItems:'flex-end', flexShrink:0 }}>
              <Btn variant="primary" onClick={() => setBpModal(true)}>▣ 2D 보기</Btn>
              <Btn size="sm" onClick={() => setBpModal(true)}>↗ 전체 보기</Btn>
              <Btn size="sm" variant="warn" onClick={downloadJSON}>↓ download json</Btn>
              <Btn size="sm" variant="go" onClick={() => addCurrentBlueprintToCuration('keep')}>✓ aux keep</Btn>
              <Btn size="sm" onClick={() => addCurrentBlueprintToCuration('candidate')}>＋ aux queue</Btn>
              <Btn size="sm" onClick={onReset}>↺ new brief</Btn>
            </div>
          </div>

          <div className="mono" style={{ fontSize:10, color:C.lh2, marginBottom:12, lineHeight:1.5 }}>
            SINGLE PART 결과는 보조 참조(auxiliary)로만 저장됩니다. 기본 학습 후보는 Full Assembly bundle 안의 파트 설계입니다.
          </div>

          {/* 요약 그리드 */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8 }}>
            {[
              { k:'재료',      v:blueprint.brief?.constraints?.material },
              { k:'공정',      v:blueprint.brief?.constraints?.process  },
              { k:'파트 수',   v:flattenTree(blueprint.part_tree).length },
              { k:'형상 연산', v:(blueprint.geometry_ops||[]).length     },
              { k:'검증 항목', v:(blueprint.verify||[]).length           },
              { k:'리스크',    v:(blueprint.risk||[]).length             },
              { k:'레이어',    v:blueprint.print_profile?.layer_mm ? `${blueprint.print_profile.layer_mm}mm` : '—' },
              { k:'예상 시간', v:blueprint.print_profile?.est_time || '—' },
            ].map(({ k, v }) => (
              <div key={k}
                style={{ border:`1px solid ${C.frame}`, padding:'8px 10px', background:C.canvas2 }}>
                <div className="mono" style={{ fontSize:9, color:C.ink3, letterSpacing:'.08em' }}>{k}</div>
                <div className="mono" style={{ fontSize:14, color:C.lox, marginTop:4, fontWeight:700 }}>
                  {String(v ?? '—')}
                </div>
              </div>
            ))}
          </div>

          <div style={{ marginTop:14 }}>
            <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:8 }}>
              GENERATED OPS PROJECTION · TOP / FRONT / SIDE
            </div>
            <CoordinateAuditStrip bp={blueprint} />
            <GeneratedDesignThreeView2D bp={blueprint} compact />
            <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', margin:'12px 0 8px' }}>
              REFERENCE TARGET · NOT GENERATED OUTPUT
            </div>
            <BlueprintAssetReference bp={blueprint} compact />
            <div className="mono" style={{ fontSize:10, color:C.ink3, letterSpacing:'.1em', marginBottom:8 }}>
              STRUCTURE SUMMARY · 보조 확인
            </div>
            <BlueprintPlanPreview bp={blueprint} compact />
          </div>

          {/* 검증 요약 */}
          {(blueprint.verify || []).length > 0 && (
            <div style={{ marginTop:14, display:'flex', gap:6, flexWrap:'wrap' }}>
              {blueprint.verify.map((v, i) => {
                const c = { pass:C.inter, warn:C.lh2, fail:C.risk }[v.result] || C.ink3;
                return (
                  <span key={i} className="mono"
                    style={{ fontSize:9, padding:'3px 8px', border:`1px solid ${c}`, color:c }}>
                    {v.result === 'pass' ? '✓' : v.result === 'warn' ? '⚠' : '✗'} {v.check}
                  </span>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Manual Curation Queue */}
      <div style={{ border:`1px solid ${curationQueue.some(r=>r.decision==='keep') ? C.inter : C.frame}`,
                    background:C.canvas, padding:14, marginBottom:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:10 }}>
          <div>
            <Chip c={C.inter}>CURATION QUEUE</Chip>
            <span className="mono" style={{ fontSize:10, color:C.ink3, marginLeft:10 }}>
              후보 {curationQueue.length} · assembly {curationQueue.filter(r=>r.kind==='assembly').length} · aux {curationQueue.filter(r=>r.kind==='single_part').length} · 선택 {selectedCurationIds.length} · keep {curationQueue.filter(r=>r.decision==='keep').length} · reject {curationQueue.filter(r=>r.decision==='reject').length}
            </span>
          </div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            <Btn size="sm" disabled={curationQueue.length===0} onClick={selectAllCuration}>
              select all
            </Btn>
            <Btn size="sm" disabled={selectedCurationIds.length===0} onClick={clearCurationSelection}>
              select none
            </Btn>
            <Btn size="sm" variant="go" disabled={selectedCurationIds.length===0} onClick={() => bulkCurationDecision('keep')}>
              ✓ selected keep
            </Btn>
            <Btn size="sm" variant="risk" disabled={selectedCurationIds.length===0} onClick={() => bulkCurationDecision('reject')}>
              ✗ selected reject
            </Btn>
            <Btn size="sm" variant="warn" disabled={selectedCurationIds.length===0} onClick={downloadSelectedCurationJSONL}>
              ↓ selected jsonl
            </Btn>
            <Btn size="sm" variant="go" disabled={!curationQueue.some(r=>r.kind==='assembly' && r.decision==='keep')} onClick={() => downloadCurationJSONL(true)}>
              ↓ kept assembly
            </Btn>
            <Btn size="sm" disabled={!curationQueue.some(r=>r.kind==='single_part')} onClick={downloadAuxiliarySinglePartJSONL}>
              ↓ aux parts
            </Btn>
            <Btn size="sm" variant="warn" disabled={curationQueue.length===0} onClick={() => downloadCurationJSONL(false)}>
              ↓ all jsonl
            </Btn>
            <Btn size="sm" disabled={curationQueue.length===0} onClick={() => { setCurationQueue([]); setSelectedCurationIds([]); setCuration3D(null); setScorecardModalRecord(null); }}>
              clear
            </Btn>
          </div>
        </div>

        {curationQueue.length === 0 ? (
          <div className="mono" style={{ fontSize:11, color:C.ink3, padding:'8px 0' }}>
            생성 결과에서 `keep data` 또는 `queue`를 눌러 후보를 쌓으세요. 좋은 출력만 kept JSONL로 뽑아 학습 데이터에 넣습니다.
          </div>
        ) : (
          <div style={{ display:'grid', gap:8 }}>
            {curationQueue.slice(0, 12).map(r => {
              const col = r.decision === 'keep' ? C.inter : r.decision === 'reject' ? C.risk : C.lh2;
              const eng = r.engineering_scorecard || engineeringScorecardForCurationRecord(r);
              const engCol = eng?.verdict === 'keep_candidate' ? C.inter : eng?.verdict === 'review' ? C.lh2 : C.risk;
              return (
                <div key={r.id} style={{ border:`1px solid ${col}`, background:C.canvas2, padding:10,
                                          display:'grid', gridTemplateColumns:'auto 1fr auto', gap:10, alignItems:'center' }}>
                  <input
                    type="checkbox"
                    checked={selectedCurationIds.includes(r.id)}
                    onChange={() => toggleCurationSelected(r.id)}
                    style={{ width:16, height:16, accentColor:col }} />
                  <div>
                    <div className="mono" style={{ fontSize:11, color:C.ink }}>
                      {r.kind.toUpperCase()} · {r.kind === 'assembly' ? 'PRIMARY' : 'AUX'} · {r.title || r.id}
                    </div>
                    <div className="mono" style={{ fontSize:9.5, color:C.ink3, marginTop:3 }}>
                      {r.model || 'no model'} · {r.ts} · {r.decision}
                      {r.done_parts ? ` · ${r.done_parts}/${r.total_parts} parts` : ''}
                      {r.run_meta?.seed ? ` · seed ${r.run_meta.seed} · attempt ${r.run_meta.attempt}` : ''}
                    </div>
                    {eng && (
                      <div className="mono" style={{ fontSize:9.5, color:engCol, marginTop:5, lineHeight:1.45 }}>
                        ENGINEERING SCORE {eng.score}/100 · {eng.verdict}
                        {eng.findings?.length ? ` · ${eng.findings.slice(0, 2).join(' / ')}` : ''}
                      </div>
                    )}
                    <input
                      value={r.note}
                      onChange={e => updateCuration(r.id, { note:e.target.value })}
                      placeholder="선별 메모: 왜 keep/reject인지 기록"
                      style={{ marginTop:7, width:'100%', boxSizing:'border-box', background:C.canvas3, color:C.ink2,
                               border:`1px solid ${C.frame}`, padding:'5px 7px', fontFamily:C.mono, fontSize:10 }} />
                  </div>
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'flex-end' }}>
                    <Btn size="sm" variant="primary" onClick={() => viewCuration3D(r)}>3D</Btn>
                    <Btn size="sm" variant="warn" onClick={() => setScorecardModalRecord(r)}>score</Btn>
                    <Btn size="sm" variant="primary" disabled={running} onClick={() => runImprovementLoop(r)}>loop</Btn>
                    <Btn size="sm" variant="go" onClick={() => updateCuration(r.id, { decision:'keep' })}>keep</Btn>
                    <Btn size="sm" variant="risk" onClick={() => updateCuration(r.id, { decision:'reject' })}>reject</Btn>
                    <Btn size="sm" onClick={() => updateCuration(r.id, { decision:'candidate' })}>hold</Btn>
                    <Btn size="sm" variant="warn" onClick={() => downloadCurationRecordJSON(r)}>json</Btn>
                    <Btn size="sm" onClick={() => removeCuration(r.id)}>remove</Btn>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      </>)}
      {/* ═══ end SINGLE PART MODE ═══ */}

      {mode === 'assembly' && (
        <div style={{ border:`1px solid ${curationQueue.some(r=>r.decision==='keep') ? C.inter : C.frame}`,
                      background:C.canvas, padding:14, marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginBottom:10 }}>
            <div>
              <Chip c={C.inter}>CURATION QUEUE</Chip>
              <span className="mono" style={{ fontSize:10, color:C.ink3, marginLeft:10 }}>
                후보 {curationQueue.length} · assembly {curationQueue.filter(r=>r.kind==='assembly').length} · aux {curationQueue.filter(r=>r.kind==='single_part').length} · 선택 {selectedCurationIds.length} · keep {curationQueue.filter(r=>r.decision==='keep').length} · reject {curationQueue.filter(r=>r.decision==='reject').length}
              </span>
            </div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              <Btn size="sm" disabled={curationQueue.length===0} onClick={selectAllCuration}>
                select all
              </Btn>
              <Btn size="sm" disabled={selectedCurationIds.length===0} onClick={clearCurationSelection}>
                select none
              </Btn>
              <Btn size="sm" variant="go" disabled={selectedCurationIds.length===0} onClick={() => bulkCurationDecision('keep')}>
                ✓ selected keep
              </Btn>
              <Btn size="sm" variant="risk" disabled={selectedCurationIds.length===0} onClick={() => bulkCurationDecision('reject')}>
                ✗ selected reject
              </Btn>
              <Btn size="sm" variant="warn" disabled={selectedCurationIds.length===0} onClick={downloadSelectedCurationJSONL}>
                ↓ selected jsonl
              </Btn>
              <Btn size="sm" variant="go" disabled={!curationQueue.some(r=>r.kind==='assembly' && r.decision==='keep')} onClick={() => downloadCurationJSONL(true)}>
                ↓ kept assembly
              </Btn>
              <Btn size="sm" disabled={!curationQueue.some(r=>r.kind==='single_part')} onClick={downloadAuxiliarySinglePartJSONL}>
                ↓ aux parts
              </Btn>
              <Btn size="sm" variant="warn" disabled={curationQueue.length===0} onClick={() => downloadCurationJSONL(false)}>
                ↓ all jsonl
              </Btn>
              <Btn size="sm" disabled={curationQueue.length===0} onClick={() => { setCurationQueue([]); setSelectedCurationIds([]); setCuration3D(null); setScorecardModalRecord(null); }}>
                clear
              </Btn>
            </div>
          </div>

          {curationQueue.length === 0 ? (
            <div className="mono" style={{ fontSize:11, color:C.ink3, padding:'8px 0' }}>
              Assembly 생성 후 `keep data` 또는 `queue`를 눌러 후보를 쌓으세요. 좋은 출력만 kept JSONL로 뽑아 학습 데이터에 넣습니다.
            </div>
          ) : (
            <div style={{ display:'grid', gap:8 }}>
              {curationQueue.slice(0, 12).map(r => {
                const col = r.decision === 'keep' ? C.inter : r.decision === 'reject' ? C.risk : C.lh2;
                const eng = r.engineering_scorecard || engineeringScorecardForCurationRecord(r);
                const engCol = eng?.verdict === 'keep_candidate' ? C.inter : eng?.verdict === 'review' ? C.lh2 : C.risk;
                return (
                  <div key={r.id} style={{ border:`1px solid ${col}`, background:C.canvas2, padding:10,
                                            display:'grid', gridTemplateColumns:'auto 1fr auto', gap:10, alignItems:'center' }}>
                    <input
                      type="checkbox"
                      checked={selectedCurationIds.includes(r.id)}
                      onChange={() => toggleCurationSelected(r.id)}
                      style={{ width:16, height:16, accentColor:col }} />
                    <div>
                      <div className="mono" style={{ fontSize:11, color:C.ink }}>
                        {r.kind.toUpperCase()} · {r.kind === 'assembly' ? 'PRIMARY' : 'AUX'} · {r.title || r.id}
                      </div>
                      <div className="mono" style={{ fontSize:9.5, color:C.ink3, marginTop:3 }}>
                        {r.model || 'no model'} · {r.ts} · {r.decision}
                        {r.done_parts ? ` · ${r.done_parts}/${r.total_parts} parts` : ''}
                        {r.run_meta?.seed ? ` · seed ${r.run_meta.seed} · attempt ${r.run_meta.attempt}` : ''}
                      </div>
                      {eng && (
                        <div className="mono" style={{ fontSize:9.5, color:engCol, marginTop:5, lineHeight:1.45 }}>
                          ENGINEERING SCORE {eng.score}/100 · {eng.verdict}
                          {eng.findings?.length ? ` · ${eng.findings.slice(0, 2).join(' / ')}` : ''}
                        </div>
                      )}
                      <input
                        value={r.note}
                        onChange={e => updateCuration(r.id, { note:e.target.value })}
                        placeholder="선별 메모: 왜 keep/reject인지 기록"
                        style={{ marginTop:7, width:'100%', boxSizing:'border-box', background:C.canvas3, color:C.ink2,
                                 border:`1px solid ${C.frame}`, padding:'5px 7px', fontFamily:C.mono, fontSize:10 }} />
                    </div>
                    <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'flex-end' }}>
                      <Btn size="sm" variant="primary" onClick={() => viewCuration3D(r)}>3D</Btn>
                      <Btn size="sm" variant="warn" onClick={() => setScorecardModalRecord(r)}>score</Btn>
                      <Btn size="sm" variant="primary" disabled={running} onClick={() => runImprovementLoop(r)}>loop</Btn>
                      <Btn size="sm" variant="go" onClick={() => updateCuration(r.id, { decision:'keep' })}>keep</Btn>
                      <Btn size="sm" variant="risk" onClick={() => updateCuration(r.id, { decision:'reject' })}>reject</Btn>
                      <Btn size="sm" onClick={() => updateCuration(r.id, { decision:'candidate' })}>hold</Btn>
                      <Btn size="sm" variant="warn" onClick={() => downloadCurationRecordJSON(r)}>json</Btn>
                      <Btn size="sm" onClick={() => removeCuration(r.id)}>remove</Btn>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Terminal */}
      <Terminal lines={term} running={running} />

      {/* 푸터 */}
      <div style={{ borderTop:`1px solid ${C.frame}`, marginTop:14, paddingTop:10,
                    fontFamily:C.mono, fontSize:10, color:C.ink3, letterSpacing:'.05em',
                    display:'flex', justifyContent:'space-between' }}>
        <span>schema_v6 · brief → 3 variants → pick → geometry → verify → print → json</span>
        <span>ollama {ollamaOnline ? 'online' : 'offline'} · :11434</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

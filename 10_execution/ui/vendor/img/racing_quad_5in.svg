<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
<rect width="600" height="600" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">TOP VIEW</text>

<!-- Arms (carbon fiber tubes) -->
<!-- NW arm -->
<polygon points="222,228 242,248 108,114 88,134" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- NE arm -->
<polygon points="358,248 378,228 492,114 472,134" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- SE arm -->
<polygon points="378,352 358,372 472,486 492,466" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- SW arm -->
<polygon points="242,352 222,372 108,466 88,486" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Arm center lines -->
<line x1="232" y1="238" x2="98"  y2="124" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,4"/>
<line x1="368" y1="238" x2="482" y2="124" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,4"/>
<line x1="368" y1="362" x2="482" y2="476" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,4"/>
<line x1="232" y1="362" x2="98"  y2="476" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,4"/>

<!-- Motors + prop discs (4 corners) -->
<!-- NW motor -->
<circle cx="120" cy="120" r="76" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.8" stroke-dasharray="5,5"/>
<circle cx="120" cy="120" r="40" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<circle cx="120" cy="120" r="24" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="120" cy="120" r="7"  fill="rgba(100,160,240,0.5)"/>
<!-- Motor bolt pattern -->
<circle cx="106" cy="106" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="134" cy="106" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="106" cy="134" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="134" cy="134" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<!-- NE motor -->
<circle cx="480" cy="120" r="76" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.8" stroke-dasharray="5,5"/>
<circle cx="480" cy="120" r="40" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<circle cx="480" cy="120" r="24" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="480" cy="120" r="7"  fill="rgba(100,160,240,0.5)"/>
<circle cx="466" cy="106" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="494" cy="106" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="466" cy="134" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="494" cy="134" r="3" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<!-- SE motor -->
<circle cx="480" cy="480" r="76" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.8" stroke-dasharray="5,5"/>
<circle cx="480" cy="480" r="40" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<circle cx="480" cy="480" r="24" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="480" cy="480" r="7"  fill="rgba(100,160,240,0.5)"/>
<!-- SW motor -->
<circle cx="120" cy="480" r="76" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.8" stroke-dasharray="5,5"/>
<circle cx="120" cy="480" r="40" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<circle cx="120" cy="480" r="24" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="120" cy="480" r="7"  fill="rgba(100,160,240,0.5)"/>

<!-- Frame plates (top + bottom) -->
<rect x="222" y="222" width="156" height="80" rx="4" fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<rect x="222" y="298" width="156" height="78" rx="4" fill="#081c30" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Mounting holes grid -->
<circle cx="242" cy="238" r="4" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="358" cy="238" r="4" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="242" cy="300" r="4" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="358" cy="300" r="4" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

<!-- FC/ESC stack (center) -->
<rect x="250" y="248" width="100" height="100" rx="3" fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<rect x="264" y="262" width="72"  height="72"  rx="2" fill="#07182a" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<!-- PCB detail -->
<line x1="264" y1="298" x2="336" y2="298" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<rect x="272" y="270" width="24" height="16" rx="1" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<rect x="304" y="270" width="24" height="16" rx="1" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>

<!-- Camera (front center) -->
<rect x="240" y="160" width="120" height="58" rx="4" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<circle cx="300" cy="189" r="20" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="300" cy="189" r="11" fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="300" cy="189" r="5"  fill="rgba(100,160,240,0.08)"/>

<!-- Battery (rear underside) -->
<rect x="196" y="462" width="208" height="66" rx="5"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1" stroke-dasharray="5,4"/>
<line x1="196" y1="495" x2="404" y2="495" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<rect x="386" y="478" width="18"  height="20" rx="2" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Centerlines -->
<line x1="300" y1="60" x2="300" y2="540" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="8,6"/>
<line x1="60"  y1="300" x2="540" y2="300" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="8,6"/>

<!-- Diagonals (wheelbase) -->
<line x1="120" y1="120" x2="480" y2="480" stroke="rgba(100,160,240,0.1)" stroke-width="0.4" stroke-dasharray="6,6"/>
<line x1="480" y1="120" x2="120" y2="480" stroke="rgba(100,160,240,0.1)" stroke-width="0.4" stroke-dasharray="6,6"/>

<!-- FRONT indicator -->
<polygon points="300,88 316,108 284,108" fill="rgba(100,160,240,0.35)" stroke="none"/>
<text x="300" y="78" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.45)" text-anchor="middle">FRONT</text>

</svg>

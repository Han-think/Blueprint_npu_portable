<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
<rect width="700" height="380" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW</text>

<!-- Rocker-bogie suspension arms -->
<!-- Left rocker arm -->
<path d="M 200,186 C 185,200 168,218 152,232 L 148,258 L 200,254 Z"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<!-- Left bogie arm -->
<path d="M 152,232 C 136,240 116,252 98,262 L 98,280 L 152,258 Z"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<!-- Bogie pivot -->
<circle cx="152" cy="244" r="7" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>

<!-- Right rocker arm (mirrored, show as background) -->
<path d="M 500,186 C 515,200 532,218 548,232 L 552,258 L 500,254 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.9" stroke-dasharray="4,3"/>

<!-- WHEELS (6-wheel drive, 3 visible left side) -->
<!-- Front left wheel -->
<circle cx="98" cy="290" r="32" fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<circle cx="98" cy="290" r="22" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<!-- Wheel spokes -->
<line x1="98" y1="258" x2="98" y2="322" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="66"  y1="290" x2="130" y2="290" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="75"  y1="267" x2="121" y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<line x1="121" y1="267" x2="75"  y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<circle cx="98" cy="290" r="6"  fill="rgba(100,160,240,0.3)"/>
<!-- Cleats (grouser) pattern -->
<circle cx="98" cy="290" r="30" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="2.5" stroke-dasharray="6,6"/>

<!-- Middle left wheel -->
<circle cx="256" cy="290" r="32" fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<circle cx="256" cy="290" r="22" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<line x1="256" y1="258" x2="256" y2="322" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="224" y1="290" x2="288" y2="290" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="233" y1="267" x2="279" y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<line x1="279" y1="267" x2="233" y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<circle cx="256" cy="290" r="6"  fill="rgba(100,160,240,0.3)"/>
<circle cx="256" cy="290" r="30" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="2.5" stroke-dasharray="6,6"/>

<!-- Rear left wheel -->
<circle cx="414" cy="290" r="32" fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<circle cx="414" cy="290" r="22" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<line x1="414" y1="258" x2="414" y2="322" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="382" y1="290" x2="446" y2="290" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="391" y1="267" x2="437" y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<line x1="437" y1="267" x2="391" y2="313" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<circle cx="414" cy="290" r="6"  fill="rgba(100,160,240,0.3)"/>
<circle cx="414" cy="290" r="30" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="2.5" stroke-dasharray="6,6"/>

<!-- Steering actuators (front and rear) -->
<circle cx="98"  cy="258" r="14" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="414" cy="258" r="14" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>

<!-- Main body chassis (warm electronics box) -->
<rect x="196" y="118" width="308" height="136" rx="5"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Chassis internal panels -->
<line x1="196" y1="186" x2="504" y2="186" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="302" y1="118" x2="302" y2="254" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,3"/>
<!-- Thermal radiator panel hints -->
<rect x="206" y="128" width="88" height="52" rx="2" fill="rgba(100,160,240,0.04)" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>
<rect x="314" y="128" width="88" height="52" rx="2" fill="rgba(100,160,240,0.04)" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>

<!-- Solar array panel (on top) -->
<rect x="168" y="80" width="368" height="40" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Solar cells grid -->
<line x1="192" y1="80" x2="192" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="240" y1="80" x2="240" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="288" y1="80" x2="288" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="336" y1="80" x2="336" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="384" y1="80" x2="384" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="432" y1="80" x2="432" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="480" y1="80" x2="480" y2="120" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="168" y1="100" x2="536" y2="100" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>

<!-- Camera mast (remote sensing) -->
<rect x="288" y="46" width="20" height="76" rx="2"
  fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<!-- Camera head -->
<circle cx="298" cy="44" rx="22" ry="22" fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.2">
</circle>
<circle cx="298" cy="44" r="22" fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.2"/>
<circle cx="298" cy="44" r="10" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Stereo cameras -->
<circle cx="290" cy="40" r="5" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>
<circle cx="306" cy="40" r="5" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>

<!-- HGA dish (high gain antenna) -->
<path d="M 390,44 Q 418,60 446,44 L 440,82 L 396,82 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<line x1="418" y1="52" x2="418" y2="118" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="418" cy="60" r="7" fill="rgba(100,160,240,0.3)"/>
<!-- Dish struts -->
<line x1="396" y1="82" x2="418" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="440" y1="82" x2="418" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Robotic arm (deployed forward) -->
<path d="M 196,136 L 82,136 L 76,150 L 82,164 L 196,154"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Arm joints -->
<circle cx="196" cy="145" r="12" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="140" cy="150" r="9"  fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- Tool head -->
<rect x="60" y="136" width="22" height="28" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>

<!-- Wheel connection struts -->
<line x1="98"  y1="258" x2="98"  y2="232" stroke="rgba(100,160,240,0.35)" stroke-width="0.8"/>
<line x1="256" y1="258" x2="256" y2="254" stroke="rgba(100,160,240,0.35)" stroke-width="0.8"/>
<line x1="414" y1="258" x2="414" y2="254" stroke="rgba(100,160,240,0.35)" stroke-width="0.8"/>

</svg>

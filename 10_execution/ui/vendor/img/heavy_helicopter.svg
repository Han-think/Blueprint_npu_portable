<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
<rect width="680" height="380" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW</text>

<!-- Coaxial rotor blades (upper) -->
<rect x="82" y="56" width="456" height="14" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<line x1="82"  y1="63" x2="538" y2="63" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Blade airfoil hints -->
<line x1="140" y1="56" x2="160" y2="70" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="240" y1="56" x2="260" y2="70" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="340" y1="56" x2="360" y2="70" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="440" y1="56" x2="460" y2="70" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Lower coaxial rotor -->
<rect x="102" y="78" width="418" height="12" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.9" stroke-dasharray="6,4"/>

<!-- Rotor mast -->
<rect x="298" y="88" width="24" height="62" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<!-- Gearbox housing -->
<path d="M 250,90 L 370,90 L 378,150 L 242,150 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<line x1="250" y1="120" x2="370" y2="120" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Engine pods (left and right, above cabin) -->
<path d="M 156,112 C 156,104 164,100 178,100 L 252,100 C 264,100 268,104 268,112 L 268,152 C 268,158 264,160 252,160 L 178,160 C 164,160 156,158 156,152 Z"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<ellipse cx="158" cy="132" rx="10" ry="28" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<path d="M 366,112 C 366,104 374,100 388,100 L 462,100 C 474,100 478,104 478,112 L 478,152 C 478,158 474,160 462,160 L 388,160 C 374,160 366,158 366,152 Z"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<ellipse cx="368" cy="132" rx="10" ry="28" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Main cabin (large, boxy helicopter body) -->
<path d="M 88,150 C 96,148 108,148 128,148
         L 128,264
         L 478,264
         Q 516,264 522,242
         L 524,148
         Q 540,148 558,148
         L 624,150
         C 624,180 610,190 580,190
         L 524,190
         Q 518,264 478,280
         L 128,280
         Q 96,280 88,260 Z"
  fill="#050d18" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Fuselage proper outline -->
<path d="M 88,150 L 128,148 L 128,264 L 478,264 L 522,148 L 624,150 L 624,184 L 522,184 L 478,280 L 128,280 L 88,210 Z"
  fill="#081c32" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Cockpit nose (blunt, helicopter-style) -->
<path d="M 88,150 L 128,148 L 128,280 L 88,210 Z"
  fill="#0b2440" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Cockpit windows (large, slanted) -->
<polygon points="94,156 126,150 126,210 94,204"
  fill="#0a3050" stroke="rgba(100,160,240,0.7)" stroke-width="1.1"/>
<line x1="110" y1="150" x2="110" y2="210" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Cabin windows -->
<rect x="144" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="188" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="232" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="276" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="320" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="364" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="408" y="166" width="30" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<rect x="452" y="166" width="22" height="22" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>

<!-- Rear ramp line -->
<line x1="478" y1="264" x2="478" y2="280" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>

<!-- Tail boom (boom structure left side) -->
<path d="M 522,148 L 622,150 L 624,184 L 522,184 Z"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<line x1="555" y1="148" x2="555" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="588" y1="148" x2="588" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Horizontal stabilizer on tail -->
<polygon points="572,146 638,144 638,158 572,160"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Tail rotor (anti-torque) -->
<circle cx="622" cy="150" r="10" fill="#050d18" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<line x1="622" y1="118" x2="622" y2="182" stroke="rgba(100,160,240,0.5)" stroke-width="1.3"/>
<line x1="606" y1="134" x2="638" y2="166" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>

<!-- Landing gear (sponson type) -->
<!-- Forward gear -->
<line x1="158" y1="280" x2="146" y2="322" stroke="rgba(100,160,240,0.55)" stroke-width="1.3"/>
<line x1="206" y1="280" x2="220" y2="322" stroke="rgba(100,160,240,0.55)" stroke-width="1.3"/>
<line x1="140" y1="322" x2="228" y2="322" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Aft gear -->
<line x1="400" y1="280" x2="388" y2="322" stroke="rgba(100,160,240,0.55)" stroke-width="1.3"/>
<line x1="450" y1="280" x2="464" y2="322" stroke="rgba(100,160,240,0.55)" stroke-width="1.3"/>
<line x1="382" y1="322" x2="470" y2="322" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Rotor disc reference circle (dashed) -->
<ellipse cx="310" cy="63" rx="240" ry="22" fill="none" stroke="rgba(100,160,240,0.1)" stroke-width="0.6" stroke-dasharray="6,5"/>

</svg>

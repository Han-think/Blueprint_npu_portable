<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
<rect width="700" height="300" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">TOP VIEW · FLYING WING</text>

<!-- Wing planform (flying wing / blended body delta) -->
<path d="M 350,38
         C 330,50 260,80 180,118
         C 130,140 90,158 90,168
         L 90,192
         C 90,200 130,212 180,220
         C 260,234 330,248 350,252
         C 370,248 440,234 520,220
         C 570,212 610,200 610,192
         L 610,168
         C 610,158 570,140 520,118
         C 440,80 370,50 350,38 Z"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Wing rib stations -->
<line x1="350" y1="38"  x2="350" y2="252" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="4,4"/>
<line x1="270" y1="68"  x2="270" y2="238" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="190" y1="116" x2="190" y2="222" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="430" y1="68"  x2="430" y2="238" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<line x1="510" y1="116" x2="510" y2="222" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<!-- Spar (structural) -->
<line x1="90" y1="180" x2="610" y2="180" stroke="rgba(100,160,240,0.35)" stroke-width="0.9" stroke-dasharray="5,3"/>

<!-- Elevons (trailing edge control surfaces) -->
<path d="M 90,192 C 130,212 180,220 220,224 L 220,240 C 180,236 130,228 90,212 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<path d="M 480,224 C 520,220 570,212 610,192 L 610,212 C 570,228 520,236 480,240 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<!-- Elevon hinge lines -->
<line x1="90"  y1="202" x2="220" y2="228" stroke="rgba(100,160,240,0.3)" stroke-width="0.6" stroke-dasharray="3,3"/>
<line x1="480" y1="228" x2="610" y2="202" stroke="rgba(100,160,240,0.3)" stroke-width="0.6" stroke-dasharray="3,3"/>

<!-- Center pod (fuselage blister) -->
<ellipse cx="350" cy="150" rx="64" ry="86"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<!-- Pod frame lines -->
<ellipse cx="350" cy="150" rx="48" ry="64"
  fill="#050d18" stroke="rgba(100,160,240,0.3)" stroke-width="0.6" stroke-dasharray="3,4"/>

<!-- Camera bay (forward in pod) -->
<ellipse cx="350" cy="108" rx="24" ry="18"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="350" cy="108" r="10" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="350" cy="108" r="5"  fill="rgba(100,160,240,0.06)"/>

<!-- Pusher motor (rear of pod) -->
<circle cx="350" cy="88" r="30" fill="#07182a" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<circle cx="350" cy="88" r="16" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="350" cy="88" r="6"  fill="rgba(100,160,240,0.4)"/>
<!-- Prop disc -->
<circle cx="350" cy="88" r="56" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.7" stroke-dasharray="5,5"/>

<!-- Battery bay (inside pod) -->
<rect x="314" y="155" width="72" height="36" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9" stroke-dasharray="4,3"/>
<line x1="314" y1="173" x2="386" y2="173" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>

<!-- GPS on boom (front) -->
<circle cx="350" cy="52" r="14" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="350" cy="52" r="6"  fill="rgba(100,160,240,0.3)"/>
<line x1="350" y1="66" x2="350" y2="86" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Wingtip fins (vertical, shown in top view as rectangles) -->
<rect x="84"  y="164" width="8"  height="28" rx="2" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<rect x="608" y="164" width="8"  height="28" rx="2" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>

<!-- Telemetry antenna (VHF/LRS) -->
<line x1="544" y1="195" x2="572" y2="215" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<circle cx="572" cy="218" r="5" fill="rgba(100,160,240,0.2)" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>

<!-- FRONT indicator -->
<polygon points="350,30 366,50 334,50" fill="rgba(100,160,240,0.35)"/>
<text x="350" y="20" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.45)" text-anchor="middle">NOSE (CAMERA)</text>

<!-- Dimension span line -->
<line x1="90" y1="268" x2="610" y2="268" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="90"  y1="264" x2="90"  y2="272" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="610" y1="264" x2="610" y2="272" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<text x="350" y="280" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.35)" text-anchor="middle">WINGSPAN</text>

</svg>

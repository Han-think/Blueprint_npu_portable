<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#050d18"/>
  <defs>
    <pattern id="fine" width="21" height="21" patternUnits="userSpaceOnUse">
      <path d="M 21 0 L 0 0 0 21" fill="none" stroke="rgba(39,74,121,.08)" stroke-width=".4"/>
    </pattern>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="rgba(39,74,121,.16)" stroke-width=".55"/>
    </pattern>
    <style>
      .skin{fill:#081c30;stroke:rgba(100,160,240,.76);stroke-width:1.35;vector-effect:non-scaling-stroke}
      .panel{fill:rgba(100,160,240,.035);stroke:rgba(100,160,240,.36);stroke-width:.9;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}
      .glass{fill:rgba(100,160,240,.055);stroke:rgba(100,160,240,.38);stroke-width:.9;vector-effect:non-scaling-stroke}
      .rotor{fill:#061625;stroke:rgba(100,160,240,.58);stroke-width:1.15;vector-effect:non-scaling-stroke}
      .nozzle{fill:#050d18;stroke:rgba(137,255,168,.48);stroke-width:1;vector-effect:non-scaling-stroke}
      .major{fill:none;stroke:rgba(100,160,240,.48);stroke-width:1.15;vector-effect:non-scaling-stroke}
      .minor,.minor *{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.75;vector-effect:non-scaling-stroke}
      .ghost{opacity:.18}
      .system{stroke-width:.9;vector-effect:non-scaling-stroke}
      .flow{fill:none;stroke:rgba(137,255,168,.22);stroke-width:.8;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}
      .lead{fill:none;stroke:rgba(159,211,255,.25);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}
      .title{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.26em;fill:rgba(159,211,255,.64)}
      .label{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6.1px;letter-spacing:.06em;fill:rgba(230,236,245,.64)}
      .micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.14em;fill:rgba(100,160,240,.34)}
      .dim{fill:none;stroke:rgba(100,160,240,.18);stroke-width:.55;vector-effect:non-scaling-stroke}
    </style>
  </defs>
  <rect width="500" height="500" fill="url(#fine)"/>
  <rect width="500" height="500" fill="url(#grid)"/>
  <text x="18" y="20" class="title">EXTERIOR AXIS · ION THRUSTER ASSY</text>
  <text x="18" y="34" class="micro">Cross-Section (Side) · FORM / SILHOUETTE / REFERENCE PROPORTION</text>
  <line x1="250" y1="42" x2="250" y2="466" class="dim" stroke-dasharray="8 6"/>
  <g transform="scale(0.71429 1.19048)"><ellipse cx="350" cy="210" rx="150" ry="150" class="skin"/><ellipse cx="350" cy="210" rx="104" ry="104" class="panel"/><ellipse cx="350" cy="210" rx="86" ry="42" class="nozzle"/><g class="minor"><line x1="402.0" y1="210.0" x2="510.0" y2="210.0"/><line x1="398.9" y1="218.6" x2="500.4" y2="235.7"/><line x1="389.8" y1="226.1" x2="472.6" y2="258.2"/><line x1="376.0" y1="231.7" x2="430.0" y2="275.0"/><line x1="359.0" y1="234.6" x2="377.8" y2="283.9"/><line x1="341.0" y1="234.6" x2="322.2" y2="283.9"/><line x1="324.0" y1="231.7" x2="270.0" y2="275.0"/><line x1="310.2" y1="226.1" x2="227.4" y2="258.2"/><line x1="301.1" y1="218.6" x2="199.6" y2="235.7"/><line x1="298.0" y1="210.0" x2="190.0" y2="210.0"/><line x1="301.1" y1="201.4" x2="199.6" y2="184.3"/><line x1="310.2" y1="193.9" x2="227.4" y2="161.8"/><line x1="324.0" y1="188.3" x2="270.0" y2="145.0"/><line x1="341.0" y1="185.4" x2="322.2" y2="136.1"/><line x1="359.0" y1="185.4" x2="377.8" y2="136.1"/><line x1="376.0" y1="188.3" x2="430.0" y2="145.0"/><line x1="389.8" y1="193.9" x2="472.6" y2="161.8"/><line x1="398.9" y1="201.4" x2="500.4" y2="184.3"/></g></g>
  <text x="250" y="488" text-anchor="middle" class="micro">AXIS 1 OF 3 · EXTERIOR RECOGNITION</text>
</svg>

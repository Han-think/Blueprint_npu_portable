<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
<rect width="500" height="600" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW · 6-DOF ARM</text>

<!-- Base pedestal -->
<rect x="156" y="492" width="188" height="76" rx="5"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Base mounting holes -->
<circle cx="180" cy="540" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="250" cy="540" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="320" cy="540" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<!-- Base top plate -->
<rect x="166" y="484" width="168" height="16" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>

<!-- J1 — Base Rotation (top of base, shown as circle) -->
<circle cx="250" cy="484" r="20" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="250" cy="484" r="10" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<line x1="230" y1="484" x2="270" y2="484" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="250" y1="464" x2="250" y2="504" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Base-to-J2 column -->
<rect x="236" y="434" width="28" height="52" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>

<!-- J2 — Shoulder (large joint) -->
<circle cx="250" cy="428" r="40" fill="#081c30" stroke="rgba(100,160,240,0.75)" stroke-width="1.6"/>
<circle cx="250" cy="428" r="26" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<circle cx="250" cy="428" r="12" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<circle cx="250" cy="428" r="5"  fill="rgba(100,160,240,0.5)"/>
<!-- Shoulder rotation arc -->
<path d="M 210,428 A 40,40 0 0 1 290,428" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="3,4"/>

<!-- Upper arm link -->
<rect x="232" y="280" width="36" height="150" rx="5"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Upper arm rib lines -->
<line x1="232" y1="320" x2="268" y2="320" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,2"/>
<line x1="232" y1="360" x2="268" y2="360" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,2"/>
<line x1="232" y1="400" x2="268" y2="400" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,2"/>
<!-- Upper arm channel detail -->
<line x1="240" y1="282" x2="240" y2="428" stroke="rgba(100,160,240,0.12)" stroke-width="0.4"/>
<line x1="260" y1="282" x2="260" y2="428" stroke="rgba(100,160,240,0.12)" stroke-width="0.4"/>

<!-- J3 — Elbow -->
<circle cx="250" cy="272" r="34" fill="#081c30" stroke="rgba(100,160,240,0.75)" stroke-width="1.5"/>
<circle cx="250" cy="272" r="20" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="250" cy="272" r="8"  fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="250" cy="272" r="4"  fill="rgba(100,160,240,0.45)"/>
<!-- Elbow arc -->
<path d="M 216,272 A 34,34 0 0 1 284,272" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.6" stroke-dasharray="3,4"/>

<!-- Forearm link -->
<rect x="232" y="134" width="36" height="140" rx="5"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<line x1="232" y1="178" x2="268" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,2"/>
<line x1="232" y1="218" x2="268" y2="218" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,2"/>

<!-- Cable spine (runs along arm exterior) -->
<rect x="270" y="134" width="16" height="300" rx="3"
  fill="#050d18" stroke="rgba(100,160,240,0.3)" stroke-width="0.7" stroke-dasharray="4,3"/>
<line x1="274" y1="150" x2="274" y2="420" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="2,4"/>
<line x1="281" y1="150" x2="281" y2="420" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="2,4"/>

<!-- J4 — Wrist Roll -->
<circle cx="250" cy="126" r="30" fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<circle cx="250" cy="126" r="18" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="250" cy="126" r="7"  fill="rgba(100,160,240,0.3)"/>

<!-- J5 — Wrist Pitch (smaller) -->
<circle cx="250" cy="86"  r="24" fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<circle cx="250" cy="86"  r="13" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="250" cy="86"  r="5"  fill="rgba(100,160,240,0.35)"/>

<!-- J6 — Tool flange connector -->
<rect x="218" y="52" width="64" height="36" rx="4"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<!-- Flange bolt circle -->
<circle cx="228" cy="70" r="4" fill="none" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<circle cx="250" cy="60" r="4" fill="none" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<circle cx="272" cy="70" r="4" fill="none" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<circle cx="250" cy="80" r="4" fill="none" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<!-- Center bore -->
<circle cx="250" cy="70" r="8"  fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.8"/>

<!-- End effector (generic gripper) -->
<rect x="226" y="20" width="48" height="34" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0" stroke-dasharray="4,3"/>
<!-- Gripper fingers -->
<path d="M 226,28 L 206,22 L 204,36 L 226,36" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<path d="M 226,34 L 206,36 L 204,50 L 226,44" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<path d="M 274,28 L 294,22 L 296,36 L 274,36" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<path d="M 274,34 L 294,36 L 296,50 L 274,44" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Vertical centerline -->
<line x1="250" y1="12" x2="250" y2="492" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="8,6"/>

<!-- Joint labels -->
<text x="298" y="432" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)">J2 SHOULDER</text>
<text x="298" y="276" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)">J3 ELBOW</text>
<text x="298" y="130" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)">J4 WRIST</text>
<text x="298" y="90"  font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)">J5</text>
<text x="298" y="74"  font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)">J6</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 680">
<rect width="400" height="680" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">FRONT VIEW</text>

<!-- Payload fairing (ogive nose) -->
<path d="M 200,18 C 200,18 240,50 258,102 L 142,102 C 160,50 200,18 200,18 Z"
  fill="#081c32" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Fairing split line -->
<line x1="200" y1="18" x2="200" y2="102" stroke="rgba(100,160,240,0.35)" stroke-width="0.7" stroke-dasharray="4,3"/>
<!-- Fairing rib lines -->
<path d="M 200,18 C 218,38 236,68 248,102" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>
<path d="M 200,18 C 182,38 164,68 152,102" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Stage 2 avionics section -->
<rect x="150" y="102" width="100" height="56" rx="2"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Port access -->
<rect x="158" y="112" width="14" height="10" rx="1" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<rect x="228" y="112" width="14" height="10" rx="1" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>

<!-- Stage 2 body -->
<rect x="155" y="158" width="90" height="78" rx="2"
  fill="#081c30" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- S2 engine bell -->
<path d="M 172,236 C 172,254 228,254 228,236 L 224,158 L 176,158 Z"
  fill="#060f1e" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<ellipse cx="200" cy="236" rx="28" ry="10" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Interstage section (grid/truss structure) -->
<rect x="148" y="240" width="104" height="36" rx="2"
  fill="rgba(5,13,24,0.4)" stroke="rgba(100,160,240,0.5)" stroke-width="1.1" stroke-dasharray="5,4"/>
<line x1="148" y1="258" x2="252" y2="258" stroke="rgba(100,160,240,0.25)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Truss members -->
<line x1="160" y1="240" x2="172" y2="276" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="178" y1="240" x2="190" y2="276" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="196" y1="240" x2="208" y2="276" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="214" y1="240" x2="226" y2="276" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="232" y1="240" x2="244" y2="276" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Stage separation ring -->
<rect x="146" y="274" width="108" height="8" rx="2"
  fill="rgba(100,160,240,0.1)" stroke="rgba(100,160,240,0.5)" stroke-width="1.2"/>

<!-- Stage 1 LOX tank -->
<rect x="148" y="282" width="104" height="92" rx="3"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Tank dome -->
<path d="M 148,282 Q 200,270 252,282" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Tank barrel rings -->
<line x1="148" y1="316" x2="252" y2="316" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="148" y1="348" x2="252" y2="348" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- LOX fill/drain line -->
<line x1="252" y1="310" x2="272" y2="310" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<rect x="272" y="305" width="14" height="10" rx="1" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>

<!-- Stage 1 fuel tank -->
<rect x="148" y="374" width="104" height="74" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<line x1="148" y1="411" x2="252" y2="411" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Turbopump (side) -->
<rect x="256" y="380" width="58" height="52" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<circle cx="285" cy="406" rx="18" ry="18" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8">
  <animateTransform type="rotate" attributeName="transform" values="none"/>
</circle>
<circle cx="285" cy="406" r="18" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="285" cy="406" r="8"  fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Stage 1 engine section -->
<path d="M 148,448 L 252,448 L 262,528 L 138,528 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<ellipse cx="200" cy="448" rx="52" ry="12" fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<!-- Engine chamber lines -->
<line x1="160" y1="480" x2="240" y2="480" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Bell nozzle -->
<path d="M 162,528 C 148,548 130,580 122,610 L 278,610 C 270,580 252,548 238,528 Z"
  fill="#060f1e" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Nozzle exit plane -->
<ellipse cx="200" cy="610" rx="78" ry="14" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Nozzle interior lines -->
<line x1="162" y1="528" x2="122" y2="610" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,4"/>
<line x1="238" y1="528" x2="278" y2="610" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,4"/>
<path d="M 170,555 C 158,572 148,590 140,610" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<path d="M 230,555 C 242,572 252,590 260,610" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Fins (4, show 2 sides) -->
<polygon points="148,528 118,568 118,610 148,610"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<polygon points="252,528 282,568 282,610 252,610"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Fin root chord -->
<line x1="148" y1="528" x2="148" y2="610" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<line x1="252" y1="528" x2="252" y2="610" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Center axis -->
<line x1="200" y1="14" x2="200" y2="614" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="8,6"/>

<!-- Labels -->
<text x="264" y="106" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.45)">FAIRING</text>
<text x="264" y="198" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.45)">STAGE 2</text>
<text x="264" y="334" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.45)">LOX</text>
<text x="264" y="418" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.45)">FUEL</text>
<text x="264" y="490" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.45)">ENGINE</text>

</svg>

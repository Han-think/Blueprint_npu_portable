<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 680">
  <rect width="400" height="680" fill="#050d18"/>

  <defs>
    <pattern id="fine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0 L0 0 0 8" fill="none" stroke="rgba(58,98,150,.09)" stroke-width=".35"/>
    </pattern>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(58,98,150,.17)" stroke-width=".55"/>
    </pattern>
    <style>
      .skin{fill:rgba(7,24,42,.72);stroke:rgba(133,190,255,.86);stroke-width:1.15;vector-effect:non-scaling-stroke}
      .skin2{fill:rgba(8,28,48,.52);stroke:rgba(133,190,255,.62);stroke-width:.85;vector-effect:non-scaling-stroke}
      .cut{fill:none;stroke:rgba(133,190,255,.28);stroke-width:.65;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}
      .line{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.65;vector-effect:non-scaling-stroke}
      .thin{fill:none;stroke:rgba(133,190,255,.22);stroke-width:.5;vector-effect:non-scaling-stroke}
      .dim{fill:none;stroke:rgba(133,190,255,.25);stroke-width:.55;vector-effect:non-scaling-stroke}
      .green{fill:none;stroke:rgba(137,255,168,.45);stroke-width:.8;vector-effect:non-scaling-stroke}
      .ghost{fill:rgba(100,160,240,.035);stroke:rgba(133,190,255,.22);stroke-width:.55;stroke-dasharray:4 4;vector-effect:non-scaling-stroke}
      .zone{fill:none;stroke:rgba(202,169,255,.38);stroke-width:.85;stroke-dasharray:7 4;vector-effect:non-scaling-stroke}
      .zone2{fill:none;stroke:rgba(137,255,168,.25);stroke-width:.75;stroke-dasharray:6 5;vector-effect:non-scaling-stroke}
      .bolt{fill:#050d18;stroke:rgba(159,211,255,.46);stroke-width:.65;vector-effect:non-scaling-stroke}
      .dot{fill:rgba(159,211,255,.42)}
      .title{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.26em;fill:rgba(159,211,255,.68)}
      .txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:7px;letter-spacing:.1em;fill:rgba(230,236,245,.66)}
      .micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:5.4px;letter-spacing:.1em;fill:rgba(118,169,232,.46)}
    </style>
  </defs>

  <rect width="400" height="680" fill="url(#fine)"/>
  <rect width="400" height="680" fill="url(#grid)"/>

  <text x="16" y="20" class="title">FRONT ELEVATION - SMALL LAUNCH VEHICLE MASTER</text>
  <text x="16" y="34" class="micro">SATURN V STRUCTURAL STUDY BASIS - ORIGINAL OVERLAY-READY LINE ART</text>

  <!-- Primary datums -->
  <line x1="200" y1="22" x2="200" y2="632" class="cut"/>
  <line x1="48" y1="48" x2="48" y2="612" class="dim"/>
  <path d="M43 48 L53 48 M43 612 L53 612" class="dim"/>
  <text x="34" y="340" text-anchor="middle" class="micro" transform="rotate(-90 34 340)">VEHICLE CENTERLINE / STATION DATUM</text>
  <line x1="104" y1="626" x2="296" y2="626" class="dim"/>
  <path d="M104 621 L104 631 M296 621 L296 631" class="dim"/>
  <text x="200" y="642" text-anchor="middle" class="micro">BASE FIN SPAN / ENGINE CLUSTER REFERENCE</text>

  <!-- Silhouette: Saturn V inspired but adapted to current two-stage part tree -->
  <path class="skin" d="M200 29
    C184 40 171 58 162 80
    C154 98 150 112 150 128
    L150 154 L158 154
    L158 234 L142 234 L142 274
    L142 450 L154 450 L154 526
    L136 610 L264 610 L246 526 L246 450
    L258 450 L258 274 L258 234 L242 234
    L242 154 L250 154 L250 128
    C250 112 246 98 238 80
    C229 58 216 40 200 29 Z"/>

  <!-- P8 fairing / spacecraft adapter analogue -->
  <path class="skin2" d="M151 103 C158 72 177 43 200 29 C223 43 242 72 249 103 Z"/>
  <path class="line" d="M151 103 L249 103"/>
  <path class="thin" d="M164 80 C184 91 216 91 236 80"/>
  <path class="thin" d="M174 58 C190 66 210 66 226 58"/>
  <line x1="200" y1="33" x2="200" y2="103" class="cut"/>
  <rect x="172" y="76" width="56" height="18" rx="2" class="ghost"/>
  <text x="319" y="70" text-anchor="end" class="txt">BISECTOR PAYLOAD FAIRING</text>
  <path d="M226 76 L312 76" class="dim"/>

  <!-- P10 avionics / Saturn IU ring cue -->
  <rect x="150" y="103" width="100" height="13" class="skin2"/>
  <rect x="142" y="116" width="116" height="42" class="skin2"/>
  <path class="line" d="M142 128 L258 128 M142 144 L258 144"/>
  <rect x="156" y="124" width="24" height="14" class="ghost"/>
  <rect x="186" y="124" width="28" height="14" class="ghost"/>
  <rect x="220" y="124" width="22" height="14" class="ghost"/>
  <g>
    <circle cx="154" cy="108" r="1.8" class="bolt"/><circle cx="176" cy="108" r="1.8" class="bolt"/>
    <circle cx="198" cy="108" r="1.8" class="bolt"/><circle cx="220" cy="108" r="1.8" class="bolt"/>
    <circle cx="242" cy="108" r="1.8" class="bolt"/>
  </g>
  <text x="82" y="119" text-anchor="end" class="txt">IU AVIONICS RING</text>
  <path d="M86 117 L150 110" class="dim"/>

  <!-- P7 upper stage / S-IVB-like vacuum engine bay -->
  <rect x="152" y="158" width="96" height="76" class="skin2"/>
  <ellipse cx="200" cy="160" rx="48" ry="9" class="line"/>
  <path class="thin" d="M158 178 L242 178 M158 198 L242 198 M158 218 L242 218"/>
  <path class="ghost" d="M166 174 C184 184 216 184 234 174 L234 208 C216 199 184 199 166 208 Z"/>
  <path class="green" d="M178 224 C181 204 192 190 200 184 C208 190 219 204 222 224"/>
  <ellipse cx="200" cy="222" rx="24" ry="9" class="green"/>
  <text x="318" y="196" text-anchor="end" class="txt">UPPER STAGE VAC ENGINE</text>
  <path d="M224 202 L312 202" class="dim"/>

  <!-- P6 interstage with open truss / separation plane -->
  <rect x="142" y="234" width="116" height="40" class="skin2"/>
  <path class="line" d="M142 234 L258 274 M258 234 L142 274"/>
  <path class="thin" d="M162 234 L162 274 M181 234 L181 274 M200 234 L200 274 M219 234 L219 274 M238 234 L238 274"/>
  <path class="cut" d="M136 254 L264 254"/>
  <g>
    <circle cx="154" cy="254" r="2" class="dot"/><circle cx="176" cy="254" r="2" class="dot"/>
    <circle cx="200" cy="254" r="2" class="dot"/><circle cx="224" cy="254" r="2" class="dot"/>
    <circle cx="246" cy="254" r="2" class="dot"/>
  </g>

  <!-- P4 LOX tank, S-IC proportion study -->
  <rect x="142" y="274" width="116" height="92" class="skin2"/>
  <ellipse cx="200" cy="274" rx="58" ry="11" class="line"/>
  <ellipse cx="200" cy="366" rx="58" ry="11" class="line"/>
  <path class="ghost" d="M154 289 C176 303 224 303 246 289 L246 351 C224 337 176 337 154 351 Z"/>
  <path class="thin" d="M154 303 L246 303 M154 320 L246 320 M154 337 L246 337 M154 354 L246 354"/>
  <path class="cut" d="M170 284 C174 314 174 338 170 366 M230 284 C226 314 226 338 230 366"/>
  <text x="319" y="320" text-anchor="end" class="txt">LOX TANK / BAFFLE STACK</text>
  <path d="M246 320 L312 320" class="dim"/>

  <!-- P5 fuel tank -->
  <rect x="142" y="366" width="116" height="84" class="skin2"/>
  <ellipse cx="200" cy="366" rx="58" ry="11" class="line"/>
  <ellipse cx="200" cy="450" rx="58" ry="11" class="line"/>
  <path class="ghost" d="M154 381 C176 394 224 394 246 381 L246 435 C224 422 176 422 154 435 Z"/>
  <path class="thin" d="M154 392 L246 392 M154 410 L246 410 M154 428 L246 428"/>
  <path class="cut" d="M176 374 C180 397 180 426 176 450 M224 374 C220 397 220 426 224 450"/>
  <text x="82" y="414" text-anchor="end" class="txt">RP-1 / FUEL TANK</text>
  <path d="M86 412 L154 412" class="dim"/>

  <!-- P3 turbopump assembly: external plumbing study -->
  <rect x="263" y="382" width="72" height="58" rx="5" class="skin2"/>
  <circle cx="292" cy="411" r="18" class="green"/>
  <circle cx="308" cy="411" r="9" class="bolt"/>
  <path class="green" d="M258 398 C272 391 285 394 292 411"/>
  <path class="green" d="M258 426 C278 435 309 432 334 417"/>
  <path class="thin" d="M276 392 L322 430 M322 392 L276 430"/>
  <text x="344" y="405" class="micro">TPA</text>
  <text x="344" y="414" class="micro">LOX/RP</text>

  <!-- P1 thrust chamber / boat-tail thrust structure -->
  <rect x="152" y="450" width="96" height="76" class="skin2"/>
  <ellipse cx="200" cy="450" rx="48" ry="10" class="line"/>
  <path class="skin2" d="M162 466 L238 466 L226 516 L174 516 Z"/>
  <path class="line" d="M162 466 L174 516 M238 466 L226 516 M184 466 L184 516 M200 466 L200 516 M216 466 L216 516"/>
  <g>
    <circle cx="164" cy="458" r="2" class="bolt"/><circle cx="184" cy="458" r="2" class="bolt"/>
    <circle cx="204" cy="458" r="2" class="bolt"/><circle cx="224" cy="458" r="2" class="bolt"/>
    <circle cx="236" cy="458" r="2" class="bolt"/>
  </g>
  <text x="82" y="486" text-anchor="end" class="txt">THRUST STRUCTURE</text>
  <path d="M86 484 L162 484" class="dim"/>

  <!-- P9 fin can and P2 five-engine F-1 style cluster -->
  <polygon points="142,526 108,574 108,604 142,590" class="skin"/>
  <polygon points="258,526 292,574 292,604 258,590" class="skin"/>
  <path class="thin" d="M142 536 L116 578 M258 536 L284 578"/>
  <path class="skin2" d="M162 526 L238 526 L264 610 L136 610 Z"/>
  <ellipse cx="200" cy="610" rx="63" ry="12" class="line"/>
  <ellipse cx="200" cy="562" rx="18" ry="26" class="green"/>
  <ellipse cx="174" cy="584" rx="15" ry="22" class="green"/>
  <ellipse cx="226" cy="584" rx="15" ry="22" class="green"/>
  <ellipse cx="183" cy="552" rx="13" ry="17" class="green"/>
  <ellipse cx="217" cy="552" rx="13" ry="17" class="green"/>
  <path class="thin" d="M162 526 C178 540 222 540 238 526"/>
  <path class="green" d="M142 628 C164 614 236 614 258 628"/>
  <text x="319" y="570" text-anchor="end" class="txt">5 ENGINE CLUSTER</text>
  <path d="M239 570 L312 570" class="dim"/>

  <!-- Saturn V reference scale strip: structural study note, not copied blueprint -->
  <g transform="translate(318 112)">
    <rect x="0" y="0" width="48" height="182" class="ghost"/>
    <path class="line" d="M24 8 L24 174"/>
    <path class="thin" d="M12 44 L36 44 M12 92 L36 92 M12 142 L36 142"/>
    <text x="24" y="16" text-anchor="middle" class="micro">REF</text>
    <text x="24" y="40" text-anchor="middle" class="micro">S-IVB</text>
    <text x="24" y="88" text-anchor="middle" class="micro">S-II</text>
    <text x="24" y="138" text-anchor="middle" class="micro">S-IC</text>
    <text x="24" y="178" text-anchor="middle" class="micro">SATURN</text>
  </g>

  <!-- Overlay zones kept in exact app coordinates -->
  <polygon points="148,28 252,28 278,102 122,102" class="zone"/>
  <rect x="142" y="102" width="116" height="56" class="zone2"/>
  <rect x="152" y="158" width="96" height="78" class="zone"/>
  <rect x="142" y="236" width="116" height="38" class="zone2"/>
  <rect x="142" y="274" width="116" height="92" class="zone"/>
  <rect x="142" y="366" width="116" height="82" class="zone2"/>
  <rect x="262" y="382" width="74" height="58" class="zone"/>
  <rect x="152" y="448" width="96" height="78" class="zone2"/>
  <polygon points="142,526 112,568 112,590 142,590" class="zone"/>
  <polygon points="258,526 288,568 288,590 258,590" class="zone2"/>
  <polygon points="162,526 238,526 262,596 138,596" class="zone"/>

  <!-- Part callouts -->
  <g>
    <path d="M200 64 L86 64 L86 54" class="dim"/><text x="82" y="52" text-anchor="end" class="txt">P8 FAIRING</text>
    <path d="M200 128 L86 128" class="dim"/><text x="82" y="126" text-anchor="end" class="txt">P10 AVIONICS</text>
    <path d="M200 197 L86 197" class="dim"/><text x="82" y="195" text-anchor="end" class="txt">P7 VAC ENGINE</text>
    <path d="M200 254 L86 254" class="dim"/><text x="82" y="252" text-anchor="end" class="txt">P6 INTERSTAGE</text>
    <path d="M200 320 L86 320" class="dim"/><text x="82" y="318" text-anchor="end" class="txt">P4 LOX</text>
    <path d="M200 407 L86 407" class="dim"/><text x="82" y="405" text-anchor="end" class="txt">P5 FUEL</text>
    <path d="M200 488 L86 488" class="dim"/><text x="82" y="486" text-anchor="end" class="txt">P1 CHAMBER</text>
    <path d="M200 562 L86 562" class="dim"/><text x="82" y="560" text-anchor="end" class="txt">P2 NOZZLES</text>
  </g>

  <!-- Stage/station bands -->
  <g>
    <line x1="112" y1="103" x2="288" y2="103" class="cut"/><text x="292" y="105" class="micro">FAIRING SEP</text>
    <line x1="112" y1="158" x2="288" y2="158" class="cut"/><text x="292" y="160" class="micro">IU / ADAPTER</text>
    <line x1="112" y1="234" x2="288" y2="234" class="cut"/><text x="292" y="236" class="micro">UPPER SEP</text>
    <line x1="112" y1="274" x2="288" y2="274" class="cut"/><text x="292" y="276" class="micro">INTERSTAGE</text>
    <line x1="112" y1="366" x2="288" y2="366" class="cut"/><text x="292" y="368" class="micro">COMMON BULKHEAD</text>
    <line x1="112" y1="450" x2="288" y2="450" class="cut"/><text x="292" y="452" class="micro">AFT TANK DOME</text>
    <line x1="112" y1="526" x2="288" y2="526" class="cut"/><text x="292" y="528" class="micro">THRUST FRAME</text>
  </g>

  <text x="200" y="660" text-anchor="middle" class="micro">MASTER ASSEMBLY BLUEPRINT - SATURN V STUDY BASIS - SMALL LAUNCH VEHICLE</text>
  <text x="200" y="670" text-anchor="middle" class="micro">SOURCE STRUCTURE: S-IC / S-II / S-IVB / IU LOGIC, REDRAWN FOR CURRENT PART TREE</text>
</svg>

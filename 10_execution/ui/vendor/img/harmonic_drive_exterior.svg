<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#050d18"/>
  <defs>
    <pattern id="fine" width="16.5" height="16.5" patternUnits="userSpaceOnUse">
      <path d="M 16.5 0 L 0 0 0 16.5" fill="none" stroke="rgba(39,74,121,.08)" stroke-width=".4"/>
    </pattern>
    <pattern id="grid" width="33" height="33" patternUnits="userSpaceOnUse">
      <path d="M 33 0 L 0 0 0 33" fill="none" stroke="rgba(39,74,121,.16)" stroke-width=".55"/>
    </pattern>
    <style>
      .skin{fill:#081c30;stroke:rgba(100,160,240,.76);stroke-width:1.35;vector-effect:non-scaling-stroke}
      .panel{fill:rgba(100,160,240,.035);stroke:rgba(100,160,240,.36);stroke-width:.9;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}
      .glass{fill:rgba(100,160,240,.055);stroke:rgba(100,160,240,.38);stroke-width:.9;vector-effect:non-scaling-stroke}
      .rotor{fill:#061625;stroke:rgba(100,160,240,.58);stroke-width:1.15;vector-effect:non-scaling-stroke}
      .nozzle{fill:#050d18;stroke:rgba(137,255,168,.48);stroke-width:1;vector-effect:non-scaling-stroke}
      .major{fill:none;stroke:rgba(100,160,240,.48);stroke-width:1.15;vector-effect:non-scaling-stroke}
      .minor,.minor *{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.75;vector-effect:non-scaling-stroke}
      .ghost{opacity:.18}
      .system{stroke-width:.9;vector-effect:non-scaling-stroke}
      .flow{fill:none;stroke:rgba(137,255,168,.22);stroke-width:.8;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}
      .lead{fill:none;stroke:rgba(159,211,255,.25);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}
      .title{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.26em;fill:rgba(159,211,255,.64)}
      .label{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6.1px;letter-spacing:.06em;fill:rgba(230,236,245,.64)}
      .micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.14em;fill:rgba(100,160,240,.34)}
      .dim{fill:none;stroke:rgba(100,160,240,.18);stroke-width:.55;vector-effect:non-scaling-stroke}
    </style>
  </defs>
  <rect width="500" height="400" fill="url(#fine)"/>
  <rect width="500" height="400" fill="url(#grid)"/>
  <text x="18" y="20" class="title">EXTERIOR AXIS · HARMONIC DRIVE</text>
  <text x="18" y="34" class="micro">Cross-Section (Side) · FORM / SILHOUETTE / REFERENCE PROPORTION</text>
  <line x1="250" y1="42" x2="250" y2="366" class="dim" stroke-dasharray="8 6"/>
  <g transform="scale(0.71429 0.95238)"><circle cx="350" cy="210" r="145" class="skin"/><circle cx="350" cy="210" r="94" class="panel"/><circle cx="350" cy="210" r="42" class="nozzle"/><g class="minor"><circle cx="468.0" cy="210.0" r="8"/><circle cx="452.2" cy="269.0" r="8"/><circle cx="409.0" cy="312.2" r="8"/><circle cx="350.0" cy="328.0" r="8"/><circle cx="291.0" cy="312.2" r="8"/><circle cx="247.8" cy="269.0" r="8"/><circle cx="232.0" cy="210.0" r="8"/><circle cx="247.8" cy="151.0" r="8"/><circle cx="291.0" cy="107.8" r="8"/><circle cx="350.0" cy="92.0" r="8"/><circle cx="409.0" cy="107.8" r="8"/><circle cx="452.2" cy="151.0" r="8"/></g></g>
  <text x="250" y="388" text-anchor="middle" class="micro">AXIS 1 OF 3 · EXTERIOR RECOGNITION</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300">
<rect width="780" height="300" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW</text>

<!-- Swept main wing (drawn under fuselage) -->
<polygon points="228,110 596,94 596,166 228,168"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.2"/>
<!-- Wing ribs -->
<line x1="270" y1="110" x2="270" y2="168" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="330" y1="108" x2="330" y2="168" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="400" y1="106" x2="400" y2="167" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="480" y1="102" x2="480" y2="166" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="540" y1="97"  x2="540" y2="165" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Wing leading edge highlight -->
<line x1="228" y1="110" x2="596" y2="94"  stroke="rgba(100,160,240,0.45)" stroke-width="1.0"/>
<!-- Wing trailing edge -->
<line x1="228" y1="168" x2="596" y2="166" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<!-- Flap/slat panel lines -->
<line x1="228" y1="152" x2="596" y2="150" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,4"/>

<!-- Engine pylon L -->
<rect x="292" y="110" width="12" height="38" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- Engine nacelle L -->
<path d="M 268,126 C 272,112 304,112 318,118 L 330,130 L 318,142 C 304,148 272,148 268,134 Z"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<ellipse cx="270" cy="130" rx="10" ry="22" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="327" cy="130" rx="7"  ry="16" fill="#071828" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<!-- Fan face rings -->
<ellipse cx="272" cy="130" rx="7" ry="16" fill="none" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>

<!-- Engine pylon R -->
<rect x="404" y="108" width="12" height="38" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- Engine nacelle R -->
<path d="M 388,126 C 392,112 424,112 438,118 L 450,130 L 438,142 C 424,148 392,148 388,134 Z"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<ellipse cx="390" cy="130" rx="10" ry="22" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="447" cy="130" rx="7"  ry="16" fill="#071828" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<ellipse cx="392" cy="130" rx="7" ry="16" fill="none" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>

<!-- Vertical tail fin -->
<path d="M 650,110 C 656,110 672,100 696,58 L 682,50 C 658,92 646,100 638,104 Z"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<!-- Horizontal stab -->
<polygon points="628,110 730,110 730,130 628,126"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.1"/>

<!-- Main fuselage tube (narrow-body) -->
<path d="M 42,140
         C 58,136 80,112 108,108
         L 680,108
         Q 720,108 736,126
         L 736,152
         Q 720,168 680,168
         L 108,168
         C 80,168 58,160 42,156
         Z"
  fill="#081c32" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Radome nose -->
<path d="M 42,148 C 56,136 82,112 108,108 L 108,168 C 82,168 56,160 42,148 Z"
  fill="#0b2440" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>

<!-- Cockpit windows -->
<rect x="114" y="118" width="54" height="24" rx="3" fill="#0a2846" stroke="rgba(100,160,240,0.7)" stroke-width="1.1"/>
<line x1="141" y1="118" x2="141" y2="142" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Cabin windows row (oval) -->
<rect x="178" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="210" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="242" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="274" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="370" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="402" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="434" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="466" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="498" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="530" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="562" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>
<rect x="594" y="120" width="20" height="13" rx="4" fill="#0a2238" stroke="rgba(100,160,240,0.5)" stroke-width="0.6"/>

<!-- Main gear strut L -->
<rect x="316" y="168" width="18" height="50" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="325" cy="220" rx="16" ry="6" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Main gear strut R -->
<rect x="398" y="168" width="18" height="50" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="407" cy="220" rx="16" ry="6" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Nose gear -->
<rect x="154" y="168" width="14" height="44" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="161" cy="214" rx="12" ry="5" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

<!-- Centerline -->
<line x1="42" y1="138" x2="736" y2="138" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="8,5"/>

</svg>

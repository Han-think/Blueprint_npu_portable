<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
<rect width="600" height="420" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">FRONT VIEW · CYCLOROTOR</text>

<!-- Left cyclorotor drum -->
<rect x="58" y="110" width="168" height="186" rx="8"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Drum end plates (circles viewed from front gives a rect... drum ribs) -->
<line x1="58"  y1="150" x2="226" y2="150" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="58"  y1="203" x2="226" y2="203" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="58"  y1="256" x2="226" y2="256" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Cyclorotor blades (6 blades, shown as lines) -->
<circle cx="142" cy="203" r="72" fill="none" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,5"/>
<line x1="142" y1="131" x2="142" y2="275" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="70"  y1="167" x2="214" y2="239" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="70"  y1="239" x2="214" y2="167" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<!-- Blade pitch links (dashed) -->
<circle cx="142" cy="203" r="36" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="3,4"/>
<!-- Central shaft -->
<circle cx="142" cy="203" r="16" fill="#050d18" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<circle cx="142" cy="203" r="7"  fill="rgba(100,160,240,0.25)"/>

<!-- Right cyclorotor drum -->
<rect x="374" y="110" width="168" height="186" rx="8"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<line x1="374" y1="150" x2="542" y2="150" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="374" y1="203" x2="542" y2="203" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="374" y1="256" x2="542" y2="256" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<circle cx="458" cy="203" r="72" fill="none" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="4,5"/>
<line x1="458" y1="131" x2="458" y2="275" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="386" y1="167" x2="530" y2="239" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="386" y1="239" x2="530" y2="167" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<circle cx="458" cy="203" r="36" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="3,4"/>
<circle cx="458" cy="203" r="16" fill="#050d18" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<circle cx="458" cy="203" r="7"  fill="rgba(100,160,240,0.25)"/>

<!-- Pylon mounts (connecting drum to body) -->
<rect x="58"  y="96"  width="168" height="24" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<rect x="374" y="96"  width="168" height="24" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>

<!-- Center fuselage body -->
<rect x="226" y="136" width="148" height="124" rx="5"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Body panel lines -->
<line x1="226" y1="198" x2="374" y2="198" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Avionics bay -->
<rect x="240" y="148" width="120" height="44" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<rect x="252" y="156" width="44"  height="28" rx="2"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>

<!-- Servo module (pitch control) -->
<rect x="218" y="260" width="164" height="48" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Servo drive dots -->
<circle cx="248" cy="284" r="8" fill="#071828" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="300" cy="284" r="8" fill="#071828" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="352" cy="284" r="8" fill="#071828" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

<!-- GPS tower (top center) -->
<rect x="290" y="72" width="20" height="26" rx="2" fill="#07182a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="300" cy="68" r="18" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="300" cy="68" r="8"  fill="rgba(100,160,240,0.2)"/>

<!-- Landing skids -->
<line x1="238" y1="308" x2="198" y2="366" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<line x1="362" y1="308" x2="402" y2="366" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<line x1="188" y1="366" x2="272" y2="366" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<line x1="328" y1="366" x2="412" y2="366" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Skid cross member -->
<line x1="250" y1="345" x2="350" y2="345" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="4,4"/>

<!-- Connecting struts (drum to body) -->
<line x1="226" y1="203" x2="226" y2="203" stroke="rgba(100,160,240,0.5)" stroke-width="1.2"/>
<rect x="216" y="196" width="16" height="14" rx="2" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<rect x="368" y="196" width="16" height="14" rx="2" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>

<!-- Rotation direction arrows -->
<text x="98"  y="106" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">CCW ↺</text>
<text x="502" y="106" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">CW ↻</text>

</svg>

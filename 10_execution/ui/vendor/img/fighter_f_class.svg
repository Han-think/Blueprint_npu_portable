<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300">
<rect width="680" height="300" fill="#050d18"/>

<!-- ═══ SIDE VIEW ═══ -->
<!-- label -->
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW</text>

<!-- Delta main wing (drawn first — lowest layer) -->
<polygon points="195,162 470,158 470,278 210,210"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.2"/>
<!-- Wing ribs (diagonal) -->
<line x1="235" y1="162" x2="310" y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.6" stroke-dasharray="4,4"/>
<line x1="285" y1="161" x2="385" y2="268" stroke="rgba(100,160,240,0.22)" stroke-width="0.6" stroke-dasharray="4,4"/>
<line x1="340" y1="160" x2="445" y2="276" stroke="rgba(100,160,240,0.22)" stroke-width="0.6" stroke-dasharray="4,4"/>
<line x1="400" y1="159" x2="468" y2="272" stroke="rgba(100,160,240,0.22)" stroke-width="0.6" stroke-dasharray="4,4"/>
<!-- Wing trailing edge panel -->
<line x1="195" y1="162" x2="210" y2="210" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Horizontal stabilator -->
<polygon points="476,134 548,132 548,164 476,160"
  fill="#071520" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>

<!-- Vertical stabilizer -->
<polygon points="428,120 506,118 488,46 448,50"
  fill="#071520" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<line x1="448" y1="50" x2="506" y2="118" stroke="rgba(100,160,240,0.3)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Engine inlet duct (below fuselage) -->
<path d="M 122,170 L 280,170 L 280,196 L 122,202 Z"
  fill="#040e1a" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="5,3"/>

<!-- Main fuselage — smooth body -->
<path d="M 42,148
         C 58,146 82,140 112,134
         C 138,129 162,122 188,116
         Q 210,111 232,110
         Q 268,109 300,112
         L 482,120
         Q 530,122 558,136
         L 574,148
         L 558,160
         Q 530,174 482,176
         L 300,182
         Q 268,185 232,184
         Q 210,183 188,178
         C 162,172 138,165 112,160
         C 82,154 58,150 42,148 Z"
  fill="#081c32" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Canopy bubble -->
<path d="M 118,134
         C 132,124 158,106 195,99
         Q 218,94 238,96
         Q 262,99 272,110
         L 118,134 Z"
  fill="#0a2846" stroke="rgba(100,160,240,0.7)" stroke-width="1.2"/>
<!-- Canopy framing -->
<line x1="165" y1="114" x2="225" y2="110" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<line x1="238" y1="96" x2="272" y2="110" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Engine nozzle -->
<ellipse cx="568" cy="148" rx="14" ry="28" fill="#040e1a" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<ellipse cx="568" cy="148" rx="7"  ry="16" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<!-- Afterburner glow hint -->
<ellipse cx="582" cy="148" rx="8" ry="20" fill="rgba(100,160,240,0.04)" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="2,3"/>

<!-- Nose gear strut -->
<rect x="110" y="170" width="15" height="44" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="117" cy="216" rx="14" ry="6" fill="#040e1a" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- Main gear strut -->
<rect x="282" y="188" width="17" height="44" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="290" cy="234" rx="16" ry="6" fill="#040e1a" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>

<!-- Fuselage station lines -->
<line x1="195" y1="116" x2="195" y2="180" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="360" y1="118" x2="360" y2="180" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="480" y1="120" x2="480" y2="178" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Centerline -->
<line x1="42" y1="148" x2="574" y2="148" stroke="rgba(100,160,240,0.2)" stroke-width="0.4" stroke-dasharray="8,5"/>

<!-- Pilot oval (cockpit interior hint) -->
<ellipse cx="215" cy="108" rx="12" ry="8" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Dimension lines -->
<line x1="42" y1="285" x2="574" y2="285" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>
<line x1="42" y1="282" x2="42" y2="288" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>
<line x1="574" y1="282" x2="574" y2="288" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>
<text x="308" y="296" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">OVERALL LENGTH</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
<rect width="600" height="380" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW · ROV</text>

<!-- Tether cable (entering from top) -->
<path d="M 480,38 C 470,50 458,70 446,98" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.9" stroke-dasharray="4,3"/>
<circle cx="480" cy="36" r="4" fill="rgba(100,160,240,0.25)" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<!-- Buoyancy foam block (top) -->
<rect x="136" y="74" width="328" height="46" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1" stroke-dasharray="5,4"/>
<!-- Foam texture lines -->
<line x1="152" y1="74" x2="152" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="188" y1="74" x2="188" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="224" y1="74" x2="224" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="260" y1="74" x2="260" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="296" y1="74" x2="296" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="332" y1="74" x2="332" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="368" y1="74" x2="368" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="404" y1="74" x2="404" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="440" y1="74" x2="440" y2="120" stroke="rgba(100,160,240,0.12)" stroke-width="0.4" stroke-dasharray="2,3"/>
<text x="300" y="101" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.3)" text-anchor="middle">SYNTACTIC FOAM</text>

<!-- Main structural frame (open frame ROV) -->
<rect x="54"  y="92"  width="492" height="240" rx="4"
  fill="rgba(5,13,24,0.3)" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Frame cross members -->
<line x1="54"  y1="172" x2="546" y2="172" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="4,3"/>
<line x1="54"  y1="252" x2="546" y2="252" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="4,3"/>
<line x1="186" y1="92"  x2="186" y2="332" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="4,3"/>
<line x1="390" y1="92"  x2="390" y2="332" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="4,3"/>
<!-- Frame diagonal bracing -->
<line x1="54"  y1="92"  x2="186" y2="172" stroke="rgba(100,160,240,0.12)" stroke-width="0.4"/>
<line x1="186" y1="92"  x2="54"  y2="172" stroke="rgba(100,160,240,0.12)" stroke-width="0.4"/>

<!-- Pressure housing (main electronics cylinder) -->
<rect x="164" y="128" width="218" height="90" rx="10"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- End cap domes -->
<ellipse cx="164" cy="173" rx="12" ry="45" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="382" cy="173" rx="12" ry="45" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<!-- Housing rib rings -->
<line x1="200" y1="128" x2="200" y2="218" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="260" y1="128" x2="260" y2="218" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="320" y1="128" x2="320" y2="218" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Viewport -->
<circle cx="200" cy="173" r="24" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="200" cy="173" r="14" fill="#040e1a" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Camera dome (front-left) -->
<circle cx="108" cy="178" r="46" fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<circle cx="108" cy="178" r="30" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<circle cx="108" cy="178" r="16" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="108" cy="178" r="6"  fill="rgba(100,160,240,0.06)"/>
<!-- LED ring around camera -->
<circle cx="108" cy="178" r="42" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="1.5" stroke-dasharray="4,6"/>

<!-- LED flood lights -->
<rect x="64"  y="158" width="40" height="16" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="76"  cy="166" r="4" fill="rgba(100,160,240,0.3)"/>
<circle cx="90"  cy="166" r="4" fill="rgba(100,160,240,0.3)"/>
<circle cx="104" cy="166" r="4" fill="rgba(100,160,240,0.3)"/>

<!-- Manipulator arm -->
<rect x="54"  y="192" width="54" height="22" rx="3" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<rect x="54"  y="218" width="40" height="46" rx="3" fill="#06111f" stroke="rgba(100,160,240,0.5)"  stroke-width="0.9"/>
<!-- Jaw/gripper -->
<path d="M 54,230 L 30,226 L 28,240 L 54,244" fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<path d="M 54,234 L 30,236 L 28,250 L 54,252" fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>

<!-- Horizontal thrusters (left side) -->
<rect x="60"  y="96"  width="62" height="42" rx="4" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="91" cy="117" r="16" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="91" cy="117" r="8"  fill="#040e1a" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<!-- Thruster guard ring -->
<circle cx="91" cy="117" r="20" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Horizontal thruster (right) -->
<rect x="478" y="96"  width="62" height="42" rx="4" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="509" cy="117" r="16" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="509" cy="117" r="8"  fill="#040e1a" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="509" cy="117" r="20" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Vertical thruster (top center) -->
<rect x="268" y="54" width="62" height="42" rx="4" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="299" cy="75" r="16" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="299" cy="75" r="8"  fill="#040e1a" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="299" cy="75" r="20" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Sonar pod (rear) -->
<rect x="444" y="168" width="102" height="50" rx="6"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Sonar array face -->
<rect x="538" y="174" width="12" height="38" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<line x1="542" y1="178" x2="542" y2="208" stroke="rgba(100,160,240,0.2)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="546" y1="178" x2="546" y2="208" stroke="rgba(100,160,240,0.2)" stroke-width="0.4" stroke-dasharray="2,3"/>

<!-- Tether junction box -->
<rect x="400" y="196" width="88" height="58" rx="4"
  fill="#07182a" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<rect x="410" y="206" width="30" height="12" rx="1" fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<!-- Tether connector -->
<rect x="488" y="210" width="14" height="26" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>

<!-- Frame foot pads -->
<rect x="62"  y="326" width="80" height="8" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<rect x="458" y="326" width="80" height="8" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

</svg>

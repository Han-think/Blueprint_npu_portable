<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
<rect width="600" height="420" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW · QUADRUPED</text>

<!-- Background legs (right side, dimmed) -->
<circle cx="418" cy="184" r="28" fill="#050d18" stroke="rgba(100,160,240,0.25)" stroke-width="0.8"/>
<rect x="404" y="212" width="28" height="80" rx="4" fill="#050d18" stroke="rgba(100,160,240,0.22)" stroke-width="0.7"/>
<circle cx="418" cy="305" r="22" fill="#050d18" stroke="rgba(100,160,240,0.22)" stroke-width="0.7"/>
<rect x="404" y="327" width="28" height="76" rx="4" fill="#050d18" stroke="rgba(100,160,240,0.22)" stroke-width="0.7"/>
<ellipse cx="418" cy="406" rx="22" ry="8" fill="#050d18" stroke="rgba(100,160,240,0.18)" stroke-width="0.6"/>

<!-- Body main chassis -->
<rect x="144" y="124" width="312" height="118" rx="6"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Body panel lines -->
<line x1="144" y1="183" x2="456" y2="183" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="4,3"/>
<line x1="270" y1="124" x2="270" y2="242" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="3,4"/>

<!-- Body internal structures -->
<!-- Electronics bay (center) -->
<rect x="180" y="138" width="120" height="52" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<rect x="192" y="148" width="96" height="12" rx="1"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<rect x="192" y="164" width="96" height="12" rx="1"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>

<!-- Battery pack (rear) -->
<rect x="348" y="140" width="96" height="82" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.0" stroke-dasharray="4,3"/>
<text x="396" y="185" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.35)" text-anchor="middle">BATT</text>

<!-- Spine/IMU module (center-top) -->
<rect x="262" y="158" width="72" height="68" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="298" cy="192" r="20" fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>

<!-- Sensor head (front) -->
<rect x="80"  y="112" width="84" height="62" rx="5"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Camera eyes -->
<circle cx="108" cy="132" r="18" fill="#050d18" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="108" cy="132" r="10" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="108" cy="132" r="4"  fill="rgba(100,160,240,0.06)"/>
<circle cx="148" cy="136" r="12" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="148" cy="136" r="6"  fill="#040e1a" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<!-- Lidar ring (ToF sensor) -->
<rect x="82"  y="152" width="80" height="14" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<!-- Neck connector -->
<rect x="144" y="124" width="40" height="28" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>

<!-- Front LEFT leg (foreground) -->
<!-- Hip J1 -->
<circle cx="182" cy="184" r="32" fill="#081c30" stroke="rgba(100,160,240,0.75)" stroke-width="1.5"/>
<circle cx="182" cy="184" r="18" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="182" cy="184" r="7"  fill="rgba(100,160,240,0.45)"/>
<!-- Thigh link -->
<rect x="166" y="216" width="32" height="86" rx="6"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Thigh lines -->
<line x1="172" y1="240" x2="192" y2="240" stroke="rgba(100,160,240,0.2)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="172" y1="268" x2="192" y2="268" stroke="rgba(100,160,240,0.2)" stroke-width="0.4" stroke-dasharray="2,3"/>
<!-- Knee J2 -->
<circle cx="182" cy="314" r="26" fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<circle cx="182" cy="314" r="14" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="182" cy="314" r="5"  fill="rgba(100,160,240,0.4)"/>
<!-- Shin link -->
<rect x="166" y="340" width="32" height="74" rx="6"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Foot pad -->
<ellipse cx="182" cy="416" rx="26" ry="10"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Ankle spring hint -->
<line x1="166" y1="408" x2="182" y2="416" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<line x1="198" y1="408" x2="182" y2="416" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Rear LEFT leg (foreground, same structure offset aft) -->
<circle cx="415" cy="184" r="32" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<circle cx="415" cy="184" r="18" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="415" cy="184" r="7"  fill="rgba(100,160,240,0.35)"/>
<rect x="399" y="216" width="32" height="86" rx="6"
  fill="#071020" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<circle cx="415" cy="314" r="26" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<circle cx="415" cy="314" r="14" fill="#050d18" stroke="rgba(100,160,240,0.38)" stroke-width="0.7"/>
<circle cx="415" cy="314" r="5"  fill="rgba(100,160,240,0.3)"/>
<rect x="399" y="340" width="32" height="74" rx="6"
  fill="#071020" stroke="rgba(100,160,240,0.5)" stroke-width="1.1"/>
<ellipse cx="415" cy="416" rx="26" ry="10"
  fill="#07182a" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>

<!-- Walking motion arc hints -->
<path d="M 148,416 A 70,30 0 0 1 216,416" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="3,5"/>
<path d="M 381,416 A 70,30 0 0 1 449,416" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="3,5"/>

<!-- Ground plane -->
<line x1="40" y1="426" x2="560" y2="426" stroke="rgba(100,160,240,0.25)" stroke-width="0.7" stroke-dasharray="5,4"/>

</svg>

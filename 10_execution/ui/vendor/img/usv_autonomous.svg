<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
<rect width="700" height="300" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">TOP VIEW · CATAMARAN USV</text>

<!-- Wake / water lines (decorative) -->
<path d="M 40,87 C 30,87 20,80 8,74" fill="none" stroke="rgba(100,160,240,0.1)" stroke-width="0.6" stroke-dasharray="3,4"/>
<path d="M 40,213 C 30,213 20,220 8,226" fill="none" stroke="rgba(100,160,240,0.1)" stroke-width="0.6" stroke-dasharray="3,4"/>
<path d="M 40,87 C 30,100 22,125 22,150 C 22,175 30,200 40,213" fill="none" stroke="rgba(100,160,240,0.08)" stroke-width="0.5" stroke-dasharray="4,5"/>

<!-- Port hull (top) -->
<path d="M 78,58 C 78,58 50,72 46,87 C 42,100 46,102 78,116 L 622,116 C 650,116 656,104 656,87 C 656,70 650,58 622,58 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Hull plating lines (port) -->
<line x1="120" y1="58" x2="120" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="200" y1="58" x2="200" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="300" y1="58" x2="300" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="400" y1="58" x2="400" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="500" y1="58" x2="500" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="580" y1="58" x2="580" y2="116" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<!-- Waterline (hull midline) -->
<line x1="78" y1="87" x2="622" y2="87" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>

<!-- Starboard hull (bottom) -->
<path d="M 78,184 C 78,184 50,198 46,213 C 42,226 46,228 78,242 L 622,242 C 650,242 656,230 656,213 C 656,196 650,184 622,184 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<line x1="120" y1="184" x2="120" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="200" y1="184" x2="200" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="300" y1="184" x2="300" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="400" y1="184" x2="400" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="500" y1="184" x2="500" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="580" y1="184" x2="580" y2="242" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="78"  y1="213" x2="622" y2="213" stroke="rgba(100,160,240,0.25)" stroke-width="0.6"/>

<!-- Cross-deck beam (connects hulls) -->
<rect x="166" y="116" width="368" height="68" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<!-- Beam cross members -->
<line x1="220" y1="116" x2="220" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="280" y1="116" x2="280" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="420" y1="116" x2="420" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="480" y1="116" x2="480" y2="184" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Solar array (main deck coverage) -->
<rect x="180" y="122" width="336" height="56" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Solar cell grid lines -->
<line x1="222" y1="122" x2="222" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="264" y1="122" x2="264" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="306" y1="122" x2="306" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="348" y1="122" x2="348" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="390" y1="122" x2="390" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="432" y1="122" x2="432" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="474" y1="122" x2="474" y2="178" stroke="rgba(100,160,240,0.2)" stroke-width="0.4"/>
<line x1="180" y1="150" x2="516" y2="150" stroke="rgba(100,160,240,0.15)" stroke-width="0.4"/>

<!-- Sensor mast (top view = circle) -->
<circle cx="370" cy="150" r="22" fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<circle cx="370" cy="150" r="10" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- Mast instruments -->
<circle cx="370" cy="140" r="4" fill="rgba(100,160,240,0.2)" stroke="rgba(100,160,240,0.35)" stroke-width="0.5"/>
<circle cx="378" cy="156" r="3" fill="rgba(100,160,240,0.2)" stroke="rgba(100,160,240,0.35)" stroke-width="0.5"/>

<!-- Payload bay (center-aft of mast) -->
<rect x="236" y="126" width="122" height="48" rx="3"
  fill="#07182a" stroke="rgba(100,160,240,0.5)" stroke-width="1.0" stroke-dasharray="5,4"/>
<text x="297" y="155" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.35)" text-anchor="middle">PAYLOAD</text>

<!-- Battery bay (forward) -->
<rect x="108" y="126" width="110" height="48" rx="3"
  fill="#07182a" stroke="rgba(100,160,240,0.5)" stroke-width="1.0" stroke-dasharray="5,4"/>
<text x="163" y="147" font-family="monospace" font-size="7" fill="rgba(100,160,240,0.3)" text-anchor="middle">BATTERY</text>
<line x1="163" y1="150" x2="163" y2="170" stroke="rgba(100,160,240,0.15)" stroke-width="0.4"/>

<!-- Propulsion pods + thrusters (stern) -->
<!-- Port pod -->
<circle cx="594" cy="87"  r="26" fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<circle cx="594" cy="87"  r="14" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="594" cy="87"  r="6"  fill="rgba(100,160,240,0.35)"/>
<!-- Prop disk -->
<circle cx="594" cy="87"  r="24" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.6" stroke-dasharray="4,5"/>

<!-- Stbd pod -->
<circle cx="594" cy="213" r="26" fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<circle cx="594" cy="213" r="14" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="594" cy="213" r="6"  fill="rgba(100,160,240,0.35)"/>
<circle cx="594" cy="213" r="24" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.6" stroke-dasharray="4,5"/>

<!-- Rudder flaps -->
<polygon points="618,72 646,78 646,96 618,102"  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<polygon points="618,198 646,204 646,222 618,228" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>

<!-- Bow indicator -->
<polygon points="46,150 68,138 68,162" fill="rgba(100,160,240,0.25)"/>
<text x="20" y="154" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">BOW</text>
<text x="670" y="154" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">AFT</text>

<!-- LIDAR / radar dome (forward mast) -->
<circle cx="186" cy="150" r="16" fill="#07182a" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="186" cy="150" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>

</svg>

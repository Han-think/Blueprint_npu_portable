<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
<rect width="600" height="600" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">TOP VIEW · X8 OCTOCOPTER</text>

<!-- Arms -->
<polygon points="222,228 248,252 108,112 82,138" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<polygon points="352,252 378,228 492,112 518,138" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<polygon points="378,352 352,378 518,492 492,466" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>
<polygon points="248,352 222,378 82,492 108,466" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.4"/>

<!-- X8: Upper+Lower props (two layers per motor, stacked) -->
<!-- NW motor - upper layer -->
<circle cx="120" cy="120" r="92" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.7" stroke-dasharray="5,5"/>
<circle cx="120" cy="120" r="46" fill="#07182a" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<circle cx="120" cy="120" r="32" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<circle cx="120" cy="120" r="8"  fill="rgba(100,160,240,0.5)"/>
<!-- X8 lower prop (offset ring) -->
<circle cx="120" cy="120" r="82" fill="none" stroke="rgba(100,160,240,0.1)" stroke-width="0.6" stroke-dasharray="4,6"/>

<!-- NE motor -->
<circle cx="480" cy="120" r="92" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.7" stroke-dasharray="5,5"/>
<circle cx="480" cy="120" r="46" fill="#07182a" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<circle cx="480" cy="120" r="32" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<circle cx="480" cy="120" r="8"  fill="rgba(100,160,240,0.5)"/>
<!-- SE motor -->
<circle cx="480" cy="480" r="92" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.7" stroke-dasharray="5,5"/>
<circle cx="480" cy="480" r="46" fill="#07182a" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<circle cx="480" cy="480" r="32" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<circle cx="480" cy="480" r="8"  fill="rgba(100,160,240,0.5)"/>
<!-- SW motor -->
<circle cx="120" cy="480" r="92" fill="none" stroke="rgba(100,160,240,0.12)" stroke-width="0.7" stroke-dasharray="5,5"/>
<circle cx="120" cy="480" r="46" fill="#07182a" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<circle cx="120" cy="480" r="32" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<circle cx="120" cy="480" r="8"  fill="rgba(100,160,240,0.5)"/>

<!-- Large center hub plate -->
<rect x="210" y="210" width="180" height="180" rx="5"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.6"/>
<!-- Inner frame cutouts -->
<rect x="226" y="226" width="148" height="148" rx="4"
  fill="#050d18" stroke="rgba(100,160,240,0.3)" stroke-width="0.7"/>
<!-- Mounting pattern -->
<circle cx="234" cy="234" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="366" cy="234" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="234" cy="366" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="366" cy="366" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Gimbal plate (center) -->
<circle cx="300" cy="300" r="52" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<circle cx="300" cy="300" r="36" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="300" cy="300" r="18" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<!-- Gimbal roll/tilt rings -->
<ellipse cx="300" cy="300" rx="52" ry="22" fill="none" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- FC bay (front) -->
<rect x="244" y="226" width="112" height="42" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>

<!-- Dual battery (rear) -->
<rect x="222" y="336" width="156" height="48" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0" stroke-dasharray="5,4"/>
<line x1="300" y1="336" x2="300" y2="384" stroke="rgba(100,160,240,0.25)" stroke-width="0.6" stroke-dasharray="3,3"/>
<rect x="370" y="344" width="8" height="16" rx="1" fill="rgba(100,160,240,0.15)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>

<!-- GPS mast -->
<circle cx="300" cy="136" r="24" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="300" cy="136" r="12" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

<!-- Landing gear struts -->
<rect x="188" y="454" width="98" height="28" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<rect x="314" y="454" width="98" height="28" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>

<!-- Canopy (payload protection cover) -->
<path d="M 228,148 Q 300,130 372,148 L 372,210 L 228,210 Z"
  fill="rgba(5,13,24,0.4)" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="5,4"/>

<!-- Centerlines -->
<line x1="300" y1="50" x2="300" y2="550" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="8,6"/>
<line x1="50"  y1="300" x2="550" y2="300" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="8,6"/>
<line x1="120" y1="120" x2="480" y2="480" stroke="rgba(100,160,240,0.08)" stroke-width="0.4" stroke-dasharray="6,6"/>
<line x1="480" y1="120" x2="120" y2="480" stroke="rgba(100,160,240,0.08)" stroke-width="0.4" stroke-dasharray="6,6"/>

<polygon points="300,80 316,100 284,100" fill="rgba(100,160,240,0.3)"/>
<text x="300" y="70" font-family="monospace" font-size="8" fill="rgba(100,160,240,0.4)" text-anchor="middle">FRONT</text>
<text x="300" y="530" font-family="monospace" font-size="7" fill="rgba(100,160,240,0.3)" text-anchor="middle">X8 COAXIAL · 8 MOTORS TOTAL</text>
</svg>

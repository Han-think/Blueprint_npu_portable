<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520">
<rect width="500" height="520" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">FRONT VIEW</text>

<!-- High Gain Antenna -->
<path d="M 222,36 Q 250,52 278,36 L 270,78 L 230,78 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<line x1="250" y1="52" x2="250" y2="118" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="250" cy="50" r="8" fill="rgba(100,160,240,0.25)"/>
<!-- Dish ribs -->
<line x1="230" y1="78" x2="250" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="270" y1="78" x2="250" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="246" y1="66" x2="250" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>
<line x1="254" y1="66" x2="250" y2="52" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Payload / avionics deck -->
<rect x="172" y="118" width="156" height="60" rx="3"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<rect x="184" y="128" width="52" height="36" rx="2"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<rect x="248" y="128" width="52" height="36" rx="2"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<rect x="312" y="132" width="10" height="8" rx="1"
  fill="rgba(100,160,240,0.15)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>

<!-- Solar arrays (deployed) -->
<rect x="38" y="138" width="134" height="40" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Solar cells -->
<line x1="64"  y1="138" x2="64"  y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="90"  y1="138" x2="90"  y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="116" y1="138" x2="116" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="142" y1="138" x2="142" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="38"  y1="158" x2="172" y2="158" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<!-- Solar hinge -->
<rect x="170" y="144" width="6" height="28" rx="2" fill="rgba(100,160,240,0.3)" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>

<rect x="328" y="138" width="134" height="40" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<line x1="354" y1="138" x2="354" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="380" y1="138" x2="380" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="406" y1="138" x2="406" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="432" y1="138" x2="432" y2="178" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<line x1="328" y1="158" x2="462" y2="158" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<rect x="324" y="144" width="6" height="28" rx="2" fill="rgba(100,160,240,0.3)" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>

<!-- Main propellant tank (spherical) -->
<circle cx="250" cy="228" r="92"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.6"/>
<!-- Tank latitude rings -->
<ellipse cx="250" cy="228" rx="92" ry="30" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.6" stroke-dasharray="5,4"/>
<ellipse cx="250" cy="195" rx="70" ry="20" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="4,5"/>
<ellipse cx="250" cy="261" rx="70" ry="20" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="4,5"/>
<!-- Tank longitude lines -->
<line x1="250" y1="136" x2="250" y2="320" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="4,5"/>
<line x1="175" y1="152" x2="175" y2="304" stroke="rgba(100,160,240,0.1)" stroke-width="0.4" stroke-dasharray="3,6"/>
<line x1="325" y1="152" x2="325" y2="304" stroke="rgba(100,160,240,0.1)" stroke-width="0.4" stroke-dasharray="3,6"/>
<!-- Weld seam highlight -->
<line x1="160" y1="228" x2="340" y2="228" stroke="rgba(100,160,240,0.25)" stroke-width="0.6" stroke-dasharray="3,3"/>

<!-- RCS thrusters (attitude control) -->
<rect x="134" y="190" width="28" height="38" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="148" cy="209" r="12" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<!-- RCS nozzle -->
<path d="M 134,198 L 118,194 L 118,224 L 134,220" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<rect x="338" y="190" width="28" height="38" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="352" cy="209" r="12" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<path d="M 366,198 L 382,194 L 382,224 L 366,220" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>

<!-- Main descent engine -->
<path d="M 208,320 L 188,400 L 312,400 L 292,320 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Engine bell throat -->
<ellipse cx="250" cy="320" rx="42" ry="10" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<!-- Bell nozzle exit -->
<ellipse cx="250" cy="400" rx="62" ry="14" fill="none" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<!-- Bell interior lines -->
<path d="M 208,320 C 196,348 184,374 188,400" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>
<path d="M 292,320 C 304,348 316,374 312,400" fill="none" stroke="rgba(100,160,240,0.15)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Landing legs (4 deployed, show 2 sides) -->
<!-- Left primary strut -->
<line x1="168" y1="310" x2="46" y2="446" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Left secondary strut -->
<line x1="200" y1="310" x2="96" y2="446" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<!-- Left cross brace -->
<line x1="100" y1="380" x2="162" y2="310" stroke="rgba(100,160,240,0.25)" stroke-width="0.6" stroke-dasharray="3,4"/>
<!-- Left footpad -->
<ellipse cx="68" cy="450" rx="32" ry="8" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>

<!-- Right primary strut -->
<line x1="332" y1="310" x2="454" y2="446" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>
<!-- Right secondary strut -->
<line x1="300" y1="310" x2="404" y2="446" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<line x1="400" y1="380" x2="338" y2="310" stroke="rgba(100,160,240,0.25)" stroke-width="0.6" stroke-dasharray="3,4"/>
<ellipse cx="432" cy="450" rx="32" ry="8" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>

<!-- Vertical axis -->
<line x1="250" y1="30" x2="250" y2="400" stroke="rgba(100,160,240,0.12)" stroke-width="0.5" stroke-dasharray="8,6"/>

</svg>

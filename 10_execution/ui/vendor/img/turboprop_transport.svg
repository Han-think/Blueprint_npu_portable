<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300">
<rect width="680" height="300" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW</text>

<!-- High wing -->
<polygon points="122,108 378,108 378,76 122,76"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.2"/>
<!-- Wing ribs -->
<line x1="158" y1="76" x2="158" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="196" y1="76" x2="196" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="234" y1="76" x2="234" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="272" y1="76" x2="272" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="310" y1="76" x2="310" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="344" y1="76" x2="344" y2="108" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Spar line -->
<line x1="122" y1="92" x2="378" y2="92" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="5,3"/>

<!-- Left engine nacelle (blunt, tubular) -->
<path d="M 128,56 C 128,48 142,44 162,44 L 218,44 C 230,44 236,48 236,56 L 236,72 C 236,78 230,80 218,80 L 162,80 C 142,80 128,78 128,72 Z"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<ellipse cx="130" cy="64" rx="8" ry="20" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Left propeller disk -->
<ellipse cx="126" cy="64" rx="5" ry="34" fill="none" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="4,3"/>
<circle cx="126" cy="64" r="6" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<line x1="126" y1="30" x2="126" y2="98" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="108" y1="46" x2="144" y2="82" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<line x1="144" y1="46" x2="108" y2="82" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>

<!-- Right engine nacelle -->
<path d="M 258,56 C 258,48 272,44 292,44 L 348,44 C 360,44 366,48 366,56 L 366,72 C 366,78 360,80 348,80 L 292,80 C 272,80 258,78 258,72 Z"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.3"/>
<ellipse cx="260" cy="64" rx="8" ry="20" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Right prop disk -->
<ellipse cx="256" cy="64" rx="5" ry="34" fill="none" stroke="rgba(100,160,240,0.35)" stroke-width="0.8" stroke-dasharray="4,3"/>
<circle cx="256" cy="64" r="6" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<line x1="256" y1="30" x2="256" y2="98" stroke="rgba(100,160,240,0.4)" stroke-width="1.2"/>
<line x1="238" y1="46" x2="274" y2="82" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>
<line x1="274" y1="46" x2="238" y2="82" stroke="rgba(100,160,240,0.3)" stroke-width="0.8"/>

<!-- T-tail: vertical fin -->
<path d="M 466,98 L 502,98 L 502,46 L 468,46 Z"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.2"/>
<!-- T-tail: horizontal stab (on top of fin) -->
<polygon points="440,98 562,98 562,118 440,118"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.1"/>

<!-- Main fuselage (boxy transport shape) -->
<path d="M 48,140
         C 64,134 84,108 108,108
         L 510,108
         Q 540,108 554,122
         L 554,172
         Q 540,184 510,184
         L 108,184
         C 84,184 64,162 48,156
         Z"
  fill="#081c32" stroke="rgba(100,160,240,0.65)" stroke-width="1.5"/>

<!-- Nose (more rounded than fighter) -->
<path d="M 48,148 C 62,134 86,108 108,108 L 108,184 C 86,184 62,162 48,148 Z"
  fill="#0b2440" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Cockpit windows -->
<rect x="114" y="118" width="58" height="28" rx="3" fill="#0a2846" stroke="rgba(100,160,240,0.65)" stroke-width="1.0"/>
<line x1="143" y1="118" x2="143" y2="146" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- Cabin windows -->
<rect x="184" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="218" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="252" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="286" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="320" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="354" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>
<rect x="388" y="120" width="22" height="14" rx="3" fill="#0a2238" stroke="rgba(100,160,240,0.45)" stroke-width="0.6"/>

<!-- Rear cargo ramp line -->
<line x1="510" y1="108" x2="510" y2="184" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<path d="M 510,170 L 554,172" stroke="rgba(100,160,240,0.3)" stroke-width="0.7" stroke-dasharray="4,3"/>

<!-- Main gear -->
<rect x="238" y="184" width="20" height="52" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="248" cy="238" rx="17" ry="6" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- Nose gear -->
<rect x="118" y="184" width="16" height="44" rx="2" fill="#040e1a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<ellipse cx="126" cy="230" rx="13" ry="5" fill="#040e1a" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>

<!-- Centerline -->
<line x1="48" y1="146" x2="554" y2="146" stroke="rgba(100,160,240,0.15)" stroke-width="0.4" stroke-dasharray="8,5"/>

</svg>

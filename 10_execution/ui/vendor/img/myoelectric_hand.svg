<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550">
<rect width="400" height="550" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">FRONT VIEW · MYOELECTRIC HAND</text>

<!-- Index finger -->
<rect x="116" y="92" width="38" height="138" rx="10"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Knuckle joints (DIP, PIP) -->
<line x1="116" y1="136" x2="154" y2="136" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="116" y1="178" x2="154" y2="178" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<!-- Fingertip rounded cap -->
<path d="M 116,92 Q 135,78 154,92" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<!-- Finger actuator rod -->
<line x1="135" y1="96" x2="135" y2="228" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Middle finger (tallest) -->
<rect x="158" y="72" width="38" height="160" rx="10"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<line x1="158" y1="120" x2="196" y2="120" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="158" y1="165" x2="196" y2="165" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<path d="M 158,72 Q 177,58 196,72" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<line x1="177" y1="76" x2="177" y2="230" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Ring finger -->
<rect x="200" y="82" width="38" height="150" rx="10"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<line x1="200" y1="128" x2="238" y2="128" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="200" y1="172" x2="238" y2="172" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<path d="M 200,82 Q 219,68 238,82" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<line x1="219" y1="86" x2="219" y2="230" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Pinky finger -->
<rect x="242" y="100" width="34" height="132" rx="9"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<line x1="242" y1="142" x2="276" y2="142" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<line x1="242" y1="180" x2="276" y2="180" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<path d="M 242,100 Q 259,88 276,100" fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="0.9"/>
<line x1="259" y1="104" x2="259" y2="230" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,4"/>

<!-- Thumb (angled, lateral) -->
<path d="M 100,252 C 88,248 72,248 66,258 L 62,314 C 62,328 70,340 82,344 L 108,344 C 120,344 128,332 128,318 L 128,270 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- Thumb IP joint -->
<path d="M 63,300 L 127,298" stroke="rgba(100,160,240,0.4)" stroke-width="1.0"/>
<!-- Thumb tip -->
<path d="M 62,258 C 62,246 72,238 90,238 C 108,238 122,248 128,258" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.8"/>

<!-- Palm structure -->
<rect x="108" y="228" width="192" height="192" rx="8"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>

<!-- Metacarpal alignment lines (4 fingers) -->
<line x1="135" y1="228" x2="135" y2="420" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="177" y1="228" x2="177" y2="420" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="219" y1="228" x2="219" y2="420" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="3,4"/>
<line x1="259" y1="228" x2="259" y2="420" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="3,4"/>

<!-- Actuator motors (4 finger drives) -->
<circle cx="135" cy="378" r="14" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="135" cy="378" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="177" cy="378" r="14" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="177" cy="378" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="219" cy="378" r="14" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="219" cy="378" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="259" cy="378" r="14" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="259" cy="378" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>

<!-- Thumb drive motor -->
<circle cx="116" cy="292" r="14" fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="116" cy="292" r="7"  fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>

<!-- Wrist rotation joint -->
<rect x="108" y="420" width="192" height="56" rx="5"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Wrist gear ring -->
<ellipse cx="204" cy="448" rx="70" ry="20"
  fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="1.0"/>
<ellipse cx="204" cy="448" rx="38" ry="11"
  fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.7"/>
<circle cx="204" cy="448" r="10" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<!-- Wrist bolt pattern -->
<circle cx="154" cy="444" r="4" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="254" cy="444" r="4" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="154" cy="452" r="4" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="254" cy="452" r="4" fill="none" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>

<!-- EMG cuff -->
<rect x="90"  y="476" width="228" height="52" rx="5"
  fill="#081c30" stroke="rgba(100,160,240,0.65)" stroke-width="1.4"/>
<!-- EMG electrode array -->
<circle cx="122" cy="502" r="9" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="122" cy="502" r="4" fill="rgba(100,160,240,0.2)"/>
<circle cx="160" cy="502" r="9" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="160" cy="502" r="4" fill="rgba(100,160,240,0.2)"/>
<circle cx="198" cy="502" r="9" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="198" cy="502" r="4" fill="rgba(100,160,240,0.2)"/>
<circle cx="236" cy="502" r="9" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="236" cy="502" r="4" fill="rgba(100,160,240,0.2)"/>
<circle cx="274" cy="502" r="9" fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<circle cx="274" cy="502" r="4" fill="rgba(100,160,240,0.2)"/>
<text x="204" y="524" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.35)" text-anchor="middle">EMG ELECTRODES</text>

<!-- Socket interface -->
<rect x="90" y="528" width="228" height="18" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9" stroke-dasharray="4,3"/>

</svg>

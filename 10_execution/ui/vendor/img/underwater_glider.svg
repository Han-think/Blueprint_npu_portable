<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250">
<rect width="700" height="250" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW · UNDERWATER GLIDER</text>

<!-- Main pressure hull (torpedo-shaped) -->
<path d="M 58,125
         C 58,125 68,78 92,78
         L 610,78
         C 634,78 644,99 644,125
         C 644,151 634,172 610,172
         L 92,172
         C 68,172 58,125 58,125 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>

<!-- Hull nose cap -->
<path d="M 58,125 C 62,102 72,78 92,78 L 92,172 C 72,172 62,148 58,125 Z"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<!-- Hull tail cap -->
<path d="M 610,78 C 630,78 640,102 644,125 C 640,148 630,172 610,172 L 610,78 Z"
  fill="#071828" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>

<!-- Hull section rings -->
<line x1="128" y1="78" x2="128" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="200" y1="78" x2="200" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="280" y1="78" x2="280" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="360" y1="78" x2="360" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="440" y1="78" x2="440" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="520" y1="78" x2="520" y2="172" stroke="rgba(100,160,240,0.18)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Centerline -->
<line x1="58" y1="125" x2="644" y2="125" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="6,4"/>

<!-- Fixed wings (mid-body) -->
<!-- Upper wing -->
<path d="M 248,78 L 248,48 C 300,42 390,40 454,48 L 454,78 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Upper wing ribs -->
<line x1="280" y1="78" x2="284" y2="48" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="320" y1="78" x2="324" y2="44" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="360" y1="78" x2="364" y2="42" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="400" y1="78" x2="404" y2="43" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="440" y1="78" x2="444" y2="47" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<!-- Wing spar -->
<line x1="248" y1="63" x2="454" y2="63" stroke="rgba(100,160,240,0.3)" stroke-width="0.7" stroke-dasharray="5,3"/>

<!-- Lower wing -->
<path d="M 248,172 L 248,202 C 300,208 390,210 454,202 L 454,172 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<line x1="248" y1="187" x2="454" y2="187" stroke="rgba(100,160,240,0.3)" stroke-width="0.7" stroke-dasharray="5,3"/>
<!-- Lower wing ribs -->
<line x1="280" y1="172" x2="284" y2="202" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="360" y1="172" x2="364" y2="208" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>
<line x1="440" y1="172" x2="444" y2="203" stroke="rgba(100,160,240,0.18)" stroke-width="0.4" stroke-dasharray="2,3"/>

<!-- Tail fins (vertical, at stern) -->
<!-- Dorsal -->
<path d="M 582,78 L 582,38 C 594,36 606,40 614,46 L 614,78 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<!-- Ventral -->
<path d="M 582,172 L 582,212 C 594,214 606,210 614,204 L 614,172 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<!-- Horizontal tail -->
<path d="M 564,78 L 564,60 L 622,62 L 622,78 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>
<path d="M 564,172 L 564,190 L 622,188 L 622,172 Z"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.9"/>

<!-- VHF antenna (retractable, stern) -->
<rect x="600" y="24" width="18" height="56" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<line x1="609" y1="24" x2="609" y2="8" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="609" cy="7" r="3" fill="rgba(100,160,240,0.35)"/>
<text x="625" y="60" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.35)">VHF</text>

<!-- Buoyancy engine (nose section, oil piston) -->
<rect x="86" y="92" width="118" height="66" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<rect x="94" y="100" width="102" height="50" rx="3"
  fill="#050d18" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<!-- Piston rod -->
<line x1="186" y1="125" x2="206" y2="125" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="194" cy="125" r="14" fill="#050d18" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>

<!-- Bladder / external oil bag -->
<ellipse cx="75" cy="125" rx="16" ry="28" fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9" stroke-dasharray="4,3"/>

<!-- Battery / CG shift mass -->
<rect x="220" y="98" width="172" height="54" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Battery cell dividers -->
<line x1="262" y1="98" x2="262" y2="152" stroke="rgba(100,160,240,0.15)" stroke-width="0.4"/>
<line x1="306" y1="98" x2="306" y2="152" stroke="rgba(100,160,240,0.15)" stroke-width="0.4"/>
<line x1="350" y1="98" x2="350" y2="152" stroke="rgba(100,160,240,0.15)" stroke-width="0.4"/>

<!-- Roll mass (side-sliding) -->
<circle cx="300" cy="125" r="26" fill="#07182a" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<circle cx="300" cy="125" r="14" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<line x1="270" y1="125" x2="330" y2="125" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Science / sensor bay (aft) -->
<rect x="444" y="96" width="122" height="62" rx="4"
  fill="#06111f" stroke="rgba(100,160,240,0.55)" stroke-width="1.0"/>
<rect x="456" y="106" width="40" height="18" rx="2"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<rect x="504" y="106" width="40" height="18" rx="2"
  fill="rgba(100,160,240,0.05)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>

<!-- Drop weight (emergency ascent) -->
<circle cx="195" cy="172" r="16" fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<line x1="195" y1="188" x2="195" y2="204" stroke="rgba(100,160,240,0.35)" stroke-width="0.7" stroke-dasharray="3,3"/>
<text x="195" y="218" font-family="monospace" font-size="7" fill="rgba(100,160,240,0.35)" text-anchor="middle">DROP WT</text>

</svg>

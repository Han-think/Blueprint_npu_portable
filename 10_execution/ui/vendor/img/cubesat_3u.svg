<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
<rect width="400" height="500" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">FRONT VIEW · 3U CUBESAT</text>

<!-- Deployed antennas -->
<line x1="158" y1="128" x2="118" y2="42"  stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="116" cy="38" r="5" fill="rgba(100,160,240,0.4)" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>
<line x1="242" y1="128" x2="282" y2="42"  stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<circle cx="284" cy="38" r="5" fill="rgba(100,160,240,0.4)" stroke="rgba(100,160,240,0.5)" stroke-width="0.7"/>
<!-- Monopole (UHF) -->
<line x1="200" y1="128" x2="200" y2="40"  stroke="rgba(100,160,240,0.45)" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- Main 3U structure -->
<rect x="138" y="128" width="124" height="244" rx="2"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>

<!-- CubeSat unit division lines (each U = ~82px) -->
<line x1="138" y1="210" x2="262" y2="210" stroke="rgba(100,160,240,0.45)" stroke-width="1.0"/>
<line x1="138" y1="292" x2="262" y2="292" stroke="rgba(100,160,240,0.45)" stroke-width="1.0"/>

<!-- Corner rails -->
<rect x="138" y="128" width="10" height="244" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>
<rect x="252" y="128" width="10" height="244" fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<!-- 1U top: Reaction wheel -->
<circle cx="200" cy="169" r="34" fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<circle cx="200" cy="169" r="22" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="200" cy="169" r="10" fill="#06111f" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<circle cx="200" cy="169" r="4"  fill="rgba(100,160,240,0.3)"/>
<!-- Flywheel spokes -->
<line x1="200" y1="147" x2="200" y2="191" stroke="rgba(100,160,240,0.2)" stroke-width="0.6"/>
<line x1="178" y1="158" x2="222" y2="180" stroke="rgba(100,160,240,0.2)" stroke-width="0.6"/>
<line x1="178" y1="180" x2="222" y2="158" stroke="rgba(100,160,240,0.2)" stroke-width="0.6"/>

<!-- 2U middle: Star tracker + Payload -->
<rect x="148" y="220" width="52" height="52" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<!-- Star tracker lens -->
<circle cx="174" cy="246" r="18" fill="#050d18" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="174" cy="246" r="10" fill="#040e1a" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<circle cx="174" cy="246" r="4"  fill="rgba(100,160,240,0.06)"/>

<rect x="204" y="220" width="52" height="52" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="1.0"/>
<!-- Payload optics -->
<circle cx="230" cy="246" r="18" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="230" cy="246" r="10" fill="#040e1a" stroke="rgba(100,160,240,0.3)" stroke-width="0.6"/>
<text x="230" y="287" font-family="monospace" font-size="7" fill="rgba(100,160,240,0.35)" text-anchor="middle">PAYLOAD</text>

<!-- 3U bottom: Propulsion + power -->
<!-- Cold gas thrusters -->
<rect x="148" y="302" width="44" height="24" rx="2"
  fill="#07182a" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<circle cx="165" cy="314" r="8" fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<!-- Propellant tank outline -->
<rect x="148" y="328" width="44" height="30" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<!-- EPS / power board -->
<rect x="200" y="302" width="52" height="56" rx="2"
  fill="#07182a" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<rect x="206" y="308" width="40" height="10" rx="1"
  fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.25)" stroke-width="0.4"/>
<rect x="206" y="322" width="40" height="10" rx="1"
  fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.25)" stroke-width="0.4"/>

<!-- Separation spring (P-POD interface) -->
<rect x="138" y="362" width="124" height="12" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.6)" stroke-width="1.1"/>
<line x1="150" y1="362" x2="150" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="165" y1="362" x2="165" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="180" y1="362" x2="180" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="195" y1="362" x2="195" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="210" y1="362" x2="210" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="225" y1="362" x2="225" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<line x1="240" y1="362" x2="240" y2="374" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<text x="200" y="390" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.4)" text-anchor="middle">P-POD SEPARATION SPRING</text>

<!-- Solar panels (deployed) -->
<rect x="32"  y="142" width="106" height="100" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Solar cell grid L -->
<line x1="58"  y1="142" x2="58"  y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="84"  y1="142" x2="84"  y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="110" y1="142" x2="110" y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="32"  y1="167" x2="138" y2="167" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<line x1="32"  y1="192" x2="138" y2="192" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<line x1="32"  y1="217" x2="138" y2="217" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<rect x="132" y="152" width="8"  height="80"  rx="2" fill="rgba(100,160,240,0.15)" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<rect x="262" y="142" width="106" height="100" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<line x1="288" y1="142" x2="288" y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="314" y1="142" x2="314" y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="340" y1="142" x2="340" y2="242" stroke="rgba(100,160,240,0.22)" stroke-width="0.5"/>
<line x1="262" y1="167" x2="368" y2="167" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<line x1="262" y1="192" x2="368" y2="192" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<line x1="262" y1="217" x2="368" y2="217" stroke="rgba(100,160,240,0.18)" stroke-width="0.4"/>
<rect x="260" y="152" width="8"  height="80"  rx="2" fill="rgba(100,160,240,0.15)" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<!-- Dimension marks -->
<line x1="128" y1="412" x2="128" y2="128" stroke="rgba(100,160,240,0.18)" stroke-width="0.5"/>
<line x1="124" y1="128" x2="132" y2="128" stroke="rgba(100,160,240,0.18)" stroke-width="0.5"/>
<line x1="124" y1="370" x2="132" y2="370" stroke="rgba(100,160,240,0.18)" stroke-width="0.5"/>
<text x="108" y="255" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.3)" text-anchor="middle" transform="rotate(-90,108,255)">3U = 340mm</text>

</svg>

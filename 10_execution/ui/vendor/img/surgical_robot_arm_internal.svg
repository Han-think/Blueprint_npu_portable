<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <rect width="500" height="600" fill="#050d18"/>
  <defs>
    <pattern id="fine" width="21" height="21" patternUnits="userSpaceOnUse">
      <path d="M 21 0 L 0 0 0 21" fill="none" stroke="rgba(39,74,121,.08)" stroke-width=".4"/>
    </pattern>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="rgba(39,74,121,.16)" stroke-width=".55"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,30)">
  <text class="ti" x="180" y="14">MIDDLE FINGER MODULE</text>
  <text class="mc" x="180" y="24">UNDERACTUATED · LONGER PHALANX · SINGLE MOTOR</text>
  <!-- proximal phalanx — longer than index -->
  <rect class="sk" x="115" y="50" width="108" height="30" rx="5"/>
  <text class="ct" x="169" y="69">PROXIMAL PHALANX L=88mm</text>
  <!-- middle phalanx -->
  <rect class="sk" x="125" y="92" width="88" height="26" rx="4"/>
  <text class="ct" x="169" y="109">MIDDLE PHALANX</text>
  <!-- distal -->
  <rect class="sk" x="138" y="130" width="66" height="20" rx="8"/>
  <text class="ct" x="171" y="144">DISTAL</text>
  <!-- joints -->
  <circle class="nz" cx="169" cy="92" r="5"/>
  <text class="mc" x="176" y="95">MCP</text>
  <circle class="nz" cx="170" cy="130" r="4"/>
  <text class="mc" x="176" y="133">PIP</text>
  <circle class="nz" cx="171" cy="150" r="3"/>
  <text class="mc" x="176" y="153">DIP</text>
  <!-- parallel drive bars -->
  <rect class="ma" x="108" y="52" width="5" height="96" rx="2"/>
  <rect class="ma" x="226" y="52" width="5" height="96" rx="2"/>
  <!-- motor -->
  <rect class="sk" x="55" y="50" width="48" height="38" rx="3"/>
  <circle class="ma" cx="79" cy="69" r="13"/>
  <circle class="mi" cx="79" cy="69" r="7"/>
  <text class="ct" x="79" y="101" text-anchor="middle">MOTOR</text>
  <!-- tendon -->
  <line class="cl" x1="103" y1="69" x2="115" y2="69"/>
  <!-- spring return -->
  <path class="cl" d="M232,54 Q246,74 232,94 Q246,114 232,130 Q246,146 232,150"/>
  <text class="mc" x="250" y="104">SPRING RET.</text>
  <!-- dimension bar -->
  <line class="mi" x1="115" y1="170" x2="223" y2="170"/>
  <text class="mc" x="169" y="180" text-anchor="middle">LONGEST DIGIT · TRAVEL 95°</text>
  <!-- silicone tip pad -->
  <rect class="pa" x="138" y="128" width="66" height="6" rx="3"/>
  <text class="mc" x="171" y="157" text-anchor="middle">SILICONE PAD</text>
</g>
<text class="mc" x="10" y="292">p4 · middle_finger · longer phalanx 88mm · single motor drive · underactuated · PA12 shells</text>
</svg>
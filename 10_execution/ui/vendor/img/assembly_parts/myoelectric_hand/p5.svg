<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(20,28)">
  <text class="ti" x="190" y="14">RING + PINKY LINKED-DRIVE PAIR</text>
  <text class="mc" x="190" y="24">SINGLE MOTOR · DIFFERENTIAL · INDIVIDUAL FLEXION</text>
  <!-- shared motor block -->
  <rect class="sk" x="160" y="38" width="60" height="44" rx="4"/>
  <circle class="ma" cx="190" cy="60" r="16"/>
  <circle class="mi" cx="190" cy="60" r="9"/>
  <text class="ct" x="190" y="64" text-anchor="middle">MOTOR</text>
  <!-- differential gear symbol -->
  <ellipse class="ma" cx="190" cy="90" rx="14" ry="6"/>
  <line class="mi" x1="176" y1="90" x2="204" y2="90"/>
  <text class="mc" x="190" y="102" text-anchor="middle">DIFFERENTIAL</text>
  <!-- ring finger column -->
  <rect class="sk" x="80" y="108" width="90" height="24" rx="4"/>
  <text class="ct" x="125" y="124">RING PROXIMAL</text>
  <rect class="sk" x="88" y="142" width="74" height="20" rx="3"/>
  <text class="ct" x="125" y="156">RING MIDDLE</text>
  <rect class="sk" x="96" y="172" width="58" height="18" rx="7"/>
  <text class="ct" x="125" y="185">RING DIST.</text>
  <circle class="nz" cx="125" cy="142" r="4"/>
  <circle class="nz" cx="125" cy="172" r="3"/>
  <!-- pinky finger column -->
  <rect class="sk" x="214" y="108" width="80" height="24" rx="4"/>
  <text class="ct" x="254" y="124">PINKY PROXIMAL</text>
  <rect class="sk" x="222" y="142" width="64" height="20" rx="3"/>
  <text class="ct" x="254" y="156">PINKY MIDDLE</text>
  <rect class="sk" x="232" y="172" width="46" height="18" rx="7"/>
  <text class="ct" x="255" y="185">PINKY D.</text>
  <circle class="nz" cx="254" cy="142" r="4"/>
  <circle class="nz" cx="254" cy="172" r="3"/>
  <!-- drive links from differential -->
  <line class="cl" x1="176" y1="90" x2="125" y2="108"/>
  <line class="cl" x1="204" y1="90" x2="254" y2="108"/>
  <!-- spring return indicators -->
  <path class="cl" d="M172,142 Q162,154 172,166 Q162,178 172,190"/>
  <text class="mc" x="148" y="168">SPR</text>
  <path class="cl" d="M288,142 Q298,154 288,166 Q298,178 288,190"/>
  <text class="mc" x="300" y="168">SPR</text>
  <!-- dimension -->
  <line class="mi" x1="80" y1="210" x2="298" y2="210"/>
  <text class="mc" x="189" y="220" text-anchor="middle">COUPLED DRIVE · RING 76mm / PINKY 62mm PROXIMAL</text>
</g>
<text class="mc" x="10" y="292">p5 · ring_pinky_pair · single motor differential · individual flexion coupling · spring return · PA12</text>
</svg>
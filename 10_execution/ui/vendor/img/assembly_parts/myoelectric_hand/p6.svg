<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">WRIST ROTATION UNIT</text>
  <text class="mc" x="180" y="24">±180° ROTATION · SLIP RING · BRUSHLESS FLAT MOTOR · M30 ISO</text>
  <!-- outer housing ring -->
  <circle class="sk" cx="190" cy="148" r="90"/>
  <circle class="pa" cx="190" cy="148" r="82"/>
  <!-- inner rotor -->
  <circle class="sk" cx="190" cy="148" r="52"/>
  <circle class="ma" cx="190" cy="148" r="44"/>
  <!-- brushless flat motor windings (simplified) -->
  <circle class="mi" cx="190" cy="148" r="34"/>
  <circle class="mi" cx="190" cy="148" r="24"/>
  <!-- motor pole lines -->
  <line class="mi" x1="190" y1="104" x2="190" y2="124"/>
  <line class="mi" x1="214" y1="112" x2="204" y2="128"/>
  <line class="mi" x1="226" y1="134" x2="208" y2="140"/>
  <line class="mi" x1="166" y1="112" x2="176" y2="128"/>
  <line class="mi" x1="154" y1="134" x2="172" y2="140"/>
  <!-- slip ring center -->
  <circle class="nz" cx="190" cy="148" r="10"/>
  <text class="mc" x="190" y="151" text-anchor="middle">SLIP RING</text>
  <!-- M30 thread collar at bottom -->
  <rect class="sk" x="162" y="228" width="56" height="16" rx="3"/>
  <line class="mi" x1="168" y1="228" x2="168" y2="244"/>
  <line class="mi" x1="176" y1="228" x2="176" y2="244"/>
  <line class="mi" x1="184" y1="228" x2="184" y2="244"/>
  <line class="mi" x1="192" y1="228" x2="192" y2="244"/>
  <line class="mi" x1="200" y1="228" x2="200" y2="244"/>
  <line class="mi" x1="208" y1="228" x2="208" y2="244"/>
  <text class="ct" x="190" y="258" text-anchor="middle">M30 ISO THREAD COLLAR</text>
  <!-- rotation arc annotation -->
  <path class="cl" d="M108,148 A82,82 0 0 1 272,148"/>
  <text class="mc" x="190" y="72" text-anchor="middle">±180° TRAVEL</text>
  <!-- labels -->
  <text class="ct" x="190" y="148" text-anchor="middle" dy="-18">FLAT BLDC</text>
  <text class="mc" x="295" y="148">HOUSING</text>
  <text class="mc" x="38" y="148">STATOR</text>
</g>
<text class="mc" x="10" y="292">p6 · wrist_rotation · ±180° · brushless flat motor · 8-ch slip ring · M30 ISO thread palm coupling</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">PALM CHASSIS</text>
<text x="12" y="26" class="mc">PA12 SLS · MOTOR POCKETS x5 · PCB COMPARTMENT · WRIST COUPLING</text>
<!-- palm plate (rectangular, slightly trapezoidal) -->
<path d="M100 80 L320 80 L310 240 L110 240 Z" class="sk"/>
<path d="M112 92 L308 92 L299 228 L121 228 Z" class="pa"/>
<!-- 5 finger motor pockets at top edge -->
<rect x="118" y="92" width="32" height="40" rx="5" class="nz"/>
<rect x="158" y="92" width="32" height="40" rx="5" class="nz"/>
<rect x="198" y="92" width="32" height="40" rx="5" class="nz"/>
<rect x="238" y="92" width="32" height="40" rx="5" class="nz"/>
<rect x="278" y="95" width="28" height="36" rx="5" class="nz"/>
<!-- motor labels -->
<text x="134" y="116" text-anchor="middle" class="mc">M1</text>
<text x="174" y="116" text-anchor="middle" class="mc">M2</text>
<text x="214" y="116" text-anchor="middle" class="mc">M3</text>
<text x="254" y="116" text-anchor="middle" class="mc">M4</text>
<text x="292" y="116" text-anchor="middle" class="mc">M5</text>
<!-- PCB compartment (center palm) -->
<rect x="130" y="148" width="150" height="58" rx="5" class="pa"/>
<text x="205" y="170" text-anchor="middle" class="mc">PCB BAY</text>
<text x="205" y="182" text-anchor="middle" class="mc">sEMG + CTRL</text>
<!-- wrist coupling interface (bottom) -->
<rect x="150" y="222" width="110" height="20" rx="6" class="sk"/>
<circle cx="205" cy="232" r="8" class="nz"/>
<!-- finger guide slots -->
<line x1="134" y1="132" x2="134" y2="228" class="mi"/>
<line x1="174" y1="132" x2="174" y2="228" class="mi"/>
<line x1="214" y1="132" x2="214" y2="228" class="mi"/>
<line x1="254" y1="132" x2="254" y2="228" class="mi"/>
<!-- callouts -->
<line x1="134" y1="92" x2="60" y2="58" class="cl"/><text x="10" y="56" class="ct">Motor Pocket ×5 (PA12)</text>
<line x1="205" y1="148" x2="310" y2="118" class="cl"/><text x="312" y="116" class="ct">PCB Compartment</text>
<line x1="205" y1="232" x2="310" y2="252" class="cl"/><text x="312" y="250" class="ct">Wrist M30 ISO Thread</text>
<line x1="112" y1="160" x2="50" y2="175" class="cl"/><text x="10" y="173" class="ct">PA12 SLS Chassis</text>
<text x="210" y="292" text-anchor="middle" class="mc">MYOELECTRIC HAND · P1 PALM CHASSIS · PA12 SLS · 5 MOTOR POCKETS</text>
</svg>
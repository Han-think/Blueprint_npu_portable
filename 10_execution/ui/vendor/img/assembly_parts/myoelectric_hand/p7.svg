<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">sEMG ELECTRODE CUFF</text>
  <text class="mc" x="180" y="24">8-CHANNEL · SILICONE OVER RIGID FRAME · SNAP CONNECTOR</text>
  <!-- outer silicone cuff profile (elliptical cross-section) -->
  <ellipse class="pa" cx="190" cy="148" rx="130" ry="88"/>
  <!-- inner rigid frame -->
  <ellipse class="sk" cx="190" cy="148" rx="110" ry="70"/>
  <ellipse class="ma" cx="190" cy="148" rx="92" ry="54"/>
  <!-- 8 electrode positions evenly around inner ellipse -->
  <!-- top 4 -->
  <circle class="nz" cx="190" cy="94" r="6"/>
  <text class="mc" x="190" y="90" text-anchor="middle">E1</text>
  <circle class="nz" cx="248" cy="108" r="6"/>
  <text class="mc" x="256" y="106">E2</text>
  <circle class="nz" cx="280" cy="148" r="6"/>
  <text class="mc" x="290" y="148">E3</text>
  <circle class="nz" cx="248" cy="188" r="6"/>
  <text class="mc" x="256" y="192">E4</text>
  <!-- bottom 4 -->
  <circle class="nz" cx="190" cy="202" r="6"/>
  <text class="mc" x="190" y="214" text-anchor="middle">E5</text>
  <circle class="nz" cx="132" cy="188" r="6"/>
  <text class="mc" x="108" y="192">E6</text>
  <circle class="nz" cx="100" cy="148" r="6"/>
  <text class="mc" x="76" y="148">E7</text>
  <circle class="nz" cx="132" cy="108" r="6"/>
  <text class="mc" x="108" y="106">E8</text>
  <!-- snap connector block -->
  <rect class="sk" x="158" y="38" width="64" height="20" rx="3"/>
  <rect class="mi" x="164" y="41" width="10" height="14" rx="1"/>
  <rect class="mi" x="178" y="41" width="10" height="14" rx="1"/>
  <rect class="mi" x="192" y="41" width="10" height="14" rx="1"/>
  <rect class="mi" x="206" y="41" width="10" height="14" rx="1"/>
  <text class="ct" x="190" y="34" text-anchor="middle">SNAP CONNECTOR 8-PIN</text>
  <!-- wire traces to snap connector -->
  <line class="cl" x1="190" y1="94" x2="190" y2="58"/>
  <line class="cl" x1="248" y1="108" x2="214" y2="52"/>
  <!-- closure tab -->
  <rect class="sk" x="54" y="138" width="30" height="20" rx="3"/>
  <text class="mc" x="69" y="150" text-anchor="middle">LATCH</text>
  <!-- dimension -->
  <line class="mi" x1="60" y1="244" x2="320" y2="244"/>
  <text class="mc" x="190" y="254" text-anchor="middle">OD≈110mm CIRCUMFERENCE FIT · SILICONE LINER 3mm</text>
</g>
<text class="mc" x="10" y="292">p7 · semg_electrode_cuff · 8-ch · silicone over rigid frame · snap 8-pin connector · residual limb fit</text>
</svg>
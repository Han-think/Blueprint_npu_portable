<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,30)">
  <text class="ti" x="180" y="14">INDEX FINGER MODULE</text>
  <text class="mc" x="180" y="24">UNDERACTUATED · 3-PHALANX · PARALLEL DRIVE BAR</text>
  <!-- proximal phalanx -->
  <rect class="sk" x="120" y="50" width="100" height="28" rx="5"/>
  <text class="ct" x="170" y="68">PROXIMAL PHALANX</text>
  <!-- middle phalanx -->
  <rect class="sk" x="130" y="90" width="82" height="24" rx="4"/>
  <text class="ct" x="171" y="106">MIDDLE PHALANX</text>
  <!-- distal phalanx -->
  <rect class="sk" x="140" y="126" width="64" height="20" rx="8"/>
  <text class="ct" x="172" y="140">DISTAL</text>
  <!-- parallel drive bar left -->
  <rect class="ma" x="112" y="52" width="6" height="90" rx="2"/>
  <text class="mc" x="90" y="100">DRIVE BAR L</text>
  <!-- parallel drive bar right -->
  <rect class="ma" x="224" y="52" width="6" height="90" rx="2"/>
  <text class="mc" x="232" y="100">DRIVE BAR R</text>
  <!-- joints -->
  <circle class="nz" cx="170" cy="90" r="5"/>
  <text class="mc" x="177" y="93">MCP</text>
  <circle class="nz" cx="171" cy="126" r="4"/>
  <text class="mc" x="177" y="129">PIP</text>
  <circle class="nz" cx="172" cy="146" r="3"/>
  <text class="mc" x="177" y="149">DIP</text>
  <!-- motor block -->
  <rect class="sk" x="60" y="50" width="46" height="36" rx="3"/>
  <circle class="ma" cx="83" cy="68" r="12"/>
  <circle class="mi" cx="83" cy="68" r="7"/>
  <text class="ct" x="83" y="100" text-anchor="middle">MOTOR</text>
  <!-- spring return annotation -->
  <path class="cl" d="M232,52 Q248,70 232,88 Q248,106 232,124 Q248,142 232,142"/>
  <text class="mc" x="250" y="100">SPRING RETURN</text>
  <!-- tendon line -->
  <line class="cl" x1="106" y1="68" x2="120" y2="68"/>
  <line class="cl" x1="120" y1="68" x2="120" y2="50"/>
  <!-- dimension -->
  <line class="mi" x1="120" y1="168" x2="220" y2="168"/>
  <text class="mc" x="170" y="178" text-anchor="middle">L=82mm PROXIMAL · STROKE 90°</text>
</g>
<text class="mc" x="10" y="292">p3 · index_finger · underactuated 3-phalanx · single motor · PA12 phalanx shells · spring return DIP</text>
</svg>
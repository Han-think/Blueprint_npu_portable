<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">COUPLER (FLOATING LINK)</text>
<text x="12" y="26" class="mc">Al 7075 OR CFRP · TRACE-POINT EXTENSION ARM · ADJUSTABLE TRACING POINT</text>
<!-- main coupler body (angled arm) -->
<path d="M100 200 L300 120 L310 140 L110 220 Z" class="sk"/>
<!-- crank connection bore (left end) -->
<circle cx="108" cy="210" r="14" class="sk"/>
<circle cx="108" cy="210" r="8" class="nz"/>
<!-- rocker connection bore (right end) -->
<circle cx="304" cy="130" r="14" class="sk"/>
<circle cx="304" cy="130" r="8" class="nz"/>
<!-- trace-point extension arm (perpendicular branch) -->
<path d="M200 162 L240 92 L254 100 L214 170 Z" class="pa"/>
<!-- trace point at extension tip -->
<circle cx="247" cy="96" r="8" class="ma"/>
<circle cx="247" cy="96" r="4" class="nz"/>
<!-- adjustment slot on extension -->
<rect x="218" y="130" width="8" height="28" rx="2" class="nz"/>
<!-- coupler midpoint -->
<circle cx="205" cy="165" r="5" class="rv"/>
<!-- callouts -->
<line x1="108" y1="196" x2="38" y2="160" class="cl"/><text x="10" y="158" class="ct">Crank-Coupler Pin Ø12</text>
<line x1="304" y1="116" x2="360" y2="88" class="cl"/><text x="362" y="86" class="ct">Rocker-Coupler Pin Ø12</text>
<line x1="247" y1="88" x2="320" y2="55" class="cl"/><text x="322" y="53" class="ct">Trace Point (Coupler Curve)</text>
<line x1="222" y1="140" x2="140" y2="110" class="cl"/><text x="80" y="108" class="ct">Adj. Slot ±20mm</text>
<line x1="185" y1="185" x2="60" y2="210" class="cl"/><text x="10" y="208" class="ct">Al 7075 / CFRP Arm</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P3 COUPLER LINK · TRACE-POINT EXT ARM</text>
</svg>
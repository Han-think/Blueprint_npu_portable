<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">ENCODER + DRIVE MOTOR</text>
<text x="12" y="26" class="mc">INPUT SHAFT 2500ppr ENCODER · SERVO MOTOR 50W · BACKLASH-FREE COUPLING · CLOSED-LOOP</text>
<!-- servo motor body -->
<rect x="230" y="90" width="130" height="120" rx="8" class="sk"/>
<rect x="244" y="104" width="102" height="92" rx="4" class="pa"/>
<!-- motor shaft -->
<rect x="290" y="70" width="18" height="24" rx="3" class="sk"/>
<!-- encoder body (attached to motor) -->
<rect x="60" y="100" width="90" height="80" rx="6" class="sk"/>
<rect x="72" y="110" width="66" height="60" rx="3" class="pa"/>
<!-- encoder disk inside -->
<circle cx="105" cy="140" r="24" class="mi"/>
<circle cx="105" cy="140" r="16" class="pa"/>
<circle cx="105" cy="140" r="8" class="nz"/>
<!-- quadrature signal lines on disk -->
<path d="M105 116 L112 130 L105 140" class="mi"/>
<path d="M129 140 L116 147 L105 140" class="mi"/>
<!-- coupling between motor and encoder -->
<rect x="150" y="128" width="80" height="24" rx="6" class="sk"/>
<line x1="170" y1="132" x2="170" y2="148" class="mi"/>
<line x1="185" y1="132" x2="185" y2="148" class="mi"/>
<line x1="200" y1="132" x2="200" y2="148" class="mi"/>
<line x1="215" y1="132" x2="215" y2="148" class="mi"/>
<!-- wiring harness from encoder -->
<path d="M60 140 Q30 140 30 180 L60 180" class="mi"/>
<!-- callouts -->
<line x1="299" y1="70" x2="340" y2="45" class="cl"/><text x="342" y="43" class="ct">Motor Shaft to Linkage</text>
<line x1="360" y1="150" x2="390" y2="130" class="cl"/><text x="392" y="128" class="ct">50W Servo Motor</text>
<line x1="188" y1="128" x2="188" y2="80" class="cl"/><text x="150" y="76" class="ct">Backlash-free Coupling</text>
<line x1="105" y1="116" x2="50" y2="72" class="cl"/><text x="10" y="70" class="ct">2500ppr Encoder Disk</text>
<line x1="60" y1="155" x2="20" y2="170" class="cl"/><text x="10" y="168" class="ct">Closed-Loop Output</text>
<line x1="295" y1="192" x2="350" y2="215" class="cl"/><text x="352" y="213" class="ct">Encoder Closed-Loop</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P7 ENCODER+MOTOR · 2500ppr · 50W · BACKLASH-FREE</text>
</svg>
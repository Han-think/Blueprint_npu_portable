<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">ROCKER (OUTPUT LINK)</text>
<text x="12" y="26" class="mc">Ti-6Al-4V · OUTPUT SHAFT BORE Ø20H7 · 100N·m TORQUE OUTPUT · ENCODER DISK MOUNT</text>
<!-- rocker arm body -->
<rect x="130" y="125" width="170" height="50" rx="8" class="sk"/>
<!-- ground pivot bore (left - fixed to frame) -->
<circle cx="145" cy="150" r="20" class="sk"/>
<circle cx="145" cy="150" r="12" class="nz"/>
<!-- coupler attachment bore (right top) -->
<circle cx="285" cy="150" r="16" class="sk"/>
<circle cx="285" cy="150" r="9" class="nz"/>
<!-- output shaft bore center -->
<circle cx="145" cy="150" r="16" class="mi"/>
<!-- encoder disk mount (flange on frame side pivot) -->
<circle cx="145" cy="150" r="30" class="pa"/>
<!-- encoder bolt pattern x4 -->
<circle cx="145" cy="120" r="4" class="pa"/>
<circle cx="175" cy="150" r="4" class="pa"/>
<circle cx="145" cy="180" r="4" class="pa"/>
<circle cx="115" cy="150" r="4" class="pa"/>
<!-- rocker throw dimension -->
<line x1="145" y1="86" x2="285" y2="86" class="ma"/>
<line x1="145" y1="80" x2="145" y2="92" class="mi"/>
<line x1="285" y1="80" x2="285" y2="92" class="mi"/>
<text x="215" y="82" text-anchor="middle" class="mc">ROCKER LENGTH ~140mm</text>
<!-- callouts -->
<line x1="145" y1="130" x2="50" y2="88" class="cl"/><text x="10" y="86" class="ct">Output Shaft Bore Ø20H7</text>
<line x1="175" y1="150" x2="310" y2="108" class="cl"/><text x="312" y="106" class="ct">Encoder Disk Flange</text>
<line x1="285" y1="134" x2="360" y2="96" class="cl"/><text x="362" y="94" class="ct">Coupler Pin Bore Ø12</text>
<line x1="145" y1="170" x2="50" y2="200" class="cl"/><text x="10" y="198" class="ct">Frame Pivot Fixed</text>
<line x1="215" y1="175" x2="280" y2="215" class="cl"/><text x="282" y="213" class="ct">100N·m Output Torque</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P4 ROCKER OUTPUT · Ti · Ø20H7 · 100N·m</text>
</svg>
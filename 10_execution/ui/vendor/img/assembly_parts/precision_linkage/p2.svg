<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CRANK (INPUT LINK)</text>
<text x="12" y="26" class="mc">Ti-6Al-4V · Ø12mm PIVOT PINS · BALANCED MASS · DRIVER ATTACHMENT BOSS</text>
<!-- crank arm body -->
<rect x="140" y="130" width="160" height="40" rx="8" class="sk"/>
<!-- input pivot bore (drive motor side - left) -->
<circle cx="155" cy="150" r="20" class="sk"/>
<circle cx="155" cy="150" r="12" class="nz"/>
<!-- output pivot bore (coupler connection - right) -->
<circle cx="285" cy="150" r="16" class="sk"/>
<circle cx="285" cy="150" r="9" class="nz"/>
<!-- driver attachment boss (keyed bore) -->
<circle cx="155" cy="150" r="16" class="mi"/>
<rect x="151" y="134" width="8" height="8" class="nz"/>
<!-- mass balance calculation indicator - symmetry lines -->
<line x1="155" y1="108" x2="155" y2="192" class="mi"/>
<line x1="100" y1="150" x2="340" y2="150" class="mi"/>
<!-- crank throw dimension -->
<line x1="155" y1="86" x2="285" y2="86" class="ma"/>
<line x1="155" y1="80" x2="155" y2="92" class="mi"/>
<line x1="285" y1="80" x2="285" y2="92" class="mi"/>
<text x="220" y="82" text-anchor="middle" class="mc">THROW RADIUS ~65mm</text>
<!-- Ti material callout lines on body -->
<line x1="200" y1="130" x2="210" y2="90" class="mi"/>
<!-- callouts -->
<line x1="155" y1="130" x2="60" y2="85" class="cl"/><text x="10" y="83" class="ct">Input Drive Boss Keyway</text>
<line x1="285" y1="134" x2="360" y2="90" class="cl"/><text x="362" y="88" class="ct">Coupler Pin Bore Ø12</text>
<line x1="200" y1="130" x2="250" y2="68" class="cl"/><text x="252" y="66" class="ct">Ti-6Al-4V Balanced</text>
<line x1="155" y1="170" x2="60" y2="195" class="cl"/><text x="10" y="193" class="ct">Ground Pivot Bore Ø12</text>
<line x1="285" y1="166" x2="360" y2="195" class="cl"/><text x="362" y="193" class="ct">Crank Throw ~65mm</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P2 CRANK INPUT · Ti-6Al-4V · Ø12 PIVOT · BALANCED</text>
</svg>
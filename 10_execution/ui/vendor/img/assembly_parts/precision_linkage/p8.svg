<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">ADJUSTMENT ECCENTRIC</text>
<text x="12" y="26" class="mc">ECCENTRIC BUSHING · ±2mm CENTER ADJ · LOCKING SET SCREW · GROUND OD H7 FIT</text>
<!-- eccentric bushing outer OD -->
<circle cx="210" cy="155" r="72" class="sk"/>
<!-- outer ground OD (H7 fit) -->
<circle cx="210" cy="155" r="68" class="pa"/>
<!-- eccentric bore (offset from center) -->
<circle cx="222" cy="155" r="32" class="nz"/>
<!-- offset indicator: center of outer vs inner -->
<circle cx="210" cy="155" r="3" class="rv"/>
<circle cx="222" cy="155" r="3" class="rv"/>
<!-- offset dimension line -->
<line x1="210" y1="155" x2="222" y2="155" class="ma"/>
<text x="216" y="148" text-anchor="middle" class="mc">e=±2mm</text>
<!-- angular adjustment marks at 0°, 90°, 180°, 270° on outer rim -->
<line x1="210" y1="83" x2="210" y2="93" class="ma"/>
<line x1="282" y1="155" x2="272" y2="155" class="ma"/>
<line x1="210" y1="227" x2="210" y2="217" class="ma"/>
<line x1="138" y1="155" x2="148" y2="155" class="ma"/>
<!-- set screw hole on outer rim -->
<circle cx="278" cy="118" r="6" class="nz"/>
<!-- rotation arrow -->
<path d="M210 83 Q282 83 282 155" class="mi" stroke-dasharray="4 3"/>
<!-- bore relief groove -->
<circle cx="222" cy="155" r="36" class="mi"/>
<!-- callouts -->
<line x1="210" y1="83" x2="140" y2="48" class="cl"/><text x="80" y="46" class="ct">Outer OD Ground H7</text>
<line x1="278" y1="118" x2="360" y2="90" class="cl"/><text x="362" y="88" class="ct">Set Screw Lock M5</text>
<line x1="254" y1="155" x2="360" y2="145" class="cl"/><text x="362" y="143" class="ct">Eccentric Bore ±2mm</text>
<line x1="148" y1="155" x2="48" y2="140" class="cl"/><text x="10" y="138" class="ct">Angular Adj. Scale</text>
<line x1="210" y1="227" x2="210" y2="262" class="cl"/><text x="155" y="270" class="ct">Install in H7 Frame Bore</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P8 ECCENTRIC BUSHING · ±2mm ADJ · SET SCREW</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">FRAME (GROUND LINK)</text>
<text x="12" y="26" class="mc">Al 7075 · PRECISION-BORED PIVOT HOLES Ø12H6 · FLATNESS &lt;0.005mm · HARD ANODIZED</text>
<!-- frame body: rectangular base plate -->
<rect x="60" y="90" width="300" height="130" rx="6" class="sk"/>
<!-- weight-relief pockets -->
<rect x="80" y="108" width="100" height="94" rx="4" class="pa"/>
<rect x="240" y="108" width="100" height="94" rx="4" class="pa"/>
<!-- center web -->
<rect x="190" y="108" width="40" height="94" rx="2" class="mi"/>
<!-- precision pivot bores x2 (left and right) -->
<circle cx="130" cy="155" r="18" class="sk"/>
<circle cx="130" cy="155" r="12" class="nz"/>
<circle cx="290" cy="155" r="18" class="sk"/>
<circle cx="290" cy="155" r="12" class="nz"/>
<!-- mounting holes on base edges -->
<circle cx="80" cy="100" r="5" class="pa"/>
<circle cx="340" cy="100" r="5" class="pa"/>
<circle cx="80" cy="210" r="5" class="pa"/>
<circle cx="340" cy="210" r="5" class="pa"/>
<circle cx="210" cy="100" r="5" class="pa"/>
<circle cx="210" cy="210" r="5" class="pa"/>
<!-- flatness datum symbol bottom edge -->
<line x1="60" y1="226" x2="360" y2="226" class="mi"/>
<line x1="120" y1="226" x2="120" y2="238" class="mi"/>
<line x1="300" y1="226" x2="300" y2="238" class="mi"/>
<!-- callouts -->
<line x1="130" y1="137" x2="60" y2="62" class="cl"/><text x="10" y="60" class="ct">Pivot Bore Ø12H6</text>
<line x1="290" y1="137" x2="360" y2="62" class="cl"/><text x="362" y="60" class="ct">Pivot Bore Ø12H6</text>
<line x1="210" y1="90" x2="280" y2="50" class="cl"/><text x="282" y="48" class="ct">Al 7075 Hard Anodized</text>
<line x1="80" y1="155" x2="20" y2="148" class="cl"/><text x="10" y="146" class="ct">Lightening Pocket</text>
<line x1="210" y1="226" x2="210" y2="260" class="cl"/><text x="165" y="268" class="ct">Flatness &lt;0.005mm</text>
<text x="210" y="292" text-anchor="middle" class="mc">PRECISION LINKAGE · P1 FRAME/GROUND LINK · Al 7075 · Ø12H6 BORES</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">WAVE GENERATOR</text>
<text x="12" y="26" class="mc">52100 STEEL ELLIPTICAL CAM · RADIAL BALL BEARING · Ø30mm INPUT BORE KEY</text>
<!-- elliptical cam body -->
<ellipse cx="210" cy="150" rx="88" ry="58" class="sk"/>
<!-- bearing race outer on cam OD -->
<ellipse cx="210" cy="150" rx="88" ry="58" class="ma"/>
<ellipse cx="210" cy="150" rx="80" ry="50" class="mi"/>
<!-- bearing balls indication at major/minor axes -->
<circle cx="298" cy="150" r="6" class="pa"/>
<circle cx="122" cy="150" r="6" class="pa"/>
<circle cx="210" cy="92" r="6" class="pa"/>
<circle cx="210" cy="208" r="6" class="pa"/>
<!-- intermediate ball positions -->
<circle cx="280" cy="108" r="5" class="pa"/>
<circle cx="140" cy="108" r="5" class="pa"/>
<circle cx="280" cy="192" r="5" class="pa"/>
<circle cx="140" cy="192" r="5" class="pa"/>
<!-- keyway shaft bore -->
<circle cx="210" cy="150" r="22" class="nz"/>
<rect x="206" y="128" width="8" height="10" class="nz"/>
<!-- major/minor axis lines -->
<line x1="122" y1="150" x2="298" y2="150" class="mi"/>
<line x1="210" y1="92" x2="210" y2="208" class="mi"/>
<!-- callouts -->
<line x1="298" y1="150" x2="380" y2="130" class="cl"/><text x="382" y="128" class="ct">Major Axis (Ø176)</text>
<line x1="210" y1="92" x2="330" y2="70" class="cl"/><text x="332" y="68" class="ct">Minor Axis (Ø116)</text>
<line x1="210" y1="135" x2="330" y2="105" class="cl"/><text x="332" y="103" class="ct">Input Bore Ø30 + Key</text>
<line x1="140" y1="120" x2="38" y2="90" class="cl"/><text x="10" y="88" class="ct">Radial Ball Bearing</text>
<line x1="150" y1="180" x2="38" y2="200" class="cl"/><text x="10" y="198" class="ct">Cam 52100 Steel</text>
<text x="210" y="292" text-anchor="middle" class="mc">HARMONIC DRIVE · P3 WAVE GENERATOR · ELLIPTICAL CAM + BEARING</text>
</svg>
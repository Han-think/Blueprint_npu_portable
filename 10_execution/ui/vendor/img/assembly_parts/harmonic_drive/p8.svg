<line x1="318" y1="154" x2="382" y2="145" class="cl"/><text x="382" y="143" class="ct">SPI 4-wire Header</text>
<line x1="210" y1="170" x2="380" y2="185" class="cl"/><text x="382" y="183" class="ct">AS5048A 14-bit</text>
<line x1="116" y1="106" x2="38" y2="88" class="cl"/><text x="10" y="86" class="ct">M3 Standoff x4</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CROSS-ROLLER OUTPUT BEARING</text>
<text x="12" y="26" class="mc">Ø100mm · ±0.001mm AXIAL RUNOUT · 1000Nm MOMENT LOAD · 52100 STEEL</text>
<!-- outer ring -->
<circle cx="210" cy="152" r="100" class="sk"/>
<circle cx="210" cy="152" r="88" class="pa"/>
<!-- inner ring -->
<circle cx="210" cy="152" r="74" class="sk"/>
<circle cx="210" cy="152" r="62" class="pa"/>
<!-- cross-roller arrangement: alternating 45° rollers -->
<g class="ma">
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(0 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(30 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(60 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(90 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(120 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(150 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(180 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(210 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(240 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(270 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(300 210 152)"/>
  <rect x="204" y="64" width="12" height="22" rx="2" transform="rotate(330 210 152)"/>
</g>
<!-- center bore -->
<circle cx="210" cy="152" r="40" class="nz"/>
<!-- race groove -->
<circle cx="210" cy="152" r="81" class="mi"/>
<!-- callouts -->
<line x1="310" y1="110" x2="382" y2="90" class="cl"/><text x="382" y="88" class="ct">OD=Ø200 Outer Ring</text>
<line x1="210" y1="52" x2="330" y2="40" class="cl"/><text x="332" y="38" class="ct">Cross-Roller ×12</text>
<line x1="284" y1="152" x2="382" y2="145" class="cl"/><text x="382" y="143" class="ct">±0.001mm Runout</text>
<line x1="170" y1="152" x2="60" y2="135" class="cl"/><text x="10" y="133" class="ct">ID=Ø100 Inner Ring</text>
<line x1="150" y1="185" x2="60" y2="200" class="cl"/><text x="10" y="198" class="ct">1000Nm Moment Cap</text>
<text x="210" y="292" text-anchor="middle" class="mc">HARMONIC DRIVE · P7 CROSS-ROLLER OUTPUT BEARING · Ø100 · 1000Nm</text>
</svg>
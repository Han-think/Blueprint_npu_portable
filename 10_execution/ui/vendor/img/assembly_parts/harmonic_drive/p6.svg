<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">HOUSING + SEAL</text>
<text x="12" y="26" class="mc">Al 7075 · OIL/GREASE-PACKED · DUAL LIP SEAL · M4 BOLT-ON MOUNT</text>
<!-- housing outer wall cross-section (rectangular outline with flanges) -->
<rect x="80" y="80" width="260" height="140" rx="8" class="sk"/>
<!-- inner cavity -->
<rect x="96" y="96" width="228" height="108" rx="4" class="pa"/>
<!-- seal grooves left and right -->
<rect x="80" y="108" width="16" height="24" rx="2" class="nz"/>
<rect x="80" y="168" width="16" height="24" rx="2" class="nz"/>
<rect x="324" y="108" width="16" height="24" rx="2" class="nz"/>
<rect x="324" y="168" width="16" height="24" rx="2" class="nz"/>
<!-- grease port -->
<circle cx="210" cy="80" r="6" class="nz"/>
<!-- mounting bolt holes on flanges -->
<circle cx="110" cy="80" r="4" class="pa"/>
<circle cx="310" cy="80" r="4" class="pa"/>
<circle cx="110" cy="220" r="4" class="pa"/>
<circle cx="310" cy="220" r="4" class="pa"/>
<!-- center bore through -->
<rect x="155" y="80" width="110" height="140" rx="2" class="pa"/>
<circle cx="210" cy="150" r="35" class="nz"/>
<!-- thermal fin suggestion -->
<line x1="100" y1="220" x2="100" y2="240" class="mi"/>
<line x1="120" y1="220" x2="120" y2="240" class="mi"/>
<line x1="140" y1="220" x2="140" y2="240" class="mi"/>
<line x1="280" y1="220" x2="280" y2="240" class="mi"/>
<line x1="300" y1="220" x2="300" y2="240" class="mi"/>
<line x1="320" y1="220" x2="320" y2="240" class="mi"/>
<!-- callouts -->
<line x1="88" y1="120" x2="30" y2="100" class="cl"/><text x="10" y="98" class="ct">Dual Lip Seal</text>
<line x1="210" y1="80" x2="210" y2="50" class="cl"/><text x="175" y="46" class="ct">Grease Nipple M6</text>
<line x1="340" y1="150" x2="400" y2="130" class="cl"/><text x="382" y="128" class="ct">Al 7075 Housing</text>
<line x1="245" y1="150" x2="380" y2="165" class="cl"/><text x="382" y="163" class="ct">Center Bore Ø70</text>
<line x1="160" y1="200" x2="60" y2="215" class="cl"/><text x="10" y="213" class="ct">M4 Mount Bolt x4</text>
<line x1="200" y1="100" x2="60" y2="80" class="cl"/><text x="10" y="78" class="ct">Grease-Packed Cavity</text>
<text x="210" y="292" text-anchor="middle" class="mc">HARMONIC DRIVE · P6 HOUSING+SEAL · Al 7075 · DUAL LIP SEAL</text>
</svg>
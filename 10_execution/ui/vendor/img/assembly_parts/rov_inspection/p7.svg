<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SONAR / SENSOR MOUNT</text>
<text x="12" y="26" class="mc">FORWARD SONAR + DVL MOUNT · ±15° TILT · DRAG FAIRING · CABLE STRAIN RELIEF</text>
<!-- drag fairing body -->
<path d="M80 150 Q80 80 210 60 Q340 80 340 150 Q340 220 210 240 Q80 220 80 150 Z" class="sk"/>
<path d="M95 150 Q95 90 210 72 Q325 90 325 150 Q325 210 210 228 Q95 210 95 150 Z" class="pa"/>
<!-- forward sonar transducer (front face) -->
<ellipse cx="210" cy="90" rx="55" ry="18" class="ma"/>
<ellipse cx="210" cy="90" rx="40" ry="12" class="mi"/>
<!-- DVL transducers (4-beam at corners) -->
<circle cx="160" cy="165" r="10" class="nz"/>
<circle cx="260" cy="165" r="10" class="nz"/>
<circle cx="160" cy="205" r="10" class="nz"/>
<circle cx="260" cy="205" r="10" class="nz"/>
<!-- tilt adjustment slot -->
<path d="M190 108 A20 20 0 0 1 230 108" class="ma"/>
<!-- cable exit with strain relief -->
<rect x="192" y="228" width="36" height="22" rx="4" class="pa"/>
<path d="M200 248 Q210 260 220 248" class="mi"/>
<!-- mount pivot point -->
<circle cx="210" cy="150" r="8" class="nz"/>
<!-- callouts -->
<line x1="210" y1="72" x2="340" y2="45" class="cl"/><text x="342" y="43" class="ct">Forward Sonar Array</text>
<line x1="260" y1="155" x2="380" y2="140" class="cl"/><text x="382" y="138" class="ct">DVL 4-Beam ×4</text>
<line x1="210" y1="108" x2="310" y2="100" class="cl"/><text x="312" y="98" class="ct">±15° Tilt Adjust</text>
<line x1="95" y1="150" x2="30" y2="135" class="cl"/><text x="10" y="133" class="ct">Drag Fairing GRP</text>
<line x1="210" y1="248" x2="280" y2="268" class="cl"/><text x="282" y="266" class="ct">Cable Strain Relief</text>
<text x="210" y="292" text-anchor="middle" class="mc">ROV INSPECTION · P7 SONAR/SENSOR MOUNT · DVL + FWD SONAR · ±15°</text>

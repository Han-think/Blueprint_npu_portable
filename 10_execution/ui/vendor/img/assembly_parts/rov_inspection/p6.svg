<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">MANIPULATOR ARM (5-DOF)</text>
<text x="12" y="26" class="mc">5-DOF INSPECTION ARM · GRIPPER EE · OIL-COMPENSATED JOINTS · 5kg LIFT</text>
<!-- base mount -->
<rect x="60" y="220" width="60" height="32" rx="6" class="sk"/>
<circle cx="90" cy="220" r="14" class="pa"/>
<!-- joint 1 (rotation base) -->
<circle cx="90" cy="220" r="10" class="nz"/>
<!-- link 1 (base-shoulder) -->
<rect x="82" y="160" width="16" height="64" rx="4" class="sk"/>
<!-- joint 2 (shoulder) -->
<circle cx="90" cy="158" r="12" class="pa"/>
<circle cx="90" cy="158" r="7" class="nz"/>
<!-- link 2 (upper arm) -->
<rect x="88" y="108" width="14" height="54" rx="4" class="sk" transform="rotate(-15 90 158)"/>
<!-- joint 3 (elbow) -->
<circle cx="118" cy="118" r="10" class="pa"/>
<circle cx="118" cy="118" r="6" class="nz"/>
<!-- link 3 (forearm) -->
<rect x="115" y="72" width="12" height="50" rx="4" class="sk" transform="rotate(10 118 118)"/>
<!-- joint 4 (wrist pitch) -->
<circle cx="140" cy="82" r="9" class="pa"/>
<circle cx="140" cy="82" r="5" class="nz"/>
<!-- link 4 (wrist) -->
<rect x="138" y="55" width="10" height="30" rx="3" class="sk" transform="rotate(-5 140 82)"/>
<!-- joint 5 (wrist roll) -->
<circle cx="148" cy="55" r="8" class="pa"/>
<circle cx="148" cy="55" r="4" class="nz"/>
<!-- gripper end effector -->
<path d="M148 47 L165 30 L175 35 L160 55 Z" class="sk"/>
<path d="M148 47 L131 30 L121 35 L136 55 Z" class="sk"/>
<!-- oil compensation indicator -->
<rect x="200" y="155" width="48" height="16" rx="3" class="pa"/>
<text x="224" y="166" text-anchor="middle" class="mc">OIL COMP.</text>
<!-- callouts -->
<line x1="90" y1="235" x2="38" y2="260" class="cl"/><text x="10" y="258" class="ct">Base Rotation J1</text>
<line x1="90" y1="148" x2="20" y2="138" class="cl"/><text x="10" y="136" class="ct">Shoulder J2 Oil-Comp</text>
<line x1="118" y1="108" x2="60" y2="90" class="cl"/><text x="10" y="88" class="ct">Elbow J3</text>
<line x1="150" y1="55" x2="280" y2="38" class="cl"/><text x="282" y="36" class="ct">Gripper EE 5kg Lift</text>
<line x1="248" y1="163" x2="320" y2="155" class="cl"/><text x="322" y="153" class="ct">Oil-filled Joints</text>
<text x="210" y="292" text-anchor="middle" class="mc">ROV INSPECTION · P6 MANIPULATOR 5-DOF · OIL-COMP · 5kg LIFT</text>
</svg>
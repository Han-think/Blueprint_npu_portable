<line x1="210" y1="98" x2="210" y2="132" class="mi"/>
<line x1="210" y1="168" x2="210" y2="202" class="mi"/>
<!-- mount bracket extending from guard -->
<rect x="258" y="138" width="50" height="24" rx="4" class="pa"/>
<circle cx="296" cy="150" r="8" class="nz"/>
<!-- configuration diagram (6-thruster layout, small) -->
<rect x="340" y="60" width="68" height="68" rx="4" class="pa"/>
<text x="374" y="78" text-anchor="middle" class="mc">4H+2V</text>
<text x="374" y="90" text-anchor="middle" class="mc">CONFIG</text>
<text x="374" y="102" text-anchor="middle" class="mc">5-DOF</text>
<!-- callouts -->
<line x1="210" y1="95" x2="140" y2="60" class="cl"/><text x="100" y="58" class="ct">Guard Ring Ø110mm</text>
<line x1="248" y1="138" x2="340" y2="108" class="cl"/><text x="342" y="106" class="ct">Angled Mount Bracket</text>
<line x1="250" y1="155" x2="330" y2="165" class="cl"/><text x="332" y="163" class="ct">Thrust Force ~5.1kgf</text>
<line x1="200" y1="140" x2="90" y2="108" class="cl"/><text x="10" y="106" class="ct">Brushless DC Ø85 Motor</text>
<line x1="160" y1="165" x2="60" y2="195" class="cl"/><text x="10" y="193" class="ct">T200 w/ Cable Penetrator</text>
<text x="210" y="292" text-anchor="middle" class="mc">ROV INSPECTION · P2 THRUSTER x6 · T200-CLASS · VECTORED · 5-DOF</text>

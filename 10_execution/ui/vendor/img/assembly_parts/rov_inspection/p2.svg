<!-- thruster body -->
<circle cx="210" cy="150" r="55" class="sk"/>
<circle cx="210" cy="150" r="42" class="pa"/>
<!-- propeller blades -->
<ellipse cx="210" cy="150" rx="38" ry="14" class="ma"/>
<path d="M172 150 Q210 128 248 150 Q210 172 172 150" class="ma"/>
<!-- motor hub center -->
<circle cx="210" cy="150" r="18" class="sk"/>
<circle cx="210" cy="150" r="10" class="nz"/>

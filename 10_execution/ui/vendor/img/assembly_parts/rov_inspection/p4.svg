<circle cx="210" cy="155" r="20" class="mi"/>
<circle cx="210" cy="155" r="12" class="nz"/>
<!-- bolt holes on flange -->
<circle cx="110" cy="209" r="5" class="pa"/>
<circle cx="145" cy="209" r="5" class="pa"/>
<circle cx="210" cy="209" r="5" class="pa"/>

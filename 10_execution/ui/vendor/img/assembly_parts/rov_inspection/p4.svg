<line x1="210" y1="80" x2="320" y2="48" class="cl"/><text x="322" y="46" class="ct">Acrylic Dome Ø100mm</text>
<line x1="302" y1="140" x2="380" y2="120" class="cl"/><text x="382" y="118" class="ct">Anti-Fog Coating</text>
<line x1="210" y1="140" x2="350" y2="155" class="cl"/><text x="352" y="153" class="ct">Camera Housing</text>
<line x1="100" y1="205" x2="30" y2="195" class="cl"/><text x="10" y="193" class="ct">Double O-ring Seal</text>
<line x1="160" y1="222" x2="60" y2="240" class="cl"/><text x="10" y="238" class="ct">M4 Flange Bolt x6</text>
<text x="210" y="292" text-anchor="middle" class="mc">ROV INSPECTION · P4 CAMERA DOME · ACRYLIC · Ø100 · DBL O-RING</text>

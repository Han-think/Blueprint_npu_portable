<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">COMMUNICATION MAST</text>
<text x="12" y="26" class="mc">IRIDIUM + WiFi + CELLULAR · AIS + GPS · NAV LIGHT · BIRD DETERRENT · FOLD-DOWN</text>
<!-- mast base with fold hinge -->
<rect x="190" y="240" width="40" height="30" rx="5" class="sk"/>
<circle cx="210" cy="242" r="10" class="nz"/>
<!-- mast tube -->
<rect x="205" y="80" width="10" height="164" rx="3" class="sk"/>
<!-- Iridium dome (top) -->
<circle cx="210" cy="65" r="18" class="pa"/>
<circle cx="210" cy="65" r="10" class="nz"/>
<text x="210" y="68" text-anchor="middle" class="mc">IRD</text>
<!-- WiFi/cellular antenna collar -->
<rect x="196" y="95" width="28" height="12" rx="4" class="pa"/>
<!-- AIS antenna (stub whip) -->
<line x1="225" y1="110" x2="248" y2="95" class="ma"/>
<circle cx="250" cy="93" r="5" class="nz"/>
<!-- GPS patch -->
<rect x="196" y="120" width="18" height="10" rx="3" class="pa"/>
<!-- nav light (white all-round) -->
<circle cx="225" cy="148" r="7" class="ma"/>
<!-- bird deterrent spike (top of dome) -->
<line x1="210" y1="47" x2="210" y2="32" class="ma"/>
<line x1="204" y1="38" x2="216" y2="38" class="mi"/>
<!-- fold position dashed -->
<path d="M210 242 Q245 242 252 220 Q258 200 248 185" class="mi" stroke-dasharray="4 3"/>
<!-- callouts -->
<line x1="210" y1="47" x2="300" y2="25" class="cl"/><text x="302" y="23" class="ct">Bird Deterrent Spike</text>
<line x1="210" y1="65" x2="310" y2="50" class="cl"/><text x="312" y="48" class="ct">Iridium SBD Dome</text>
<line x1="224" y1="101" x2="320" y2="88" class="cl"/><text x="322" y="86" class="ct">WiFi + 4G Antenna</text>
<line x1="250" y1="93" x2="340" y2="110" class="cl"/><text x="342" y="108" class="ct">AIS Whip Antenna</text>
<line x1="225" y1="148" x2="340" y2="148" class="cl"/><text x="342" y="146" class="ct">Nav Light (All-Round)</text>
<line x1="210" y1="248" x2="80" y2="262" class="cl"/><text x="10" y="268" class="ct">Fold-Down Hinge</text>
<text x="210" y="292" text-anchor="middle" class="mc">WAVE GLIDER ASV · P7 COMM MAST · IRIDIUM+WiFi+4G+AIS+GPS</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">WAVE FIN ARRAY x4</text>
<text x="12" y="26" class="mc">NACA 0012 PASSIVE FINS · SPRING-DAMPER PIVOT · Al SPAR · 30kgf@1m/s HEAVE</text>
<!-- show 4 fins in tandem (side view of underwater body) -->
<!-- fin 1 (fwd) -->
<path d="M90 140 L90 220 L120 220 L120 160 Z" class="sk"/>
<path d="M95 145 L95 215 L115 215 L115 162 Z" class="pa"/>
<!-- fin 2 -->
<path d="M160 145 L160 215 L190 215 L190 165 Z" class="sk"/>
<path d="M165 150 L165 210 L185 210 L185 167 Z" class="pa"/>
<!-- fin 3 -->
<path d="M230 145 L230 215 L260 215 L260 165 Z" class="sk"/>
<path d="M235 150 L235 210 L255 210 L255 167 Z" class="pa"/>
<!-- fin 4 (aft) -->
<path d="M300 140 L300 220 L330 220 L330 160 Z" class="sk"/>
<path d="M305 145 L305 215 L325 215 L325 162 Z" class="pa"/>
<!-- pivot / spring-damper mechanism (top of each fin) -->
<circle cx="105" cy="140" r="10" class="pa"/>
<circle cx="105" cy="140" r="5" class="nz"/>
<circle cx="175" cy="145" r="10" class="pa"/>
<circle cx="175" cy="145" r="5" class="nz"/>
<circle cx="245" cy="145" r="10" class="pa"/>
<circle cx="245" cy="145" r="5" class="nz"/>
<circle cx="315" cy="140" r="10" class="pa"/>
<circle cx="315" cy="140" r="5" class="nz"/>
<!-- submerged body rail (keel) they mount to -->
<rect x="70" y="128" width="280" height="14" rx="4" class="sk"/>
<!-- oscillation arc indication -->
<path d="M90 158 A14 14 0 0 1 120 158" class="mi"/>
<path d="M160 163 A14 14 0 0 1 190 163" class="mi"/>
<!-- NACA profile inset -->
<path d="M350 180 Q380 175 390 180 Q380 185 350 180 Z" class="ma"/>
<text x="370" y="195" text-anchor="middle" class="mc">NACA 0012</text>
<!-- force annotation -->
<line x1="105" y1="220" x2="105" y2="255" class="ma"/>
<text x="105" y="270" text-anchor="middle" class="mc">THRUST</text>
<!-- callouts -->
<line x1="70" y1="135" x2="20" y2="110" class="cl"/><text x="10" y="108" class="ct">Keel Mount Rail</text>
<line x1="105" y1="130" x2="50" y2="95" class="cl"/><text x="10" y="93" class="ct">Spring-Damper Pivot</text>
<line x1="105" y1="180" x2="30" y2="190" class="cl"/><text x="10" y="188" class="ct">Al Spar NACA 0012</text>
<line x1="350" y1="128" x2="392" y2="108" class="cl"/><text x="392" y="106" class="ct">30kgf@1m/s Heave</text>
<text x="210" y="292" text-anchor="middle" class="mc">WAVE GLIDER ASV · P3 WAVE FIN x4 · NACA0012 · PASSIVE · 30kgf</text>
</svg>
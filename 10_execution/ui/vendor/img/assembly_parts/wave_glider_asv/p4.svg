<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">TETHER (UMBILICAL)</text>
<text x="12" y="26" class="mc">10m NEUTRAL BUOYANCY · DYNEEMA CORE · 4-CONDUCTOR POWER+RS-485 · SWIVEL BOTH ENDS</text>
<!-- tether cable (wavy/catenary) -->
<path d="M60 80 Q120 140 180 100 Q240 60 300 120 Q340 155 360 100" class="sk" fill="none" stroke-width="8"/>
<!-- outer jacket -->
<path d="M60 80 Q120 140 180 100 Q240 60 300 120 Q340 155 360 100" class="pa" fill="none" stroke-width="6"/>
<!-- cross-section detail inset (right side) -->
<circle cx="340" cy="200" r="38" class="sk"/>
<circle cx="340" cy="200" r="30" class="pa"/>
<!-- Dyneema core (center) -->
<circle cx="340" cy="200" r="12" class="sk"/>
<circle cx="340" cy="200" r="8" class="nz"/>
<!-- 4 conductors around core -->
<circle cx="340" cy="175" r="6" class="ma"/>
<circle cx="358" cy="188" r="6" class="ma"/>
<circle cx="358" cy="212" r="6" class="ma"/>
<circle cx="340" cy="225" r="6" class="ma"/>
<circle cx="322" cy="212" r="6" class="ma"/>
<circle cx="322" cy="188" r="6" class="ma"/>
<!-- swivel end (float side) -->
<circle cx="60" cy="80" r="16" class="pa"/>
<circle cx="60" cy="80" r="8" class="nz"/>
<!-- swivel end (sub side) -->
<circle cx="360" cy="100" r="16" class="pa"/>
<circle cx="360" cy="100" r="8" class="nz"/>
<!-- neutral buoyancy foam strips (along cable) -->
<ellipse cx="150" cy="112" rx="18" ry="6" class="mi"/>
<ellipse cx="240" cy="88" rx="18" ry="6" class="mi"/>
<!-- callouts -->
<line x1="60" y1="64" x2="20" y2="40" class="cl"/><text x="10" y="38" class="ct">Float Swivel</text>
<line x1="360" y1="84" x2="396" y2="60" class="cl"/><text x="382" y="58" class="ct">Sub Swivel</text>
<line x1="200" y1="95" x2="180" y2="45" class="cl"/><text x="110" y="43" class="ct">Neutral Buoyancy Foam</text>
<line x1="340" y1="175" x2="380" y2="148" class="cl"/><text x="382" y="146" class="ct">4-Conductor + Dyneema</text>
<line x1="340" y1="228" x2="340" y2="258" class="cl"/><text x="285" y="268" class="ct">Cross-Section Ø25mm</text>
<text x="210" y="292" text-anchor="middle" class="mc">WAVE GLIDER ASV · P4 TETHER 10m · DYNEEMA · 4-COND · SWIVEL ENDS</text>
</svg>
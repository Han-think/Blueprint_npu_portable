<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SENSOR PAYLOAD BAY</text>
<text x="12" y="26" class="mc">CTD + DO + ADCP · FLOW-THROUGH PLUMBING · WET-MATE CONNECTOR · FLUOROMETER</text>
<!-- payload bay housing (submerged, cylindrical section) -->
<rect x="80" y="90" width="260" height="130" rx="12" class="sk"/>
<rect x="94" y="103" width="232" height="104" rx="8" class="pa"/>
<!-- CTD sensor -->
<rect x="100" y="112" width="56" height="82" rx="5" class="pa"/>
<text x="128" y="135" text-anchor="middle" class="mc">CTD</text>
<circle cx="128" cy="170" r="14" class="nz"/>
<!-- ADCP (acoustic) sensor -->
<rect x="165" y="112" width="90" height="82" rx="5" class="pa"/>
<text x="210" y="130" text-anchor="middle" class="mc">ADCP</text>
<!-- ADCP transducer array (4-beam) -->
<circle cx="185" cy="165" r="10" class="nz"/>
<circle cx="210" cy="155" r="10" class="nz"/>
<circle cx="235" cy="165" r="10" class="nz"/>
<circle cx="210" cy="175" r="10" class="nz"/>
<!-- Fluorometer -->
<rect x="264" y="112" width="52" height="82" rx="5" class="pa"/>
<text x="290" y="135" text-anchor="middle" class="mc">FLUORO</text>
<circle cx="290" cy="165" r="14" class="pa"/>
<!-- flow-through port fore/aft -->
<rect x="60" y="142" width="22" height="26" rx="4" class="nz"/>
<rect x="338" y="142" width="22" height="26" rx="4" class="nz"/>
<!-- wet-mate connector (top) -->
<rect x="178" y="78" width="64" height="14" rx="4" class="nz"/>
<!-- callouts -->
<line x1="128" y1="90" x2="70" y2="55" class="cl"/><text x="10" y="53" class="ct">CTD Sensor</text>
<line x1="210" y1="90" x2="210" y2="52" class="cl"/><text x="165" y="48" class="ct">Wet-Mate Connector</text>
<line x1="290" y1="90" x2="360" y2="55" class="cl"/><text x="362" y="53" class="ct">Fluorometer</text>
<line x1="60" y1="155" x2="20" y2="148" class="cl"/><text x="10" y="146" class="ct">Flow-Through Inlet</text>
<line x1="210" y1="155" x2="350" y2="165" class="cl"/><text x="352" y="163" class="ct">ADCP 4-Beam</text>
<text x="210" y="292" text-anchor="middle" class="mc">WAVE GLIDER ASV · P6 SENSOR BAY · CTD+DO+ADCP+FLUORO</text>
</svg>
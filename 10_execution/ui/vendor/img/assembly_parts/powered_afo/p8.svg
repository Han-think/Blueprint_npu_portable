<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">CABLE MANAGEMENT COVER</text>
  <text class="mc" x="180" y="24">PCB TO ANKLE · SNAP-FIT · ABRASION-RESISTANT · LOW PROFILE</text>
  <!-- cover profile (side view - long narrow strip) -->
  <rect class="sk" x="80" y="90" width="240" height="32" rx="6"/>
  <!-- abrasion-resistant outer surface texture -->
  <rect class="pa" x="80" y="90" width="240" height="12" rx="4"/>
  <text class="mc" x="200" y="100" text-anchor="middle">ABRASION-RESISTANT OUTER SURFACE</text>
  <!-- cable channel cross-section (end view, shown right) -->
  <rect class="sk" x="338" y="80" width="30" height="52" rx="4"/>
  <rect class="pa" x="342" y="84" width="22" height="18" rx="2"/>
  <text class="mc" x="353" y="96" text-anchor="middle">CH</text>
  <text class="ct" x="353" y="112" text-anchor="middle">END</text>
  <text class="mc" x="353" y="120" text-anchor="middle">VIEW</text>
  <!-- snap-fit clips along cover -->
  <rect class="nz" x="104" y="122" width="14" height="12" rx="2"/>
  <text class="mc" x="111" y="140" text-anchor="middle">SNAP</text>
  <rect class="nz" x="154" y="122" width="14" height="12" rx="2"/>
  <rect class="nz" x="204" y="122" width="14" height="12" rx="2"/>
  <rect class="nz" x="254" y="122" width="14" height="12" rx="2"/>
  <rect class="nz" x="302" y="122" width="14" height="12" rx="2"/>
  <text class="mc" x="200" y="146" text-anchor="middle">SNAP-FIT CLIPS @ 60mm SPACING</text>
  <!-- cable bundle inside -->
  <line class="cl" x1="88" y1="102" x2="316" y2="102"/>
  <line class="cl" x1="88" y1="108" x2="316" y2="108"/>
  <text class="mc" x="200" y="116" text-anchor="middle">CABLE BUNDLE (2 CONDUCTORS)</text>
  <!-- PCB end connector -->
  <rect class="sk" x="60" y="84" width="22" height="44" rx="3"/>
  <line class="mi" x1="68" y1="92" x2="80" y2="92"/>
  <line class="mi" x1="68" y1="100" x2="80" y2="100"/>
  <line class="mi" x1="68" y1="108" x2="80" y2="108"/>
  <text class="mc" x="71" y="136" text-anchor="middle">PCB</text>
  <!-- ankle end connector -->
  <rect class="sk" x="318" y="84" width="22" height="44" rx="3"/>
  <line class="mi" x1="318" y1="92" x2="330" y2="92"/>
  <line class="mi" x1="318" y1="100" x2="330" y2="100"/>
  <line class="mi" x1="318" y1="108" x2="330" y2="108"/>
  <text class="mc" x="329" y="136" text-anchor="middle">ANKLE</text>
  <!-- profile height dimension -->
  <line class="mi" x1="80" y1="160" x2="320" y2="160"/>
  <text class="mc" x="200" y="170" text-anchor="middle">L≈320mm · H=8mm LOW PROFILE · SNAP-FIT REMOVAL</text>
</g>
<text class="mc" x="10" y="292">p8 · cable_mgmt_cover · snap-fit clips · abrasion-resistant shell · low-profile 8mm · PCB-to-ankle routing</text>
</svg>
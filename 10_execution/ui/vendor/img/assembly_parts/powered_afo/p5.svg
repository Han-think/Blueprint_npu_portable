<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">CONTROL PCB HOUSING</text>
  <text class="mc" x="180" y="24">IMU + FORCE SENSOR INPUTS · BLE RADIO · USB-C CHARGING</text>
  <!-- outer enclosure -->
  <rect class="sk" x="100" y="56" width="200" height="180" rx="6"/>
  <!-- PCB board layer -->
  <rect class="pa" x="110" y="68" width="180" height="152" rx="4"/>
  <!-- IMU chip -->
  <rect class="sk" x="125" y="82" width="38" height="28" rx="2"/>
  <text class="ct" x="144" y="100" text-anchor="middle">IMU</text>
  <text class="mc" x="144" y="114" text-anchor="middle">6-DOF</text>
  <!-- MCU -->
  <rect class="sk" x="175" y="80" width="50" height="32" rx="2"/>
  <text class="ct" x="200" y="98" text-anchor="middle">MCU</text>
  <!-- BLE radio module -->
  <rect class="sk" x="240" y="82" width="38" height="28" rx="2"/>
  <rect class="mi" x="245" y="88" width="28" height="16" rx="1"/>
  <text class="ct" x="259" y="102" text-anchor="middle">BLE</text>
  <!-- force sensor ADC -->
  <rect class="sk" x="125" y="124" width="50" height="24" rx="2"/>
  <text class="ct" x="150" y="140" text-anchor="middle">FSR ADC</text>
  <!-- gait state machine -->
  <rect class="sk" x="185" y="124" width="54" height="24" rx="2"/>
  <text class="ct" x="212" y="140" text-anchor="middle">GAIT SM</text>
  <!-- power regulation -->
  <rect class="sk" x="125" y="162" width="60" height="22" rx="2"/>
  <text class="ct" x="155" y="176" text-anchor="middle">POWER REG</text>
  <!-- MOSFET drivers -->
  <rect class="sk" x="196" y="162" width="44" height="22" rx="2"/>
  <text class="ct" x="218" y="176" text-anchor="middle">MOTOR DRV</text>
  <!-- USB-C connector at bottom -->
  <rect class="sk" x="172" y="210" width="36" height="16" rx="3"/>
  <text class="ct" x="190" y="222" text-anchor="middle">USB-C</text>
  <text class="mc" x="190" y="235" text-anchor="middle">CHARGING PORT</text>
  <!-- force input connectors left side -->
  <rect class="sk" x="100" y="130" width="12" height="40" rx="2"/>
  <line class="mi" x1="100" y1="136" x2="112" y2="136"/>
  <line class="mi" x1="100" y1="144" x2="112" y2="144"/>
  <line class="mi" x1="100" y1="152" x2="112" y2="152"/>
  <line class="mi" x1="100" y1="160" x2="112" y2="160"/>
  <text class="mc" x="72" y="152">FORCE IN</text>
  <!-- ankle motor out right side -->
  <rect class="sk" x="288" y="110" width="12" height="36" rx="2"/>
  <line class="mi" x1="288" y1="116" x2="300" y2="116"/>
  <line class="mi" x1="288" y1="124" x2="300" y2="124"/>
  <line class="mi" x1="288" y1="132" x2="300" y2="132"/>
  <text class="mc" x="304" y="130">MOTOR OUT</text>
</g>
<text class="mc" x="10" y="292">p5 · control_pcb_housing · IMU 6-DOF · FSR ADC · BLE · gait state machine MCU · USB-C · motor drive out</text>
</svg>
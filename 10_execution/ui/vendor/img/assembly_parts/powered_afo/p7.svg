<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">FORCE / PRESSURE INSOLE</text>
  <text class="mc" x="180" y="24">4-ZONE FSR · CABLE TO ANKLE JOINT · WASHABLE COVER</text>
  <!-- insole outline (top view - foot shape) -->
  <path class="sk" d="M120,52 Q140,38 180,36 Q240,34 280,52 Q310,68 318,100 Q324,136 310,170 Q290,210 240,232 Q200,246 160,240 Q120,232 106,200 Q90,170 94,130 Q98,88 120,52 Z"/>
  <!-- washable cover texture -->
  <path class="pa" d="M122,54 Q140,40 180,38 Q238,36 278,54 Q308,70 316,102 Q322,138 308,172 Q288,212 238,234 Q198,248 158,242 Q118,234 104,202 Q88,172 92,132 Q96,90 122,54 Z"/>
  <!-- FSR Zone 1: Heel -->
  <ellipse class="nz" cx="160" cy="202" rx="36" ry="24"/>
  <text class="ct" x="160" y="206" text-anchor="middle">FSR-1 HEEL</text>
  <!-- FSR Zone 2: Lateral midfoot -->
  <ellipse class="nz" cx="270" cy="162" rx="28" ry="20"/>
  <text class="ct" x="270" y="166" text-anchor="middle">FSR-2</text>
  <text class="mc" x="270" y="177" text-anchor="middle">LATERAL</text>
  <!-- FSR Zone 3: Metatarsal heads -->
  <ellipse class="nz" cx="240" cy="100" rx="44" ry="18"/>
  <text class="ct" x="240" y="104" text-anchor="middle">FSR-3 METATARSAL</text>
  <!-- FSR Zone 4: Big toe -->
  <ellipse class="nz" cx="190" cy="56" rx="22" ry="14"/>
  <text class="ct" x="190" y="60" text-anchor="middle">FSR-4 TOE</text>
  <!-- cable routing -->
  <path class="cl" d="M160,202 L160,180 L200,160 L240,140 L240,100"/>
  <path class="cl" d="M160,202 L172,220 L190,240"/>
  <text class="mc" x="118" y="165">CABLE ROUTE</text>
  <!-- cable exit at heel -->
  <rect class="sk" x="128" y="226" width="40" height="14" rx="3"/>
  <text class="ct" x="148" y="237" text-anchor="middle">CABLE EXIT</text>
  <!-- dimension -->
  <line class="mi" x1="92" y1="262" x2="322" y2="262"/>
  <text class="mc" x="207" y="272" text-anchor="middle">L≈280mm · EU 38–44 · WASHABLE COVER</text>
</g>
<text class="mc" x="10" y="292">p7 · pressure_insole · 4-zone FSR heel/lateral/metatarsal/toe · cable to ankle controller · washable cover</text>
</svg>
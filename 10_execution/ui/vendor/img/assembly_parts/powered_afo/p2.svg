<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">POWERED ANKLE JOINT</text>
  <text class="mc" x="180" y="24">±20° DORSI/PLANTARFLEXION · BLDC + HARMONIC DRIVE 50Nm · ANATOMICAL AXIS</text>
  <!-- outer housing -->
  <rect class="sk" x="110" y="80" width="160" height="110" rx="8"/>
  <!-- harmonic drive cross-section (concentric) -->
  <circle class="ma" cx="190" cy="135" r="44"/>
  <ellipse class="sk" cx="190" cy="135" rx="32" ry="30"/>
  <ellipse class="ma" cx="190" cy="135" rx="22" ry="20"/>
  <!-- flex spline wave -->
  <path class="mi" d="M168,135 Q174,120 180,135 Q186,150 192,135 Q198,120 204,135 Q210,150 212,135"/>
  <!-- motor rotor behind -->
  <circle class="mi" cx="190" cy="135" r="12"/>
  <line class="mi" x1="190" y1="123" x2="190" y2="147"/>
  <line class="mi" x1="178" y1="135" x2="202" y2="135"/>
  <text class="ct" x="190" y="138" text-anchor="middle">BLDC</text>
  <!-- rotation arc annotations ±20° -->
  <path class="cl" d="M150,90 A54,54 0 0 1 230,90"/>
  <text class="mc" x="190" y="86" text-anchor="middle">±20° TRAVEL</text>
  <text class="mc" x="125" y="90">DORSI</text>
  <text class="mc" x="225" y="90">PLANTAR</text>
  <!-- anatomical axis marker -->
  <line class="nz" x1="110" y1="135" x2="270" y2="135"/>
  <text class="mc" x="275" y="138">ANAT. AXIS</text>
  <!-- calf interface top -->
  <rect class="sk" x="155" y="56" width="70" height="24" rx="3"/>
  <line class="mi" x1="162" y1="56" x2="162" y2="80"/>
  <line class="mi" x1="172" y1="56" x2="172" y2="80"/>
  <line class="mi" x1="182" y1="56" x2="182" y2="80"/>
  <line class="mi" x1="192" y1="56" x2="192" y2="80"/>
  <line class="mi" x1="202" y1="56" x2="202" y2="80"/>
  <line class="mi" x1="212" y1="56" x2="212" y2="80"/>
  <text class="ct" x="190" y="72" text-anchor="middle">CALF SHELL MOUNT</text>
  <!-- foot plate interface -->
  <rect class="sk" x="130" y="190" width="120" height="18" rx="3"/>
  <text class="ct" x="190" y="203" text-anchor="middle">FOOT PLATE INTERFACE</text>
  <!-- torque label -->
  <text class="mc" x="60" y="135">50Nm PEAK</text>
  <line class="cl" x1="108" y1="135" x2="85" y2="135"/>
</g>
<text class="mc" x="10" y="292">p2 · ankle_joint · ±20° dorsiflexion/plantarflexion · BLDC + harmonic drive · 50Nm · anatomical axis</text>
</svg>
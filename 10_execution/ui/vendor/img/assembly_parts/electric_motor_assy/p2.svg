<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.wind{fill:rgba(10,30,50,.8);stroke:rgba(133,190,255,.5);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.phA{fill:none;stroke:rgba(137,255,168,.7);stroke-width:1.1}.phB{fill:none;stroke:rgba(255,200,80,.6);stroke-width:1.1}.phC{fill:none;stroke:rgba(200,100,255,.6);stroke-width:1.1}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P2 STATOR WINDING (3-PHASE)</text>
  <text x="16" y="36" class="micro">3-PHASE CONCENTRATED · 12-POLE STAR · AWG-12 · Litz OPTION</text>
  <!-- Stator annulus outline -->
  <circle cx="210" cy="162" r="108" class="skin"/>
  <circle cx="210" cy="162" r="54"  fill="#050d18" stroke="rgba(133,190,255,.5)" stroke-width=".8"/>
  <!-- Winding bundles by phase (schematic, 4 coil groups per phase) -->
  <!-- Phase A (green) -->
  <path d="M 248 80 Q 270 120 264 162 Q 258 204 240 234" class="phA"/>
  <path d="M 172 80 Q 150 120 156 162 Q 162 204 180 234" class="phA"/>
  <!-- Phase B (amber) -->
  <path d="M 300 124 Q 290 155 270 175 Q 248 196 224 210" class="phB"/>
  <path d="M 120 124 Q 130 155 150 175 Q 172 196 196 210" class="phB"/>
  <!-- Phase C (violet) -->
  <path d="M 284 232 Q 252 218 222 210 Q 198 202 172 208" class="phC"/>
  <path d="M 284 92 Q 252 106 222 114 Q 198 122 172 116" class="phC"/>
  <!-- Star point (neutral) at center connection -->
  <circle cx="210" cy="162" r="10" class="hot"/>
  <!-- Winding slot fill (ghost) -->
  <circle cx="210" cy="162" r="88" class="wind" fill="rgba(20,40,80,.3)" stroke-dasharray="4 4"/>
  <!-- Phase terminal pads -->
  <circle cx="210" cy="62" r="8" class="phA" fill="rgba(20,60,30,.4)"/>
  <circle cx="299" cy="112" r="8" class="phB" fill="rgba(40,30,5,.4)"/>
  <circle cx="299" cy="212" r="8" class="phC" fill="rgba(30,10,50,.4)"/>
  <!-- Lead labels -->
  <text x="210" y="48" class="micro" text-anchor="middle" fill="rgba(137,255,168,.7)">U</text>
  <text x="318" y="116" class="micro" fill="rgba(255,200,80,.7)">V</text>
  <text x="318" y="216" class="micro" fill="rgba(200,100,255,.7)">W</text>
  <!-- Callouts -->
  <path d="M 318 82 L 360 56 L 404 56" class="detail"/>
  <text x="404" y="53" class="micro" text-anchor="end">12-POLE (3PH × 4)</text>
  <path d="M 220 162 L 310 145 L 404 145" class="hot"/>
  <text x="404" y="142" class="micro" text-anchor="end">STAR NEUTRAL POINT</text>
  <path d="M 156 234 L 100 258 L 18 258" class="phA" stroke="rgba(137,255,168,.5)"/>
  <text x="18" y="255" class="micro">COIL: AWG-12 / 200°C WIRE · FILL &gt;70%</text>
</svg>

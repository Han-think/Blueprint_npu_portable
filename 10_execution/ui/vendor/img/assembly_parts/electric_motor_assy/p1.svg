<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.lam{fill:rgba(10,22,40,.8);stroke:rgba(133,190,255,.45);stroke-width:.6}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P1 STATOR LAMINATION STACK</text>
  <text x="16" y="36" class="micro">48-SLOT · 0.2 mm 10JNEX900 Si-Fe · OD 155 mm · PRESS-PACK</text>
  <!-- Front face (annular lamination cross-section) -->
  <!-- Outer stator OD -->
  <circle cx="210" cy="162" r="108" class="skin"/>
  <!-- Inner bore -->
  <circle cx="210" cy="162" r="54" fill="#050d18" stroke="rgba(133,190,255,.86)" stroke-width="1.2"/>
  <!-- 48 slots (salient poles) - drawn as evenly spaced notches -->
  <!-- Lamination layer lines (edge-on, showing stack thickness) -->
  <circle cx="210" cy="162" r="100" class="lam"/>
  <circle cx="210" cy="162" r="92"  class="lam"/>
  <circle cx="210" cy="162" r="84"  class="lam"/>
  <circle cx="210" cy="162" r="76"  class="lam"/>
  <circle cx="210" cy="162" r="68"  class="lam"/>
  <circle cx="210" cy="162" r="62"  class="lam"/>
  <!-- Slot openings (48 slots) represented as radial lines -->
  <g class="detail">
    <line x1="210" y1="108" x2="210" y2="54"/>
    <line x1="223" y1="109" x2="230" y2="55"/>
    <line x1="235" y1="113" x2="249" y2="61"/>
    <line x1="246" y1="120" x2="267" y2="71"/>
    <line x1="255" y1="130" x2="283" y2="84"/>
    <line x1="261" y1="142" x2="294" y2="99"/>
    <line x1="264" y1="155" x2="300" y2="115"/>
    <line x1="263" y1="168" x2="299" y2="131"/>
    <line x1="259" y1="180" x2="292" y2="147"/>
    <line x1="251" y1="191" x2="280" y2="162"/>
    <line x1="240" y1="199" x2="264" y2="174"/>
    <line x1="228" y1="205" x2="245" y2="183"/>
    <line x1="210" y1="216" x2="210" y2="270"/>
    <line x1="197" y1="215" x2="190" y2="269"/>
    <line x1="185" y1="211" x2="171" y2="263"/>
    <line x1="174" y1="204" x2="156" y2="254"/>
    <line x1="165" y1="194" x2="143" y2="241"/>
    <line x1="159" y1="182" x2="133" y2="225"/>
    <line x1="156" y1="169" x2="126" y2="209"/>
    <line x1="157" y1="156" x2="127" y2="193"/>
    <line x1="161" y1="143" x2="131" y2="178"/>
    <line x1="169" y1="132" x2="140" y2="164"/>
    <line x1="180" y1="123" x2="154" y2="151"/>
    <line x1="192" y1="117" x2="172" y2="141"/>
  </g>
  <!-- Winding slot fill indication -->
  <circle cx="210" cy="162" r="57" fill="rgba(20,60,30,.3)" stroke="rgba(137,255,168,.2)" stroke-width=".5" stroke-dasharray="3 3"/>
  <!-- Callouts -->
  <path d="M 318 72 L 360 44 L 404 44" class="detail"/>
  <text x="404" y="41" class="micro" text-anchor="end">OD Ø155 mm</text>
  <path d="M 264 162 L 360 140 L 404 140" class="detail"/>
  <text x="404" y="137" class="micro" text-anchor="end">48 SLOTS (CONCENTRATED)</text>
  <path d="M 210 216 L 150 254 L 18 254" class="hot"/>
  <text x="18" y="251" class="micro">BORE Ø108 mm (ROTOR GAP)</text>
  <text x="16" y="280" class="micro">t=0.2 mm / PLY · STACK L=100 mm · SLOT FILL &gt;70% · INS CLASS H 200°C</text>
</svg>

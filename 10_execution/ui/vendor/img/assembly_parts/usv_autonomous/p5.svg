<path d="M200 60 Q215 80 218 150 Q215 220 200 240 Q185 220 182 150 Q185 80 200 60 Z" class="sk"/>
<path d="M200 68 Q212 85 214 150 Q212 215 200 232 Q188 215 186 150 Q188 85 200 68 Z" class="pa"/>
<!-- rudder stock (vertical shaft) -->
<rect x="196" y="40" width="8" height="220" rx="3" class="sk"/>

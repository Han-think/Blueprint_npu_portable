<line x1="184" y1="100" x2="100" y2="80" class="cl"/><text x="60" y="78" class="ct">Deck Bearing Tube</text>
<line x1="268" y1="102" x2="360" y2="88" class="cl"/><text x="362" y="86" class="ct">Servo Actuator Arm</text>
<line x1="188" y1="75" x2="100" y2="55" class="cl"/><text x="10" y="53" class="ct">Balance 15% Fwd</text>
<line x1="200" y1="240" x2="300" y2="258" class="cl"/><text x="302" y="256" class="ct">Rudder Tip Trailing</text>
<text x="210" y="292" text-anchor="middle" class="mc">USV AUTONOMOUS · P5 RUDDER x2 · NACA0015 · SPADE · SERVO ACTUATED</text>

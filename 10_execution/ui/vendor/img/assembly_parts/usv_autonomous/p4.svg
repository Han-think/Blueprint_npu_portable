<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">ELECTRIC POD x2</text>
<text x="12" y="26" class="mc">SUBMERGED BLDC · 3-BLADE PROP · MAGNETIC SHAFT SEAL · WATER-COOLED</text>
<!-- pod body (streamlined) -->
<path d="M70 150 Q80 108 210 100 Q340 108 350 150 Q340 192 210 200 Q80 192 70 150 Z" class="sk"/>
<path d="M84 150 Q92 112 210 105 Q328 112 336 150 Q328 188 210 195 Q92 188 84 150 Z" class="pa"/>
<!-- motor section (rear) -->
<rect x="290" y="118" width="60" height="64" rx="6" class="sk"/>
<!-- propeller (front) -->
<ellipse cx="80" cy="150" rx="12" ry="38" class="ma"/>
<path d="M68 112 Q80 140 68 188" class="ma"/>
<path d="M92 112 Q80 140 92 188" class="ma"/>
<!-- propeller hub -->
<circle cx="80" cy="150" r="10" class="sk"/>
<circle cx="80" cy="150" r="5" class="nz"/>
<!-- shaft (magnetic sealed) -->
<rect x="80" y="145" width="60" height="10" rx="3" class="sk"/>
<!-- seal location indicator -->
<rect x="125" y="143" width="14" height="14" rx="3" class="nz"/>
<!-- water cooling vents -->
<line x1="210" y1="100" x2="210" y2="90" class="mi"/>
<line x1="230" y1="101" x2="230" y2="91" class="mi"/>
<line x1="190" y1="101" x2="190" y2="91" class="mi"/>
<!-- callouts -->
<line x1="80" y1="112" x2="38" y2="75" class="cl"/><text x="10" y="73" class="ct">3-Blade Prop</text>
<line x1="132" y1="143" x2="80" y2="105" class="cl"/><text x="50" y="103" class="ct">Mag Shaft Seal</text>
<line x1="320" y1="118" x2="360" y2="85" class="cl"/><text x="362" y="83" class="ct">Brushless DC Motor</text>
<line x1="320" y1="168" x2="380" y2="175" class="cl"/><text x="382" y="173" class="ct">Water-Cooled Stator</text>
<line x1="210" y1="90" x2="280" y2="58" class="cl"/><text x="282" y="56" class="ct">Cooling Water Inlet</text>
<text x="210" y="292" text-anchor="middle" class="mc">USV AUTONOMOUS · P4 ELECTRIC POD x2 · BLDC · MAG SEAL · WATER-COOLED</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">PAYLOAD BAY (WET/DRY)</text>
<text x="12" y="26" class="mc">WET SENSOR + DRY COMPUTER COMPARTMENTS · QUICK-SWAP MODULE · MODULAR</text>
<!-- outer bay frame -->
<rect x="60" y="80" width="300" height="160" rx="8" class="sk"/>
<!-- dry compartment (left half) -->
<rect x="72" y="92" width="136" height="136" rx="5" class="pa"/>
<text x="140" y="118" text-anchor="middle" class="mc">DRY</text>
<text x="140" y="130" text-anchor="middle" class="mc">COMPUTER</text>
<!-- computer/electronics inside dry -->
<rect x="86" y="138" width="108" height="36" rx="3" class="pa"/>
<rect x="90" y="142" width="30" height="10" rx="2" class="mi"/>
<rect x="126" y="142" width="30" height="10" rx="2" class="mi"/>
<rect x="162" y="142" width="18" height="10" rx="2" class="mi"/>
<!-- wet compartment (right half) -->
<rect x="212" y="92" width="136" height="136" rx="5" class="nz"/>
<text x="280" y="118" text-anchor="middle" class="mc">WET</text>
<text x="280" y="130" text-anchor="middle" class="mc">SENSOR</text>
<!-- sensor tubes inside wet bay -->
<circle cx="252" cy="165" r="18" class="pa"/>
<circle cx="252" cy="165" r="10" class="nz"/>
<circle cx="296" cy="165" r="18" class="pa"/>
<circle cx="296" cy="165" r="10" class="nz"/>
<!-- flow-through ports bottom of wet bay -->
<rect x="230" y="224" width="20" height="16" rx="3" class="nz"/>
<rect x="268" y="224" width="20" height="16" rx="3" class="nz"/>
<!-- quick-swap latch on sides -->
<rect x="52" y="140" width="12" height="40" rx="4" class="pa"/>
<rect x="356" y="140" width="12" height="40" rx="4" class="pa"/>
<!-- bulkhead between wet/dry -->
<rect x="207" y="80" width="8" height="160" rx="2" class="sk"/>
<!-- callouts -->
<line x1="140" y1="92" x2="80" y2="55" class="cl"/><text x="10" y="53" class="ct">Dry Computer Bay (IP67)</text>
<line x1="280" y1="92" x2="360" y2="55" class="cl"/><text x="362" y="53" class="ct">Wet Sensor Bay</text>
<line x1="252" y1="147" x2="340" y2="128" class="cl"/><text x="342" y="126" class="ct">CTD / Fluorometer</text>
<line x1="248" y1="232" x2="190" y2="258" class="cl"/><text x="100" y="266" class="ct">Flow-Through Port</text>
<line x1="58" y1="160" x2="20" y2="155" class="cl"/><text x="10" y="153" class="ct">Quick-Swap Latch</text>
<text x="210" y="292" text-anchor="middle" class="mc">USV AUTONOMOUS · P7 PAYLOAD BAY · WET+DRY MODULAR · QUICK-SWAP</text>
</svg>
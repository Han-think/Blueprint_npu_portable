<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SENSOR MAST</text>
<text x="12" y="26" class="mc">FOLD-DOWN MAST · GPS + AIS + ANEMOMETER · NAV LIGHTS · CAMERA DOME</text>
<!-- mast base / hinge -->
<rect x="190" y="230" width="40" height="30" rx="5" class="sk"/>
<circle cx="210" cy="232" r="10" class="nz"/>
<!-- mast tube (vertical) -->
<rect x="204" y="80" width="12" height="154" rx="4" class="sk"/>
<!-- GPS antenna at top -->
<circle cx="210" cy="70" r="16" class="pa"/>
<circle cx="210" cy="70" r="8" class="nz"/>
<!-- AIS antenna (vertical stick above GPS) -->
<line x1="210" y1="54" x2="210" y2="30" class="ma"/>
<circle cx="210" cy="28" r="5" class="nz"/>
<!-- anemometer arm + cups -->
<rect x="226" y="108" width="40" height="10" rx="3" class="pa"/>
<circle cx="268" cy="113" r="7" class="mi"/>
<circle cx="255" cy="100" r="5" class="mi"/>
<circle cx="255" cy="126" r="5" class="mi"/>
<!-- navigation light (starboard green) -->
<circle cx="228" cy="160" r="6" class="pa"/>
<!-- port light red -->
<circle cx="192" cy="160" r="6" class="pa"/>
<!-- camera dome lower -->
<circle cx="210" cy="190" r="14" class="pa"/>
<circle cx="210" cy="190" r="7" class="nz"/>
<!-- fold hinge indicator -->
<path d="M190 235 Q185 220 190 210" class="mi"/>
<!-- callouts -->
<line x1="210" y1="54" x2="310" y2="35" class="cl"/><text x="312" y="33" class="ct">GPS + AIS Antenna</text>
<line x1="268" y1="113" x2="360" y2="100" class="cl"/><text x="362" y="98" class="ct">Anemometer</text>
<line x1="228" y1="160" x2="330" y2="155" class="cl"/><text x="332" y="153" class="ct">Nav Light Stbd</text>
<line x1="210" y1="190" x2="330" y2="200" class="cl"/><text x="332" y="198" class="ct">Camera Dome</text>
<line x1="192" y1="235" x2="100" y2="248" class="cl"/><text x="10" y="246" class="ct">Fold-Down Hinge</text>
<text x="210" y="292" text-anchor="middle" class="mc">USV AUTONOMOUS · P6 SENSOR MAST · GPS+AIS+ANEMOMETER · FOLD-DOWN</text>
</svg>
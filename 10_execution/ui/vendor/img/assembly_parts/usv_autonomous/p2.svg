<line x1="60" y1="120" x2="20" y2="90" class="cl"/><text x="10" y="88" class="ct">Al Extrusion Cross-Beam</text>
<line x1="60" y1="155" x2="20" y2="175" class="cl"/><text x="10" y="173" class="ct">Aft Cross-Beam</text>
<line x1="65" y1="121" x2="65" y2="68" class="cl"/><text x="30" y="64" class="ct">3DP Corner Node</text>
<line x1="150" y1="155" x2="150" y2="238" class="cl"/><text x="100" y="248" class="ct">Payload Deck Panel</text>
<line x1="210" y1="110" x2="290" y2="75" class="cl"/><text x="292" y="73" class="ct">Center Stiffener Rib</text>
<text x="210" y="292" text-anchor="middle" class="mc">USV AUTONOMOUS · P2 CROSS-BEAM DECK · Al EXTRUSION + 3DP NODES</text>

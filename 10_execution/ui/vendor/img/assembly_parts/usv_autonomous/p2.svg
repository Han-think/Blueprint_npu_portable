<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CROSS-BEAM DECK</text>
<text x="12" y="26" class="mc">Al EXTRUSION + 3DP CORNER NODES · HULL CROSSBEAM · PAYLOAD DECK TOP</text>
<!-- two hull connectors (fore and aft beams) -->
<rect x="60" y="120" width="300" height="25" rx="6" class="sk"/>
<rect x="60" y="165" width="300" height="25" rx="6" class="sk"/>
<!-- deck panels between beams -->
<rect x="70" y="143" width="280" height="24" rx="3" class="pa"/>
<!-- corner 3DP nodes -->
<rect x="52" y="113" width="16" height="16" rx="3" class="pa"/>
<rect x="352" y="113" width="16" height="16" rx="3" class="pa"/>
<rect x="52" y="160" width="16" height="16" rx="3" class="pa"/>
<rect x="352" y="160" width="16" height="16" rx="3" class="pa"/>
<!-- stiffener rib mid-span -->
<rect x="202" y="110" width="16" height="80" rx="3" class="sk"/>
<!-- payload area markings -->
<rect x="100" y="145" width="100" height="20" rx="2" class="pa"/>
<rect x="220" y="145" width="100" height="20" rx="2" class="pa"/>
<!-- hull attachment bolt points -->
<circle cx="80" cy="132" r="4" class="nz"/>
<circle cx="340" cy="132" r="4" class="nz"/>
<circle cx="80" cy="177" r="4" class="nz"/>
<circle cx="340" cy="177" r="4" class="nz"/>

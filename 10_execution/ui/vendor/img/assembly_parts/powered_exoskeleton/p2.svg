<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">HIP JOINT ASSEMBLY × 2</text>
  <text class="mc" x="180" y="24">BLDC + HARMONIC DRIVE 100:1 · 80Nm · ±70° FLEX/EXT · 2-DOF · CRASH-STOP</text>
  <!-- outer joint housing -->
  <circle class="sk" cx="190" cy="148" r="82"/>
  <circle class="pa" cx="190" cy="148" r="74"/>
  <!-- harmonic drive (flex spline) -->
  <circle class="sk" cx="190" cy="148" r="54"/>
  <circle class="ma" cx="190" cy="148" r="44"/>
  <!-- wave generator / BLDC rotor -->
  <ellipse class="sk" cx="190" cy="148" rx="32" ry="28"/>
  <ellipse class="mi" cx="190" cy="148" rx="22" ry="18"/>
  <!-- motor poles -->
  <line class="mi" x1="190" y1="120" x2="190" y2="130"/>
  <line class="mi" x1="212" y1="128" x2="206" y2="136"/>
  <line class="mi" x1="222" y1="148" x2="212" y2="148"/>
  <line class="mi" x1="212" y1="168" x2="206" y2="160"/>
  <line class="mi" x1="168" y1="128" x2="174" y2="136"/>
  <line class="mi" x1="158" y1="148" x2="168" y2="148"/>
  <line class="mi" x1="168" y1="168" x2="174" y2="160"/>
  <text class="ct" x="190" y="152" text-anchor="middle">BLDC</text>
  <!-- flex/ext arc ±70° -->
  <path class="cl" d="M124,90 A82,82 0 0 1 256,90"/>
  <text class="mc" x="190" y="80" text-anchor="middle">±70° FLEX / EXT</text>
  <!-- abd/add arc (second DOF, represented at right) -->
  <path class="cl" d="M270,108 A82,82 0 0 1 270,188"/>
  <text class="mc" x="280" y="148">ABD/ADD</text>
  <!-- crash stop notch -->
  <rect class="nz" cx="190" cy="66" x="180" y="60" width="20" height="12" rx="2"/>
  <text class="mc" x="190" y="56" text-anchor="middle">CRASH-STOP</text>
  <!-- thigh shell output flange (bottom) -->
  <rect class="sk" x="162" y="228" width="56" height="18" rx="3"/>
  <text class="ct" x="190" y="241" text-anchor="middle">THIGH SHELL OUTPUT</text>
  <!-- 80Nm label -->
  <text class="mc" x="60" y="148">80Nm PEAK</text>
  <line class="cl" x1="108" y1="148" x2="80" y2="148"/>
  <text class="mc" x="60" y="158">100:1 HD</text>
</g>
<text class="mc" x="10" y="292">p2 · hip_joint_x2 · BLDC + harmonic drive 100:1 · 80Nm · ±70° flex/ext · 2-DOF abd/add · crash-stop</text>
</svg>
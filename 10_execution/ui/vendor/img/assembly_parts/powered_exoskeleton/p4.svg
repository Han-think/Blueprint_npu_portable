<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">KNEE JOINT × 2</text>
  <text class="mc" x="180" y="24">50Nm PEAK · QUASI-DIRECT-DRIVE 8:1 PLANETARY · POLYCENTRIC 4-BAR OPTION</text>
  <!-- main joint housing -->
  <circle class="sk" cx="190" cy="148" r="70"/>
  <circle class="pa" cx="190" cy="148" r="62"/>
  <!-- planetary gear set (concentric) -->
  <circle class="sk" cx="190" cy="148" r="44"/>
  <circle class="ma" cx="190" cy="148" r="34"/>
  <!-- planet gears (3 visible) -->
  <circle class="mi" cx="190" cy="114" r="10"/>
  <text class="mc" x="190" y="118" text-anchor="middle">P</text>
  <circle class="mi" cx="220" cy="162" r="10"/>
  <text class="mc" x="220" y="166" text-anchor="middle">P</text>
  <circle class="mi" cx="160" cy="162" r="10"/>
  <text class="mc" x="160" y="166" text-anchor="middle">P</text>
  <!-- sun gear center (BLDC rotor) -->
  <circle class="sk" cx="190" cy="148" r="18"/>
  <circle class="mi" cx="190" cy="148" r="10"/>
  <text class="ct" x="190" y="152" text-anchor="middle">SUN</text>
  <!-- 8:1 ratio label -->
  <text class="mc" x="190" y="188" text-anchor="middle">8:1 PLANETARY</text>
  <!-- flex arc ±120° (knee) -->
  <path class="cl" d="M122,100 A82,82 0 0 1 258,100"/>
  <text class="mc" x="190" y="84" text-anchor="middle">0–120° FLEX / EXT</text>
  <!-- thigh interface top -->
  <rect class="sk" x="160" y="72" width="60" height="14" rx="3"/>
  <text class="ct" x="190" y="83" text-anchor="middle">THIGH IF</text>
  <!-- shank interface bottom -->
  <rect class="sk" x="160" y="220" width="60" height="14" rx="3"/>
  <text class="ct" x="190" y="231" text-anchor="middle">SHANK IF</text>
  <!-- polycentric 4-bar option note -->
  <rect class="pa" x="70" y="148" width="30" height="30" rx="3"/>
  <line class="cl" x1="82" y1="148" x2="90" y2="136"/>
  <line class="cl" x1="90" y1="136" x2="100" y2="148"/>
  <line class="cl" x1="100" y1="148" x2="82" y2="148"/>
  <text class="mc" x="62" y="188">4-BAR OPT.</text>
  <!-- 50Nm label -->
  <text class="mc" x="282" y="148">50Nm PEAK</text>
</g>
<text class="mc" x="10" y="292">p4 · knee_joint_x2 · 50Nm · quasi-direct-drive 8:1 planetary · 0-120° flex/ext · polycentric 4-bar option</text>
</svg>
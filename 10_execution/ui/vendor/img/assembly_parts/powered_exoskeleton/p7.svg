  <rect class="mi" x="194" y="84" width="46" height="60" rx="2"/>
  <rect class="mi" x="248" y="84" width="60" height="60" rx="2"/>
  <text class="mc" x="109" y="118" text-anchor="middle">S1-S4</text>
  <text class="mc" x="163" y="118" text-anchor="middle">S5-S8</text>
  <text class="mc" x="217" y="118" text-anchor="middle">S9-S12</text>
  <text class="mc" x="278" y="118" text-anchor="middle">BMS</text>
  <!-- electronics bay (bottom half) -->
  <rect class="sk" x="78" y="168" width="244" height="76" rx="4"/>
  <!-- motor drive modules (12-ch, shown as 3 groups) -->
  <rect class="sk" x="86" y="178" width="64" height="32" rx="2"/>
  <text class="ct" x="118" y="192" text-anchor="middle">MOTOR DRV</text>
  <text class="mc" x="118" y="202" text-anchor="middle">CH 1–4</text>
  <rect class="sk" x="158" y="178" width="64" height="32" rx="2"/>
  <text class="ct" x="190" y="192" text-anchor="middle">MOTOR DRV</text>
  <text class="mc" x="190" y="202" text-anchor="middle">CH 5–8</text>
  <rect class="sk" x="230" y="178" width="64" height="32" rx="2"/>
  <text class="ct" x="262" y="192" text-anchor="middle">MOTOR DRV</text>
  <text class="mc" x="262" y="202" text-anchor="middle">CH 9–12</text>
  <!-- gait MCU + BLE -->
  <rect class="sk" x="86" y="218" width="80" height="20" rx="2"/>

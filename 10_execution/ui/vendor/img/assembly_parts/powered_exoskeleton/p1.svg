  <!-- aluminum material lines -->
  <line class="mi" x1="88" y1="120" x2="160" y2="120"/>
  <line class="mi" x1="88" y1="140" x2="160" y2="140"/>
  <line class="mi" x1="88" y1="160" x2="160" y2="160"/>
  <line class="mi" x1="220" y1="120" x2="292" y2="120"/>

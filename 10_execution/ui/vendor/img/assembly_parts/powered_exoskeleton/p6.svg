<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">POWERED ANKLE × 2</text>
  <text class="mc" x="180" y="24">60Nm · HARMONIC DRIVE · DORSI/PLANTAR 1-DOF · ANATOMICAL AXIS · SHOE PLATE</text>
  <!-- outer ankle housing -->
  <circle class="sk" cx="190" cy="138" r="76"/>
  <circle class="pa" cx="190" cy="138" r="68"/>
  <!-- harmonic drive internals -->
  <circle class="sk" cx="190" cy="138" r="50"/>
  <circle class="ma" cx="190" cy="138" r="40"/>
  <!-- flex spline wave pattern -->
  <path class="mi" d="M160,138 Q168,120 176,138 Q184,156 192,138 Q200,120 208,138 Q216,156 220,138"/>
  <!-- BLDC rotor center -->
  <circle class="sk" cx="190" cy="138" r="22"/>
  <circle class="mi" cx="190" cy="138" r="14"/>
  <text class="ct" x="190" y="142" text-anchor="middle">BLDC</text>
  <!-- anatomical axis line -->
  <line class="nz" x1="110" y1="138" x2="270" y2="138"/>
  <text class="mc" x="280" y="141">ANAT. AXIS</text>
  <!-- dorsiflexion / plantarflexion arcs -->
  <path class="cl" d="M136,84 A76,76 0 0 1 244,84"/>
  <text class="mc" x="190" y="76" text-anchor="middle">±30° DORSI / PLANTAR</text>
  <!-- shank interface (top) -->
  <rect class="sk" x="162" y="58" width="56" height="14" rx="3"/>
  <text class="ct" x="190" y="69" text-anchor="middle">SHANK IF</text>
  <!-- shoe plate interface (bottom) -->
  <rect class="sk" x="128" y="210" width="124" height="18" rx="4"/>
  <line class="mi" x1="136" y1="210" x2="136" y2="228"/>
  <line class="mi" x1="148" y1="210" x2="148" y2="228"/>
  <line class="mi" x1="160" y1="210" x2="160" y2="228"/>
  <line class="mi" x1="172" y1="210" x2="172" y2="228"/>
  <line class="mi" x1="184" y1="210" x2="184" y2="228"/>
  <line class="mi" x1="196" y1="210" x2="196" y2="228"/>
  <line class="mi" x1="208" y1="210" x2="208" y2="228"/>
  <line class="mi" x1="220" y1="210" x2="220" y2="228"/>
  <line class="mi" x1="232" y1="210" x2="232" y2="228"/>
  <line class="mi" x1="244" y1="210" x2="244" y2="228"/>
  <text class="ct" x="190" y="244" text-anchor="middle">SHOE PLATE INTERFACE</text>
  <!-- 60Nm label -->
  <text class="mc" x="54" y="138">60Nm PEAK</text>
  <line class="cl" x1="114" y1="138" x2="80" y2="138"/>
</g>
<text class="mc" x="10" y="292">p6 · powered_ankle_x2 · 60Nm harmonic drive · ±30° dorsi/plantar · anatomical axis · shoe plate interface</text>

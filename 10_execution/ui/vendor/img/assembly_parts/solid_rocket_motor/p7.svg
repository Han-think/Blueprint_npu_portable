<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.flex{fill:rgba(30,18,8,.6);stroke:rgba(200,140,80,.52);stroke-width:1}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P7 TVC FLEX JOINT</text>
  <text x="16" y="36" class="micro">2-AXIS ±7° GIMBAL · ELASTOMERIC FLEX SEAL · ACTUATOR TRUNNION</text>
  <!-- Flex joint cross-section view (side) -->
  <!-- Upper flange (case side) -->
  <rect x="98" y="58" width="224" height="28" rx="4" class="skin"/>
  <line x1="120" y1="58" x2="120" y2="86" class="detail"/>
  <line x1="150" y1="58" x2="150" y2="86" class="detail"/>
  <line x1="180" y1="58" x2="180" y2="86" class="detail"/>
  <line x1="240" y1="58" x2="240" y2="86" class="detail"/>
  <line x1="270" y1="58" x2="270" y2="86" class="detail"/>
  <line x1="300" y1="58" x2="300" y2="86" class="detail"/>
  <circle cx="120" cy="72" r="4" class="detail"/>
  <circle cx="156" cy="72" r="4" class="detail"/>
  <circle cx="210" cy="72" r="4" class="detail"/>
  <circle cx="264" cy="72" r="4" class="detail"/>
  <circle cx="300" cy="72" r="4" class="detail"/>
  <!-- Elastomeric flex seal layers (5 rubber + 4 shim) -->
  <rect x="118" y="86"  width="184" height="10" class="flex"/>
  <rect x="114" y="96"  width="192" height="7"  class="skin" stroke-opacity="0.6"/>
  <rect x="110" y="103" width="200" height="10" class="flex"/>
  <rect x="106" y="113" width="208" height="7"  class="skin" stroke-opacity="0.6"/>
  <rect x="102" y="120" width="216" height="10" class="flex"/>
  <rect x="98"  y="130" width="224" height="7"  class="skin" stroke-opacity="0.6"/>
  <rect x="96"  y="137" width="228" height="10" class="flex"/>
  <rect x="94"  y="147" width="232" height="7"  class="skin" stroke-opacity="0.6"/>
  <rect x="92"  y="154" width="236" height="10" class="flex"/>
  <!-- Lower flange (nozzle side) -->
  <rect x="88" y="164" width="244" height="28" rx="4" class="skin"/>
  <line x1="110" y1="164" x2="110" y2="192" class="detail"/>
  <line x1="145" y1="164" x2="145" y2="192" class="detail"/>
  <line x1="180" y1="164" x2="180" y2="192" class="detail"/>
  <line x1="240" y1="164" x2="240" y2="192" class="detail"/>
  <line x1="275" y1="164" x2="275" y2="192" class="detail"/>
  <line x1="310" y1="164" x2="310" y2="192" class="detail"/>
  <!-- Gimbal center mark -->
  <circle cx="210" cy="124" r="18" class="hot"/>
  <line x1="192" y1="124" x2="228" y2="124" class="hot"/>
  <line x1="210" y1="106" x2="210" y2="142" class="hot"/>
  <!-- Actuator trunnion clevis (left side) -->
  <rect x="60" y="108" width="36" height="32" rx="3" class="skin"/>
  <circle cx="78" cy="124" r="8" class="detail"/>
  <line x1="60" y1="120" x2="96" y2="120" class="hot"/>
  <line x1="60" y1="128" x2="96" y2="128" class="hot"/>
  <!-- Right trunnion -->
  <rect x="324" y="108" width="36" height="32" rx="3" class="skin"/>
  <circle cx="342" cy="124" r="8" class="detail"/>
  <line x1="324" y1="120" x2="360" y2="120" class="hot"/>
  <line x1="324" y1="128" x2="360" y2="128" class="hot"/>
  <!-- ±7° gimbal arc -->
  <path d="M 174 86 A 36 36 0 0 1 246 86" class="hot" stroke-dasharray="4 3"/>
  <path d="M 174 164 A 36 36 0 0 0 246 164" class="hot" stroke-dasharray="4 3"/>
  <!-- Callouts -->
  <path d="M 324 72 L 380 52 L 404 52" class="detail"/>
  <text x="404" y="49" class="micro" text-anchor="end">CASE BOLT CIRCLE × 12</text>
  <path d="M 324 96 L 380 80 L 404 80" class="flex" stroke="rgba(200,140,80,.52)"/>
  <text x="404" y="77" class="micro" text-anchor="end">HTPB ELASTOMER SHIM</text>
  <path d="M 228 124 L 310 110 L 404 110" class="hot"/>
  <text x="404" y="107" class="micro" text-anchor="end">GIMBAL CENTER (PIVOT)</text>
  <path d="M 360 124 L 380 148 L 404 148" class="hot"/>
  <text x="404" y="145" class="micro" text-anchor="end">ACTUATOR TRUNNION</text>
  <path d="M 88 186 L 60 230 L 18 230" class="detail"/>
  <text x="18" y="227" class="micro">NOZZLE BOLT CIRCLE × 12</text>
</svg>

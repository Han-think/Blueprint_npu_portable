<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P3 AFT CLOSURE + NOZZLE MOUNT</text>
  <text x="16" y="36" class="micro">AFT DOME · NOZZLE BOSS · CASE BOND · S/A DEVICE PORT</text>
  <!-- Dome cross-section (half shown, symmetric) -->
  <!-- Outer dome contour -->
  <path d="M 64 200 Q 64 60 210 52 Q 356 60 356 200 Z" class="skin"/>
  <!-- Inner dome surface -->
  <path d="M 80 200 Q 80 76 210 68 Q 340 76 340 200" class="detail"/>
  <!-- CFRP thickness marks -->
  <path d="M 96 200 Q 96 90 210 84 Q 324 90 324 200" class="detail" stroke-dasharray="2 4" stroke-opacity="0.5"/>
  <!-- Central nozzle boss -->
  <ellipse cx="210" cy="52" rx="32" ry="16" class="skin"/>
  <ellipse cx="210" cy="52" rx="20" ry="10" class="detail"/>
  <circle cx="210" cy="52" r="8" class="hot"/>
  <!-- Nozzle bolt circle (12-bolt pattern) -->
  <circle cx="210" cy="52" r="26" class="detail" stroke-dasharray="3 4"/>
  <circle cx="210" cy="26" r="3" class="detail"/>
  <circle cx="223" cy="29" r="3" class="detail"/>
  <circle cx="232" cy="40" r="3" class="detail"/>
  <circle cx="236" cy="52" r="3" class="detail"/>
  <circle cx="232" cy="64" r="3" class="detail"/>
  <circle cx="223" cy="75" r="3" class="detail"/>
  <circle cx="210" cy="78" r="3" class="detail"/>
  <circle cx="197" cy="75" r="3" class="detail"/>
  <circle cx="188" cy="64" r="3" class="detail"/>
  <circle cx="184" cy="52" r="3" class="detail"/>
  <circle cx="188" cy="40" r="3" class="detail"/>
  <circle cx="197" cy="29" r="3" class="detail"/>
  <!-- S/A device boss port (side) -->
  <rect x="64" y="144" width="28" height="18" rx="3" class="skin"/>
  <circle cx="78" cy="153" r="5" class="hot"/>
  <line x1="64" y1="150" x2="56" y2="150" class="hot"/>
  <!-- Case bond flange at periphery -->
  <rect x="56" y="192" width="308" height="16" rx="2" class="skin"/>
  <line x1="64" y1="196" x2="64" y2="204" class="detail"/>
  <line x1="100" y1="196" x2="100" y2="204" class="detail"/>
  <line x1="140" y1="196" x2="140" y2="204" class="detail"/>
  <line x1="180" y1="196" x2="180" y2="204" class="detail"/>
  <line x1="240" y1="196" x2="240" y2="204" class="detail"/>
  <line x1="280" y1="196" x2="280" y2="204" class="detail"/>
  <line x1="320" y1="196" x2="320" y2="204" class="detail"/>
  <line x1="356" y1="196" x2="356" y2="204" class="detail"/>
  <!-- Callouts -->
  <path d="M 238 52 L 310 28 L 404 28" class="detail"/>
  <text x="404" y="25" class="micro" text-anchor="end">NOZZLE BOSS Ø0.16 m</text>
  <path d="M 356 144 L 380 120 L 404 120" class="detail"/>
  <text x="404" y="117" class="micro" text-anchor="end">DOME THICKNESS 12 mm</text>
  <path d="M 78 140 L 60 104 L 18 104" class="hot"/>
  <text x="18" y="101" class="micro">S/A PORT</text>
  <path d="M 210 208 L 210 240 L 18 240" class="detail"/>
  <text x="18" y="237" class="micro">CASE BOND FLANGE (Al 2219)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.noz{fill:rgba(6,18,28,.8);stroke:rgba(137,255,168,.62);stroke-width:1.1}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P4 NOZZLE ASSEMBLY (C/C)</text>
  <text x="16" y="36" class="micro">CARBON-CARBON C-D · INCONEL HOUSING · ABLATIVE THROAT · TVC FLEX BOSS</text>
  <!-- Nozzle cross-section (vertical, symmetric about horizontal axis y=155) -->
  <!-- Outer Inconel housing -->
  <path d="M 68 88 L 96 88 L 116 132 L 116 178 L 96 222 L 68 222 Z" class="skin"/>
  <path d="M 352 88 L 324 88 L 304 132 L 304 178 L 324 222 L 352 222 Z" class="skin"/>
  <!-- Convergent section top -->
  <path d="M 68 88 L 352 88 L 304 132 L 116 132 Z" class="skin"/>
  <!-- Divergent section bottom -->
  <path d="M 116 178 L 304 178 L 352 222 L 68 222 Z" class="skin"/>
  <!-- C/C nozzle inner contour -->
  <path d="M 80 94 L 340 94 L 296 136 L 124 136" class="noz" fill="none"/>
  <path d="M 80 216 L 340 216 L 296 174 L 124 174" class="noz" fill="none"/>
  <!-- Throat (minimum area) -->
  <rect x="116" y="136" width="188" height="38" rx="4" class="noz"/>
  <!-- Throat convergence lines -->
  <path d="M 124 136 Q 180 148 210 149 Q 240 148 296 136" class="hot"/>
  <path d="M 124 174 Q 180 162 210 161 Q 240 162 296 174" class="hot"/>
  <!-- Ablative throat insert marks -->
  <ellipse cx="210" cy="155" rx="40" ry="10" class="hot"/>
  <line x1="170" y1="148" x2="170" y2="162" class="hot"/>
  <line x1="250" y1="148" x2="250" y2="162" class="hot"/>
  <!-- C/C structure hatching (internal) -->
  <line x1="130" y1="94" x2="138" y2="136" class="detail"/>
  <line x1="155" y1="94" x2="160" y2="136" class="detail"/>
  <line x1="180" y1="94" x2="182" y2="136" class="detail"/>
  <line x1="240" y1="94" x2="238" y2="136" class="detail"/>
  <line x1="265" y1="94" x2="260" y2="136" class="detail"/>
  <line x1="290" y1="94" x2="282" y2="136" class="detail"/>
  <line x1="130" y1="216" x2="138" y2="174" class="detail"/>
  <line x1="160" y1="216" x2="166" y2="174" class="detail"/>
  <line x1="210" y1="216" x2="210" y2="174" class="detail"/>
  <line x1="260" y1="216" x2="254" y2="174" class="detail"/>
  <line x1="290" y1="216" x2="282" y2="174" class="detail"/>
  <!-- TVC flex joint boss (aft side) -->
  <rect x="90" y="218" width="240" height="20" rx="4" class="skin"/>
  <line x1="120" y1="218" x2="120" y2="238" class="detail"/>
  <line x1="160" y1="218" x2="160" y2="238" class="detail"/>
  <line x1="210" y1="218" x2="210" y2="238" class="detail"/>
  <line x1="260" y1="218" x2="260" y2="238" class="detail"/>
  <line x1="300" y1="218" x2="300" y2="238" class="detail"/>
  <!-- Callouts -->
  <path d="M 352 96 L 380 68 L 404 68" class="detail"/>
  <text x="404" y="65" class="micro" text-anchor="end">INCONEL 625 HOUSING</text>
  <path d="M 352 216 L 380 244 L 404 244" class="detail"/>
  <text x="404" y="241" class="micro" text-anchor="end">TVC FLEX BOSS</text>
  <path d="M 250 149 L 310 130 L 404 130" class="hot"/>
  <text x="404" y="127" class="micro" text-anchor="end">C/C ABLATIVE THROAT</text>
  <path d="M 68 155 L 18 155" class="hot"/>
  <text x="18" y="152" class="micro">EXPANSION RATIO Er=7</text>
</svg>

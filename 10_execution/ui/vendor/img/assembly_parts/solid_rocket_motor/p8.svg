<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.insul{fill:rgba(60,30,10,.65);stroke:rgba(200,140,80,.58);stroke-width:1}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P8 THERMAL INSULATION (EPDM)</text>
  <text x="16" y="36" class="micro">EPDM MANDREL-WRAPPED · 6-18 mm VARIABLE THICKNESS · CASE-BONDED</text>
  <!-- Cut-away cylinder section showing insulation liner -->
  <!-- Outer case boundary (partial arc) -->
  <path d="M 64 82 L 356 82 L 356 218 L 64 218 Z" class="skin" fill-opacity="0.2"/>
  <!-- EPDM insulation layer (variable thickness) -->
  <!-- Main mid-body section (6 mm nominal) -->
  <rect x="64" y="94" width="292" height="14" class="insul"/>
  <rect x="64" y="190" width="292" height="14" class="insul"/>
  <!-- Aft taper (thicker near nozzle, ~18 mm) -->
  <path d="M 292 94 L 356 82 L 356 94 L 292 94 Z" class="insul"/>
  <path d="M 292 204 L 356 218 L 356 204 L 292 204 Z" class="insul"/>
  <path d="M 292 94 L 356 82 L 356 218 L 292 204 Z" class="insul" fill-opacity="0.3"/>
  <!-- Forward section (nominal) -->
  <path d="M 128 94 L 64 82 L 64 94 L 128 94 Z" class="insul"/>
  <path d="M 128 204 L 64 218 L 64 204 L 128 204 Z" class="insul"/>
  <!-- Propellant grain surface (inner boundary) -->
  <rect x="64" y="108" width="292" height="14" fill="rgba(60,40,12,.5)" stroke="rgba(200,160,80,.4)" stroke-width=".8"/>
  <rect x="64" y="178" width="292" height="14" fill="rgba(60,40,12,.5)" stroke="rgba(200,160,80,.4)" stroke-width=".8"/>
  <!-- Gap between insulation layers (propellant grain void center) -->
  <rect x="64" y="122" width="292" height="56" fill="#050d18" stroke="rgba(100,160,240,.12)" stroke-width=".5" stroke-dasharray="3 4"/>
  <!-- Star bore indicative (bore center) -->
  <line x1="64" y1="150" x2="356" y2="150" class="hot" stroke-dasharray="8 4"/>
  <!-- Mandrel wrap seams -->
  <line x1="140" y1="94" x2="140" y2="108" class="detail"/>
  <line x1="200" y1="94" x2="200" y2="108" class="detail"/>
  <line x1="260" y1="94" x2="260" y2="108" class="detail"/>
  <line x1="140" y1="190" x2="140" y2="204" class="detail"/>
  <line x1="200" y1="190" x2="200" y2="204" class="detail"/>
  <line x1="260" y1="190" x2="260" y2="204" class="detail"/>
  <!-- Bond surface arrows -->
  <path d="M 210 108 L 210 102" class="hot" marker-end="url(#a)"/>
  <path d="M 210 190 L 210 196" class="hot"/>
  <!-- Thickness dimension lines -->
  <line x1="358" y1="82"  x2="376" y2="82"  class="detail"/>
  <line x1="358" y1="94"  x2="376" y2="94"  class="detail"/>
  <line x1="358" y1="108" x2="376" y2="108" class="detail"/>
  <line x1="367" y1="82"  x2="367" y2="94"  class="detail"/>
  <line x1="367" y1="94"  x2="367" y2="108" class="detail"/>
  <!-- Callouts -->
  <path d="M 64 88 L 40 60 L 18 60" class="insul" stroke="rgba(200,140,80,.58)"/>
  <text x="18" y="57" class="micro">EPDM LINER (BONDED)</text>
  <path d="M 380 88 L 404 60" class="detail"/>
  <text x="404" y="57" class="micro" text-anchor="end">CASE WALL</text>
  <path d="M 367 100 L 404 100" class="detail"/>
  <text x="404" y="97" class="micro" text-anchor="end">t=6 mm NOM</text>
  <path d="M 367 104 L 380 120 L 404 120" class="detail"/>
  <text x="404" y="117" class="micro" text-anchor="end">t=18 mm AFT</text>
  <path d="M 356 150 L 380 150 L 404 150" class="hot"/>
  <text x="404" y="147" class="micro" text-anchor="end">BORE AXIS (STAR PORT)</text>
  <text x="64" y="260" class="micro">EPDM MANDREL WRAPPED · ADHESIVE SF-120 BOND · CURE 72h @ 60°C · HYDROSTATIC LEAK CHECK</text>
</svg>

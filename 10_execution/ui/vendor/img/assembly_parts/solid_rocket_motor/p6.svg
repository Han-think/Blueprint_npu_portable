<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P6 FORWARD CLOSURE</text>
  <text x="16" y="36" class="micro">FORWARD DOME · INSTR PASSTHROUGH · INTERSTAGE RING · CASE BOND</text>
  <!-- Forward dome (cross-section, symmetric about vertical axis x=210) -->
  <!-- Dome exterior -->
  <path d="M 64 220 Q 64 50 210 42 Q 356 50 356 220 Z" class="skin"/>
  <!-- Dome inner surface -->
  <path d="M 80 220 Q 80 66 210 58 Q 340 66 340 220" class="detail"/>
  <!-- Dome wall thickness bands -->
  <path d="M 96 220 Q 96 82 210 74 Q 324 82 324 220" class="detail" stroke-dasharray="2 4" stroke-opacity="0.45"/>
  <!-- Central instrumentation passthrough boss -->
  <ellipse cx="210" cy="44" rx="28" ry="14" class="skin"/>
  <ellipse cx="210" cy="44" rx="18" ry="9" class="detail"/>
  <circle cx="210" cy="44" r="7" class="hot"/>
  <!-- Multiple pass-through ports (4 around center) -->
  <circle cx="198" cy="52" r="3" class="hot"/>
  <circle cx="222" cy="52" r="3" class="hot"/>
  <circle cx="198" cy="36" r="3" class="detail"/>
  <circle cx="222" cy="36" r="3" class="detail"/>
  <!-- Igniter passthrough (center) -->
  <line x1="207" y1="30" x2="207" y2="60" class="hot"/>
  <line x1="213" y1="30" x2="213" y2="60" class="hot"/>
  <!-- Interstage interface ring at periphery top -->
  <rect x="60" y="58" width="300" height="22" rx="2" class="skin"/>
  <line x1="90"  y1="58" x2="90"  y2="80" class="detail"/>
  <line x1="130" y1="58" x2="130" y2="80" class="detail"/>
  <line x1="170" y1="58" x2="170" y2="80" class="detail"/>
  <line x1="210" y1="58" x2="210" y2="80" class="detail"/>
  <line x1="250" y1="58" x2="250" y2="80" class="detail"/>
  <line x1="290" y1="58" x2="290" y2="80" class="detail"/>
  <line x1="330" y1="58" x2="330" y2="80" class="detail"/>
  <!-- Bolt holes in interface ring -->
  <circle cx="90"  cy="69" r="3" class="detail"/>
  <circle cx="130" cy="69" r="3" class="detail"/>
  <circle cx="170" cy="69" r="3" class="detail"/>
  <circle cx="250" cy="69" r="3" class="detail"/>
  <circle cx="290" cy="69" r="3" class="detail"/>
  <circle cx="330" cy="69" r="3" class="detail"/>
  <!-- Case bond flange at bottom -->
  <rect x="56" y="212" width="308" height="16" rx="2" class="skin"/>
  <line x1="80"  y1="212" x2="80"  y2="228" class="detail"/>
  <line x1="120" y1="212" x2="120" y2="228" class="detail"/>
  <line x1="160" y1="212" x2="160" y2="228" class="detail"/>
  <line x1="210" y1="212" x2="210" y2="228" class="detail"/>
  <line x1="260" y1="212" x2="260" y2="228" class="detail"/>
  <line x1="300" y1="212" x2="300" y2="228" class="detail"/>
  <line x1="340" y1="212" x2="340" y2="228" class="detail"/>
  <!-- Callouts -->
  <path d="M 238 44 L 310 24 L 404 24" class="hot"/>
  <text x="404" y="21" class="micro" text-anchor="end">INSTR PASSTHROUGH × 4</text>
  <path d="M 360 69 L 380 90 L 404 90" class="detail"/>
  <text x="404" y="87" class="micro" text-anchor="end">INTERSTAGE RING (Ti)</text>
  <path d="M 356 135 L 380 160 L 404 160" class="detail"/>
  <text x="404" y="157" class="micro" text-anchor="end">DOME t=10 mm CFRP</text>
  <path d="M 210 228 L 210 258 L 18 258" class="detail"/>
  <text x="18" y="255" class="micro">CASE BOND INTERFACE (ADHESIVE PREP)</text>
</svg>

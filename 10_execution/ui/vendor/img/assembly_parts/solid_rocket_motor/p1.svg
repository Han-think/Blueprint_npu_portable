<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P1 MOTOR CASE (FILAMENT WOUND CFRP)</text>
  <text x="16" y="36" class="micro">CFRP FILAMENT WOUND · BURST 3× MEOP · POLAR BOSS</text>
  <!-- Outer cylindrical shell (side view) -->
  <rect x="64" y="80" width="292" height="100" rx="8" class="skin"/>
  <!-- End caps / polar boss geometry -->
  <ellipse cx="64" cy="130" rx="10" ry="50" class="skin"/>
  <ellipse cx="356" cy="130" rx="10" ry="50" class="skin"/>
  <!-- Polar boss detail (forward) -->
  <ellipse cx="64" cy="130" rx="5" ry="18" class="detail"/>
  <line x1="59" y1="112" x2="74" y2="112" class="detail"/>
  <line x1="59" y1="148" x2="74" y2="148" class="detail"/>
  <!-- Polar boss detail (aft) -->
  <ellipse cx="356" cy="130" rx="5" ry="18" class="detail"/>
  <line x1="346" y1="112" x2="361" y2="112" class="detail"/>
  <line x1="346" y1="148" x2="361" y2="148" class="detail"/>
  <!-- Filament winding pattern (helical lines) -->
  <g class="detail">
    <line x1="88" y1="80" x2="112" y2="180"/>
    <line x1="116" y1="80" x2="140" y2="180"/>
    <line x1="144" y1="80" x2="168" y2="180"/>
    <line x1="172" y1="80" x2="196" y2="180"/>
    <line x1="200" y1="80" x2="224" y2="180"/>
    <line x1="228" y1="80" x2="252" y2="180"/>
    <line x1="256" y1="80" x2="280" y2="180"/>
    <line x1="284" y1="80" x2="308" y2="180"/>
    <line x1="312" y1="80" x2="336" y2="180"/>
    <!-- Counter helix -->
    <line x1="112" y1="80" x2="88" y2="180"/>
    <line x1="140" y1="80" x2="116" y2="180"/>
    <line x1="168" y1="80" x2="144" y2="180"/>
    <line x1="196" y1="80" x2="172" y2="180"/>
    <line x1="224" y1="80" x2="200" y2="180"/>
    <line x1="252" y1="80" x2="228" y2="180"/>
    <line x1="280" y1="80" x2="256" y2="180"/>
    <line x1="308" y1="80" x2="284" y2="180"/>
    <line x1="336" y1="80" x2="312" y2="180"/>
  </g>
  <!-- Hoop layer bands -->
  <line x1="64" y1="95" x2="356" y2="95" class="detail"/>
  <line x1="64" y1="165" x2="356" y2="165" class="detail"/>
  <!-- Hydro test boss port -->
  <rect x="194" y="68" width="32" height="16" rx="3" class="skin"/>
  <circle cx="210" cy="76" r="5" class="detail"/>
  <!-- Callouts -->
  <text x="326" y="72" class="micro" text-anchor="end">HYDRO PORT</text>
  <path d="M226 72 L310 72" class="detail"/>
  <text x="326" y="110" class="micro" text-anchor="end">HELICAL WIND ±14°</text>
  <path d="M356 110 L318 110" class="detail"/>
  <text x="326" y="162" class="micro" text-anchor="end">HOOP PLY BAND</text>
  <path d="M356 162 L318 162" class="detail"/>
  <text x="104" y="228" class="micro">Ø0.60 m OD · WALL t=6 mm CFRP + 4 mm EPDM · L=2.40 m</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.grain{fill:rgba(60,40,12,.65);stroke:rgba(200,160,80,.6);stroke-width:1}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P2 PROPELLANT GRAIN (HTPB STAR PORT)</text>
  <text x="16" y="36" class="micro">HTPB/AP/Al COMPOSITE · 14-PT STAR · NEUTRAL BURN</text>
  <!-- Outer case boundary (cross-section from above) -->
  <circle cx="210" cy="162" r="112" class="skin"/>
  <!-- Insulation ring -->
  <circle cx="210" cy="162" r="100" class="detail"/>
  <!-- Propellant grain outer boundary -->
  <circle cx="210" cy="162" r="96" class="grain"/>
  <!-- Star bore (14-point star) -->
  <!-- The star port is cut from the grain center outward to the star points -->
  <!-- Draw 14-point star bore as background cutout -->
  <polygon points="
    210,102 217,122 236,110 228,130 248,128 234,144 254,152 236,154 244,172 224,168 222,188 210,174 198,188 196,168 176,172 184,154 166,152 186,144 172,128 192,130 184,110 203,122
  " fill="#050d18" stroke="rgba(137,255,168,.4)" stroke-width=".9"/>
  <!-- Central bore circle -->
  <circle cx="210" cy="162" r="18" fill="#050d18" stroke="rgba(137,255,168,.5)" stroke-width=".85"/>
  <!-- Grain radial marks (regression surface layers) -->
  <circle cx="210" cy="162" r="60" class="detail" stroke-dasharray="3 4" stroke-opacity="0.3"/>
  <circle cx="210" cy="162" r="78" class="detail" stroke-dasharray="3 4" stroke-opacity="0.3"/>
  <!-- Callout lines -->
  <path d="M292 92 L342 62 L404 62" class="detail"/>
  <text x="404" y="59" class="micro" text-anchor="end">CASE WALL (CFRP)</text>
  <path d="M278 116 L342 100 L404 100" class="detail"/>
  <text x="404" y="97" class="micro" text-anchor="end">EPDM INSULATION</text>
  <path d="M280 148 L342 138 L404 138" class="detail"/>
  <text x="404" y="135" class="micro" text-anchor="end">HTPB GRAIN</text>
  <path d="M228 145 L342 178 L404 178" class="hot"/>
  <text x="404" y="175" class="micro" text-anchor="end">STAR BORE (14 PT)</text>
  <path d="M210 144 L342 218 L404 218" class="hot"/>
  <text x="404" y="215" class="micro" text-anchor="end">CENTRAL PORT</text>
  <text x="16" y="266" class="micro">OD Ø0.60 m · GRAIN OD 0.556 m · BORE DIA ~0.10 m · BURN AREA NEUTRAL ±5%</text>
</svg>

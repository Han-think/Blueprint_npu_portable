<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="#050d18"/>
  <defs>
    <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0 L0 0 0 20" fill="none" stroke="rgba(72,118,174,.14)" stroke-width=".45"/></pattern>
    <style>.skin{fill:rgba(8,28,48,.72);stroke:rgba(133,190,255,.86);stroke-width:1.2}.detail{fill:none;stroke:rgba(133,190,255,.36);stroke-width:.7}.hot{fill:none;stroke:rgba(137,255,168,.55);stroke-width:.85}.txt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8px;letter-spacing:.12em;fill:rgba(230,236,245,.68)}.micro{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:6px;letter-spacing:.12em;fill:rgba(118,169,232,.5)}</style>
  </defs>
  <rect width="420" height="300" fill="url(#g)"/>
  <text x="16" y="22" class="txt">P5 IGNITER ASSEMBLY (PYROTECHNIC)</text>
  <text x="16" y="36" class="micro">BORON-KNO3 CHARGE · DUAL BRIDGEWIRE · SAFE/ARM · J-LEAD</text>
  <!-- Igniter outer housing (cross-section) -->
  <rect x="140" y="58" width="140" height="180" rx="12" class="skin"/>
  <!-- Inner charge cavity -->
  <rect x="158" y="76" width="104" height="106" rx="6" class="skin" fill="rgba(40,20,4,.6)" stroke-opacity="0.5"/>
  <!-- Boron/KNO3 pyrotechnic charge (center fill) -->
  <rect x="164" y="82" width="92" height="94" rx="4" fill="rgba(80,50,12,.7)" stroke="rgba(200,160,80,.5)" stroke-width=".7"/>
  <!-- Ignition head (top of charge) -->
  <ellipse cx="210" cy="82" rx="46" ry="10" fill="rgba(80,50,12,.7)" stroke="rgba(137,255,168,.5)" stroke-width=".8"/>
  <!-- Dual bridgewire leads -->
  <line x1="192" y1="58" x2="192" y2="82" class="hot"/>
  <line x1="228" y1="58" x2="228" y2="82" class="hot"/>
  <!-- Bridgewire connection (resistance element) -->
  <path d="M 192 78 Q 210 88 228 78" class="hot"/>
  <!-- J-lead connectors at top -->
  <rect x="178" y="40" width="64" height="22" rx="4" class="skin"/>
  <circle cx="196" cy="51" r="5" class="hot"/>
  <circle cx="224" cy="51" r="5" class="hot"/>
  <!-- Safe/arm device -->
  <rect x="140" y="184" width="56" height="28" rx="4" class="skin"/>
  <rect x="148" y="190" width="40" height="16" rx="2" class="detail"/>
  <line x1="168" y1="184" x2="168" y2="212" class="hot"/>
  <!-- Output header / boss thread -->
  <ellipse cx="210" cy="238" rx="44" ry="14" class="skin"/>
  <ellipse cx="210" cy="238" rx="30" ry="9" class="detail"/>
  <circle cx="210" cy="238" r="10" class="hot"/>
  <!-- Thread marks on boss -->
  <line x1="180" y1="232" x2="174" y2="244" class="detail"/>
  <line x1="188" y1="228" x2="182" y2="242" class="detail"/>
  <line x1="232" y1="228" x2="238" y2="242" class="detail"/>
  <line x1="240" y1="232" x2="246" y2="244" class="detail"/>
  <!-- Callouts -->
  <path d="M 280 51 L 328 28 L 404 28" class="hot"/>
  <text x="404" y="25" class="micro" text-anchor="end">DUAL BRIDGEWIRE (REDUNDANT)</text>
  <path d="M 280 130 L 328 80 L 404 80" class="detail"/>
  <text x="404" y="77" class="micro" text-anchor="end">B/KNO3 CHARGE 120 g</text>
  <path d="M 196 212 L 100 224 L 18 224" class="hot"/>
  <text x="18" y="221" class="micro">SAFE/ARM DEVICE</text>
  <path d="M 254 238 L 328 258 L 404 258" class="detail"/>
  <text x="404" y="255" class="micro" text-anchor="end">OUTPUT BOSS (M48×2)</text>
</svg>

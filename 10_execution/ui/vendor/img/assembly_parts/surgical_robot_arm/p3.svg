<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,24)">
  <text class="ti" x="180" y="14">ENDOWRIST — 3-DOF WRIST</text>
  <text class="mc" x="180" y="24">PITCH ±90° · YAW ±60° · ROLL ±360° · 7mm CABLE-DRIVEN · STERILIZABLE</text>
  <!-- instrument shaft -->
  <rect class="sk" x="80" y="128" width="160" height="14" rx="3"/>
  <text class="ct" x="160" y="138" text-anchor="middle">INSTRUMENT SHAFT Ø7mm</text>
  <!-- cable channels inside shaft -->
  <line class="mi" x1="88" y1="132" x2="232" y2="132"/>
  <line class="mi" x1="88" y1="138" x2="232" y2="138"/>
  <text class="mc" x="160" y="126" text-anchor="middle">CABLE CHANNELS ×4</text>
  <!-- wrist housing at distal end -->
  <rect class="sk" x="244" y="112" width="52" height="46" rx="5"/>
  <!-- pitch axis -->
  <line class="nz" x1="244" y1="135" x2="296" y2="135"/>
  <text class="mc" x="308" y="127">PITCH AXIS</text>
  <!-- yaw pulley -->
  <circle class="ma" cx="270" cy="135" r="16"/>
  <circle class="mi" cx="270" cy="135" r="8"/>
  <text class="ct" x="270" y="139" text-anchor="middle">YAW</text>
  <!-- roll annotation arc -->
  <path class="cl" d="M244,118 A18,18 0 0 1 244,152"/>
  <text class="mc" x="222" y="136">ROLL ±360°</text>
  <!-- pitch arc -->
  <path class="cl" d="M296,118 A22,22 0 0 1 296,152"/>
  <text class="mc" x="298" y="139">PITCH ±90°</text>
  <!-- yaw arc top -->
  <path class="cl" d="M256,112 A16,16 0 0 1 284,112"/>
  <text class="mc" x="270" y="108" text-anchor="middle">YAW ±60°</text>
  <!-- cable pulleys inside wrist -->
  <circle class="mi" cx="258" cy="135" r="5"/>
  <circle class="mi" cx="282" cy="135" r="5"/>
  <!-- grasper attachment port -->
  <rect class="sk" x="296" y="122" width="28" height="26" rx="3"/>
  <text class="mc" x="310" y="138" text-anchor="middle">EFF. PORT</text>
  <!-- sterilization note -->
  <rect class="pa" x="80" y="168" width="248" height="18" rx="3"/>
  <text class="mc" x="204" y="180" text-anchor="middle">AUTOCLAVE STERILIZABLE · PEEK + 316L STAINLESS</text>
  <!-- dimension -->
  <line class="mi" x1="80" y1="198" x2="324" y2="198"/>
  <text class="mc" x="202" y="208" text-anchor="middle">WRIST SECTION L=52mm · SHAFT Ø7mm</text>
</g>
<text class="mc" x="10" y="292">p3 · endowrist_3dof · pitch ±90° yaw ±60° roll ±360° · cable-driven 7mm shaft · PEEK+316L sterilizable</text>
</svg>
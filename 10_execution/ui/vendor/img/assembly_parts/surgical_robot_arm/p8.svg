<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">ARM CONTROL ELECTRONICS BAY</text>
  <text class="mc" x="180" y="24">MOTOR DRIVES · FORCE SENSING ADC · CAN BUS · EMI SHIELDED</text>
  <!-- shielded enclosure -->
  <rect class="sk" x="80" y="56" width="240" height="190" rx="6"/>
  <!-- EMI shield lining -->
  <rect class="pa" x="84" y="60" width="232" height="182" rx="4"/>
  <text class="mc" x="200" y="74" text-anchor="middle">EMI SHIELD LINING (COPPER FOIL)</text>
  <!-- motor driver boards (4x) -->
  <rect class="sk" x="95" y="82" width="50" height="36" rx="2"/>
  <text class="ct" x="120" y="98" text-anchor="middle">DRV-1</text>
  <text class="mc" x="120" y="108" text-anchor="middle">MOTOR</text>
  <rect class="sk" x="153" y="82" width="50" height="36" rx="2"/>
  <text class="ct" x="178" y="98" text-anchor="middle">DRV-2</text>
  <text class="mc" x="178" y="108" text-anchor="middle">MOTOR</text>
  <rect class="sk" x="211" y="82" width="50" height="36" rx="2"/>
  <text class="ct" x="236" y="98" text-anchor="middle">DRV-3</text>
  <text class="mc" x="236" y="108" text-anchor="middle">MOTOR</text>
  <rect class="sk" x="95" y="126" width="50" height="36" rx="2"/>
  <text class="ct" x="120" y="142" text-anchor="middle">DRV-4</text>
  <text class="mc" x="120" y="152" text-anchor="middle">MOTOR</text>
  <!-- force sensing ADC board -->
  <rect class="sk" x="153" y="126" width="108" height="36" rx="2"/>
  <text class="ct" x="207" y="142" text-anchor="middle">FORCE SENSING ADC</text>
  <text class="mc" x="207" y="152" text-anchor="middle">16-BIT · 8-CH</text>
  <!-- CAN bus transceiver -->
  <rect class="sk" x="95" y="172" width="70" height="28" rx="2"/>
  <text class="ct" x="130" y="188" text-anchor="middle">CAN BUS XCVR</text>
  <!-- power supply board -->
  <rect class="sk" x="175" y="172" width="86" height="28" rx="2"/>
  <text class="ct" x="218" y="188" text-anchor="middle">POWER SUPPLY</text>
  <!-- CAN bus connector -->
  <rect class="sk" x="80" y="212" width="30" height="28" rx="3"/>
  <line class="mi" x1="88" y1="220" x2="108" y2="220"/>
  <line class="mi" x1="88" y1="228" x2="108" y2="228"/>
  <text class="mc" x="95" y="248">CAN OUT</text>
  <!-- power in connector -->
  <rect class="sk" x="290" y="212" width="30" height="28" rx="3"/>
  <line class="mi" x1="292" y1="220" x2="312" y2="220"/>
  <line class="mi" x1="292" y1="228" x2="312" y2="228"/>
  <text class="mc" x="288" y="248">PWR IN</text>
</g>
<text class="mc" x="10" y="292">p8 · control_electronics_bay · 4x motor drives · 16-bit force ADC · CAN bus · EMI shielded enclosure</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">END-EFFECTOR — LAPAROSCOPIC GRASPER</text>
  <text class="mc" x="180" y="24">PARALLEL JAW · 5N GRIP · ELECTRIC CAUTERY PASS-THROUGH</text>
  <!-- instrument shaft (short section) -->
  <rect class="sk" x="60" y="133" width="140" height="14" rx="3"/>
  <line class="mi" x1="68" y1="137" x2="192" y2="137"/>
  <line class="mi" x1="68" y1="143" x2="192" y2="143"/>
  <text class="ct" x="130" y="157" text-anchor="middle">SHAFT Ø7mm</text>
  <!-- jaw pivot housing -->
  <rect class="sk" x="200" y="122" width="40" height="36" rx="4"/>
  <circle class="nz" cx="220" cy="140" r="7"/>
  <text class="mc" x="220" y="158" text-anchor="middle">PIVOT</text>
  <!-- upper jaw -->
  <path class="sk" d="M238,125 L310,104 L318,110 L246,134 Z"/>
  <text class="ct" x="278" y="112">UPPER JAW</text>
  <!-- lower jaw -->
  <path class="sk" d="M238,155 L310,176 L318,170 L246,146 Z"/>
  <text class="ct" x="278" y="182">LOWER JAW</text>
  <!-- serrations on jaw faces -->
  <line class="mi" x1="250" y1="130" x2="308" y2="112"/>
  <line class="mi" x1="256" y1="132" x2="314" y2="114"/>
  <line class="mi" x1="250" y1="150" x2="308" y2="168"/>
  <line class="mi" x1="256" y1="148" x2="314" y2="166"/>
  <!-- closed gap annotation -->
  <line class="cl" x1="318" y1="110" x2="318" y2="170"/>
  <text class="mc" x="324" y="142">JAW GAP</text>
  <!-- cautery pass-through wire -->
  <line class="cl" x1="68" y1="140" x2="310" y2="140"/>
  <text class="mc" x="200" y="136">CAUTERY WIRE</text>
  <!-- 5N force annotation -->
  <line class="cl" x1="316" y1="118" x2="316" y2="138"/>
  <line class="cl" x1="316" y1="142" x2="316" y2="162"/>
  <text class="mc" x="320" y="112">5N GRIP</text>
  <!-- dimension -->
  <line class="mi" x1="60" y1="200" x2="320" y2="200"/>
  <text class="mc" x="190" y="210" text-anchor="middle">JAW REACH=80mm FROM PIVOT · PARALLEL GRIP</text>
  <!-- actuation cable -->
  <rect class="pa" x="60" y="108" width="140" height="16" rx="3"/>
  <text class="mc" x="130" y="120" text-anchor="middle">ACTUATION CABLE CONDUIT</text>
</g>
<text class="mc" x="10" y="292">p4 · endeffector_grasper · parallel jaw · 5N grip · electric cautery pass-through · Ø7mm shaft compatible</text>
</svg>
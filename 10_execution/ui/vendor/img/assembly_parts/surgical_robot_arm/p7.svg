<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">ARM CART INTERFACE MOUNT</text>
  <text class="mc" x="180" y="24">3-POINT KINEMATIC · QUICK-EXCHANGE LEVER · ELECTRICAL THROUGH-CONNECTOR</text>
  <!-- base plate -->
  <rect class="sk" x="80" y="100" width="240" height="90" rx="6"/>
  <!-- 3-point kinematic mounts (3 precision features) -->
  <circle class="nz" cx="130" cy="145" r="12"/>
  <text class="ct" x="130" y="149" text-anchor="middle">K1</text>
  <circle class="nz" cx="200" cy="145" r="12"/>
  <text class="ct" x="200" y="149" text-anchor="middle">K2</text>
  <circle class="nz" cx="270" cy="145" r="12"/>
  <text class="ct" x="270" y="149" text-anchor="middle">K3</text>
  <text class="mc" x="200" y="172" text-anchor="middle">3-POINT KINEMATIC MOUNT</text>
  <!-- quick-exchange lever -->
  <rect class="sk" x="82" y="144" width="36" height="20" rx="3"/>
  <line class="ma" x1="100" y1="144" x2="88" y2="130"/>
  <line class="ma" x1="100" y1="144" x2="112" y2="130"/>
  <text class="mc" x="100" y="135" text-anchor="middle">QE LEVER</text>
  <!-- electrical through-connector block -->
  <rect class="sk" x="298" y="108" width="20" height="74" rx="3"/>
  <line class="mi" x1="300" y1="116" x2="316" y2="116"/>
  <line class="mi" x1="300" y1="124" x2="316" y2="124"/>
  <line class="mi" x1="300" y1="132" x2="316" y2="132"/>
  <line class="mi" x1="300" y1="140" x2="316" y2="140"/>
  <line class="mi" x1="300" y1="148" x2="316" y2="148"/>
  <line class="mi" x1="300" y1="156" x2="316" y2="156"/>
  <line class="mi" x1="300" y1="164" x2="316" y2="164"/>
  <line class="mi" x1="300" y1="172" x2="316" y2="172"/>
  <text class="mc" x="324" y="148">ELEC. THRU</text>
  <!-- arm mounting surface (top) -->
  <rect class="pa" x="80" y="78" width="240" height="24" rx="4"/>
  <text class="mc" x="200" y="94" text-anchor="middle">ARM MOUNTING SURFACE (STERILE SIDE)</text>
  <!-- cart mounting surface (bottom) -->
  <rect class="pa" x="80" y="190" width="240" height="20" rx="4"/>
  <text class="mc" x="200" y="203" text-anchor="middle">CART SIDE INTERFACE</text>
  <!-- dimension -->
  <line class="mi" x1="80" y1="226" x2="320" y2="226"/>
  <text class="mc" x="200" y="236" text-anchor="middle">W=240mm · 3-POINT REPEATABILITY ±0.1mm</text>
</g>
<text class="mc" x="10" y="292">p7 · cart_interface_mount · 3-point kinematic mount · quick-exchange lever · electrical through-connector</text>
</svg>
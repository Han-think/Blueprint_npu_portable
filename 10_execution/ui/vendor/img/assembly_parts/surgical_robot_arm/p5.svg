<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">CANNULA MOUNT — RCM COLLAR</text>
  <text class="mc" x="180" y="24">8mm BORE · QUICK-LOCK LEVER · 360° ROTATION · STERILE DRAPE INTERFACE</text>
  <!-- outer collar ring -->
  <circle class="sk" cx="190" cy="148" r="80"/>
  <circle class="pa" cx="190" cy="148" r="72"/>
  <!-- 8mm bore (trocar passage) -->
  <circle class="sk" cx="190" cy="148" r="22"/>
  <circle class="ma" cx="190" cy="148" r="16"/>
  <text class="ct" x="190" y="152" text-anchor="middle">Ø8mm</text>
  <text class="mc" x="190" y="162" text-anchor="middle">TROCAR BORE</text>
  <!-- quick-lock lever -->
  <rect class="sk" x="258" y="134" width="48" height="28" rx="4"/>
  <rect class="mi" x="262" y="138" width="24" height="20" rx="2"/>
  <line class="ma" x1="286" y1="138" x2="302" y2="130"/>
  <text class="ct" x="282" y="152" text-anchor="middle">LOCK</text>
  <text class="mc" x="282" y="163" text-anchor="middle">LEVER</text>
  <!-- rotation bearing groove -->
  <circle class="mi" cx="190" cy="148" r="52"/>
  <text class="mc" x="190" y="100" text-anchor="middle">ROTATION BEARING RACE</text>
  <!-- 360° arc -->
  <path class="cl" d="M140,148 A52,52 0 1 0 140,149"/>
  <text class="mc" x="126" y="148">360°</text>
  <!-- sterile drape interface flat face (top) -->
  <rect class="sk" x="148" y="60" width="84" height="16" rx="3"/>
  <rect class="pa" x="152" y="62" width="76" height="12" rx="2"/>
  <text class="mc" x="190" y="73" text-anchor="middle">STERILE DRAPE INTERFACE</text>
  <!-- arm connection bottom -->
  <rect class="sk" x="158" y="222" width="64" height="16" rx="3"/>
  <line class="mi" x1="164" y1="222" x2="164" y2="238"/>
  <line class="mi" x1="174" y1="222" x2="174" y2="238"/>
  <line class="mi" x1="184" y1="222" x2="184" y2="238"/>
  <line class="mi" x1="194" y1="222" x2="194" y2="238"/>
  <line class="mi" x1="204" y1="222" x2="204" y2="238"/>
  <line class="mi" x1="214" y1="222" x2="214" y2="238"/>
  <text class="ct" x="190" y="250" text-anchor="middle">ARM MOUNT INTERFACE</text>
</g>
<text class="mc" x="10" y="292">p5 · cannula_mount_rcm · Ø8mm trocar bore · quick-lock lever · 360° rotation bearing · drape interface</text>

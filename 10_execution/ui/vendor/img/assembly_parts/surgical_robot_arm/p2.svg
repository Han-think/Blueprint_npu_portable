<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,24)">
  <text class="ti" x="180" y="14">ARM LINKS × 3</text>
  <text class="mc" x="180" y="24">Ti-6Al-4V TUBE · CNC JOINTS · TORQUE SENSOR · CABLE BORE</text>
  <!-- link 1 (proximal) -->
  <rect class="sk" x="60" y="60" width="100" height="22" rx="5"/>
  <text class="ct" x="110" y="75" text-anchor="middle">LINK 1 — PROXIMAL</text>
  <!-- cable bore through link 1 -->
  <line class="mi" x1="68" y1="71" x2="152" y2="71"/>
  <text class="mc" x="110" y="67" text-anchor="middle">CABLE BORE Ø4mm</text>
  <!-- joint 1-2 -->
  <circle class="sk" cx="168" cy="71" r="16"/>
  <circle class="ma" cx="168" cy="71" r="10"/>
  <circle class="mi" cx="168" cy="71" r="5"/>
  <text class="mc" x="168" y="95" text-anchor="middle">J1</text>
  <!-- torque sensor ring on joint -->
  <circle class="cl" cx="168" cy="71" r="20"/>
  <text class="mc" x="148" y="58">TORQUE</text>
  <text class="mc" x="148" y="64">SENSOR</text>
  <!-- link 2 (middle) -->
  <rect class="sk" x="192" y="60" width="90" height="22" rx="5"/>
  <text class="ct" x="237" y="75" text-anchor="middle">LINK 2 — MID</text>
  <line class="mi" x1="200" y1="71" x2="274" y2="71"/>
  <!-- joint 2-3 -->
  <circle class="sk" cx="290" cy="71" r="14"/>
  <circle class="ma" cx="290" cy="71" r="9"/>
  <circle class="mi" cx="290" cy="71" r="4"/>
  <text class="mc" x="290" y="92" text-anchor="middle">J2</text>
  <circle class="cl" cx="290" cy="71" r="18"/>
  <!-- link 3 (distal) -->
  <rect class="sk" x="310" y="60" width="62" height="22" rx="5"/>
  <text class="ct" x="341" y="75" text-anchor="middle">LINK 3</text>
  <line class="mi" x1="318" y1="71" x2="364" y2="71"/>
  <!-- cross-section view of tube -->
  <circle class="sk" cx="110" cy="150" r="28"/>
  <circle class="ma" cx="110" cy="150" r="20"/>
  <circle class="mi" cx="110" cy="150" r="12"/>
  <circle class="pa" cx="110" cy="150" r="6"/>
  <text class="ct" x="110" y="154" text-anchor="middle">BORE</text>
  <text class="ct" x="110" y="186" text-anchor="middle">SECTION A-A</text>
  <text class="mc" x="110" y="196" text-anchor="middle">Ti-6Al-4V TUBE OD=20mm / ID=12mm</text>
  <!-- material callout -->
  <text class="mc" x="60" y="118">Ti-6Al-4V</text>
  <text class="mc" x="60" y="126">SEAMLESS TUBE</text>
  <!-- dimension bars -->
  <line class="mi" x1="60" y1="110" x2="160" y2="110"/>
  <text class="mc" x="110" y="120" text-anchor="middle">L=180mm</text>
  <line class="mi" x1="192" y1="110" x2="282" y2="110"/>
  <text class="mc" x="237" y="120" text-anchor="middle">L=140mm</text>
  <line class="mi" x1="310" y1="110" x2="372" y2="110"/>
  <text class="mc" x="341" y="120" text-anchor="middle">L=80mm</text>
</g>
<text class="mc" x="10" y="292">p2 · arm_links_x3 · Ti-6Al-4V tube · CNC joints · torque sensor rings · Ø4mm cable bore through</text>

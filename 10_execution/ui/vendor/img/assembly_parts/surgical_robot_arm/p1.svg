<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,24)">
  <text class="ti" x="180" y="14">REMOTE CENTER OF MOTION MECHANISM</text>
  <text class="mc" x="180" y="24">RCM PARALLELOGRAM LINKAGE · 2-DOF SHOULDER · FIXED RCM AT TROCAR</text>
  <!-- fixed base pivot -->
  <circle class="sk" cx="190" cy="52" r="14"/>
  <circle class="mi" cx="190" cy="52" r="8"/>
  <text class="ct" x="190" y="56" text-anchor="middle">BASE</text>
  <!-- parallelogram upper arm AB -->
  <line class="ma" x1="190" y1="52" x2="130" y2="130"/>
  <line class="ma" x1="190" y1="52" x2="250" y2="130"/>
  <!-- cross links -->
  <line class="ma" x1="130" y1="130" x2="190" y2="130"/>
  <line class="ma" x1="250" y1="130" x2="190" y2="130"/>
  <!-- lower links to RCM point -->
  <line class="ma" x1="130" y1="130" x2="190" y2="208"/>
  <line class="ma" x1="250" y1="130" x2="190" y2="208"/>
  <!-- mid joints -->
  <circle class="nz" cx="130" cy="130" r="7"/>
  <text class="mc" x="108" y="133">JOINT A</text>
  <circle class="nz" cx="250" cy="130" r="7"/>
  <text class="mc" x="258" y="133">JOINT B</text>
  <circle class="nz" cx="190" cy="130" r="5"/>
  <!-- RCM point -->
  <circle class="nz" cx="190" cy="208" r="10"/>
  <text class="ct" x="190" y="212" text-anchor="middle">RCM</text>
  <text class="mc" x="190" y="226" text-anchor="middle">TROCAR ENTRY POINT</text>
  <!-- constraint arrows showing RCM stays fixed -->
  <path class="cl" d="M175,208 A16,16 0 0 1 205,208"/>
  <text class="mc" x="190" y="242" text-anchor="middle">MOTION ALWAYS ABOUT THIS POINT</text>
  <!-- DOF annotations -->
  <path class="cl" d="M176,52 A18,18 0 0 1 204,52"/>
  <text class="mc" x="190" y="38" text-anchor="middle">2-DOF SHOULDER</text>
  <!-- arm extension annotation -->
  <line class="mi" x1="318" y1="52" x2="318" y2="208"/>
  <text class="mc" x="324" y="134">ARM REACH</text>
</g>
<text class="mc" x="10" y="292">p1 · rcm_mechanism · parallelogram 2-DOF · remote center of motion · fixed trocar entry · shoulder joint</text>
</svg>
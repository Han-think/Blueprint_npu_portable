<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CYLINDER BARREL</text>
<text x="12" y="26" class="mc">42CrMo4 SEAMLESS HONED · Ø80mm BORE · Ra&lt;0.2µm ID · WALL 15mm · SAE 3000psi</text>
<!-- barrel cross-section (longitudinal) -->
<rect x="60" y="100" width="300" height="110" rx="8" class="sk"/>
<!-- bore inner surface -->
<rect x="75" y="115" width="270" height="80" rx="3" class="pa"/>
<!-- honing cross-hatch indication (angled lines on bore) -->
<line x1="90" y1="115" x2="110" y2="195" class="mi"/>
<line x1="110" y1="115" x2="130" y2="195" class="mi"/>
<line x1="130" y1="115" x2="150" y2="195" class="mi"/>
<line x1="150" y1="115" x2="170" y2="195" class="mi"/>
<line x1="170" y1="115" x2="190" y2="195" class="mi"/>
<line x1="190" y1="115" x2="210" y2="195" class="mi"/>
<line x1="210" y1="115" x2="230" y2="195" class="mi"/>
<line x1="230" y1="115" x2="250" y2="195" class="mi"/>
<line x1="250" y1="115" x2="270" y2="195" class="mi"/>
<line x1="270" y1="115" x2="290" y2="195" class="mi"/>
<line x1="110" y1="115" x2="90" y2="195" class="mi"/>
<line x1="130" y1="115" x2="110" y2="195" class="mi"/>
<line x1="150" y1="115" x2="130" y2="195" class="mi"/>
<line x1="170" y1="115" x2="150" y2="195" class="mi"/>
<line x1="190" y1="115" x2="170" y2="195" class="mi"/>
<line x1="210" y1="115" x2="190" y2="195" class="mi"/>
<line x1="230" y1="115" x2="210" y2="195" class="mi"/>
<line x1="250" y1="115" x2="230" y2="195" class="mi"/>
<line x1="270" y1="115" x2="250" y2="195" class="mi"/>
<!-- port threads at each end -->
<rect x="60" y="136" width="16" height="38" rx="2" class="nz"/>
<rect x="344" y="136" width="16" height="38" rx="2" class="nz"/>
<!-- wall thickness dimension -->
<line x1="60" y1="270" x2="75" y2="270" class="ma"/>
<line x1="60" y1="265" x2="60" y2="275" class="mi"/>
<line x1="75" y1="265" x2="75" y2="275" class="mi"/>
<text x="67" y="282" text-anchor="middle" class="mc">t=15</text>
<!-- bore diameter -->
<line x1="75" y1="255" x2="345" y2="255" class="ma"/>
<line x1="75" y1="250" x2="75" y2="260" class="mi"/>
<line x1="345" y1="250" x2="345" y2="260" class="mi"/>
<text x="210" y="267" text-anchor="middle" class="mc">Ø80mm BORE</text>
<!-- callouts -->
<line x1="210" y1="100" x2="320" y2="60" class="cl"/><text x="322" y="58" class="ct">42CrMo4 Seamless</text>
<line x1="200" y1="135" x2="60" y2="60" class="cl"/><text x="10" y="58" class="ct">Honed Ra&lt;0.2µm</text>
<line x1="68" y1="155" x2="20" y2="170" class="cl"/><text x="10" y="168" class="ct">SAE Port 3/4-16UNF</text>
<text x="210" y="292" text-anchor="middle" class="mc">HYDRAULIC CYLINDER · P1 BARREL · 42CrMo4 · Ø80 BORE · SAE 3000psi</text>

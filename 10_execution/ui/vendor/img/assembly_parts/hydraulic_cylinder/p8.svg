<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SEAL KIT (NBR / PU SET)</text>
<text x="12" y="26" class="mc">PISTON O-RING + BACKUP · ROD U-CUP · WIPER · GUIDE RING · PTFE BUFFER · NBR/PU</text>
<!-- layout: 6 seal types arranged in 2 rows -->
<!-- Row 1 left: Piston O-ring -->
<circle cx="90" cy="110" r="34" class="sk"/>
<circle cx="90" cy="110" r="26" class="nz"/>
<text x="90" y="114" text-anchor="middle" class="mc">O-RING</text>
<!-- Row 1 center: Piston backup -->
<rect x="168" y="80" width="60" height="60" rx="30" class="sk"/>
<rect x="182" y="94" width="32" height="32" rx="16" class="nz"/>
<text x="198" y="114" text-anchor="middle" class="mc">BACKUP</text>
<!-- Row 1 right: Rod U-cup -->
<path d="M290 80 L290 138 Q290 145 298 145 Q306 145 306 138 L306 80 Z" class="sk"/>
<path d="M296 86 L296 136 Q296 140 298 140 Q300 140 300 136 L300 86" class="nz"/>
<text x="298" y="158" text-anchor="middle" class="mc">U-CUP</text>
<!-- Row 2 left: Wiper -->
<path d="M56 175 L126 175 L126 215 L110 235 L72 235 L56 215 Z" class="sk"/>
<path d="M64 181 L118 181 L118 212 L106 228 L76 228 L64 212 Z" class="nz"/>
<text x="91" y="250" text-anchor="middle" class="mc">WIPER</text>
<!-- Row 2 center-left: Guide ring (rectangular section) -->
<rect x="152" y="178" width="70" height="30" rx="5" class="sk"/>
<rect x="160" y="183" width="54" height="20" rx="3" class="nz"/>
<text x="187" y="228" text-anchor="middle" class="mc">GUIDE RING</text>
<!-- Row 2 center-right: PTFE buffer ring -->
<circle cx="296" cy="200" r="32" class="sk"/>
<circle cx="296" cy="200" r="24" class="nz"/>
<text x="296" y="246" text-anchor="middle" class="mc">PTFE BUFFER</text>
<!-- material label row -->
<text x="210" y="270" text-anchor="middle" class="mc">NBR -40 to +120°C / PU -30 to +100°C / PTFE STATIC + DYNAMIC</text>
<!-- callouts -->
<line x1="90" y1="76" x2="38" y2="48" class="cl"/><text x="10" y="46" class="ct">Piston O-ring NBR</text>
<line x1="198" y1="80" x2="250" y2="48" class="cl"/><text x="252" y="46" class="ct">Backup Ring PU</text>
<line x1="298" y1="80" x2="380" y2="48" class="cl"/><text x="382" y="46" class="ct">Rod U-cup PU</text>
<line x1="56" y1="195" x2="20" y2="210" class="cl"/><text x="10" y="208" class="ct">Rod Wiper NBR</text>
<text x="210" y="292" text-anchor="middle" class="mc">HYDRAULIC CYLINDER · P8 SEAL KIT · NBR/PU/PTFE · COMPLETE SET</text>
</svg>
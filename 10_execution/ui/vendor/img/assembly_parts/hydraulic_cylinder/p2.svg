<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">PISTON + PISTON ROD</text>
<text x="12" y="26" class="mc">Ø80mm PISTON + Ø50mm ROD · 42CrMo4 · HARD CHROME 25µm · &lt;0.1mm/1000mm</text>
<!-- piston rod (horizontal) -->
<rect x="30" y="137" width="340" height="26" rx="4" class="sk"/>
<!-- chrome surface indication -->
<rect x="30" y="140" width="220" height="4" rx="2" class="ma"/>
<!-- piston head -->
<rect x="230" y="110" width="50" height="80" rx="5" class="sk"/>
<!-- piston seal grooves -->
<rect x="228" y="120" width="54" height="8" rx="2" class="nz"/>
<rect x="228" y="142" width="54" height="8" rx="2" class="nz"/>
<rect x="228" y="162" width="54" height="8" rx="2" class="nz"/>
<!-- rod end clevis -->
<rect x="345" y="127" width="28" height="46" rx="4" class="pa"/>
<circle cx="359" cy="150" r="10" class="nz"/>
<!-- rod eye at other end -->
<circle cx="22" cy="150" r="20" class="pa"/>
<circle cx="22" cy="150" r="11" class="nz"/>
<!-- straightness tolerance note -->
<line x1="30" y1="175" x2="250" y2="175" class="mi"/>
<!-- callouts -->
<line x1="22" y1="130" x2="22" y2="58" class="cl"/><text x="10" y="54" class="ct">Eye Mount End</text>
<line x1="120" y1="137" x2="120" y2="70" class="cl"/><text x="82" y="66" class="ct">Hard Chrome Ø50 Rod</text>
<line x1="255" y1="110" x2="330" y2="70" class="cl"/><text x="332" y="68" class="ct">Piston Ø80 Seals</text>
<line x1="228" y1="130" x2="140" y2="200" class="cl"/><text x="100" y="210" class="ct">O-ring + Backup Seal</text>
<line x1="359" y1="127" x2="380" y2="100" class="cl"/><text x="382" y="98" class="ct">Clevis Rod End</text>
<line x1="150" y1="175" x2="150" y2="230" class="cl"/><text x="100" y="240" class="ct">Straight &lt;0.1/1000mm</text>
<text x="210" y="292" text-anchor="middle" class="mc">HYDRAULIC CYLINDER · P2 PISTON+ROD · Ø80/50 · HARD CHROME 25µm</text>

<circle cx="210" cy="150" r="30" class="pa"/>
<circle cx="210" cy="150" r="20" class="nz"/>
<!-- bleed screw port (top) -->
<circle cx="210" cy="58" r="7" class="nz"/>
<!-- tie-rod holes x4 at 90° -->
<circle cx="210" cy="64" r="6.5" class="pa"/>
<circle cx="296" cy="150" r="6.5" class="pa"/>
<circle cx="210" cy="236" r="6.5" class="pa"/>
<circle cx="124" cy="150" r="6.5" class="pa"/>
<!-- barrel bore register (inner land) -->
<circle cx="210" cy="150" r="52" class="mi"/>
<circle cx="210" cy="150" r="48" class="mi"/>
<!-- callouts -->
<line x1="310" y1="150" x2="380" y2="130" class="cl"/><text x="382" y="128" class="ct">SAE Port 3/4-16UNF</text>
<line x1="230" y1="150" x2="360" y2="165" class="cl"/><text x="362" y="163" class="ct">Cushion Sleeve Ø40</text>
<line x1="210" y1="58" x2="340" y2="42" class="cl"/><text x="342" y="40" class="ct">Bleed Screw M8</text>
<line x1="296" y1="143" x2="380" y2="100" class="cl"/><text x="382" y="98" class="ct">Tie-Rod Bore x4</text>
<line x1="170" y1="150" x2="60" y2="135" class="cl"/><text x="10" y="133" class="ct">Barrel Register Ø104</text>
<line x1="160" y1="200" x2="60" y2="215" class="cl"/><text x="10" y="213" class="ct">Steel SAE 3000psi</text>
<text x="210" y="292" text-anchor="middle" class="mc">HYDRAULIC CYLINDER · P4 END CAP BLIND · CUSHION + PORT + BLEED</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CLEVIS / TRUNNION MOUNT</text>
<text x="12" y="26" class="mc">42CrMo4 · PIVOT BORE Ø40mm · BRONZE BUSHING · GREASE NIPPLE · ±5° MISALIGN</text>
<!-- clevis body (U-shape) -->
<path d="M100 90 L100 240 L160 240 L160 180 L260 180 L260 240 L320 240 L320 90 Z" class="sk"/>
<!-- clevis gap/throat -->
<rect x="158" y="180" width="104" height="62" rx="2" class="nz"/>
<!-- pivot bore through clevis ears -->
<circle cx="130" cy="210" r="22" class="pa"/>
<circle cx="130" cy="210" r="14" class="nz"/>
<circle cx="290" cy="210" r="22" class="pa"/>
<circle cx="290" cy="210" r="14" class="nz"/>
<!-- bronze bushing in bore -->
<circle cx="130" cy="210" r="18" class="mi"/>
<circle cx="290" cy="210" r="18" class="mi"/>
<!-- cylinder attachment thread (top) -->
<rect x="170" y="60" width="80" height="34" rx="4" class="pa"/>
<line x1="175" y1="70" x2="245" y2="70" class="mi"/>
<line x1="175" y1="76" x2="245" y2="76" class="mi"/>
<line x1="175" y1="82" x2="245" y2="82" class="mi"/>
<!-- grease nipple -->
<circle cx="210" cy="130" r="6" class="nz"/>
<!-- pivot pin dashed -->
<line x1="100" y1="210" x2="320" y2="210" class="ma" stroke-dasharray="8 4"/>
<!-- callouts -->
<line x1="210" y1="60" x2="340" y2="44" class="cl"/><text x="342" y="42" class="ct">Cylinder Thread Mount</text>
<line x1="130" y1="188" x2="38" y2="165" class="cl"/><text x="10" y="163" class="ct">Pivot Bore Ø40</text>
<line x1="130" y1="218" x2="38" y2="235" class="cl"/><text x="10" y="233" class="ct">Bronze Bushing</text>
<line x1="210" y1="130" x2="340" y2="118" class="cl"/><text x="342" y="116" class="ct">Grease Nipple</text>
<line x1="290" y1="188" x2="370" y2="165" class="cl"/><text x="372" y="163" class="ct">±5° Misalign OK</text>
<text x="210" y="292" text-anchor="middle" class="mc">HYDRAULIC CYLINDER · P6 CLEVIS MOUNT · Ø40 PIVOT · BRONZE BUSH</text>

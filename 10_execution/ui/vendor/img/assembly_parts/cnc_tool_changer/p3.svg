<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CAM DRIVE HOUSING</text>
<text x="12" y="26" class="mc">42CrMo4 HARDENED · BARREL CAM + ROLLER FOLLOWER · SINGLE-MOTOR INPUT</text>
<!-- housing body -->
<rect x="100" y="80" width="220" height="160" rx="8" class="sk"/>
<!-- barrel cam cylinder inside -->
<ellipse cx="210" cy="130" rx="70" ry="30" class="pa"/>
<rect x="140" y="100" width="140" height="60" rx="4" class="pa"/>
<ellipse cx="210" cy="160" rx="70" ry="30" class="mi"/>
<!-- cam groove path on barrel -->
<path d="M145 115 Q175 100 210 115 Q245 130 275 115" class="ma"/>
<path d="M145 145 Q175 130 210 145 Q245 160 275 145" class="ma"/>
<!-- roller followers on groove -->
<circle cx="175" cy="108" r="7" class="pa"/>
<circle cx="245" cy="122" r="7" class="pa"/>
<!-- input shaft bore -->
<circle cx="210" cy="240" r="18" class="nz"/>
<rect x="200" y="220" width="20" height="60" rx="3" class="pa"/>
<!-- output shaft (to magazine ring) -->
<circle cx="100" cy="160" r="15" class="nz"/>
<!-- bearing supports -->
<rect x="100" y="115" width="20" height="30" rx="3" class="pa"/>
<rect x="300" y="115" width="20" height="30" rx="3" class="pa"/>
<!-- callouts -->
<line x1="210" y1="80" x2="330" y2="55" class="cl"/><text x="332" y="53" class="ct">42CrMo4 Housing</text>
<line x1="210" y1="115" x2="360" y2="100" class="cl"/><text x="362" y="98" class="ct">Barrel Cam Groove</text>
<line x1="175" y1="101" x2="100" y2="72" class="cl"/><text x="50" y="70" class="ct">Roller Follower</text>
<line x1="210" y1="240" x2="340" y2="252" class="cl"/><text x="342" y="250" class="ct">Motor Input Shaft</text>
<line x1="100" y1="160" x2="38" y2="148" class="cl"/><text x="10" y="146" class="ct">Output to Magazine</text>
<text x="210" y="292" text-anchor="middle" class="mc">CNC TOOL CHANGER · P3 CAM DRIVE HOUSING · 42CrMo4 · BARREL CAM</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">DRIVE MOTOR + GEARBOX</text>
<text x="12" y="26" class="mc">3-PHASE AC SERVO 1.5kW · 40:1 PLANETARY · BRAKE-EQUIPPED · 200ms INDEX</text>
<!-- motor body -->
<rect x="240" y="80" width="120" height="160" rx="8" class="sk"/>
<!-- motor stator windings indicator -->
<rect x="252" y="95" width="96" height="130" rx="4" class="pa"/>
<!-- rotor shaft -->
<rect x="295" y="70" width="20" height="180" rx="3" class="sk"/>
<!-- planetary gearbox body -->
<rect x="60" y="100" width="180" height="120" rx="8" class="sk"/>
<!-- planet gears inside box -->
<circle cx="150" cy="160" r="35" class="pa"/>
<circle cx="150" cy="160" r="18" class="nz"/>
<circle cx="118" cy="138" r="10" class="mi"/>
<circle cx="182" cy="138" r="10" class="mi"/>
<circle cx="118" cy="182" r="10" class="mi"/>
<circle cx="182" cy="182" r="10" class="mi"/>
<!-- output shaft -->
<rect x="30" y="152" width="32" height="16" rx="3" class="sk"/>
<!-- brake unit on top of motor -->
<rect x="256" y="60" width="88" height="24" rx="4" class="pa"/>
<text x="300" y="75" text-anchor="middle" class="mc">BRAKE</text>
<!-- ratio label -->
<text x="150" y="165" text-anchor="middle" class="mc">40:1</text>
<!-- callouts -->
<line x1="300" y1="80" x2="340" y2="48" class="cl"/><text x="342" y="46" class="ct">1.5kW AC Servo Motor</text>
<line x1="300" y1="60" x2="380" y2="45" class="cl"/><text x="382" y="43" class="ct">Electromagnetic Brake</text>
<line x1="182" y1="138" x2="360" y2="128" class="cl"/><text x="362" y="126" class="ct">Planetary 40:1</text>
<line x1="30" y1="160" x2="10" y2="145" class="cl"/><text x="10" y="140" class="ct">Output Shaft</text>
<line x1="150" y1="220" x2="200" y2="250" class="cl"/><text x="202" y="248" class="ct">200ms Index Time</text>
<text x="210" y="292" text-anchor="middle" class="mc">CNC TOOL CHANGER · P4 DRIVE MOTOR+GEARBOX · 1.5kW · 40:1</text>
</svg>
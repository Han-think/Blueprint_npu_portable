<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">POT MAGAZINE CYLINDER</text>
<text x="12" y="26" class="mc">Ø80 DOUBLE-ACTING PNEUMATIC · REED SWITCHES · 150mm STROKE · 8 BAR</text>
<!-- cylinder body -->
<rect x="140" y="70" width="140" height="180" rx="10" class="sk"/>
<!-- bore inner -->
<rect x="157" y="80" width="106" height="160" rx="6" class="pa"/>
<!-- piston inside -->
<rect x="155" y="150" width="110" height="22" rx="4" class="sk"/>
<!-- piston seals -->
<rect x="155" y="148" width="110" height="5" rx="2" class="ma"/>
<rect x="155" y="167" width="110" height="5" rx="2" class="ma"/>
<!-- piston rod extending down -->
<rect x="197" y="170" width="26" height="100" rx="3" class="sk"/>
<circle cx="210" cy="272" r="10" class="pa"/>
<!-- port A (top) -->
<rect x="175" y="58" width="28" height="18" rx="3" class="nz"/>
<text x="189" y="70" text-anchor="middle" class="mc">PORT A</text>
<!-- port B (bottom of barrel) -->
<rect x="245" y="152" width="18" height="14" rx="3" class="nz"/>
<text x="254" y="162" text-anchor="middle" class="mc">B</text>
<!-- reed switch positions -->
<rect x="280" y="135" width="28" height="14" rx="3" class="pa"/>
<rect x="280" y="175" width="28" height="14" rx="3" class="pa"/>
<text x="294" y="145" text-anchor="middle" class="mc">RS1</text>
<text x="294" y="185" text-anchor="middle" class="mc">RS2</text>
<!-- tie rods x4 -->
<circle cx="148" cy="82" r="4" class="pa"/>
<circle cx="272" cy="82" r="4" class="pa"/>
<circle cx="148" cy="238" r="4" class="pa"/>
<circle cx="272" cy="238" r="4" class="pa"/>
<!-- stroke dimension -->
<line x1="315" y1="80" x2="315" y2="230" class="ma"/>
<line x1="310" y1="80" x2="320" y2="80" class="mi"/>
<line x1="310" y1="230" x2="320" y2="230" class="mi"/>
<text x="328" y="158" class="mc">150mm</text>
<!-- callouts -->
<line x1="189" y1="58" x2="100" y2="40" class="cl"/><text x="10" y="38" class="ct">Port A (Extend)</text>
<line x1="157" y1="160" x2="60" y2="148" class="cl"/><text x="10" y="146" class="ct">Ø80mm Piston</text>
<line x1="294" y1="135" x2="380" y2="118" class="cl"/><text x="382" y="116" class="ct">Reed Switch x2</text>
<line x1="210" y1="272" x2="340" y2="278" class="cl"/><text x="342" y="276" class="ct">Rod End Clevis</text>
<text x="210" y="292" text-anchor="middle" class="mc">CNC TOOL CHANGER · P5 PNEUMATIC CYLINDER · Ø80 · 150mm · 8BAR</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">INTERNAL MAGNET + ANTENNA COIL</text>
  <text class="mc" x="180" y="24">Ø30mm RECEIVING COIL · 5MHz CERAMIC CAP TUNED · REMOVABLE MAGNET MRI</text>
  <!-- outer coil housing -->
  <circle class="sk" cx="190" cy="148" r="60"/>
  <!-- coil winding representation (concentric) -->
  <circle class="ma" cx="190" cy="148" r="52"/>
  <circle class="mi" cx="190" cy="148" r="44"/>
  <circle class="mi" cx="190" cy="148" r="36"/>
  <circle class="mi" cx="190" cy="148" r="28"/>
  <text class="mc" x="190" y="82" text-anchor="middle">RECEIVING COIL WINDINGS</text>
  <!-- center magnet (removable) -->
  <circle class="sk" cx="190" cy="148" r="18"/>
  <circle class="nz" cx="190" cy="148" r="12"/>
  <text class="ct" x="190" y="152" text-anchor="middle">MAGNET</text>
  <text class="mc" x="190" y="174" text-anchor="middle">REMOVABLE FOR MRI</text>
  <!-- ceramic capacitor tuning (shown as SMD on coil edge) -->
  <rect class="sk" x="236" y="140" width="20" height="16" rx="2"/>
  <text class="mc" x="246" y="151" text-anchor="middle">CAP</text>
  <text class="mc" x="246" y="162" text-anchor="middle">5MHz</text>
  <!-- lead wire exit -->
  <rect class="sk" x="120" y="140" width="12" height="16" rx="2"/>
  <line class="cl" x1="120" y1="148" x2="90" y2="148"/>
  <text class="mc" x="68" y="148">→ RCVR</text>
  <!-- magnetic field lines (decorative) -->
  <path class="cl" d="M140,108 Q120,148 140,188"/>
  <path class="cl" d="M240,108 Q260,148 240,188"/>
  <text class="mc" x="62" y="130">H-FIELD</text>
  <text class="mc" x="262" y="130">H-FIELD</text>
  <!-- dimension -->
  <line class="mi" x1="130" y1="220" x2="250" y2="220"/>
  <text class="mc" x="190" y="230" text-anchor="middle">Ø30mm · SILICONE ENCAPSULATED</text>
</g>
<text class="mc" x="10" y="292">p3 · internal_coil_magnet · Ø30mm receiving · 5MHz ceramic cap · removable magnet · silicone encapsulated</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">SOUND PROCESSOR — EXTERNAL BTE</text>
  <text class="mc" x="180" y="24">ABS HOUSING · 312/675 ZINC-AIR · BLE STREAMING · IP68 · 7.2g</text>
  <!-- BTE processor body (behind-ear curved shape) -->
  <path class="sk" d="M155,48 Q200,38 238,50 L248,180 Q244,210 200,218 Q158,218 152,186 Z"/>
  <!-- microphone ports (top) -->
  <circle class="nz" cx="178" cy="58" r="5"/>
  <text class="mc" x="178" y="52">MIC-1</text>
  <circle class="nz" cx="210" cy="54" r="5"/>
  <text class="mc" x="210" y="48">MIC-2</text>
  <text class="mc" x="194" y="42" text-anchor="middle">DIRECTIONAL MIC ARRAY</text>
  <!-- DSP chip block -->
  <rect class="sk" x="162" y="72" width="74" height="44" rx="3"/>
  <text class="ct" x="199" y="90" text-anchor="middle">DSP</text>
  <text class="mc" x="199" y="102" text-anchor="middle">AUDIO PROC.</text>
  <text class="mc" x="199" y="110" text-anchor="middle">BLE SOC</text>
  <!-- battery compartment -->
  <rect class="sk" x="162" y="126" width="74" height="34" rx="3"/>
  <ellipse class="ma" cx="199" cy="143" rx="24" ry="10"/>
  <text class="ct" x="199" y="147" text-anchor="middle">BATTERY</text>
  <text class="mc" x="199" y="167" text-anchor="middle">312 or 675 ZINC-AIR</text>
  <!-- volume control button -->
  <rect class="sk" x="245" y="110" width="10" height="22" rx="3"/>
  <text class="mc" x="260" y="124">VOL</text>
  <!-- USB-C port at bottom -->
  <rect class="sk" x="175" y="202" width="48" height="14" rx="3"/>
  <text class="ct" x="199" y="213" text-anchor="middle">USB-C CHARGE</text>
  <!-- coil lead wire exit at bottom -->
  <line class="cl" x1="199" y1="216" x2="199" y2="240"/>
  <text class="mc" x="199" y="250" text-anchor="middle">LEAD TO TRANSMITTING COIL</text>
  <!-- IP68 seal label -->
  <rect class="cl" x="155" y="48" width="93" height="172" rx="6"/>
  <text class="mc" x="155" y="44">IP68</text>
</g>
<text class="mc" x="10" y="292">p4 · sound_processor_bte · ABS IP68 · directional dual mic · DSP+BLE SoC · 312/675 zinc-air · USB-C</text>
</svg>
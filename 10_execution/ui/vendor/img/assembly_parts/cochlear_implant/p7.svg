<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">COCHLEOSTOMY DRILL GUIDE</text>
  <text class="mc" x="180" y="24">PATIENT-SPECIFIC PEEK · Ø1.5mm GUIDE SLEEVE · SINGLE-USE</text>
  <!-- main guide body (patient-specific shaped base) -->
  <path class="sk" d="M120,80 Q160,60 220,70 Q270,80 280,120 L276,210 Q268,230 200,234 Q132,232 120,210 Z"/>
  <!-- bone contact surface (bottom curved) -->
  <path class="pa" d="M120,188 Q160,224 240,208 L276,210 Q268,232 200,234 Q132,232 120,210 Z"/>
  <text class="mc" x="200" y="224" text-anchor="middle">BONE CONTACT SURFACE</text>
  <!-- guide sleeve (Ø1.5mm) -->
  <rect class="nz" x="178" y="72" width="24" height="120" rx="3"/>
  <rect class="mi" x="183" y="76" width="14" height="114"/>
  <text class="ct" x="190" y="100" text-anchor="middle">Ø1.5</text>
  <text class="ct" x="190" y="110" text-anchor="middle">SLEEVE</text>
  <!-- depth stop collar -->
  <rect class="sk" x="170" y="148" width="40" height="12" rx="2"/>
  <text class="mc" x="190" y="158" text-anchor="middle">DEPTH STOP</text>
  <!-- positioning reference pins -->
  <circle class="nz" cx="145" cy="145" r="6"/>
  <text class="mc" x="125" y="148">REF PIN ①</text>
  <circle class="nz" cx="240" cy="155" r="6"/>
  <text class="mc" x="248" y="158">REF PIN ②</text>
  <!-- single-use label -->
  <rect class="pa" x="100" y="56" width="180" height="16" rx="3"/>
  <text class="mc" x="190" y="67" text-anchor="middle">SINGLE-USE · EO STERILIZED · PEEK BIOCOMPATIBLE</text>
  <!-- dimension -->
  <line class="mi" x1="120" y1="248" x2="280" y2="248"/>
  <text class="mc" x="200" y="258" text-anchor="middle">PATIENT-SPECIFIC CT-DERIVED · GUIDE SLEEVE L=8mm</text>
</g>
<text class="mc" x="10" y="292">p7 · cochleostomy_drill_guide · patient-specific PEEK · Ø1.5mm sleeve · depth stop · 2 ref pins · single-use</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">RECEIVER-STIMULATOR HOUSING</text>
  <text class="mc" x="180" y="24">HERMETIC Ti GRADE-2 · LASER-WELD SEALED · 15-YEAR LIFE · MRI 1.5T · Ø36mm</text>
  <!-- outer housing disc (Ø36mm = Ø108 @ 3x) -->
  <circle class="sk" cx="190" cy="148" r="72"/>
  <!-- titanium material hatching -->
  <circle class="pa" cx="190" cy="148" r="64"/>
  <!-- internal ASIC + capacitor block -->
  <rect class="sk" cx="190" cy="148" x="158" y="120" width="64" height="56" rx="4"/>
  <text class="ct" x="190" y="148" text-anchor="middle">ASIC</text>
  <text class="mc" x="190" y="158" text-anchor="middle">STIMULATOR</text>
  <!-- laser weld seam (around perimeter) -->
  <circle class="ma" cx="190" cy="148" r="68"/>
  <text class="mc" x="190" y="82" text-anchor="middle">LASER-WELD SEAM</text>
  <!-- electrode lead exit -->
  <rect class="sk" x="256" y="140" width="36" height="16" rx="3"/>
  <text class="ct" x="274" y="151" text-anchor="middle">LEAD EXIT</text>
  <line class="cl" x1="262" y1="148" x2="290" y2="148"/>
  <text class="mc" x="296" y="148">→ ARRAY</text>
  <!-- receiving coil land -->
  <circle class="cl" cx="190" cy="148" r="55"/>
  <text class="mc" x="190" y="95" text-anchor="middle">RF COIL LAND</text>
  <!-- hermetic feedthrough pins (left) -->
  <rect class="sk" x="84" y="136" width="16" height="24" rx="2"/>
  <line class="mi" x1="86" y1="142" x2="100" y2="142"/>
  <line class="mi" x1="86" y1="148" x2="100" y2="148"/>
  <line class="mi" x1="86" y1="154" x2="100" y2="154"/>
  <text class="mc" x="68" y="150">FEEDTHRU</text>
  <!-- MRI note -->
  <rect class="pa" x="100" y="220" width="180" height="16" rx="3"/>
  <text class="mc" x="190" y="231" text-anchor="middle">MRI CONDITIONAL 1.5T · ISO 14708-7</text>
  <!-- dimension -->
  <line class="mi" x1="118" y1="256" x2="262" y2="256"/>
  <text class="mc" x="190" y="265" text-anchor="middle">Ø36mm × 10mm THICKNESS</text>
</g>
<text class="mc" x="10" y="292">p1 · receiver_stimulator · hermetic Ti grade-2 · laser-weld · ASIC stimulator · Ø36mm · MRI 1.5T conditional</text>
</svg>
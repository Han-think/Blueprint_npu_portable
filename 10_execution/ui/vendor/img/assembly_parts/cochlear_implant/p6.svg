<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><g transform="translate(30,28)">
  <text class="ti" x="180" y="14">HEADPIECE ATTACHMENT</text>
  <text class="mc" x="180" y="24">MAGNET HOUSING · BTE CLIP · OPTIONAL BAND · DIRECTIONAL MIC PORT</text>
  <!-- headpiece outer shell -->
  <path class="sk" d="M130,60 Q190,46 250,60 L256,180 Q252,210 190,214 Q128,210 124,180 Z"/>
  <!-- retention magnet housing -->
  <circle class="sk" cx="190" cy="110" r="30"/>
  <circle class="ma" cx="190" cy="110" r="22"/>
  <circle class="nz" cx="190" cy="110" r="14"/>
  <text class="ct" x="190" y="114" text-anchor="middle">MAGNET</text>
  <text class="mc" x="190" y="132" text-anchor="middle">RETENTION MAGNET</text>
  <!-- BTE processor clip (side) -->
  <rect class="sk" x="252" y="100" width="32" height="44" rx="4"/>
  <path class="ma" d="M256,108 Q280,100 284,128 Q280,144 256,138"/>
  <text class="mc" x="268" y="127" text-anchor="middle">BTE CLIP</text>
  <!-- optional band anchor points -->
  <circle class="nz" cx="148" cy="76" r="6"/>
  <text class="mc" x="128" y="78">BAND ANCHOR</text>
  <circle class="nz" cx="232" cy="76" r="6"/>
  <text class="mc" x="238" y="78">BAND ANCHOR</text>
  <!-- directional microphone port -->
  <ellipse class="nz" cx="190" cy="172" rx="14" ry="8"/>
  <text class="ct" x="190" y="175" text-anchor="middle">MIC PORT</text>
  <text class="mc" x="190" y="190" text-anchor="middle">DIRECTIONAL MICROPHONE</text>
  <!-- transmitting coil seated behind magnet -->
  <circle class="cl" cx="190" cy="110" r="26"/>
  <text class="mc" x="190" y="58" text-anchor="middle">TX COIL SEAT</text>
  <!-- dimension -->
  <line class="mi" x1="124" y1="228" x2="256" y2="228"/>
  <text class="mc" x="190" y="238" text-anchor="middle">W=132mm · FITS OVER EAR</text>
</g>
<text class="mc" x="10" y="292">p6 · headpiece_attachment · retention magnet housing · BTE clip · band anchors · directional mic port</text>
</svg>
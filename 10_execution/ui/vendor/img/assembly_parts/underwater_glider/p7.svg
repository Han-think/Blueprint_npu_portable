<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SENSOR PAYLOAD BAY</text>
<text x="12" y="26" class="mc">CTD + DO + FLUOROMETER · FLOW-THROUGH SAMPLING · OIL-COMPENSATED</text>
<!-- payload bay housing (cylindrical section) -->
<rect x="80" y="100" width="260" height="110" rx="12" class="sk"/>
<rect x="94" y="113" width="232" height="84" rx="8" class="pa"/>
<!-- CTD sensor (left third) -->
<rect x="100" y="120" width="62" height="70" rx="5" class="pa"/>
<text x="131" y="142" text-anchor="middle" class="mc">CTD</text>
<!-- conductivity cell -->
<circle cx="131" cy="162" r="12" class="nz"/>
<line x1="119" y1="162" x2="143" y2="162" class="mi"/>
<!-- DO sensor (middle) -->
<rect x="172" y="120" width="62" height="70" rx="5" class="pa"/>
<text x="203" y="142" text-anchor="middle" class="mc">DO</text>
<circle cx="203" cy="162" r="10" class="nz"/>
<!-- fluorometer (right third) -->
<rect x="244" y="120" width="62" height="70" rx="5" class="pa"/>
<text x="275" y="142" text-anchor="middle" class="mc">FLUORO</text>
<circle cx="275" cy="162" r="10" class="pa"/>
<!-- flow-through ports (fore and aft) -->
<rect x="60" y="138" width="22" height="34" rx="5" class="nz"/>
<rect x="338" y="138" width="22" height="34" rx="5" class="nz"/>
<!-- oil compensation port -->
<circle cx="210" cy="100" r="7" class="nz"/>
<!-- callouts -->
<line x1="131" y1="100" x2="80" y2="62" class="cl"/><text x="10" y="60" class="ct">CTD (Cond/Temp/Depth)</text>
<line x1="203" y1="100" x2="210" y2="60" class="cl"/><text x="172" y="56" class="ct">DO Optode</text>
<line x1="275" y1="100" x2="340" y2="62" class="cl"/><text x="342" y="60" class="ct">Fluorometer</text>
<line x1="60" y1="155" x2="20" y2="148" class="cl"/><text x="10" y="146" class="ct">Flow-Through Inlet</text>
<line x1="360" y1="155" x2="392" y2="148" class="cl"/><text x="392" y="146" class="ct">Flow-Through Outlet</text>
<line x1="210" y1="100" x2="290" y2="78" class="cl"/><text x="292" y="76" class="ct">Oil Compensation Port</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P7 SENSOR BAY · CTD+DO+FLUORO · FLOW-THROUGH</text>
</svg>
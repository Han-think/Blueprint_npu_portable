<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">ROLL MASS MECHANISM</text>
<text x="12" y="26" class="mc">±30° BODY ROLL CONTROL · LOW-POWER STEPPER · SLIDING MASS · POSITION SENSOR</text>
<!-- cross-section view of glider body showing roll mass -->
<!-- body circle cross-section -->
<circle cx="210" cy="155" r="90" class="sk"/>
<circle cx="210" cy="155" r="78" class="pa"/>
<!-- transverse rail (horizontal) -->
<rect x="120" y="148" width="180" height="14" rx="4" class="sk"/>
<!-- sliding mass (off-center for roll control) -->
<rect x="230" y="142" width="44" height="26" rx="5" class="sk"/>
<rect x="238" y="148" width="28" height="14" rx="3" class="pa"/>
<!-- position range indicators -->
<line x1="120" y1="138" x2="120" y2="122" class="ma"/>
<line x1="300" y1="138" x2="300" y2="122" class="ma"/>
<line x1="120" y1="130" x2="300" y2="130" class="ma"/>
<text x="210" y="127" text-anchor="middle" class="mc">±100mm LATERAL</text>
<!-- stepper motor drive (small) -->
<rect x="118" y="148" width="20" height="14" rx="3" class="pa"/>
<text x="128" y="158" text-anchor="middle" class="mc">STP</text>
<!-- roll angle indicator arcs -->
<path d="M150 65 A80 80 0 0 1 270 65" class="mi"/>
<text x="210" y="58" text-anchor="middle" class="mc">±30° ROLL</text>
<!-- gravity vector -->
<line x1="210" y1="155" x2="210" y2="235" class="ma"/>
<text x="220" y="225" class="mc">g</text>
<!-- callouts -->
<line x1="254" y1="142" x2="340" y2="100" class="cl"/><text x="342" y="98" class="ct">Sliding Mass (Al Block)</text>
<line x1="128" y1="148" x2="48" y2="115" class="cl"/><text x="10" y="113" class="ct">Stepper Drive</text>
<line x1="300" y1="148" x2="360" y2="130" class="cl"/><text x="362" y="128" class="ct">Position Sensor Strip</text>
<line x1="155" y1="70" x2="80" y2="48" class="cl"/><text x="10" y="46" class="ct">±30° Roll Authority</text>
<line x1="140" y1="200" x2="60" y2="222" class="cl"/><text x="10" y="220" class="ct">Body Cross-Section</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P5 ROLL MASS · ±30° · STEPPER · POSITION SENSOR</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">BUOYANCY PUMP BLADDER</text>
<text x="12" y="26" class="mc">OIL-FILLED BLADDER · PISTON PUMP · 500cc DISPLACEMENT · 2-3000 DIVES</text>
<!-- internal oil reservoir cylinder -->
<rect x="80" y="110" width="160" height="80" rx="10" class="sk"/>
<rect x="92" y="122" width="136" height="56" rx="6" class="pa"/>
<!-- piston inside cylinder -->
<rect x="148" y="120" width="24" height="60" rx="3" class="sk"/>
<!-- piston rod -->
<rect x="156" y="90" width="8" height="32" rx="2" class="sk"/>
<!-- motor drive for pump -->
<rect x="148" y="60" width="64" height="32" rx="5" class="pa"/>
<text x="180" y="80" text-anchor="middle" class="mc">PUMP MOTOR</text>
<!-- external bladder (inflated/deflated) -->
<ellipse cx="310" cy="150" r="68" ry="55" class="sk"/>
<ellipse cx="310" cy="150" r="56" ry="44" class="pa"/>
<ellipse cx="310" cy="150" r="40" ry="30" class="mi"/>
<!-- bladder connection tube -->
<rect x="240" y="145" width="70" height="10" rx="3" class="sk"/>
<!-- displacement labels -->
<text x="310" y="150" text-anchor="middle" class="mc">500cc</text>
<text x="310" y="162" text-anchor="middle" class="mc">BLADDER</text>
<!-- dive cycle indicator -->
<text x="310" y="228" text-anchor="middle" class="mc">2000-3000 DIVES RATED</text>
<!-- callouts -->
<line x1="160" y1="110" x2="80" y2="72" class="cl"/><text x="10" y="70" class="ct">Piston Pump Ø40mm</text>
<line x1="160" y1="90" x2="80" y2="50" class="cl"/><text x="10" y="48" class="ct">Linear Motor Drive</text>
<line x1="240" y1="150" x2="160" y2="175" class="cl"/><text x="60" y="188" class="ct">Oil Transfer Line</text>
<line x1="366" y1="120" x2="394" y2="95" class="cl"/><text x="382" y="93" class="ct">External Bladder</text>
<line x1="80" y1="155" x2="30" y2="165" class="cl"/><text x="10" y="163" class="ct">Oil Reservoir</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P3 BUOYANCY PUMP · OIL BLADDER · 500cc</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">DROP WEIGHT MECHANISM</text>
<text x="12" y="26" class="mc">EMERGENCY BALLAST DROP · BURN-WIRE TRIGGER · RECOVERY AID · 2kg BALLAST</text>
<!-- weight block -->
<rect x="160" y="160" width="100" height="60" rx="6" class="sk"/>
<rect x="170" y="170" width="80" height="40" rx="4" class="pa"/>
<text x="210" y="193" text-anchor="middle" class="mc">2kg BALLAST</text>
<!-- burn-wire / release mechanism at top of weight -->
<rect x="185" y="140" width="50" height="22" rx="4" class="pa"/>
<text x="210" y="154" text-anchor="middle" class="mc">BURN WIRE</text>
<!-- wire from housing to release mechanism -->
<line x1="210" y1="140" x2="210" y2="100" class="ma"/>
<!-- attachment point to glider body -->
<rect x="192" y="88" width="36" height="14" rx="4" class="sk"/>
<circle cx="210" cy="95" r="6" class="nz"/>
<!-- corrosion indicator (sacrificial wire) -->
<line x1="195" y1="140" x2="185" y2="120" class="mi"/>
<line x1="225" y1="140" x2="235" y2="120" class="mi"/>
<!-- emergency release arrow -->
<path d="M210 225 L200 255 L220 255 Z" class="ma"/>
<text x="210" y="272" text-anchor="middle" class="mc">DROPS ON TRIGGER</text>
<!-- recovery float attached to weight -->
<circle cx="258" cy="185" r="16" class="pa"/>
<text x="258" y="188" text-anchor="middle" class="mc">FLOAT</text>
<!-- callouts -->
<line x1="210" y1="88" x2="310" y2="60" class="cl"/><text x="312" y="58" class="ct">Glider Body Attach</text>
<line x1="210" y1="150" x2="100" y2="125" class="cl"/><text x="10" y="123" class="ct">Burn-Wire Galvanic</text>
<line x1="258" y1="169" x2="340" y2="148" class="cl"/><text x="342" y="146" class="ct">Recovery Float</text>
<line x1="160" y1="185" x2="60" y2="185" class="cl"/><text x="10" y="183" class="ct">2kg Pb/Steel Weight</text>
<line x1="210" y1="255" x2="310" y2="268" class="cl"/><text x="312" y="266" class="ct">Emergency Release</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P8 DROP WEIGHT · BURN-WIRE · 2kg · EMERGENCY</text>
</svg>
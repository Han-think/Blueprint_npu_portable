<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">CG-SHIFT BATTERY PACK</text>
<text x="12" y="26" class="mc">SLIDING ON LINEAR RAIL · ±100mm CG SHIFT · PITCH CONTROL · Li-PRIMARY</text>
<!-- linear rail (horizontal) -->
<rect x="60" y="143" width="300" height="14" rx="4" class="sk"/>
<!-- rail detail / groove -->
<rect x="68" y="147" width="284" height="6" rx="2" class="mi"/>
<!-- battery pack (sliding block) -->
<rect x="155" y="118" width="110" height="64" rx="6" class="sk"/>
<rect x="165" y="128" width="90" height="44" rx="4" class="pa"/>
<!-- battery cells inside -->
<rect x="172" y="135" width="18" height="30" rx="2" class="pa"/>
<rect x="196" y="135" width="18" height="30" rx="2" class="pa"/>
<rect x="220" y="135" width="18" height="30" rx="2" class="pa"/>
<rect x="244" y="135" width="18" height="30" rx="2" class="pa"/>
<!-- slider carriage under pack -->
<rect x="160" y="157" width="100" height="14" rx="3" class="sk"/>
<!-- motor/leadscrew drive end -->
<rect x="340" y="130" width="20" height="40" rx="4" class="pa"/>
<circle cx="350" cy="150" r="10" class="nz"/>
<!-- position sensor strip -->
<rect x="68" y="160" width="270" height="6" rx="2" class="mi"/>
<!-- travel dimension arrows -->
<line x1="60" y1="100" x2="160" y2="100" class="ma"/>
<line x1="265" y1="100" x2="360" y2="100" class="ma"/>
<line x1="160" y1="95" x2="160" y2="105" class="mi"/>
<line x1="265" y1="95" x2="265" y2="105" class="mi"/>
<text x="212" y="97" text-anchor="middle" class="mc">±100mm TRAVEL</text>
<!-- callouts -->
<line x1="210" y1="118" x2="210" y2="60" class="cl"/><text x="155" y="56" class="ct">Li-Primary Battery Pack</text>
<line x1="350" y1="130" x2="390" y2="105" class="cl"/><text x="392" y="103" class="ct">Lead-Screw Drive</text>
<line x1="68" y1="163" x2="30" y2="185" class="cl"/><text x="10" y="183" class="ct">Linear Position Sensor</text>
<line x1="160" y1="157" x2="60" y2="200" class="cl"/><text x="10" y="198" class="ct">Slider Carriage</text>
<line x1="270" y1="143" x2="330" y2="168" class="cl"/><text x="332" y="166" class="ct">Pitch Control Rail</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P4 CG-SHIFT BATTERY · ±100mm · PITCH CTRL</text>

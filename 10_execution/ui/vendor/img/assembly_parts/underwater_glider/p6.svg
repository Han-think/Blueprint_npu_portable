<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">TAIL ANTENNA + IRIDIUM</text>
<text x="12" y="26" class="mc">TAIL-UP ANTENNA MAST · IRIDIUM + GPS · SURFACE DATA DUMP · FOLD-DOWN</text>
<!-- tail fin structure -->
<path d="M165 250 L255 250 L240 80 L180 80 Z" class="sk"/>
<path d="M172 245 L248 245 L234 90 L186 90 Z" class="pa"/>
<!-- antenna mast (vertical) -->
<rect x="206" y="30" width="8" height="54" rx="3" class="sk"/>
<!-- Iridium patch antenna at top -->
<rect x="192" y="20" width="36" height="14" rx="4" class="pa"/>
<text x="210" y="30" text-anchor="middle" class="mc">IRIDIUM</text>
<!-- GPS patch on mast -->
<rect x="196" y="46" width="18" height="10" rx="3" class="pa"/>
<text x="205" y="54" text-anchor="middle" class="mc">GPS</text>
<!-- fold hinge at tail top -->
<circle cx="210" cy="84" r="8" class="nz"/>
<!-- fold-down position (dashed) -->
<path d="M210 84 Q240 84 255 65 Q260 52 250 45" class="mi" stroke-dasharray="4 3"/>
<!-- surface position indicator -->
<text x="210" y="72" text-anchor="middle" class="mc">UP@SURFACE</text>
<!-- satellite signal arcs -->
<path d="M192 20 Q160 5 165 -5" class="mi"/>
<path d="M228 20 Q260 5 255 -5" class="mi"/>
<!-- callouts -->
<line x1="210" y1="20" x2="310" y2="10" class="cl"/><text x="312" y="8" class="ct">Iridium SBD Modem</text>
<line x1="205" y1="46" x2="310" y2="40" class="cl"/><text x="312" y="38" class="ct">GPS Patch Antenna</text>
<line x1="210" y1="84" x2="310" y2="90" class="cl"/><text x="312" y="88" class="ct">Fold-Down Hinge</text>
<line x1="172" y1="165" x2="60" y2="148" class="cl"/><text x="10" y="146" class="ct">Tail Fin CFRP</text>
<line x1="240" y1="250" x2="310" y2="268" class="cl"/><text x="312" y="266" class="ct">Tail Body Interface</text>
<text x="210" y="292" text-anchor="middle" class="mc">UNDERWATER GLIDER · P6 TAIL ANTENNA · IRIDIUM+GPS · FOLD-DOWN</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">SCIENCE BASKET (FWD)</text>
<text x="12" y="26" class="mc">DVL + SONAR · 2-FUNCTION MANIPULATOR · HD CAMERA PAIR + LEDs</text>
<!-- basket frame (open truss front bow section) -->
<rect x="70" y="80" width="280" height="160" rx="8" class="sk"/>
<rect x="84" y="94" width="252" height="132" rx="5" class="pa"/>
<!-- DVL transducers (4-beam, square layout) -->
<circle cx="150" cy="135" r="14" class="nz"/>
<circle cx="200" cy="135" r="14" class="nz"/>
<circle cx="150" cy="185" r="14" class="nz"/>
<circle cx="200" cy="185" r="14" class="nz"/>
<text x="175" y="163" text-anchor="middle" class="mc">DVL</text>
<!-- forward sonar disk -->
<circle cx="260" cy="120" r="28" class="sk"/>
<circle cx="260" cy="120" r="20" class="pa"/>
<circle cx="260" cy="120" r="10" class="mi"/>
<text x="260" y="123" text-anchor="middle" class="mc">SONAR</text>
<!-- HD camera pair -->
<rect x="88" y="96" width="24" height="18" rx="4" class="pa"/>
<rect x="118" y="96" width="24" height="18" rx="4" class="pa"/>
<circle cx="100" cy="105" r="6" class="nz"/>
<circle cx="130" cy="105" r="6" class="nz"/>
<!-- LED lights -->
<circle cx="92" cy="122" r="7" class="ma"/>
<circle cx="132" cy="122" r="7" class="ma"/>
<!-- 2-function manipulator -->
<path d="M270 200 L300 180 L320 165 L330 150" class="ma"/>
<circle cx="330" cy="150" r="8" class="pa"/>
<circle cx="300" cy="180" r="6" class="pa"/>
<!-- sample basket -->
<rect x="236" y="200" width="80" height="30" rx="5" class="pa"/>
<text x="276" y="218" text-anchor="middle" class="mc">SAMPLE</text>
<!-- callouts -->
<line x1="175" y1="120" x2="80" y2="58" class="cl"/><text x="10" y="56" class="ct">DVL 4-Beam Array</text>
<line x1="260" y1="92" x2="330" y2="60" class="cl"/><text x="332" y="58" class="ct">Forward Sonar</text>
<line x1="100" y1="96" x2="50" y2="65" class="cl"/><text x="10" y="63" class="ct">HD Stereo Camera</text>
<line x1="330" y1="150" x2="380" y2="128" class="cl"/><text x="382" y="126" class="ct">2-Func Manipulator</text>
<line x1="276" y1="230" x2="360" y2="248" class="cl"/><text x="362" y="246" class="ct">Sample Basket</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P7 SCIENCE BASKET · DVL+SONAR+CAM+MANIP</text>
</svg>
<rect x="72" y="228" width="276" height="6" rx="2" class="nz"/>
<rect x="72" y="240" width="276" height="6" rx="2" class="nz"/>
<!-- lock ring bolt pattern -->
<circle cx="100" cy="237" r="5" class="pa"/>
<circle cx="145" cy="237" r="5" class="pa"/>
<circle cx="190" cy="237" r="5" class="pa"/>

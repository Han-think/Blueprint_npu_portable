<line x1="210" y1="55" x2="320" y2="28" class="cl"/><text x="322" y="26" class="ct">Ø600mm Heat-Cast Acrylic</text>
<line x1="310" y1="150" x2="380" y2="130" class="cl"/><text x="382" y="128" class="ct">300m Depth Rating</text>
<line x1="72" y1="230" x2="20" y2="218" class="cl"/><text x="10" y="216" class="ct">Double O-ring Seal</text>
<line x1="100" y1="237" x2="38" y2="252" class="cl"/><text x="10" y="256" class="ct">Lock Ring M16 ×12</text>
<line x1="210" y1="68" x2="210" y2="38" class="cl"/><text x="155" y="34" class="ct">Anti-Fog Inner Coat</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P2 VIEWSPHERE Ø600 · ACRYLIC · 300m · DBL O-RING</text>

<ellipse cx="210" cy="110" rx="16" ry="5" class="nz"/>
<!-- waterline indicator -->
<line x1="100" y1="185" x2="320" y2="185" class="mi" stroke-dasharray="6 4"/>
<text x="320" y="182" class="mc">WL</text>
<!-- callouts -->

<line x1="219" y1="18" x2="295" y2="5" class="cl"/><text x="297" y="3" class="ct">Search Periscope</text>
<line x1="208" y1="10" x2="280" y2="10" class="cl"/><text x="282" y="8" class="ct">Sat Comm Dome</text>
<line x1="155" y1="220" x2="60" y2="235" class="cl"/><text x="10" y="233" class="ct">UQC Hydrophone</text>
<line x1="210" y1="110" x2="310" y2="120" class="cl"/><text x="312" y="118" class="ct">Entry Hatch</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P8 CONNING TOWER · PERISCOPE+ANTENNA+UQC</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">PROPULSION POD x2</text>
<text x="12" y="26" class="mc">15kW BRUSHLESS DC · 3-BLADE KORT NOZZLE · ±30° AZIMUTH STEERING</text>
<!-- pod body (torpedo-shaped) -->
<path d="M60 150 Q70 110 200 105 Q330 110 360 150 Q330 190 200 195 Q70 190 60 150 Z" class="sk"/>
<path d="M75 150 Q83 118 200 114 Q317 118 345 150 Q317 182 200 186 Q83 182 75 150 Z" class="pa"/>
<!-- Kort nozzle around propeller (front) -->
<ellipse cx="78" cy="150" rx="18" ry="42" class="ma"/>
<ellipse cx="78" cy="150" rx="12" ry="34" class="mi"/>
<!-- propeller inside Kort nozzle -->
<ellipse cx="78" cy="150" rx="10" ry="26" class="sk"/>
<path d="M68 124 Q78 148 68 176" class="ma"/>
<path d="M88 124 Q78 148 88 176" class="ma"/>
<circle cx="78" cy="150" r="7" class="nz"/>
<!-- motor section (rear) -->
<rect x="290" y="122" width="70" height="56" rx="8" class="sk"/>
<!-- azimuth steering mechanism (vertical pivot) -->
<rect x="196" y="85" width="20" height="30" rx="5" class="pa"/>
<circle cx="206" cy="88" r="8" class="nz"/>
<!-- ±30° arc indicator -->
<path d="M170 78 A40 40 0 0 1 242 78" class="mi"/>
<text x="206" y="74" text-anchor="middle" class="mc">±30°</text>
<!-- callouts -->
<line x1="78" y1="108" x2="38" y2="75" class="cl"/><text x="10" y="73" class="ct">Kort Nozzle</text>
<line x1="78" y1="150" x2="20" y2="155" class="cl"/><text x="10" y="153" class="ct">3-Blade Prop</text>
<line x1="206" y1="85" x2="280" y2="55" class="cl"/><text x="282" y="53" class="ct">Azimuth Pivot ±30°</text>
<line x1="325" y1="122" x2="380" y2="95" class="cl"/><text x="382" y="93" class="ct">15kW BLDC Motor</text>
<line x1="325" y1="170" x2="380" y2="190" class="cl"/><text x="382" y="188" class="ct">Water-Cooled Housing</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P4 PROP POD x2 · 15kW · KORT · ±30° AZIMUTH</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">BALLAST SYSTEM (VARIABLE)</text>
<text x="12" y="26" class="mc">SEAWATER FLOOD VALVE · HP AIR BLOW · TRIM TANKS FORE/AFT · 500L CAPACITY</text>
<!-- main ballast tank (center box) -->
<rect x="100" y="110" width="220" height="90" rx="8" class="sk"/>
<rect x="112" y="120" width="196" height="70" rx="5" class="pa"/>
<text x="210" y="158" text-anchor="middle" class="mc">MAIN BALLAST 500L</text>
<!-- flood valve (keel bottom) -->
<rect x="180" y="196" width="60" height="18" rx="4" class="nz"/>
<text x="210" y="208" text-anchor="middle" class="mc">FLOOD</text>
<!-- HP air blow pipe (top) -->
<rect x="160" y="96" width="100" height="16" rx="4" class="pa"/>
<rect x="195" y="80" width="30" height="18" rx="3" class="nz"/>
<text x="210" y="92" text-anchor="middle" class="mc">HP AIR</text>
<!-- fore trim tank -->
<rect x="58" y="120" width="44" height="50" rx="5" class="sk"/>
<rect x="64" y="126" width="32" height="38" rx="3" class="pa"/>
<text x="80" y="148" text-anchor="middle" class="mc">FORE</text>
<text x="80" y="158" text-anchor="middle" class="mc">TRIM</text>
<!-- aft trim tank -->
<rect x="318" y="120" width="44" height="50" rx="5" class="sk"/>
<rect x="324" y="126" width="32" height="38" rx="3" class="pa"/>
<text x="340" y="148" text-anchor="middle" class="mc">AFT</text>
<text x="340" y="158" text-anchor="middle" class="mc">TRIM</text>
<!-- pipe connections between tanks -->
<line x1="102" y1="145" x2="58" y2="145" class="ma"/>
<line x1="320" y1="145" x2="362" y2="145" class="ma"/>
<!-- callouts -->
<line x1="210" y1="110" x2="310" y2="72" class="cl"/><text x="312" y="70" class="ct">500L Main Ballast Tank</text>
<line x1="210" y1="80" x2="310" y2="55" class="cl"/><text x="312" y="53" class="ct">HP Air Blow 200bar</text>
<line x1="210" y1="210" x2="310" y2="228" class="cl"/><text x="312" y="226" class="ct">Sea Flood Valve</text>
<line x1="58" y1="135" x2="20" y2="112" class="cl"/><text x="10" y="110" class="ct">Fore Trim Tank</text>
<line x1="362" y1="135" x2="396" y2="112" class="cl"/><text x="382" y="110" class="ct">Aft Trim Tank</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P3 BALLAST SYSTEM · 500L · HP AIR · TRIM TANKS</text>
</svg>
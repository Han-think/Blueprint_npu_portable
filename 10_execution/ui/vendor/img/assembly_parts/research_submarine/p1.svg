<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">PRESSURE HULL (HY-80)</text>
<text x="12" y="26" class="mc">HY-80 STEEL · 300m DEPTH · FS 2.0 · INTERNAL FRAME RINGS 250mm SPACING</text>
<!-- hull cylinder (side view) -->
<rect x="45" y="110" width="330" height="80" rx="16" class="sk"/>
<rect x="60" y="120" width="300" height="60" rx="10" class="pa"/>
<!-- internal frame rings (every 250mm → ~4 visible) -->
<rect x="120" y="110" width="8" height="80" rx="2" class="sk"/>
<rect x="194" y="110" width="8" height="80" rx="2" class="sk"/>
<rect x="268" y="110" width="8" height="80" rx="2" class="sk"/>
<!-- bow dome cap -->
<ellipse cx="48" cy="150" rx="24" ry="40" class="sk"/>
<ellipse cx="48" cy="150" rx="16" ry="32" class="pa"/>
<!-- stern end cap -->
<ellipse cx="372" cy="150" rx="24" ry="40" class="sk"/>
<ellipse cx="372" cy="150" rx="16" ry="32" class="pa"/>
<!-- hatch on top (conning tower entry) -->
<ellipse cx="210" cy="110" rx="22" ry="8" class="sk"/>
<ellipse cx="210" cy="110" rx="16" ry="5" class="pa"/>
<!-- flood drain ports at keel -->
<circle cx="130" cy="190" r="5" class="nz"/>
<circle cx="210" cy="190" r="5" class="nz"/>
<circle cx="290" cy="190" r="5" class="nz"/>
<!-- hull thickness label -->
<text x="210" y="153" text-anchor="middle" class="mc">HY-80 t=25mm 300m FS2.0</text>
<!-- callouts -->
<line x1="48" y1="110" x2="20" y2="72" class="cl"/><text x="10" y="70" class="ct">Bow End Cap</text>
<line x1="124" y1="110" x2="100" y2="72" class="cl"/><text x="58" y="70" class="ct">Frame Ring 250mm</text>
<line x1="210" y1="102" x2="280" y2="68" class="cl"/><text x="282" y="66" class="ct">Entry Hatch</text>
<line x1="372" y1="120" x2="398" y2="88" class="cl"/><text x="382" y="86" class="ct">Stern End Cap</text>
<line x1="210" y1="190" x2="210" y2="240" class="cl"/><text x="160" y="250" class="ct">Keel Flood Port</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P1 PRESSURE HULL · HY-80 · 300m · FS2.0</text>
</svg>
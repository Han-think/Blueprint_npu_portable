<rect x="68" y="90" width="18" height="140" rx="4" class="sk"/>
<rect x="334" y="90" width="18" height="140" rx="4" class="sk"/>
<rect x="200" y="90" width="20" height="140" rx="4" class="sk"/>
<!-- lift eyes (4-point, corners) -->
<circle cx="78" cy="90" r="10" class="pa"/>
<circle cx="78" cy="90" r="5" class="nz"/>
<circle cx="342" cy="90" r="10" class="pa"/>
<circle cx="342" cy="90" r="5" class="nz"/>
<circle cx="78" cy="228" r="10" class="pa"/>
<circle cx="78" cy="228" r="5" class="nz"/>
<circle cx="342" cy="228" r="10" class="pa"/>
<circle cx="342" cy="228" r="5" class="nz"/>
<!-- tow bitt (center forward) -->
<rect x="196" y="72" width="28" height="20" rx="4" class="pa"/>
<circle cx="210" cy="78" r="7" class="nz"/>
<!-- LARS ship-interface pads -->
<rect x="68" y="222" width="50" height="14" rx="3" class="pa"/>
<rect x="302" y="222" width="50" height="14" rx="3" class="pa"/>
<!-- callouts -->
<line x1="78" y1="80" x2="30" y2="55" class="cl"/><text x="10" y="53" class="ct">Lift Eye M24 x4</text>
<line x1="210" y1="72" x2="280" y2="45" class="cl"/><text x="282" y="43" class="ct">Tow Bitt Ø50mm</text>
<line x1="86" y1="157" x2="30" y2="175" class="cl"/><text x="10" y="173" class="ct">Keel Rail (Sub Support)</text>
<line x1="90" y1="228" x2="38" y2="248" class="cl"/><text x="10" y="256" class="ct">LARS Ship Interface Pad</text>
<line x1="342" y1="157" x2="392" y2="148" class="cl"/><text x="382" y="146" class="ct">Steel Frame FS3.0</text>
<text x="210" y="292" text-anchor="middle" class="mc">RESEARCH SUBMARINE · P5 LARS FRAME · 4-PT LIFT · TOW · SHIP INTERFACE</text>

<line x1="222" y1="152" x2="360" y2="120" class="cl"/><text x="362" y="118" class="ct">Chassis Pivot Bore</text>
<line x1="314" y1="188" x2="380" y2="175" class="cl"/><text x="382" y="173" class="ct">Spring-Damper Eye</text>

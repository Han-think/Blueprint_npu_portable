<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300"><rect width="420" height="300" fill="#050d18"/><defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0L0 0 0 20" fill="none" stroke="rgba(39,74,121,.13)" stroke-width=".4"/></pattern><style>.sk{fill:#081c30;stroke:rgba(100,160,240,.78);stroke-width:1.3;vector-effect:non-scaling-stroke}.pa{fill:rgba(100,160,240,.04);stroke:rgba(100,160,240,.38);stroke-width:.85;stroke-dasharray:5 4;vector-effect:non-scaling-stroke}.ma{fill:none;stroke:rgba(100,160,240,.5);stroke-width:1.1;vector-effect:non-scaling-stroke}.mi{fill:none;stroke:rgba(100,160,240,.22);stroke-width:.7;vector-effect:non-scaling-stroke}.nz{fill:#050d18;stroke:rgba(137,255,168,.45);stroke-width:1;vector-effect:non-scaling-stroke}.cl{fill:none;stroke:rgba(159,211,255,.3);stroke-width:.6;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.ct{font-family:ui-monospace,monospace;font-size:7px;fill:rgba(230,236,245,.6)}.ti{font-family:ui-monospace,monospace;font-size:7.5px;letter-spacing:.22em;fill:rgba(159,211,255,.52)}.mc{font-family:ui-monospace,monospace;font-size:5.5px;fill:rgba(100,160,240,.32)}.rv{fill:rgba(100,160,240,.25);stroke:none}</style></defs><rect width="420" height="300" fill="url(#g)"/><text x="12" y="16" class="ti">UPPER WISHBONE A-ARM</text>
<text x="12" y="26" class="mc">4130 STEEL TIG-WELDED · OUTBOARD BALL JOINT · INBOARD CHASSIS ROSE JOINTS</text>
<!-- A-arm plan view, apex outboard left -->
<path d="M80 150 L280 100 L280 200 Z" class="sk"/>
<!-- tube details - main struts -->
<path d="M80 150 L280 100" class="ma"/>
<path d="M80 150 L280 200" class="ma"/>
<!-- cross brace -->
<path d="M180 125 L180 175" class="mi"/>
<!-- outboard ball joint housing -->
<circle cx="80" cy="150" r="14" class="pa"/>
<circle cx="80" cy="150" r="8" class="nz"/>
<!-- inboard rose joints (chassis side) -->
<circle cx="280" cy="100" r="8" class="pa"/>
<circle cx="280" cy="100" r="4" class="nz"/>
<circle cx="280" cy="200" r="8" class="pa"/>
<circle cx="280" cy="200" r="4" class="nz"/>
<!-- tube cross-section detail indicator -->
<ellipse cx="180" cy="125" rx="6" ry="4" class="mi"/>
<ellipse cx="180" cy="175" rx="6" ry="4" class="mi"/>
<!-- chassis mount bracket -->
<rect x="278" y="88" width="30" height="26" rx="3" class="pa"/>
<rect x="278" y="188" width="30" height="26" rx="3" class="pa"/>
<!-- weld symbols -->
<circle cx="220" cy="113" r="2" class="rv"/>
<circle cx="220" cy="187" r="2" class="rv"/>
<!-- dimension span -->
<line x1="80" y1="260" x2="280" y2="260" class="ma"/>
<line x1="80" y1="255" x2="80" y2="265" class="mi"/>
<line x1="280" y1="255" x2="280" y2="265" class="mi"/>
<text x="180" y="272" text-anchor="middle" class="mc">~450mm SPAN</text>
<!-- callouts -->
<line x1="80" y1="136" x2="30" y2="100" class="cl"/><text x="10" y="98" class="ct">Ball Joint Outboard</text>
<line x1="280" y1="100" x2="380" y2="80" class="cl"/><text x="382" y="78" class="ct">Rose Joint Inboard</text>
<line x1="180" y1="125" x2="180" y2="60" class="cl"/><text x="140" y="56" class="ct">4130 Tube TIG</text>
<line x1="308" y1="100" x2="380" y2="120" class="cl"/><text x="382" y="118" class="ct">Chassis Bracket</text>
<line x1="155" y1="145" x2="60" y2="165" class="cl"/><text x="10" y="163" class="ct">Anti-dive Geom.</text>
<text x="210" y="292" text-anchor="middle" class="mc">SUSPENSION ASSY · P1 UPPER WISHBONE A-ARM · 4130 STEEL TIG</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 550">
<rect width="350" height="550" fill="#050d18"/>
<text x="12" y="18" font-family="monospace" font-size="9" fill="rgba(100,160,240,0.5)" letter-spacing="2">SIDE VIEW · POWERED AFO</text>

<!-- Knee strap (top) -->
<rect x="72" y="26" width="116" height="30" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Strap buckle -->
<rect x="176" y="30" width="14" height="20" rx="2"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9"/>
<rect x="178" y="34" width="10" height="12" rx="1"
  fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<!-- Strap detail lines -->
<line x1="72"  y1="41" x2="176" y2="41" stroke="rgba(100,160,240,0.2)" stroke-width="0.5"/>

<!-- Calf shell (main structural piece) -->
<path d="M 72,56 L 195,56 L 198,270 Q 198,324 136,324 Q 72,324 70,270 L 72,56 Z"
  fill="#081c30" stroke="rgba(100,160,240,0.7)" stroke-width="1.5"/>
<!-- Calf shell inner surface (hollow) -->
<path d="M 86,70 L 181,70 L 183,262 Q 183,308 136,308 Q 88,308 86,262 Z"
  fill="#050d18" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,4"/>
<!-- Shell rib stiffeners -->
<line x1="78" y1="110" x2="192" y2="110" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="76" y1="160" x2="193" y2="160" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="75" y1="210" x2="194" y2="210" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="73" y1="260" x2="195" y2="260" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>

<!-- Battery module (side-mounted) -->
<rect x="196" y="74" width="86" height="104" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.65)" stroke-width="1.3"/>
<!-- Battery cells stacked -->
<rect x="204" y="82"  width="70" height="24" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<rect x="204" y="110" width="70" height="24" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<rect x="204" y="138" width="70" height="24" rx="2" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<!-- Battery connector -->
<rect x="274" y="104" width="10" height="14" rx="2" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.7"/>
<!-- Charge indicator LEDs -->
<circle cx="214" cy="169" r="3" fill="rgba(100,160,240,0.4)"/>
<circle cx="226" cy="169" r="3" fill="rgba(100,160,240,0.3)"/>
<circle cx="238" cy="169" r="3" fill="rgba(100,160,240,0.2)"/>

<!-- PCB / controller board -->
<rect x="196" y="190" width="86" height="80" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.6)" stroke-width="1.2"/>
<!-- PCB components -->
<rect x="204" y="198" width="70" height="64" rx="2"
  fill="#050d18" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<rect x="208" y="204" width="22" height="14" rx="1"
  fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.3)" stroke-width="0.5"/>
<rect x="236" y="204" width="16" height="9" rx="1"
  fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.25)" stroke-width="0.4"/>
<rect x="208" y="224" width="34" height="12" rx="1"
  fill="rgba(100,160,240,0.06)" stroke="rgba(100,160,240,0.25)" stroke-width="0.4"/>
<!-- Connectors on board edge -->
<rect x="274" y="202" width="8" height="22" rx="1"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>
<rect x="274" y="232" width="8" height="22" rx="1"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<!-- Cable harness (along calf back) -->
<path d="M 184,74 L 184,124 L 200,124 L 200,280" fill="none" stroke="rgba(100,160,240,0.35)" stroke-width="0.9" stroke-dasharray="4,3"/>
<!-- Cable conduit -->
<rect x="182" y="280" width="22" height="48" rx="3"
  fill="#050d18" stroke="rgba(100,160,240,0.4)" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- Ankle joint (key mechanical feature) -->
<circle cx="136" cy="324" r="40"
  fill="#081c30" stroke="rgba(100,160,240,0.75)" stroke-width="1.6"/>
<!-- Ankle outer race -->
<circle cx="136" cy="324" r="28"
  fill="#050d18" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<!-- Ankle inner bearing -->
<circle cx="136" cy="324" r="16"
  fill="#06111f" stroke="rgba(100,160,240,0.4)" stroke-width="0.8"/>
<circle cx="136" cy="324" r="7"
  fill="rgba(100,160,240,0.35)"/>
<!-- Ankle bolt holes -->
<circle cx="136" cy="296" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="164" cy="324" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="136" cy="352" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<circle cx="108" cy="324" r="5" fill="none" stroke="rgba(100,160,240,0.4)" stroke-width="0.7"/>
<!-- Range-of-motion arc -->
<path d="M 97,324 A 40,40 0 0 0 152,362" fill="none" stroke="rgba(100,160,240,0.2)" stroke-width="0.7" stroke-dasharray="3,4"/>

<!-- Actuator (drives ankle) -->
<rect x="196" y="284" width="76" height="68" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.55)" stroke-width="1.1"/>
<circle cx="234" cy="318" r="22" fill="#050d18" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>
<circle cx="234" cy="318" r="10" fill="#06111f" stroke="rgba(100,160,240,0.35)" stroke-width="0.6"/>
<!-- Actuator rod to ankle -->
<line x1="196" y1="318" x2="176" y2="318" stroke="rgba(100,160,240,0.4)" stroke-width="0.9"/>
<circle cx="174" cy="318" r="5" fill="rgba(100,160,240,0.2)" stroke="rgba(100,160,240,0.4)" stroke-width="0.6"/>

<!-- Foot plate -->
<rect x="68" y="360" width="200" height="46" rx="4"
  fill="#071828" stroke="rgba(100,160,240,0.7)" stroke-width="1.4"/>
<!-- Foot plate stiffener ribs -->
<line x1="100" y1="360" x2="100" y2="406" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="136" y1="360" x2="136" y2="406" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="172" y1="360" x2="172" y2="406" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<line x1="234" y1="360" x2="234" y2="406" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="3,3"/>
<!-- Heel raised section -->
<rect x="68" y="350" width="48" height="16" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.45)" stroke-width="0.8"/>

<!-- Custom insole -->
<rect x="72" y="406" width="192" height="22" rx="3"
  fill="#06111f" stroke="rgba(100,160,240,0.5)" stroke-width="0.9" stroke-dasharray="4,3"/>
<!-- Pressure sensor zones -->
<ellipse cx="110" cy="417" rx="14" ry="7" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<ellipse cx="200" cy="417" rx="20" ry="7" fill="rgba(100,160,240,0.08)" stroke="rgba(100,160,240,0.25)" stroke-width="0.5"/>
<text x="196" y="440" font-family="monospace" font-size="7.5" fill="rgba(100,160,240,0.35)" text-anchor="middle">PRESSURE INSOLE</text>

<!-- Ground contact line -->
<line x1="42" y1="462" x2="310" y2="462" stroke="rgba(100,160,240,0.2)" stroke-width="0.5" stroke-dasharray="5,4"/>

</svg>

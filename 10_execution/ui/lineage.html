<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blueprint XPU — Lineage</title>
<style>
  :root { --bg:#0c1220; --panel:#121a2b; --line:#23304a; --ink:#dde6f5; --mut:#8aa0c0;
          --keep:#39d98a; --reject:#ff6b6b; --cand:#c9a227; --accent:#4ea1ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:14px; }
  h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  .sub { color:var(--mut); font-size:12px; }
  .wrap { padding:18px 22px; max-width:1100px; }
  .cards { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 16px; min-width:120px; }
  .card .n { font-size:22px; font-weight:700; }
  .card .l { color:var(--mut); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  h2 { font-size:13px; color:var(--mut); text-transform:uppercase; letter-spacing:.6px; margin:22px 0 10px; }
  .empty { background:var(--panel); border:1px dashed var(--line); border-radius:8px; padding:22px; color:var(--mut); }
  .node { background:var(--panel); border:1px solid var(--line); border-left-width:3px; border-radius:6px;
          padding:8px 12px; margin:6px 0; display:flex; gap:12px; align-items:center; }
  .node .title { flex:1; }
  .node .meta { color:var(--mut); font-size:12px; }
  .pill { font-size:11px; padding:1px 7px; border-radius:10px; border:1px solid var(--line); }
  .keep { color:var(--keep); border-color:var(--keep); } .reject { color:var(--reject); border-color:var(--reject); }
  .candidate { color:var(--cand); border-color:var(--cand); }
  .bl-keep { border-left-color:var(--keep);} .bl-reject{ border-left-color:var(--reject);} .bl-candidate{ border-left-color:var(--cand);}
  .score { font-weight:700; min-width:42px; text-align:right; }
  .delta-up { color:var(--keep);} .delta-dn{ color:var(--reject);}
  svg { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
  .seedrow { display:flex; gap:8px; align-items:center; margin:3px 0; }
  .seedrow .bar { height:10px; background:var(--accent); border-radius:3px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>BLUEPRINT XPU · LINEAGE</h1>
  <span class="sub">parent → child evolution · generation score trend · <span id="src"></span></span>
</header>
<div class="wrap">
  <div class="cards" id="cards"></div>
  <h2>Generation score trend</h2>
  <div id="trend"></div>
  <h2>By seed</h2>
  <div id="byseed"></div>
  <h2>Lineage tree</h2>
  <div id="tree"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function getJSON(path){ const r = await fetch(path); if(!r.ok) throw new Error(path+' '+r.status); return r.json(); }

function card(n,l){ return `<div class="card"><div class="n">${esc(n)}</div><div class="l">${esc(l)}</div></div>`; }

function buildTree(records){
  const byId = {}; records.forEach(r=>byId[r.id]=Object.assign({children:[]}, r));
  const roots = [];
  records.forEach(r=>{ const p = r.parent_id && byId[r.parent_id]; if(p) byId[p.id].children.push(byId[r.id]); else roots.push(byId[r.id]); });
  return roots;
}

function renderNode(n, depth){
  const dec = n.decision||'candidate';
  const sc = (n.score==null)?'—':n.score;
  let delta='';
  if(typeof n.score_delta==='number'){ const u=n.score_delta>=0; delta=`<span class="${u?'delta-up':'delta-dn'}">${u?'▲':'▼'}${Math.abs(n.score_delta).toFixed(1)}</span>`; }
  let html = `<div class="node bl-${dec}" style="margin-left:${depth*22}px">
      <span class="title">${esc(n.title)} <span class="meta">· ${esc(n.seed)} · ${esc((n.ts||'').slice(0,16))}</span></span>
      ${delta}
      <span class="pill ${dec}">${esc(dec)}</span>
      <span class="score">${esc(sc)}</span></div>`;
  (n.children||[]).sort((a,b)=>(a.ts||'').localeCompare(b.ts||'')).forEach(c=>{ html += renderNode(c, depth+1); });
  return html;
}

function renderTrend(records){
  // 세대(루트로부터 깊이)별 평균 점수
  const byId={}; records.forEach(r=>byId[r.id]=r);
  function gen(r,g=0){ const p=r.parent_id&&byId[r.parent_id]; return (p&&g<64)?gen(p,g+1)+1:0; }
  const buckets={};
  records.forEach(r=>{ if(r.score==null) return; const g=gen(r); (buckets[g]=buckets[g]||[]).push(r.score); });
  const gens=Object.keys(buckets).map(Number).sort((a,b)=>a-b);
  if(!gens.length) return '<div class="empty">No scored records yet.</div>';
  const W=640,H=180,pad=30; const avg=g=>buckets[g].reduce((a,b)=>a+b,0)/buckets[g].length;
  const xs=g=> gens.length>1 ? pad + (W-2*pad)*(g/(Math.max(...gens)||1)) : W/2;
  const ys=v=> H-pad - (H-2*pad)*(v/100);
  let pts=gens.map(g=>`${xs(g).toFixed(0)},${ys(avg(g)).toFixed(0)}`).join(' ');
  let dots=gens.map(g=>`<circle cx="${xs(g)}" cy="${ys(avg(g))}" r="4" fill="#4ea1ff"></circle>
      <text x="${xs(g)}" y="${ys(avg(g))-8}" fill="#dde6f5" font-size="11" text-anchor="middle">${avg(g).toFixed(0)}</text>
      <text x="${xs(g)}" y="${H-10}" fill="#8aa0c0" font-size="11" text-anchor="middle">gen ${g}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
      <polyline points="${pts}" fill="none" stroke="#4ea1ff" stroke-width="2"></polyline>${dots}</svg>`;
}

function renderBySeed(stats){
  const bs = stats.by_seed||{}; const keys=Object.keys(bs); if(!keys.length) return '<div class="empty">—</div>';
  const max=Math.max(...keys.map(k=>bs[k]),1);
  return keys.sort((a,b)=>bs[b]-bs[a]).map(k=>`<div class="seedrow">
      <span style="width:170px">${esc(k)}</span>
      <span class="bar" style="width:${(bs[k]/max*260)|0}px"></span>
      <span class="meta">${bs[k]}</span></div>`).join('');
}

async function main(){
  let stats={}, recs={records:[]};
  try { [stats, recs] = await Promise.all([getJSON('/curation-stats'), getJSON('/curation-records')]); }
  catch(e){ $('src').textContent='server offline'; }
  const records = recs.records||[];
  $('src').textContent = `${records.length} records · ${stats.generations||0} generations`;
  $('cards').innerHTML = card(stats.total||0,'total') + card(stats.kept||0,'kept')
      + card(stats.rejected||0,'rejected') + card(stats.generations||0,'generations');
  if(!records.length){
    $('tree').innerHTML = $('trend').innerHTML = `<div class="empty">No curation records yet.<br>
      Generate candidates, press <b>keep / reject</b> in the workbench — rows persist via
      <code>/persist-curation</code> and appear here as a parent→child tree with a per-generation score trend.</div>`;
    $('byseed').innerHTML='';
    return;
  }
  $('trend').innerHTML = renderTrend(records);
  $('byseed').innerHTML = renderBySeed(stats);
  $('tree').innerHTML = buildTree(records).sort((a,b)=>(a.ts||'').localeCompare(b.ts||'')).map(r=>renderNode(r,0)).join('');
}
main();
</script>
</body>
</html>

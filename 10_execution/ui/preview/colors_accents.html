<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="bp" style="margin:0;padding:24px;width:700px;">
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;">
    <div><div style="height:64px;background:#9fd3ff;"></div><div class="chip" style="margin-top:6px;color:#9fd3ff">LOX</div><div class="caption">#9fd3ff</div></div>
    <div><div style="height:64px;background:#ffd39f;"></div><div class="chip" style="margin-top:6px;color:#ffd39f">LH2 / RP‑1</div><div class="caption">#ffd39f</div></div>
    <div><div style="height:64px;background:#89ffa8;"></div><div class="chip" style="margin-top:6px;color:#89ffa8">INTERTANK</div><div class="caption">#89ffa8</div></div>
    <div><div style="height:64px;background:#b6ffb6;"></div><div class="chip" style="margin-top:6px;color:#b6ffb6">INTERTANK‑2</div><div class="caption">#b6ffb6</div></div>
    <div><div style="height:64px;background:#caa9ff;"></div><div class="chip" style="margin-top:6px;color:#caa9ff">HALO / IU</div><div class="caption">#caa9ff</div></div>
    <div><div style="height:64px;background:#1f6aa8;border:1px solid #9cd0ff;"></div><div class="chip" style="margin-top:6px;color:#9cd0ff">ENGINE</div><div class="caption">#1f6aa8</div></div>
  </div>
  <div class="caption" style="margin-top:14px;">Use navy canvas + white structural line + ONE pastel accent per element. Stages lane by color.</div>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="bp" style="margin:0;padding:24px;width:700px;">
  <div class="chip label-lox" style="margin-bottom:10px;">CHIPS · STATUS · LANE LABELS</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <span class="chip label-lox">LOX</span>
    <span class="chip label-lh2">LH2</span>
    <span class="chip label-intertank">INTERTANK</span>
    <span class="chip label-halo">INSTRUMENT UNIT</span>
    <span class="chip" style="color:#9cd0ff;">S‑IC — F‑1 ×5</span>
    <span class="chip" style="color:#ff9fb5;">RISK · 3</span>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
    <span class="card" style="padding:4px 10px;"><span class="mono" style="color:#89ffa8;font-size:11px;">✓ PASS</span></span>
    <span class="card" style="padding:4px 10px;"><span class="mono" style="color:#ffd39f;font-size:11px;">! WARN</span></span>
    <span class="card" style="padding:4px 10px;"><span class="mono" style="color:#ff9fb5;font-size:11px;">✗ FAIL</span></span>
    <span class="card" style="padding:4px 10px;"><span class="mono" style="color:#9fd3ff;font-size:11px;">device=NPU</span></span>
    <span class="card" style="padding:4px 10px;"><span class="mono" style="color:#caa9ff;font-size:11px;">dtype=bf16</span></span>
  </div>
</body></html>
